body:
  text: 墨莊漫録卷第十崔伯易書有金華神記舊編入聖宋文選後集中今無此集近讀曲轅集復見之因載之以廣所聞云汴人有吳生者世為冨人而生以娶宗室女得官於三班嘉祐中罷任髙郵乃寓其家於治所而獨與兄子賫金繒𢾗百千南適錢唐道出晉陵艤舟於望亭堰下是夜月明風髙生乃危坐舷上頓然殊不有寢意久之忽有緋衣𬒳髮持兩炬自竹林間出者後引一女子冠玉鳳冠曵蛟綃文錦之衣顔色甚麗而年十八九耳生見而驚俄頃至岸側回叱緋衣者曰可去矣無久留也於是滅炬泣拜而去女子即登舟面生坐謂生曰見向來緋衣者乎此君之夙仇也而索君且𢾗十年矣乃今方得之第以我故得免不然今夕君當死其手生聞益驚駭不自安女子笑曰君怯耶即以金縷衣置肩上生稍安乃問曰若神與其鬼耶女子曰我非人亦非鬼蓋金華神也過去生中嘗與君為姻好竊知將有所下濟故相救耳今事已我亦當去君矣遂去不復返顧生以目送至竹林中不見將掩門忽覩女子坐其後生大驚女子笑曰知君怯故相戲安有𢾗十年睽索一得解后而遽往者耶遂相與入舟中取酒共飲其言諧謔悉如常人然生誡曰母髙聲恐兄子知之女子曰我言特君可聞他人雖厲聲亦不能聞也生益疑竊自懼曰此果神也固無所憚倘鬼則必有所畏矣因出劍鏡二物示之女子曰此劍鏡耳精與鬼則畏夫劒陽物而有威者也鬼隂物而無形者也以無形而遇有威是謂銷鑠其妖而不能勝故鬼畏劒也鏡亦陽明而至明者也精亦隂物而為變者也以偽而當至明是故暴著其形而不能逃故精畏鏡也昔抱朴子嘗言其略而我知之且久矣乃𣣔以相畏乎生懼起謝曰誠無他意至明起謂生曰舟楫已有曉色勢不能久留當與君子決矣君後十年遊華山日多置朱粉於路隅梧桐下楊之雖然君今不可終此行恐復不濟也因索筆題詩一章曰羅襪香消九九秋淚痕空對月明流塵埃不見金華路滿目西風總是愁書已輒復流涕歔欷而去明日思其言遂回棹不復南去後以其事語人人或詰其兄子果亦不知也曲轅先生又嘗作傳記陳明逺再生事云明逺陳氏子也名公闢興化軍人嘗舉進士皇祐三年春過泗州遊普照王寺時群僧會齋于南院明逺繞浮啚自西廂趣大殿兩廡人甚譁獨老僧弊衣庭下倚樹讀青𥿄書其文光彩射百許步明逺遽往揖之僧小舉手就視其書則金字金剛經繫以梁朝傳大士之頌者僧細諷自若明逺從後聽之疑其光徙日所記久僧回顧笑謂明逺曰子亦樂此耶明逺對之稍恭僧讀竟遂以經授明逺曰江南李氏所施觀子之貌且當持此明逺喜受之以歸明且取映日則無復光彩一讀之徑藏書籠中明年從父官海陵忽得疾不可治以死三日家人將大斂覺其體復溫移刻稍蘇又食頃乃能言其族驚明逺自言方疾革時見四卒深目虎喙持文書有大印字莫可辨共執明逺桎兩手驅西北行其勢甚暴所經依約皆廣野塵埃射人不可輒視漸逼大河府署嚴密門外坐卒𢾗十悉持挺內有考掠聲三卒先入一守明逺於大門外如俟命者須臾坐卒盡起擎跪明逺回視一僧乘虛而行過門見明逺植杖而立意若哀憫明逺不覺手桎盡解熟視其狀即泗州嘗遇授經者也因拜祈之僧顧卒取文書略視曰府君知耶才𣣔入門而聞府中呼應甚遽有二人服紫服朱趨出迎之其侍衛之盛若世之逹官二人禮僧極恭僧語二人語愈喜旁睨明逺若夙有罪者僧呼明逺前使自懴悔俄二人詔吏聽還二人亦謝僧去復有吏馳出呼明逺則明逺季父釴釴大學進士有聞亡已三年矣既見訪明逺家事云我當録冤簿三年才二年爾非佳職也爾歸持尊勝七俱胝呪祈以免我又有故服藏某處幸焚之遺我寄聲親戚如平生復告明逺言世之人冤慎勿復復之後勢如索綯為若有逮百千生不能解者故吾此局置吏最多而簿書期會常若不及神君聖靈尤深厭此言未竟若有呼之者因疾馳去僧引明逺遊旁兩大廡下見繫囚不啻𢾗百亦有禽獸諸蟲悉能人言與囚對辨群吏見僧悉拜有械囚縶以大鐵繅左右文書沒其首口嘗囁嚅出血卒守之若使自讞輕重不當又鞭之其餘幾壞明逺竊視之乃其表舅鄭生生為閩吏喜以法自名死且十年餘見明逺泣下頻以手向僧且目明逺僧笑出以杖指之鎖械俱墮然莫敢起而口囁嚅出血也則未已也又見坐沙門五六人前列敗壞飲食𢾗十甕氣色殊惡僧曰此嘗棄世中供飬且重使食耳僧亦不甚念復引明逺出前大河上虹橋蜿蜒望彼岸城府樓觀煙霧出其上明逺請往觀焉僧不許曰子過此無復歸矣亟隨僧趣東南井閭人物差類人世但天氣垂慘似𣣔雨時而途中所遇往往皆昔嘗所見危冠大馬出處前後吏卒替更而迭趨人指以為名勢挾侈快意不屈之士皆超趄狼狽狀若為物所迫甚者咨嗟涕淚悔怏自擲意求有以亡匿而不可得俄及前所過廣野遇溪水漲甚始思來時則無有也明逺憂不能渡僧乃執杖端以末授明逺而導之始涉亦甚淺中流明逺失據將溺因驚呼而蘇明逺之復生也桎縳之迹隱然在臂家人持葷飲餉之雖𢾗十年輒掩鼻急遣去瞻視間僧已在室中香氣異常親族齋戒祈見者必暫覩裙衲杖履而已僧自是日以先授經義教明逺對其情品説一切世間所有之法即心是佛煩惱塵勞究竟虛妄其音靚圓若霜鍾在庭户外之人一歷耳歡然自信終身不能忘其聲每謂明逺曰吾即詣某寺齋既去食頃復還又言某氏齋私飲某僧酒猶不齋耳他時為之未免有罪時多疑以僧伽大師者明逺請焉僧曰僧伽吾師也幾一月明逺軀體復壯僧告去曰後十四年吾傳子於祖山明逺問祖山曰廬阜遂去陳氏後求釴故衣果得於其處緇徒呪而火之明逺母素好釋氏悉疏其齋雖逺𢾗百里必使人驗之明逺并告以言狀具言有是爾飲僧家聞之終身不飲酒然明逺向所懴之罪今反不復能記豈昔偶萌之於心不自引悔而神道已録以為非耶抑他生所為不復自省而幽冥記人功過誅賞有時而宴安人之苟為得以自將則跬步之間不可以為恐懼耶至和三年八月明逺歸莆田以故人訪豫且出所授經具道其事豫𣣔記之豫固已怪其人爽辨謙畏不類向時其志真若有所得然未睱從其請也今年其兄公輔調官京師特過豫復為言豫與公輔遊十五年矣今亦稱其弟所為如豫嘗所怪者則明逺由是而有聞倘求之益勤修之益明守其話言不為冨貴貧賤之所遷則其所至也豈易量哉因奮筆直載始末明逺所述蓋多其間有與佛經外史若世人已傳之事略相同者不復更録明逺父名鑄今為尚書都官郎中通判廣州曲轅子記豫觀崔公所記抑亦異矣彼鄭生者以法自名而獲罪若是吁可畏哉三尺者輕重不可踰而法家流鮮恩寡怒多論刻苟容於心已不逃於隂譴矣若能平反明慎天必以善應之臨政者於問詳讞寧可忽諸襄陽天仙寺在漢江之東津去城十里許正殿大壁畫大悲千手眼菩薩像世傳唐武德初寺尼作殿求良工啚繪有夫婦携一女子應命期尼以扃殿門七日乃開至弟六日尼頗疑之乃闢户􅞔其無人有二白鴿翻然飛去視壁間聖像已成相好竒特非世工所能獨其下有二長臂結印手未足乃二鴿飛去之應也郡有畫工武生者獨能模傳其本大觀初有梁寬大夫寓居寺中心無信向頗輕慢之武生云菩薩之面正長一尺寬以為誕必𣣔自度之乃升梯𣣔以以尺加菩薩面忽梁間有聲如雷寬震悸而墮損其左手僧教寬悔過自懴後歲餘方如舊兹禦侮於像法事者怒其慢瀆耳章丞相申公子厚以能書自負性喜揮翰雖在政府睱時日書𢾗幅豫嘗見雜書一卷凡九事乃抄之因載於此一云東漢魏晉皆以八分題宫殿榜蔡雍作飛白是八分字耳是以古云飛白是八分之輕者衛恆作散隸是用飛白筆作隸字也故又云散隸終是飛白金石刻東漢魏晉皆用八分唯小小碑刻之或蔭刻隸字也許昌群臣勸進與授禪坻碑皆八分之妙者近世有荒唐士人妄謂為隸書而不知隸書乃今正書耳世俗亦往往從而謂之隸書且相尚學焉不知彼將以何等為古八分又將以今正書為何等耶嗚呼目前淺近之事略涉古者便自可知何至昏蒙妄惑不可指示之如此耶顧𣣔與其論書學之本與用筆作字之微妙旨逺而意深者安可得哉蓋不趐於以鐘鼓樂鷃周公之服𬒳猿狙也事之類此者多矣二云書者六藝之一古人列之於學以相傳授則學者始習之已盡詳知其規矩法度與所以為書之意矣精而熟之不妙且神何待耶戰國秦漢以來其學猶未絶也故學者尚有前世之風烈至於名家乃多父子祖孫豈不由師傳授習之有素乎崔張鍾杜衛索王庾諸人是也會之於繇真父子也逸少子敬殆將鴈行矣三云吾頃見蘇浩然兄弟言其曽祖參政所收古書盡付幼子掌之既薨諸兄弟以其素所愛不復取悉以卑之所與共者十一二而已其後參政之幼子官洪州卒官因不歸其子幼弱已而遂絶書畫皆散失不復存今諸房所共有者是十一二之粗者耳然足以多甲士族也使具在者不知其當何如也必有魏晉名迹矣惜哉四云宣州筆有名耳未必佳也凡筆擇毫淨捲心圓便是工夫鋒之長短尖齊在臨時耳處處皆能要自指教令精意而已無他竒也五云張侍禁筆甚佳一管小字筆寫二十萬字尚寫字如此是少比也盧𬋩使十倍不及是其手生也凡習熟之與生踈豈不相逺哉學書須先曉規矩法度然後精苦勤功自入能品能之至極心悟妙理心手相應出乎規矩法度之外無所適而非妙者妙之極也由妙入神無復蹤迹直如造化之生成神之至也然先曉規矩法度加以精勤乃至於能能之不已至於心悟而自得乃造於妙由妙之極遂至於神要之不可無師授與精勤耳凡用筆日益習熟日有所悟悟之益深心手日益神妙矣力在手中而不在手中必須用力而不得用力應須在意而不得在意此可以神遇而不可以言傳也學佛者悟吾此語可以撤手到家矣妙哉妙哉真至理也六云吾每論學書當作意使前無古人凌厲鍾王直出其上始可即自立分若直爾低頭就其規矩之內不免為之奴矣縱復脫灑至妙猶當在子孫之列耳不能堆行也况於抗行乎此非苟為大言乃至妙之理也禪家有云見過於師方堪傳授見與師齊減師半德悟此語者乃能曉吾言矣夫於師法不傳字學廢絶𢾗百千年之後𣣔興起之以繼古人之迹非至強神悟不能至也七云學書須先極取骨力骨力充盈有羡乃漸變化收藏至於潛伏不露始為精妙若直爾暴露便是桞公權之比張筋弩骨如角抵武夫不足道也八云楊小漕言其兄官江夏有一道人自稱吕元圭時時延之學院中二姪幼小頗勤待之或言事往往有驗一日忽再三言云惡人將至矣須急避之時衆人亦不甚留之暫耳徑渡江去人但訝其所謂惡人者何也是夜忽然提刑喻君涉至州州郡都不知之乃是乘便風一日行六七程徑至岸下耳喻至則遣人訪求吕不見蹤迹喻乃素自密問得與一人往還至熟呼之至即岑文秀也詰其所得云無有喻以聲色且將笞之岑終言無喻不信遣熟事吏往搜其家乃於神堂壁中得所與岑長歌一首是言內事岑乃云吕實付此詩云汝今未曉異日當為子詳説之喻乃云吕即吕先生也其名元圭是解拆先生二字耳亦不知其定何如也衆乃悟所謂惡人者指喻耳是恐其迫逼求之也九云吾今日取君謨墨迹觀之益見其學之精勤但未得微意爾亦少骨力所以骨弱而筆嫩也使其心自得者何謝唐人李建中學書宗王法亦非不精熟然其俗氣特甚蓋其初出於學張從申而巳君謨少年時乃師周越中始知其非而變之所以恨弱然已不意其能變之至此也吾少年時便學書至今必有所至所以不學者常立意若未見鍾王妙迹終不妄學故不學耳比見之則已遲晚故學遲恐今但手中少力耳若手中不乏力不甚衰疲更二十年決至熟妙處此須常精勤乃可若不極精勤亦不能至也凡學者可以不自勉乎元祐六年十一月五日京西齋東􅈦大滌翁書時小至後一日也重和戊戍歲平江府盤門外大和宫相近耕夫𢾗人穴一冢初入隧道甚深其中極寬如處室然復有𢾗門皆扄鐍不可開耕者得古器物及堆足鐙之類以為銅也𣣔貨之熟視之乃金因紛爭至官時應安道逄原為郡首盡令追索元物到官乃遣郡官𢾗人往閉其穴觀者如覩其中四壁皆繪畫嬪御之屬丹青如新畫手殊竒妙有一祕色香爐其中灰炭尚存焉諸卒爭取破之冢之頂皆畫天文玄象此特𥘉入之室未見棺柩意其在重室內也又得𢾗器而出乃掩之後考啚經云吳孫破虜堅之墓也然考之吳志堅薨葬曲阿未詳此果何人也宋次道春明退朝録云王侍郎子融言天聖中歸其鄉里青州時滕給事涉為守盛冬濃霜屋瓦皆成百花之狀以𥿄摹之其家尚餘𢾗幅政和丙申歲先君為真州教官時朝廷頒雅樂下方州儀真學中建大樂庫屋積新瓦于地一夕霜後皆成花紋極有竒巧者折枝桃梨牡丹海棠寒蘆水藻種種可玩如善畫者所作詹度安世為太守諷學中啚繪以瑞為言𣣔諛于朝先君不從乃巳俞紫芝秀老荆公客也能詩公極善之嘗有詠草一篇云滿目卒芊野渡頭不知若箇解忘憂細隨緑水侵籬館逺帶斜暘過別洲金谷園中荒映月石頭城下碧連秋行人悵望王孫去買斷金叉十二愁為人所稱賞世畫骨觀作美人而頭顱白骨者饒德操題其上云白骨纎纎巧畫眉髑髏楚楚破羅衣手持紈扇空相對笑殺傍人自不知元祐以後宗室以詞章知名者如士暕士宇叔益令畤篪之皆有篇什聞於時然近屬環衛中能翰墨尤多如嗣濮王仲御喜作長短句嘗見十許篇於王之孫不皆可􅓻作者不能盡載如上元扈蹕作瑶臺第一層云嶰𬋩聲催人報道常娥步月來鳳燈鸞炬寒輕簾箔光泛樓臺萬年春未老更帝鄉日月蓬萊從仙杖看星河銀界錦繡天街歡陪千官萬騎九霄人在五雲堆紫𫀆光裏星毬宛轉花影徘徊未央宫漏永散異香龍闕崔嵬翠輿回奏仙歌韶吹寶殿樽罍每使人歌此曲則太平之象恍然在夢寐間也楊緯字文叔濟州任城人以明經中第纍任州縣皆有能稱後為廣州觀察推官元祐二年正月以疾卒於官道逺喪未還鄉其姪珣一日晡時恍然如醉夢中見其叔騎從甚都來其家珣亟拜之既坐言語如平時珣問叔今代滿耶曰我今為忠孝節義司判官矣所主人間忠臣孝子義夫節婦事也其職髙甚而間逸故來別汝也人但見珣若與人言語時且拜也至夜珣乃省久而方言曰適廣州叔來其言如是衆方悲駭知緯死矣洵曰叔臨去有紫衣吏曰府君好范山下石臺可即臺立祠以祀之後呼工為像一塑遂肖其容狀州縣以緯别無功績不敢聞於朝而鄉人歲時但即其墓而祭之爾宋宣獻公綬宫梅詩云閬苑春來非世境層城花早出宫欄用梁簡文帝梅花賦曰層城之宫靈苑之中梅花特早偏識春之語也山谷在荆州時鄰居一女子間靜妍美綽有態度年方笄也山谷殊嘆息之其家蓋閭閻小民也未幾嫁同里而夫亦庸俗貧下非其偶也山谷因和荆南太守馬瑊中氷玉水仙花詩有云淤泥解作白蓮藕糞壤能開黃玉花可惜國香天不𬋩隨緣流落小民家蓋有感而作後𢾗年此女生二子其夫鬻於郡人田氏家憔悴頓挫無復故態然猶有餘妍乃以國香名之濟州士人鄧御夫字從義隱居不仕嘗作農曆一百二十卷言耕織芻牧種蒔耘穫飬生備荒之事較之齊民要術尤為詳備濟守王子韶嘗上其書於朝今未見傳於世嘗訪於藏書之家或有見者王禹稱元之久為從官而未嘗知舉有詩云三入承明不知舉看人門下放門生王岐公在翰苑凡十七八年三為主文常在試幃戲書考簿後云黃州才藻舊詞臣幾嘆門生未有人自笑晚遊金馬客曽來三鎖貢闈春龍眠李亮工家藏周昉畫美人琴阮啚殊有宫禁冨貴氣旁有竹馬小兒𣣔折檻前桞者亮工官長沙時黃魯直謫冝州過而見之歎愛彌日大書一詩於黃素上云周昉冨貴女衣飾舊新兼髻重髮根急薄粧無意添琴阮相與娛聽絃不停手敷膄竹馬郎跨馬要折桞其畫後歸禁中而詩不見於集也汪彥章四六之工自少年即妙崇寧三年霍端友榜瓊林宴謝頒氷彥章作謝表有云使嗽潤而吮清得除煩而滌穢順時致卷俯同豳雅之春開受命知榮固異衛人之夕飲又云深防履薄之危不昧至堅之漸子孫傳誦記御林金碗之香生死不忘動宫井玉壼之潔韓子蒼與曽公衮吳思道戲作冷語子蒼云石崖蔽天雪塞空萬仞隂壑號悲風纎絺不禦當玄冬霜寒墜落氷溪中斫氷直侵河泊宫未若冷語清心胸公衮云萬山雲雪隂霾空千林霿􅟶水搖風凍河徹底連三冬嘉平曉獵崤函中十二律吕相與宫安得此候疏煩胸思道云御栁隂森蔽煙空尚記玉宇來清風月旁九霄凛如冬露下紫薇花影中長哦白雪明光宫衆泉湧此萬卷胸此格起於晉人之危語也湯泉有處甚多多大熱而氣烈乃疏黃湯也唯利州褒禪山相近地名平痾鎮湯泉溫溫可探而不作臭氣云是朱砂湯也人傳昔有兩美人來浴既去異香郁郁纍日不散李端叔過浴池上作詩云華清賜浴記當年偶託荒山結勝緣未必興衰異今昔曽經美女缷金鈿眺説之以道作感事詩云干戈難作墻東客疾病猶存硯北身用避世墻東王君公事而硯北身乃漢上題襟集假成式書云杯宴之餘常居硯北此又云長鐵硯北天機素少又云筆下詞友硯北諸生蓋言几案面南人坐硯之北也豫少年在襄陽曽見絃伯容云唐人能造竒語者無若劉夢得作連州廳壁記云環峯密林激清儲隂海風驅溫交戰不勝觸石轉柯化為涼颸城壓赭岡踞髙負陽土伯噓濕抵堅而散襲山逗谷化為鮮雲蓋前人所未道者不獨此爾其他刻峭清麗者不可槩舉學為文者不可不成誦也俞子容先生家藏書晉昌唐寅借校一一刪過其間魯魚甚多百不能輔其一二然裨益見聞亦為不少至若𣣔人熟連州碑所未解也墨莊漫録卷第十終
