body:
  text: 禪官小說雖曰無關治亂然所書者必勸善懲惡之事亦不為無𥙷於世也唐人所著小說家流不啻𢾗百家後史官採托者甚衆然復有一種皆神怪茫昧肆為詭誕如玄怪録河東記會昌解頥録纂異之類蓋才士寓言以逞辭皆亡是公烏有先生之比無足取焉近世諸公所記可觀而傳者如楊文公談苑歐文忠公歸田録沈存中筆談蘇耆開談録傅獻簡公佳話張藝叟畫墁録王得臣麈史王定國甲申聞見隨手三録孫君孚談圃吕氏家孰紀陳無已談叢蘇子由龍川志葉少藴石林詩話避暑録魏道輔東軒筆録碧雲騢詩話王性之四六録話趙德麟侯鯖録章氏延滿録李方叔師友談記錢申仲照堂詩話王原叔談録孫少魏東皋新録曽子固雜志宋次道春明退朝録文瑩湘山野録玉壺清話范蜀公東齊舊事張師王倦游録王闢之澠水燕談畢仲詢幕府燕間録吳淑祕閣間談惠洪覺範冷齊夜話石門林間録王立之詩話吳處厚青箱雜記劉貢父詩話潘淳詩話𥙷遺張文潜明道雜志胡先生賢惠録孝行録何子楚春渚紀聞蔡約之西清詩話不可槩舉但著述者於褒貶去取或有未公皆出於好惡之不同耳故豫抄此集如寓言寄意者皆不敢載聞之審傳之的方録焉非敢貽諸久逺聊資暇時為引睡之具耳覽者或有所不然願為我筆削之淮海張孝基子賢跋晉昌唐寅勘校畢
