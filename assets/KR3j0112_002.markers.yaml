  - {type: variant, offset: 2401, length: 0, content: '', WYG: 方亞夫幾仲興化軍人五至省闈皆不捷嘗夢廷試而無試巻甚惡之晚以八行舉詔免廷試賈安宅榜唱名排入第一甲以通直郎終崇寧中初興書畫學米芾元章方為太常博士奉詔以黄庭小楷作千文以獻繼以所藏法書名畫來上賜白金十八笏是時禁中萃前代筆蹟號宣和御覽宸翰序之詔丞相蔡京跋尾芾亦被㫖預觀已而出知無為軍復召為書學博士便殿賜對詢逮移晷因上其子友仁楚山清曉圖既退賜御書畫扇各二遂除春官外郎人以為榮十八笏葢戲之耳宣和癸卯平江朱勔採石太湖黿山得一石長四丈有竒廣得其半玲瓏嵌空竅宂千百非雕刻所能成也并郡宅後池光亭臺上白公檜世傳白樂天手植也創造二大舟費八千緡以獻時常潤間河渠淺􅉣重載不前乃先繪圖以聞宸翰賜石名神運昭功敷慶萬年之峰時人莫不目擊余時初至吳中亦獲一觀是秋方至京師置於艮嶽田衍魏泰居襄陽郡人畏其吻謡曰襄陽二害田衍魏泰未幾李廌方叔亦來郡居襄人憎之曰近日多磨又添一廌}
