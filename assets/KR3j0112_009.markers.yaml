  - {type: variant, offset: 3076, length: 0, content: '', WYG: 託者同也熈寧十年京師春旱上心焦勞於後苑瑶津亭建道場祈禱上精誠甚切一夕夢一僧形容甚異於空中吐雲霧以興雨及覺雨遂大注上大悦求其像於佛閤中乃羅漢中第十尊者也元絳厚之時為叅政作喜雨詩王禹玉和其韻云紫殿宵稱感聖憂玉毫曾降梵王州慈深三界雲常聚法徧諸天雨自流作弼為霖孤宿望神僧吐霧應精求云云人多稱之崔伯易熈寜二年為國子監直講嘗著熈寜稽古一法百利論五卷逾萬言槩以乆任為要上之召對延和稱㫖自此遂擢用徧歴清要矣予嘗求是書於其家今已}
