  - {type: variant, offset: 3894, length: 1, content: 䏻, WYG: 能}
  - {type: variant, offset: 3910, length: 535, content: 挾也西河女子杖八十老人者老人是其子因不修真以致衰老怒而杖之熈寜十年京師春旱上心焦劳於後苑瑶津亭建道塲祈禱上精誠甚切一夕夣一僧形容甚異於空中吐雲霧以興雨及覺雨遂大注上大恱求其像於佛閣下乃羅漢中第十尊者也元絳厚之時為叅政作喜雨詩王禹玉和其韻云紫殿霄祈感聖憂玉毫曽降𣑽王州慈深三界雲常聚法徧諸天雨自流作弻為霖孤宿望神僧吐霧應精求云云時䑓省舘閣悉和之崔伯易云陽元彌春帝為愁比丘龍起睠神州慈雲徧覆諸天潤惠澤相和萬國流云云人多稱之崔伯陽熈寧二年為國子監直講嘗著熈寧稽古一法百利論五卷逾萬言盖以乆任為要上之召對延和稱㫖自此遂擢用徧歴清要矣予嘗求是書於其家今亦亡矣惜乎不見於世以此知古人著述亡逸不傳者多矣同時又有臨川吴孝宗子經嘗著三書一曰法語二曰先志三曰巷議舊嘗傳於其姪道宗夣協亦亡於兵火子經予母之從叔也今聞其從孫家尚有本當復傳之唐庚子西謫惠州時自醸酒二種其醇和者名養生主其稍劲烈者名齊物論子西詩多新意不沿襲前人語如湖上云佳月明作哲好風聖之清獨游云烏攫春祠敏鳶窺野焼癡醉眠云山静似太古日長如小年又芙蓉溪歌云人間八月溪秋霜嚴芙蓉溪上春酣酣二南變後魯叟筆七國戦䖏鄒軻談人間二月春光好溪上芙蓉迹如掃周家盛䖏伯夷枯漢室隆時賈生老小兒造化誰䏻窮㡬逥枯枿還芳叢只因人老不復少有酒且發衰顔紅比興殊新竒, WYG: 袠}
