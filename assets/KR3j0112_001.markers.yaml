  - {type: variant, offset: 2770, length: 351, content: 方亞夫幾仲興化人乙軍五百至省闈皆不捷嘗夣廷試而無試卷甚惡之晚以八行舉詔免廷試賈安宅榜唱名排入第一甲以通直郎終崇寧中𥘉興書畫學米芾元章方為太常博士奉詔以黄庭小楷作千文以獻継以所藏法書名畫来上賜白金十八笏是時禁中萃前代筆蹟號宣和御覧宸翰序之詔丞相蔡京跋尾芾亦𬒳㫖預觀已而出知無為軍復召為書學博士便殿賜對詢移晷因上其子友仁楚山清暁圖旣退賜御書畫扇各二遂除春官外郎人以為荣十八笏盖戯之耳宣和癸卯平江朱勔採石太湖黿山得一石長四丈有竒廣得其半玲瓏嵌空竅穴百千非雕刻所䏻成也此則即并郡宅後云云首簡因上之道君曰斯物寧人臣家所蓄縝以元𣣔獻表言之止得賜幣焉此則亦脫首簡毗陵一士人姓常為蠏詩云水清詎免雙螯黒湯老難逃一背紅盖譏朱勔父子田衍魏泰居㐮陽郡人畏其吻謡曰㐮陽二害田衍魏泰未幾李豸方叔亦來郡居㐮陽人憎之曰近日多磨又添一豸, WYG: ''}
