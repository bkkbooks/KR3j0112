body:
  text: 墨荘漫録卷第三明州士人陳生失其名不知何年間赴舉京師家貧治行後時乃於定海求附大賈之舟𣣔航海至通州而西焉時同行十餘舟一日正在大洋忽遇暴風巨浪如山舟失措俄視前後舟覆溺相継也獨相寄之舟人力徤捷張蓬随風而去𣣔塟魚腹者屡矣凢東行𢾗日風方止恍然迷津不知涯涘盖非常日所經行也俄聞鐘声舂容指顧之際見山川甚迩乃急趋焉果得浦溆遂維矴近岸陳生驚悸稍定乃登岸前有徑路因跬歩而前左右皆佳木薈蔚珎禽鳴弄行十里許見一精舎金碧明煥榜曰天宫之院遂瞻禮而入長廊幽􅞔寂無諠譁堂上一老人㩀牀而坐厖眉鶴髮神觀清􅋯方若講說環侍左右皆白𫀆烏巾約三百餘人見客皆驚問其行止告以飄風之事惻然憫之授舘于一室懸錦帳乃饌客焉噐皿皆金玉飲食精㓗𬞞茹皆藥苗極甘美而不識名老人自言我軰皆中原人自唐末巢㓂之亂避地至此不知今幾甲子也中原天子今誰氏尚都長安否陳生為言自李唐之後更五代凢五十餘年天下太定今皇帝趙氏國號宋都于汴海内承平兵革不用如唐虞之世也老人首肎嗟嘆之又命二弟子相與游䖏因問二人此何所也老人謂誰曰我軰號處士非神仙皆人也老人唐丞相裴休也弟子凢三等毎等一百人皆授學於先生者復引登山觀覧﨑嶇而上至於峻極有一亭榜曰笑秦意以秦始皇遣徐福求三山神藥為可笑也二人遥指一峯突兀干霄峯頂積雪皓白曰此蓬萊島也山脚有蛟龍蟠繞故異物畏之莫可干犯也陳生留彼乆之一日西望浩然有歸思口未言也老人者㣲笑曰尔乃懐家耶尔以夙契得踐此地豈易得也而乃俗縁未盡此別無復再來矣然尔旣得至此吾當助尔舟楫一至蓬萊登覧勝境而後去遂使具舟倏已至山下時夜已暝暁見日輪晃曜傍山而出波聲先騰沸洶湧澎湃聲若雷霆赤光勃欝洞貫太虗頃之天明見重楼複閣翬飛雲外迨非人力之所為但不見有人居之惟瑞霧葱蘢而已同來䖏士云近世嘗有人跡至此群仙厭之故超然逺引鴻𪷟之外矣唯吕洞賔一歳两来臥聽松風耳乃復至老人所陳生求歸甚力老人曰當送尔歸山中生人葠甚太多如人形陳生𣣔乞𢾗本老人曰此物為鬼神所護惜持歸經渉海洋恐貽禍也山中良金美玉皆至寳也任尔取之老人再三敎告皆修心養性為善逺悪之事仍云世人慎勿臥而語言為害甚大又云楞嚴經乃諸佛心地之本當循習之陳生再拜而辭復令人導之登一舟轉盻之乆已至明州海次矣時元祜間也比至里門則妻子已死矣皇皇無所之方悔其歸復𣣔求徃不可得也遂為人言之後病而狂未幾以死惜哉余在四明見郡人有䏻言此事者又聞舒信道嘗記之甚詳求其本不獲乃以所聞書之睦㓂方臘未起之前一年歙州生麟即死後十日州人葉世寧夣乗麟而登山山東北有洞乃捨麟而登入二武士執而問之世寧以實對且言幸得放還當有重報一武士笑曰誤矣我即歙州某橋南停𥿄朱慶也與子不熟頗識其面此洞有三堂四室試令子觀之遂引而前中堂垂䈴曰此堂待陳公文帳堆壅吏不敢登左堂簾捲其半慶曰天符已差羅浮天王居此諸司徃迓矣旣昇有牌牌有三字世寧惟記一定字右堂無簾上有衣紫袢曳杖而行吏𢾗十軰随之二武士止世寧立世寧識視即尚書彭公汝礪也遽出拜之公劳之曰近到饒州否曰去歳到饒州公無恙公何以至此公曰吾位髙不當治獄以吾最知本末故受命至此汝何䏻来也世寧驟對乗洞前石馬而来公曰獸今安在二武士趋出曰介獸誤取至公曰杖之百朱慶者唯而出一武士領世寧𣣔出世寧曰願一觀四室不敢泄於人公逡廵首肯一吏持鑰而下引世寧徃開東室有十餘人露首愁坐竹噐𢾗十封鑰甚固旁有金帶十餘條持鑰者復開一室架大木於两楹之間有官者凢九人亦露頂蹲踞其上見人皆泣下持鑰者未嘗少佇世寧請入他室持鑰者曰西有貴臣大閹及前唐後唐未具獄囚法嚴不可輙近言未幾忽有聲如雷震見巨虵自屋東垂首而下火舌電目口鼻氣出如煙世寧懼而走持鑰者曰東将入西室矣此類甚多豈可近也世寧因問何以至是曰吁吾姓嚴前唐宦者親見當時中官勢盛士人知有中官不知有朝廷吾私竊笑而薄之有䏻言中官太盛者吾必咨嗟嘆賞聞近代亦然業力所招也世寧不盡記大畧如此復徃謝彭公則堂已虗矣世寧不敢問心動求出持鑰者復曰吾在北司無過即世後凢三領江淮要職此事了則吾為地下主者矣汝到人間為吾誦金光明經具䟽焼與嚴直事吾䏻報汝世寧拜辭獨與武士出見朱慶騎麟自山頂来下而揖世寧撫麟乃石也慶曰山髙不可陟遵河甚徑煩語慶家人蘄黄間卜居甚善郷中當大亂慶亦自以夣報得子言當信而不疑也一武士曰金光明經亦望垂賜得免追取之劳幸矣世寧曰仍為公等設醮及水陸二人以手加額世寧曰此洞何名慶曰洞名金源司名某凢四字世寧不暁而問之忽失足墜河而窹汗浹眷病瘖三日而愈其後歙人稍稍聞之宣和改元揚州學吏嚴清晝寝夣人叩門呼之清一手挈帽以趋見植牌於康荘清不暇讀斯湏入一門兵衞森然吏引造庭鞠躬曰嚴清至清戦汗伏不䏻拜上擲一巨板縱横萬釘布如棋局斜倚于階傳呼令上一人衮而冕坐紫衣侍左朱衣侍右清竊視之衮冕者乃前太守劉尚書拯也朱衣者两浙運副劉河也尚書問清茶塩法更張否對曰清學吏耳茶塩法所不知又問學法更張否對曰仍舊但近日興建道學遂命朱衣取簿令清自閱其姓名每葉大書一人姓名郷里其下有細書若功與過中有識者中有一葉乃清姓名細書極少尚書曰後十旬汝當來此又命紫衣導清過西壁以手排之壁間見衆罪人雜老㓜男女或血汚其衣帶係其􅖪悲哀愁苦幽咽墮淚可畏可憐紫衣復道清出尚書曰汝當治此獄俟取某人及淮南塩香提舉黄敦信清逡巡攝衣循板而下吏以手招清使出清過舊路仰視其牌書曰辨正司旣窹言其事於教官錢耜良仲時黄侯使一路氣熖赫然未幾盛怒間暴得疾一夕而卒清後臥病果死揚人多知之予𢾗詢郷人乃得其詳秦少㳺侍兒朝華姓邉氏京師人也元祐癸酉納之嘗為詩云天風吹月入欄干烏鵲無聲子夜䦨織女星明来枕上了知身不在人間時朝華年十九也後三年少游𣣔修真断世縁遂遣朝華歸父母家貧以金帛而嫁之朝華臨别泣不已少㳺作詩云月霧茫茫暁柝悲玉人揮手断膓時不湏重向燈前泣百歳終當一别離朝華旣去二十餘日使其父來云不願嫁乞歸少㳺憐而復取歸明年少㳺出倅錢唐至淮上因與道友議論嘆光景之遄歸謂華曰汝不去吾不得修真矣亟使人走京師呼其父來遣朝華随去復作詩云玉人前去却重來此度分携更不逥腸断亀山離别䖏夕暘孤塔自崔嵬時紹聖元年五月十一日少㳺嘗手書記此事未㡬遂竄南荒云吴郡唐寅𥙷之以詩淮海修真黜華他言道是我言差金丹不了紅顔别地下相逄两面沙毆陽文忠公與韓子華書於柱上其後過限七年方踐前志作詩寄子華曰俗諺云也賣弄得過裡其詩曰人事從来無䖏定世途多故踐言難誰知頴水閑居士十頃西湖一釣竿劉貢父詩話云文士用事誤錯雖為缺失然不害其美杜甫詩云功曹無復漢䔥何按光武紀帝謂鄧禹曰何以不掾功曹又曹参嘗為功曹云鄼侯非也貢父之意直以少陵誤耳然前漢髙紀云单父人吕父善沛令辟仇從之客因家焉沛中豪傑吏聞令有重客皆徃賀䔥何為主吏主進令諸大夫曰進不满千錢坐之堂下云云注孟康曰主吏功曹也然則少陵用此非誤也第貢父偶思之未至耳嘉州凌雲寺大像記韋臯文張綽書其碑甚豊字畫雄偉頃扵潘義荣處見之閬州州治大􅈦梁間有一凾書前後人莫敢取視者有一太守之子必𣣔開之人勸之不從竟取之乃三國蜀時断一大辟案文耳復置舊所未㡬守遂死河陽縣尉司印前後相傳不敢開匣開必境内有盗𧺫但以一木朱記用代行移新舊官交易但易匣之封耳大明弘治十七年蘇州衞印熱如火其年一衞官皆去聀啇州州治􅈦角各有一刻成壓角石兎以碧紗籠護之吏軰献𥿄錢者堆積焉人不敢正視吏軰正視者必遭刑甚畏惮之云夜即相馳逐於圃中三事皆聞之耿宗純彦醇云徐州有营妓馬盻者甚慧麗東坡守徐日甚喜之盻䏻學公書得其彷彿公嘗書黄鶴賦未畢盻竊效公書山川開合四字公見之大笑畧為潤色不復易之今碑中四字盻之書也崔鶠徳符頴昌陽翟人元祐中畢漸榜登科不汲汲於仕宦宣和中監西京洛南稲田務時中官容佐掌宫鑰於洛郡僚事之惟恐不及惟徳符不肯見之容極銜之徳符一日送客於會節園時梅花已残與客飮梅下已而容奏陳以節會園為景華御苑徳符初不知也明年暮春復騎瘠馬從老兵竟入園中梅下哦詩曰去年白玉花結子深林間小憇籍清影低顰啄㣲酸故人不復見春事今已䦨繞樹尋履跡空餘土花斑徘徊而去次日容見地有馬跡問園吏吏以崔對容怒其輕已遂劾奏鶠徑入御苑以此罪廢累年靖康初起為左正言未幾卒贈直龍圖閣歸塟郟城詩文甚髙東坡為翰苑元祐三年供端午貼子有云上林珍木暗池䑓蜀産吴苞萬里來不獨盤中見盧橘時於粽裡得楊梅每疑粽裡楊梅之句玉䑓新詠徐君蒨共内人夜坐守歳詩酒中挑喜子粽裡覔楊梅今人未見以楊梅為粽徐公乃守歳詩楊梅夏熟歳暮安有此果豈昔人以乾實為之耶東坡以角黍為午日之饌故借言之耳無錫惠山泉水乆留不敗政和甲午歳趙霆始貢水于上方月進百樽先是以十二樽為水式泥印置泉亭每貢發以為之則靖康丙午罷貢至是開之水味不變與他水異也寺僧法皥言之北京壓沙寺梨謂之御園其栽接之故先植棠梨本與棗木相近以鵝梨條接于梨木上候始生枝條又於棗木大枝上鑿一竅度接活梨條扵其中不一二年即生乃砍去棗之上枝又断棠梨下幹根脉即梨條巳接於棗本矣結實所以甘而美者以此頃又見北人云以胡桃條接於栁木易活而速實章聖時煉丹一爐在翰林司金丹閤日供炭五秤至熈寧元年猶飬火不絶劉袤延仲之父𬒳㫖裁减百司此一項在經費之𢾗有㫖罷之其丹作鉄色詔藏天章閣張忠定公安道居南都煉丹一爐飬火𢾗十年丹成不敢服張芻聖民守南都羸瘠殊甚聞有此丹堅求餌之安道云不敢吝也但此丹服火之乆不有大功必有大毒不可遽服聖民求之甚力乃以一粒如粟大以與之且戒冝韜藏慎勿輕餌聖民得之即吞焉不𢾗日便血不止五臓皆麋潰而下竟死云二事聞之劉延仲宣和間有㫖蘇軾追復軄名時衞仲逹逹可當行詞同列戯之云逹可冝刻意為此詞盖湏焚黄耳聞者莫不大笑許道寧京北人少亦業儒性頗跌宕不覊畫山水法李成獨造其妙可與營丘抗行亦工傳神每見人寝陋者必戯冩貌於酒肆識者皆笑之為其人毆擊至碎衣敗面而竟不悛後㳺太華見其峯巒崷崒始有意於山水清潤髙秀濃纎得法不愧前人矣杜祁公帥長安道寧恃其技犯公公怒捕之道寧懼𣣔竄避或謂道寧曰杜公嚴毅汝乃干犯汝将何之雖走夷狄必獲汝矣時种師誼守環州道寧乃徃投誼杜公聞之笑曰道寧真善自為謀者乃移書种公俾善遇之在環歳餘乃歸環學從祀弟子乃道寧筆也予舅吴順啚有道寧畫終南積雪圖八幅真絶品也亡於兵火惜哉長安凉榭大屏面亦道寕所作殊竒偉也眺無咎謫玉山過徐州時陳無已廢居里中無咎置酒出小姬娉娉舞梁州無已作减字木蘭花長短句云娉娉裊裊芍藥稍頭紅檏小舞䄂低囬心到郎邉客已知金樽玉酒勸我花前千萬壽莫莫休休白髮簮花我自羞無咎嘆曰人疑宋開府鉄石心膓及為梅花賦清艶殆不類其為人無已清通雖鉄石心膓不至於開府而此詞過於梅花賦矣元祐六年七夕日東坡時知楊州與發運使眺端彦吴倅眺無咎大明寺汲塔院西廊井與下院蜀井二水校其髙下以塔院水為勝玫瑰油出北虜其色瑩白其香芬馥不可名状用為試粧法用衆香煎煉北人貴重之每報聘禮物中祗一合奉使者例獲一小甖其法秘不傳也宣和間周武仲憲之使虜過磁州時葉著宣逺為守祝周云囬日願以此油分餉旣反命以油贈之葉云今不湏矣近禁中厚賂虜使遂得其法煎成賜近臣色香勝北來者婦翁蔡京新寄𢾗合且云公還朝必有取者今反献一合周亦不受也北人方物不過一合貴惜如此而貴近之家贈遺若此之多足知其侈靡之甚也蔡肇天啓乆官京師日有薮澤之思常於尺素作平岡老木極有清思因授李伯時令於餘地加逺水歸鴈作扁舟以載天啓及題小詩曰鴻鴈歸時水拍天平岡老木向寒煙借君餘地安漁艇乞我寒江聴雨眠伯時嬾不䏻竟他日王渙之彦舟取去以示宗子令戬即取筆點染如詩中意天啓見之極愛其佳後天啓汎舟宿横塘遇雨閉蓬而臥夜分不寝聞歸鴈聲因復為詩云平野風煙入梦思殷勤作畫更題詩扁舟臥聴横塘雨恰遇江南歸鴈時此畫後歸貴人家予嘗見之渺然有江湖之思眺無咎作慶州使宅記黄魯直云大為佳作蘇明允作成都府張公安道畫像記魯直讀之云司馬子長復出也王逄原作過唐論介甫云可方賈誼過秦論不及而馳騁過之裴鉶傳竒載成都古仙人吴彩鸞善書小字嘗書唐韻鬻之今蜀中導江迎祥院經藏中佛本行經六十卷乃彩鸞所書亦異物也今世間所傳唐韻猶有皆旋風葉字畫清勁人家徃徃有之建炎庚戌二月二十五日虜兵䧟平江府两浙宣撫使周望移軍退保崑山縣泊舟馬鞍山下湖邉吏方用印忽有風旋轉入舟印與文移盡卷墮水相視駭愕使水工探之不獲望懼北兵之來襲也𣣔亟走屯惠通鎮為失印所撓留吏求之吏禱於馬鞍山神曰静濟侯者曰苟不獲且将得罪必焚廟而行縣宰亦懼乃作堰捍水以踏車涸之畚􅓩如雲鑿𢾗尺始得之已淪於泥中矣此說與吴中記聞同頃有一士人每於班列中好與祕閣諸公交語好事者戯目之為舘職裡行此盖縁御史有裏行職衘故也李豸方叔祭東坡文有云皇天后土鍳平生忠義之心名山大川還千古英靈之氣兵部郎官莫卞居塲屋日因赴浙漕夣人就旅邸報姓莫人作状元卞出迎之乃云名儔非卞也時卞已投卷是舉登科明年得子因名曰儔後二十四年儔作大魁卞對賀客言之朱勔䘮父作黄籙醮請茅山道士陳赤夷字彦真拜章囬得報應但見金甲神人杖劒叱云朱勔父子罪惡貫盈上天不赦汝焉得為拜章彦真不敢言勔私為親宻者道不踰三年勔果敗李去偽紹聖初知通州静海縣至夜即入一室判冥外人皆聞訊問枷鎖聲因目為李見鬼去替宻迩會集同官出二子拜縣尉陳噩噩不敢當乃云去偽老矣不及見公之貴若長子儔雖自成立不䏻逺大次子僖異日與公有㤙契當令今日先識面耳衆皆罔測政和初噩為司勲郎官主銓試文僖中乙授西京偃師簿又三年為噩壻果符㤙契之言噩終徽猷閣侍制僖終朝請大夫儔登科未及禄而卒崇寧間平江府天平山白雲寺有𢾗僧行山間得簟一叢共煮食之至夜發吐内三人急取鴛鴛草生啖遂愈其二人不啖者吐至死鴛鴦草藤蔓而生黄白花對開傍水依山䖏䖏有之治癰疽腫毒猶妙或服或傅皆可盖沈存中良方所載金銀花又曰老翁湏者本草名忍冬山谷詩云争名朝市魚千里予問諸學生魚千里多云此齊民要術載范蠡種魚事發池中作九墩然初無千里字心頗疑之後因讀關尹子云以盆為沼以石為島魚環㳺之不知其幾千萬里不窮也乃知前軰用事如此該博字皆有來䖏班行李質人才魁岸磊落甚偉徽廟朝𣣔求一人相稱者為對無可􅓻當時同列目為察隻子京師俚語謂無對者為察隻建炎三年擢權殿帥蘇黄門子由薨於許下王鞏定國作挽詩三首其一云憶昔持風憲防㣲意獨深一時經國慮千載爱君心坤道存君终始乾坤正古今當時人物盡惆悵獨知音注云元祐中議冊后宣仁御文徳殿發冊公語余宻告吕丞相㣲仲母后御前殿兹不可啓㣲仲明日留身宣仁詔宫中本殿發冊時人無知者其云已矣東門路空悲未盡情交親踰四紀憂患共平生此去音容隔徒多涕淚横蜀山千萬疊何䖏是佳城注云公前年寄書約予至許田曰有南齋翠竹满軒可與定國為十日之飲此老年未盡之情也其三云静者冝􅈾壽胡爲忽夣楹傷嗟見行路優典識皇情徒記巴山路空悲蜀道程弟兄仁逹意千古各垂名註云公與子瞻嘗泊巴江夜雨相約共游蜀竟不果歸今子瞻塟汝公歸眉王祥有言歸塟仁也留塟逹也右三詩予在髙郵於公之子䖏見其遺藁因録之皆當時事今公之後邈然家集不復存惜其亡也因附於此晏叔原聚書甚多每有遷徙其妻厭之謂叔原有類乞兒搬􅃮椀叔原戯作詩云生計惟兹椀般檠豈惮劳造雖從假合成不自埏陶阮杓非同調顔瓢庶共操朝盛負餘米暮貯籍殘糟幸免墦間乞終甘澤畔迯挑冝卭竹杖捧稱葛為𫀆倘受桑間餉何堪井上螬綽然真自許嘑爾未應饕世乆輕原憲人方逐子敖願君同此噐珎重到霜毛唐寅醉中校畢墨荘漫録卷第三
