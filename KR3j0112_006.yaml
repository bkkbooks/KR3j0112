body:
  text: 墨莊漫録卷第六本朝能書世推蔡君謨然得古人玄妙者當還米元章米亦自負如此嘗有論書一篇及雜書十篇皆中翰墨之病用雞林𥿄書贈張大亨嘉甫蓋米老得意書也今附於此論書云歷觀前賢論書徵引迂逺比况竒巧如龍跳天門虎卧鳳閣是何等語或遣辭求工去法愈逺無益學者故吾所論要在入人不為隘辭吾書小字行書有如大字惟家藏真迹跋尾間或為之不以與求書者心既貯之隨意落筆皆得自然備其古雅世或未能立家人謂吾書為集古字蓋取諸家長處總而成之既老始自成家人見之不知以何為祖也江南吳峘登州王子詔大隸提榜有古意吾小兒友仁大隸題榜與之等又幼兒友知代吾名書碑及手書大字更無辨門許侍郎尤愛其小楷云每示簡可使令嗣書之謂友知也老杜作薛稷惠普寺詩云鬱鬱三大字蛟龍岌相纏今有石本得而視之乃視勾勒收筆鋒書之如蒸餅普字如人握兩手伸臂而立醜怪難狀以是論之古無真大字明矣葛洪天台之觀飛白為大字之魁今第一歐陽詢道林之寺寒儉無精神桞公權國清寺大小不相稱費盡筋骨裴休率意寫碑乃有真趣不陷醜怪真字甚昜惟有體勢難謂不如畫算勻而勢活也字之八面惟向真楷見之大小各自有分智勇有八面已少鍾法丁道護毆虞始勻古法亡矣桞公權師歐不及逺甚而為醜怪惡札之祖自桞始世有俗書唐官告在世為禇陸徐嶠之體殊有不俗者開元以來緣明皇字體肥俗始有徐浩以合時君所好經生亦自此肥開元以前古氣無復有矣唐人以徐浩比王僧虔甚失當以浩大小一倫是猶吏楷也僧虔蕭子雲傳鍾法與子敬無異大小各有分不一倫徐浩為顔真卿辟客書勻自張顛血脈來教顔大字促令小小字展令大非古也石刻不可學但自書使人刻之已非已書也故必須真迹觀之乃得趣如顔真卿每使家僮刻字故會主人意修改波撇致大失真惟吉州廬山題名題訖而去後人刻之故皆得其真無做作凡俗差佳乃知顔出於禇也又真迹皆無蠶頭燕尾之筆與郭知運爭座位帖有篆籕氣顔傑思也桞出歐為醜怪惡札之祖自此世人始有為俗書蓋緣時君所好其弟公綽乃不俗於其兄筋骨之説出於桞世人但以怒張為筋骨不知不怒張自有筋骨凡大字要如小字小字要如大字唯禇遂良小字如大字其後經生祖𫐠間有造妙者大字如小字未之見也世人多寫大字時用力捉筆字愈無筋骨神氣作圓筆如蒸餅大可鄙笑要須如小字鋒勢備全都無刻意故作乃佳自古及今余不敏實得之榜字固已滿世自有識者知之石曼卿佛號都無回互轉摺之勢小字展令大大字促令小是張顛教顔真卿謬論蓋字有大小相稱且如寫太一之殿作四窠分豈可將一字肥滿一窠以對殿字乎蓋自有相稱大小不當展促也豫嘗書天慶之觀天之二字皆四筆慶觀多在下各隨其相稱之挂起氣自帶過皆如大小一般真有飛動之勢也書至隸大篆古法大壞矣篆籕各隨字形大小故百物之狀活動圓備各各自足隸乃始有展促之勢而三代法亡矣其雜書十篇云歐虞禇桞顔皆一筆書也安排費工豈能垂世李雍脫子敬體乏纎濃徐浩晚年用力過更無氣骨不如作郎官時婺州碑也董孝子不空皆晚年惡札全無妍媚此自有識者知之沈傳師變格自有超世真軌徐不及也御史蕭誠書大原題名唐人無出其右為司馬係南嶽真君觀碑極有鍾王軌轍餘皆不及矣智永臨集書千文秀潤圓徑八面具備有真迹自顛沛字起在唐林夫處他人收不及也半山莊臺上故多文公書今不知存否文公學楊凝式書人鮮知之豫語其故公大賞其見鑒金陵幕山樓隸榜乃關蔚宗二十年前書想六朝宫殿榜皆如是智永硯心成臼乃能到右軍若穿透始到鍾索也可不勉之一曰不書便覺思澀想古人未嘗片時廢書也因思蘇之才桓公至洛帖字字用意殊有功為天下法書第一古所謂一筆書者謂意相鈎連非復便一筆至到底也若旋安排即虧活勢耳字要骨格肉須裹筋筋藏肉貼乃秀潤生布置穩不俗險不怪老不枯潤不肥變態真形不貴苦苦生怒怒生怪貴形不貴作作入畫畫入俗皆字病也魯顔公行字可教真便入俗品萬等古人書不如此學吾家多小兒作草字大假有意思少成若天性習慣如自然兹古語也吾夢古衣冠人授以摺𥿄書法自此差進寫與他人却不曉蔡元度見而驚曰法何太遽異耶此公亦具眼人章子厚以真自名獨稱吾行草𣣔吾書如排算􅏧然其字須有體製乃佳耳薛稷書慧普字老杜以謂蛟龍岌相纒今見其本乃如童兒擡蒸餅勢信老杜不能書也學書須得趣他好俱忘乃入妙别為一好縈之便不工海嶽以書學士召對上問本朝以書名世者凡𢾗人海嶽各以其人對曰蔡京不得筆蔡卞得筆而乏逸韻蔡襄勒字沈遼排字廣廷堅描字蘇軾畫字上復問卿書何如對曰臣書刷字曰黃廷堅抹字蘇軾刷字上復問曰卿書何如對曰臣書畫字觀蘇黃米蔡之書果如其説恐此記者有謬豫嘗謂米公人物英邁鑒裁精髙翰墨場中當推獨步平生所書遍於天下石刻中如青州南洋石橋記鄼縣京觀記無為軍天王記漣水軍𢾗碑皆逺追鍾王寧獨今人所難唐人亦鮮及也蔡天啓為公墓志銘舉止頡頏不能與世俯仰故仕𢾗困躓冠服用唐人規制所至人聚觀之姓好潔置水其傍𢾗頮而不帨未嘗與人同器視其眉宇軒然進趨襜如音吐鴻暢雖不識者亦知其為米元章也云云此逮實録云松陵唱和皮日休新秋即事云酒坊吏到常先見鶴俸符來每探枝注云吳郡有鶴料案殊未詳鶴料之説曽旻彥和博學之士也知滁州有次韻趙仲美表弟西齋自遣詩云謫守凄涼臥郡齋夫君失意偶同來海邉故國渺何許城上新樓空幾回寧羡一囊供鶴料會看千里躍龍煤清吟未免縈機慮只恐飛鷗便見猜注云唐幕府官俸謂之鶴料今歲敕頭所得止此仲美省試下故云彥和用事必有所據當更考之又宋宣獻有送黃祕丞倅蘇臺云鶴料署文移鮆場收賦算此宣獻用皮日休所云吳郡事也蔡仍子因之妻九院王家女也忽患瘵疾沈綿𢾗年既死已就小斂時上皇宫中聞之曰惜其不早以陷氷丹賜之今雖已死試令救之因命中使馳賜一粒時氣息已絶乃強灌之須臾遂活𢾗日後向安但齒皆焦落後十五年方死宋景文公詩云蟹美持螯日魴甘抑鮓天用楊淵五湖賦云連瓶抑鮓蔡丞相確持正嘗有治命遺訓云吾沒之後斂以平日間居之服棺但足以周衣衾作壙不得過楚公葬特制棺前設一坐陳瓦器以衣衾巾履𢾗事及筆硯置右左自𥘉斂至於祖載襄葬悉從簡質稱吾平生母煩公家母干恩典母受􅉠遺母求人作埋名神道碑二處但刻石云宋清源蔡某墓而紀葬之歲月於其旁可矣夫逹人君子安於性命之際而不憂窮乎死生之變而不惑超然自得與道消息生以形骸為寓死奚丘隴之念哉吾雖鄙薄亦粗聞大道之方矣𣣔效楊王孫與沐德信則必傷汝曹之意又干矯俗之稱故命送終為制將使子孫近者視吾藏足以無憾逺者尚及見吾墓道之石足以伸敬如是而芳曹其遵吾言慎勿昜也其字畫清徑如女朝人書其言可法也又有雜書一篇云楚公少年時讀書於石梯山精舍布衣𬞞食志趣超然其仕雖不逹以清名直氣聞士大夫間陳恭公孫威敏公皆嗟嘆公所為每為公屈頴川陳氏公慙卿卿慚長以德不以位也在建陽八年去日不賫一串茶邑人思公至今不衰致仕居貧以席蔽户誦詠猶不惓其清白淳亮甘貧樂道汝曹能使人謂真楚公之子孫則善矣楚公名黃裳故任太子右贊善大夫致仕忠懷公之父也文潞公為相日赴祕書有曝書宴令堂吏視閣下藝草乃公往守蜀日以此草寄植館中也因問藝辟蠹出何書一坐默然蘇子容對以魚豢典略公喜甚即借以歸王師取青唐時大軍始集下寨治作壕塹鑿土遇一壙得一琉璃瓶瑩徹如新瓶中有大髑髏其長盈尺瓶口僅數寸許不知從何而入主帥命復瘞之斯亦異矣近世墨工多名手自潘谷陳瞻張谷名振之曕之後又有常山張順九華朱覲嘉禾沈圭金華潘衡之徒皆不愧舊人宣政間如閞圭關瑱梅鼎張滋田守元曽知微亦有佳者唐州桐柏山張浩制作精緻膠法甚竒舅氏吳順啚每歲造至百斤遂壓京都之作矣前者𢾗工所制好墨者往往韜藏至今存者尚多豫舊有此癖收古今𢾗百笏種種有之渡江時為人疑篋之重以為金玉竊取之殊可惜也今尚餘一巨挺極重厚印曰河東解子城又一圭印曰韓偉升膠力皆不乏精采與新製敵可與李氏父子甲乙也士大夫留意詞翰者往往多喜收蓄唯李格非文叔獨不喜之嘗著破墨癖説云客有出墨一函其製為壁為丸為手握凡十餘種一一以錦囊之詫日昔李廷圭為江南李國主父子作墨絶世後二十年乃有李承宴又二十年有張遇自是墨無繼者矣自吾大父始得兩丸於徐常侍鉉其後吾父為天子作文章書碑銘法當賜黃金或天子寵異則以此昜之余於是以兩手當心捧硯惟謹不敢議既私怪豫用薛安潘谷墨三十餘年皆如吾意不覺少有不足不知所謂廷圭墨者用之當何如也他日客又出墨余又請其説甚辨余曰噓余可以不愛墨矣且子之言曰吾墨堅可以割然余割當以刀不以墨也曰吾墨可以置水中兩宿不腐然吾貯水當以盆罃不用墨也客復曰余説未盡凡世之墨不過二十年膠敗輒不可用今吾墨皆百餘年不敗余曰此尤不足貴余墨當用二三年者何苦用百年墨哉客辭窮曰吾墨淂色多凡用墨一圭他墨兩圭不逮余曰余用墨每一二歲不能盡一圭往往失去乃昜墨何嘗苦少墨也唯是刷碑印文書人乃常常少墨耳客心𣣔取勝曰吾墨黑余曰天下固未有白墨雖然使其誠過他墨猶足尚乃使取研屏人雜錯以他墨書之使客自辦客亦不能辨也因恚曰天下竒物要當自有識者余曰此正吾之所以難也夫碔砆之所以不可為玉魚目之所以不可為珠者以其用之不異也今墨之用在書苟有用於書與凡墨無異則亦凡墨而已焉烏在所寶哉嗟乎非徒墨也世之人不考其日用而昡于虛名者多矣此天下寒弱禍敗之所由召也吾安可以不辨于墨文叔詞翰之好乃不喜于墨此不可曉故併載之近時士大夫學佛者不行佛之心而行佛之迹者皆是也日談慈悲而行若蜂蠆乃望無上菩提吾未之信梁武帝之奉佛可謂篤矣至捨身為寺奴宗廟供麵牲乃築浮山愝灌壽春𣣔取中原一夕而殺𢾗萬人其心豈佛心哉揚州吕吉甫觀文宅乃晉鎮西將軍謝仁祖宅也在唐為法雲寺有雙檜存焉猶當時物也劉禹稷有詩云雙檜蒼然古貌竒含煙壯霧欎參差晚依禪客當金殿初對將軍看畫旗龍象界中成寶蓋鴛鴦瓦上出髙枝長明燈是前熖曽照青青年少時吉甫家居時檜尚依然李之儀端叔用夢得詩韻云故迹悲涼古木竒勢分庭下蔚相差霜根半露出林虎畫影全舒破賊旗寶界曽回鋪地色節旄逺映插雲枝劉郎風韻知誰敵儒帥端能表異時建炎兵火樹遂亡矣豫後到鄉里訪其遺迹不可得矣李端叔云樂毅論髙紳為湖北轉運使道中聞砧聲清逺因視之乃樂毅論石刻覆於下也而已斷裂矣遂載歸完理緝綴續以木箱所可辨者如此故世之傳布皆止于海字則其碎而不可緝者良可惜也端叔之説如是豫又嘗見一本在張申公家聞今尚存是唐人臨夲不知即髙紳所得者否或别本也白樂天作長恨歌元微之作連昌宫詞皆紀明皇時事也豫以謂微之之作過樂天白之歌止於荒淫之語終篇無所規正元之詞乃微而顯其荒縱之意皆可考卒章乃不忘針諷為優也其詞有云上皇正在望仙樓太真同憑欄干立樓上樓前盡珠翠炫轉熒煌照天地又云初過寒食一百六店舍無煙村樹緑夜半月髙絃索鳴賀老琵琶定場屋力士傳呼覔念奴念奴潛伴諸郎宿須臾覔得又連催特敕街中許燃燭又云飛上九天歌一聲二十五郎吹𬋩逐逡巡大遍梁州徹色色龜兹轟録續李謨擪笛傍宫墻偷得新翻數般曲又云平明大駕發行宫萬人歌舞塗路中百官隊仗避岐薛楊氏諸姨車鬪風明年十月東都破御路猶存祿山過云云祿山以天寶十四載反于漁陽陷東京則幸連山時乃十三載也巡幸而諸弟諸姨悉扈從百司供頓亦擾矣念奴名妓也帝歲幸華清時巡東洛有司潛遣隨行以備宣喚而每為諸王所邀致方寒食火大禁而中夜宫中張樂不已聲聞于外遣中官傳呼追覔念奴特呼燃燭于御街呼呌於靜夜皆不可以訓既終夕喧樂黎明六飛又復西去王者順動當如是乎此詩深議其荒淫無度也是歲帝年七十一而太真年三十六矣然考之本紀十三載乃無幸洛之事豈史逸耶微之去天寶不逺必不鑿空而云也李謨擪笛字玉篇云擪烏協切指按也於笛而云擪此一字之妙也世俗以阿阿則則為嘆息之聲李端叔云楚令尹子西將死家老請立子玉為之後子玉直視則則於是遂定昭莫恤過宋人有饋彘肩者昭奚恤阿阿以謝爾後阿阿則則更為嘆息聲嘗疑其自得於此李文叔嘗有雜書論左馬班范韓之才云司馬遷之視左丘明如麗倡黠婦長歌緩舞問以諧笑傾蓋立至亦可喜矣然而不如絶代之女方且却鉛黛紵施帷幄裴徊微吟於髙堂之上使淫夫冗隙而見之雖失氣疾歸不食以死而終不敢意其一啓齒而笑也班固之視馬遷如韓魏之壯馬短鬛大腹服千鈞之重以䇿隨之日夜不休則亦無所不至矣而曽不如騕􅒁之馬方且脫􅋮逸駕驕嘶顧影俄而縱轡一騁千里即至也范曄之視班固如勤師勞政手胝簿版口倦呼叱毛舉縷誥自以為工不可復加而僅足為治曽不如威健之吏不動聲色提一二綱目群吏為之趨走而境內晏然也韓愈之視班固如千室之邑百家之聚有儒生崛起於蓬蓽之下詩書傳記鏘鏘常𣣔鳴于齒頰間忽遇夫奕世公卿不學無術之子弟乘髙車從虎士而至雖顧其左右偃蹇侮笑無少敬其主之容雖鄙惡而體已下之矣又文叔又嘗雜書論文章之橫云余嘗與宋遐叔言孟子之言道如項羽之用兵直行曲施逆見錯出皆當大敗而舉世莫能當者何其橫也左丘明之于辭令亦甚橫自漢後千年唯韓退之之于文李太白之于詩亦皆橫者近得眉山篔簹谷記經藏記又今世橫文章也夫其撗乃其事得而絶俗雜畦徑間者故衆人不得不疑則人之行道文章恐人不疑耳七言絶句唐人之作往往皆妙頃時王荆公多喜為之極為清婉無以加焉近人亦多佳句其可喜者不可槩舉豫每愛俞紫芝秀老歲杪山中云石亂雲深客到稀鶴和殘雪在髙枝小軒日午貪濃睡門外春風過不知舒亶信道村居云水繞陂田竹繞籬榆錢落盡槿花稀夕陽牛背無人卧帶得寒鴉兩兩歸崔鶠德符秋日即事云秋草門前巴沒鞾更無人過野人家羅羅踈竹時聞雨淡淡輕煙不隔花又黃州道中云莫愁微雨落輕雲十里長亭未墊巾流水小橋山下路馬頭無處不逄春劉次莊中叟桃花云桃花雨過碎紅飛半逐溪流半染泥何處飛來雙燕子一時銜在杏梁西僧如壁德操偶成云松下柴門晝不開只有蝴蝶雙飛來密蜂兩髀大如繭應是山前花又開吳可思道病酒云無聊病酒對殘春簾幕重重又掩門細雨斜風花落盡小樓人下𣣔黃昏又春霽云南國春光一半歸杏花零落淡燕脂新晴院宇寒猶在曉絮欺風不肯飛趙士掞才儒登天清閣云夕陽低盡已西紅百尺樓臺萬里風白髮年年何處得只應多在倚欄中李怤去言春晚云花瘦煙羸可奈何不關渠事鳥聲和無人掃地驚風在分付輕紅上碧紗趙篪之子雍春日云拂牀欹枕晝初長好夢驚回燕語忙深竹有花人不見直應風轉得幽香曽紆公衮江樾軒書事云卧聽灘聲㶁㶁流冷風凄雨似深秋江邉石上烏桕樹一夜水長到稍頭胡直孺少汲春日云風園吹絮桞飛花睡起鈞簾日正斜四海隨人雙燕子相逄處處作生涯曾繹仲成還家途中云踈林殘嶺起昏鴉臘盡行人喜近家江北江南春信早傍籬穿竹見梅花劉無極希顔漾花池詩云一池春水緑如苔水上妍紅取次開間倚東風看魚樂動搖花片却驚猜王銍性之山村云住依溪口破殘村身伴渡頭零落雲更向空山拾黃葉姓名那有世人聞陳與義去非秋夜云中庭淡月照三更白露洗空和漢明莫遣西風吹葉落只愁無處著秋聲如此之類甚多不愧前人也東坡作梅花詞云髙情已逐曉雲空不與梨花同夢注云唐王建有夢看梨花雲詩豫求王建詩世所行印本雕一卷乃無此篇後得之於宴元獻類要中後又得建全集七卷乃得全篇題云夢好梨花歌薄薄落落霧不分夢中喚作梨花雲瑶池水光蓬萊雪青葉白花相次發不從地上生枝柯合在天頭繞宫闕天風微微吹不破白豔却愁春涴露玉房綵女齊看來錯認仙山鶴飛過落英散粉飄滿空梨花顔色同不同眼穿臂短取不得取得亦如從夢中無人為我解此夢梨花一曲心珍重或誤傳為王昌齡非也瘞鶴銘在潤州楊子江焦山之足石岩下惟冬序水退始可模打世傳以為王逸少書然其語不類晉人是可疑也歐陽永叔以為華陽真逸乃顧况之道號或是况所作然亦未敢以為然也豫嘗以窮冬至山中觀銘之側近復有唐王瓉刻詩一篇字畫差小於鶴銘而筆勢八法乃與鶴銘極相類意其是瓉所書也因模一本以歸以示知書者亦以為然其題云冬日與群公泛舟此山隈江水𥘉不凍今年寒復遲衆芳且未歇近臘仍夾衣載酒適我情興來趣漸微方舟大川上環酌對落暉兩片青石稜波際無因依三山安可到𣣔到風引歸滄溟壯觀多心目豁暫時况得窮日夕乘桴何所之謫丹陽功曹掾王瓉今此刻亦漸漫漶尚可讀也他時好事者當試求之以驗豫言之或是也應劭漢官儀曰周澤為太常齋有疾其妻憐其年老窺內問之澤大怒以為干齋遂收送詔獄自劾論者譏其詭激時諺云生世不諧為太常妻一歲三百六十日三百五十九日齋一日不齋醉如泥豫觀禆官小説乃得其説云南海有蟲無骨名曰泥在水則活在失水則醉如一堆泥然後又讀五國故事云偽閩王王延慶為長夜之飲因醉屢殺大臣以銀葉作杯柔弱為冬瓜片名曰醉如泥酒既盈不可覆杯惟盡乃已蓋取此義也韓維持國詩格甚竒如寄范德孺云睥睨風髙回過鴈琵琶宵寂語流鶯和兄康公罷相云移病早休丞相筆坐談猶著侍臣冠和曽存之云自愧效陶無好語敢煩凌杜發新章皆佳句也恨世少傳者曽誠存之元符間任館職嘗與同舍諸公飲王詵都尉家有侍兒輩試香求詩求字者以煙濃近侍香為韻存之得濃字賦詩云俯仰佳人看墨蹤和研新炷寶薰濃詩情過筆當千里妙思凝香𣣔萬重盎泄雲傾白酒越羅霑露浥黃封從來粉黛冝燈燭妙手憑誰寫醉容又有七夕王都尉邀同舍置酒聽琵琶詩云寶鑑凌雲結綺髙小奩爭巧暮分曹春蔥細撚龍香撥秀􅖪偏明邏逤槽牛廄寫形成粔籹馬軍馳酒送蒲萄淚珠散作人問露最覺更闌潤錦絛道山學士尚與貴戚附車過從宴飲真太平盛事也其後禁之詵元豐中坐與子瞻交結嘗竄均州矣後復與諸名士遊蓋風流好事不忘于情寧獲譴戾是可尚也故事西京每歲貢牡丹花例以一百枝及南庫酒賜館職韓子蒼去國後嘗有詩云憶將南庫官供酒共賞西京敕賜花白髮思春醒復醉豈知流落在天涯衢州􅈦事下舊有土勢隆起篠木叢生相傳云古冢也奮有碑其文云五百年刺史為吾守墓以前後相承皆畏而不敢慢紹聖元年齊安孫賁公素為守問之左右以是對公命毁去之官吏大恐闔府叩頭以諌公曰藉令土中有賢者骨當以禮法遷之乃為文自祭而除之􅓯深丈餘了無他異但有二石峯長五六尺堅瘦紺潤又有大木之根蟠蜛其下群疑遂定石上有刻云乾符五年五月三日安於此押衙徐諷龍山起寨處得二石刺史季題又刻云開寶七年重疊娥媚山於廳事前於郡齋文會閣移季公之石安置于此刺史慎知禮題時公素方修州治南韶光園重建清冷堂堂成乃移二石於堂下名曰雙石嗟乎慎公移石去季公之得石凡九十七年公素之破疑冢出石去慎公又一百二十一年物之顯晦抑自有𢾗第不知娥媚之廢乃冒冢之名自何時也公素一旦戲笑為之遂釋千百年之惑張藝叟有詩云芝蘭雖好忌當門何况庭前惡土墩畚􅓩才興雙劔出狐狸盡去老松蹲百年守冢真堪笑一日開軒亦可尊安得擲從天外去成都石笋至今存公素可謂剛毅正直自信之君子也墨莊漫録卷第六俞子容家藏書晉昌唐寅校畢
