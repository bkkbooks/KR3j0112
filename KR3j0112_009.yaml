body:
  text: 墨莊漫録卷第九李淳風論辨真玉云其色溫潤常如肥物所染𫾣之其聲清引若金磬之餘響絶而復起殘聲逺沉徐徐方盡此真玉也豫頃在唐州見任布參政之孫諭字義可收一璧凝滑如脂無有蟻缺惟有兩粟大赤􅉳蓋尸沁也以綿繩掛之擊之其清越之聲餘韻悠揚正如淳風之說與所見水蒼玉不可同日而語後聞為一中都一貴人取去自是不復再見也政和丁酉歲真州郊外屠一牛買肉歸者往往於刲割之際錚錚有聲視之於肉脉中皆有舍利也大小不一光瑩如玉詢之𢾗家皆有之自爾一村之民不復食牛東坡作長短句洞仙歌所謂氷肌玉骨自清凉無汗者公自叙云豫幼時見一老人年九十餘䏻言孟蜀主時事云蜀主嘗與花蕊夫人夜坐納凉於摩訶池上作洞仙歌令老人䏻歌之豫今但記其首兩句乃為足之近見季公彥季成詩話乃云楊元素作本事記洞仙歌氷肌玉骨自清凉無汗錢唐有老尼䏻誦後主詩章兩句後人為足其意以填此詞其說不同豫友陳興祖德昭云頃見一詩話亦題云李季成作乃全載孟蜀主一詩氷肌玉骨清無汗水殿風來暗香滿簾間明月獨窺人欹枕叉橫雲鬢亂三更庭院悄無聲時見踈星度河漢屈指西風幾時來只恐流年暗中換云東坡少年遇美人喜洞仙歌又解后處景色暗相似故􅕍括稍協律以以贈之也豫以謂此說近之據此乃詩耳而東坡自叙乃云是洞仙歌令蓋公以此叙自晦耳洞仙歌腔出近世五代及國初未之有也琴阮皆樂之雅者也琴則人多䏻之而藝精者亦衆至阮則人罕有造其妙者中都盛時有醴泉觀道士王慶之頗好此樂同時又有安敏修者以此藝供奉上前徽廟顧遇厚於倫輩二人者其䏻相抗豫在京師皆常聽之慶之則閒雅多古曲優逸不迫敏修則變移宫徴抑怨取興雜以新聲然皆妙手絶藝也後慶之不知存亡敏修𬒳虜北去未幾竄而南歸今習阮者未有䏻及此二人也劉棐仲忱詩律殊有風致嘗賦咸陽二絶云父老壼漿迎義旗秦亡誰復為秦悲不曽𬒳虐曽䝉德十二金人合淚垂玉殿珠樓二世中楚人一炬逐煙空却緣火是秦人火只與焚書一樣紅殊類唐人題詠他詩亦稱是華亭縣有寒穴泉與無錫惠山泉味相同並嘗之不覺有異人知者亦少王荆公嘗有詩云神震冽氷霜髙穴與雲平空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩酲西京牡丹聞於天下花盛時太守作萬花會宴集之所以花為屏帳至於梁棟柱栱悉以竹筒貯水簮花釘掛舉目皆花也揚州産芍藥其妙者不减於姚黃魏紫蔡元長知維揚日效洛陽亦作萬花會其後歲歲循習而為人頗病之元祐七年東坡來知揚州正遇花時吏白舊例公判罷之人皆鼓舞欣悅作書報王定國云花會檢舊案用花千萬朵吏緣為姦乃揚州大害已罷之矣雖殺風景免造業也公之為政惠利於民率皆類此民到於今稱之穆天子傳古書也杜子美多用其事語如天子之馬走千里王命官屬休曽祝沉豪牛噴玉大宛兒凡此四事皆出此書也曽敀彥和博學之士豫先君有此書彥和借往讎校乃題其後云晉中書監令荀公曽和嶠所上古文穆天子傳六卷即太康二年汲人凖盜冡發魏襄王墓所得竹書也按束晢傳竹䇿書凡七十五篇內穆天子傳五篇言周穆王游行四海見帝臺西王母雜書十九篇周食田法周書論楚事周穆王美人盛姬死事然則穆天子傳本五篇公曽等所上乃有六卷者今覩第六卷多記盛姬事蓋并入雜書中此一篇也書雖殘缺不可盡讀而其所載事物多故志之所無者如世民之吟黃澤之謡黃竹之詩其詞皆雅馴可喜又如虎牢五鹿之所以名亦可以博異聞矣嘗考漢書地理志京兆有西鄭河南有新鄭漢中有南鄭京兆之鄭先儒謂之西鄭班固曰周宣王弟威公邑應劭亦曰宣王母弟所封也其子與平王東遷更稱新鄭臣瓉曰周穆王以下都於西鄭不得以封威公初威公為周司徒王室作亂故謀於史伯而寄帑與賄於􅉑會之間幽王既敗二年而滅會四年而滅􅉑居於鄭父之丘是以為鄭威公無封京兆之文也顔師古曰穆王以下無西鄭之事瓉說非也今按此書自第四卷而下卷末皆書天子入於南鄭蓋瓉之所謂穆王之所都者是也第五卷有祭父自圃鄭來謁蓋瓉之所謂鄭父之丘者是也瓉即校書郎中傳瓉乃公曽嶠所部校穆天子傳官屬也故因取此傳以注漢書然傳稱南鄭西鄭瓉所未詳其所以異豈近世傳寫之誤耶漢中之鄭為南鄭不應京兆之鄭復稱南鄭其稱西鄭乃以圃鄭為東耳西鄭穆王出游反必入焉豈非以其所都故耶設非王都亦圻內近地也邦皆在彊地畿內諸侯當在邦都其內為縣又其內為都則西鄭之於鎬京殆可為公邑而已亦不以為國也且是時已有圃鄭矣則不必因威公之子從周東遷乃得鄭名然謂之新鄭又果何耶雖然如瓉之說亦豈全非哉今汲冢中竹書惟此書及師春行於世餘如紀年瓉語之類復已亡逸今人家閨房遇春秋社日不作組紃謂之忌作故周美成秋蕊香詞乳鴨池塘水暖風緊桞花迎面午粧粉指印窗眼曲理長眉翠淺聞知社日停針線採新燕寶叉落枕夢春逺簾影參差滿院豫見張籍吳楚詞云庭前春鳥啄林聲紅夾羅𥜗縫未成今朝社日停針線起向朱櫻樹下行方知唐時已有此忌循習至今也李傳宣和間任太府卿因職事陛對徽宗問曰知卿年彌髙而色不衰中外稱卿有內丹之術可具以進傳曰陛下聖德廣淵􅌖知日新學有緝熙於光明臣雖不學敢以誠對謹領聖訓容臣具術以聞明日方進曰臣聞內觀所以存其心也外觀所以飬其氣也存其心飬其氣則真火爐鼎日炎神水華池日盛矣長生久視上下與天地同流天道運而不積聖人知而行之大道甚易知甚易行以簡以易而天下之理得也人之所恃以生者氣也氣住則神住神住則形住形住則長生久視自此始矣蓋日月運轉寒暑往來天地所以長久吹噓呼吸吐故納新真人所以住世故丹元子曰形以神住神以氣集氣體之充也形神之舍也氣實則成氣虛則敓氣住則生氣耗則滅此廣成子所以保氣而煙蘿子所以煉氣也然則一言而盡保煉之妙者其惟咽納乎故曰一咽二咽雲蒸雨至三咽四咽內景充實七咽九咽心火下降腎水上升水火既濟則內丹成可以已疾可以保生可以延年可以超升臣謹刪其繁紊撮其樞要直書其妙以著於篇上篇曰進火候每日子後午前若於五更𥘉陽盛時尤佳就坐榻上面東或南握固盤足合目主腰而坐澄心靜慮內觀五臟仰面合口鼻中引清氣氣極則主腰而咽之每一咽縮榖道一縮再引則再如之至再至三若氣極不䏻任則低頭微開口以吹字出之勿令耳聞出氣之聲如此凡三次是謂進火一周天俟氣調勻然後行水下篇曰進水候進火畢中取口中液聚為一處多多益辦俟甘而熱即閉口仰面亞腰左顧一咽正中一咽分三咽而下內想一直下丹田每一咽亦縮榖道一縮如此一遍是為行水一周天每進火行水畢然後下榻行履自如後叙曰五行水火為𥘉人生水火為急此是極易之要法上奪天地造化學道修真之士𥘉行須覺臍下如火飲食添進四肢輕快是其驗也行而久之則髮白再黑齒落重生精神全具復歸嬰兒寒暑不䏻侵鬼神不䏻寇千二百歲壽比彭老漸為真人矣徽宗見而嘉納之梁師成録其說以示人乃簡易之道第行之者不䏻悠久耳或云虞謨君明修飬有得亦祗行此法也翰苑歲供禁中立春端午貼子前後多矣率多擬效奮語故少新意惟䏻道宫禁一時之事者為妙王履道皇帝閣云彤霞蒨霧繞觚稜樓雪融銀滴半層别是擬開延福宴夾城先試景龍燈妃嬪閣云玉燕翩翩入鬢雲花風初掠縷金裙神霄宫裡驂鸞侣來侍長生大帝君政和七年所進也又皇后閣云蘂笈琅亟受祕文清虗道合玉宸君瑶臺夜靜朝真久金屋春寒閲籙勤妃嬪閣云曈曨曉日上金鋪的皪春氷泮玉壺繍户緑窗塵不到凝酥點就輞川啚重和二年所進也不惟才思清麗皆紀當時事也徐遹子閩人博學尚氣纍舉不捷久困場屋崇寧二年為特奏名魁時已老矣赴聞喜賜晏於瓊林苑歸騎過平康狹邪之所同年所簮花多為群倡所求惟遹至所寓花乃獨存因戲題一絶云白馬青衫老得官瓊林宴罷酒腸寬平康過盡無人問留得宫花醒後看後仕至朝官知廣德軍謝事而歸豫四明同僚嚴致明飬正靖康丙午歲仕廣德軍建平尉任滿入城批書館於郡之開化寺一夕夢一婦人麗容絳服來訴曰妾四明人也久寓於此未有所歸惟君子哀之為我謀所舍意若求葬也曉窹詢諸寺僧有云政和間池陽人彭汝雲為郡從事其子婦張氏死乃殯於城西明教院其後改院為神霄宫徙其徒入此寺併移其柩於此僧輩常有見之者不以為怪嚴頗疑之未幾考課事竟將返馬時赴郡官會暨歸夜參半矣方就枕復見其人立於帳前泣訴曰知君戒行有日前懇何如又有云𣣔竭奴心誓殫素志嚴恍惚驚窹悚悸而起不䏻悉記其語翌日復詢彭氏則亦亡矣乃為祭酹而祝之曰此剎館之客􅍪至鼎來不知其幾何人胡不訴之乃獨告於我乎然我貧無力曷以副汝之請當遍告諸有位者庶有成焉時崔公成美為簽判乃率同僚出金且令廣德邑宰檀佾庭季辦集之為作佛事葬於城西橫山之陽仍書其事刋石納壙中檀與彭蓋鄉人故亦樂為之枸𣏌神藥也修真之士服食多升仙歲久者根如犬形夜䏻鳴吠羅浮山記云山上有枸杞樹大三四圍髙二丈餘時有赤犬見於其下夜聞其吠今所至有之但鮮得枝幹大者豫外氏家唐州第宅之盛甲於漢上宅東有園在東南城之一隅城上下枸杞甚茂枝幹有如杯盂者春時􅈪條如指甘美無復苦味一日因𣣔地骨皮入藥豫與表弟季任命僕􅓯之初深三二尺根已如椽又深鋤之其下形如一犬頭足悉具惟一足差細其嫩皮厚寸許伯舅順啚見之嘆惋曰惜乎靈物為二子所發使其歲月益深必亦䏻狺狺而吠矣治其皮得𢾗斤諸君爭取之而盡後豫因觀曲轅先生崔公度伯易所進枸杞詩序云臣昔聞隱君子言枸杞𢾗百歲根類生物得而食之顔長年後閲仙書𢾗有驗者嘗與道士字文希真游南嶽朱陵洞天過古蘭若基野客留宿庵下有聞類犬吠希真謂此非人境安得有是客笑曰岩腹枸杞生而酷似此其音也臣憶舊說黎明祈客𣣔識其處未至百步皆曰彼婆娑出衆榮者是也臣與希真將前客急止曰此神物也側常有蛇虎守護必待有道之士以歸吾等母得輒近自是每念之或入他山中遇樵蘇必訪焉間云往往有見但苦在深絶不可到之地元豐己未三月陛下親䇿進士集英殿三館故事臣得寓直殿廊入左銀臺門少西十許步御溝之上有若洞天所望就視則枸杞也其本圍尺有咫右紐而連理臣函詢衛士髙年者對曰聞天聖前尤盛此荐出者苗耳臣益悚然竊語同舍或曰事雖可進而其為祕也曽减仙山神壑之嚴乎既而嘆曰下誠有物耶孕天地隂陽之至和隱端然不可輒致之神今乃自托宫槐禁桞之列備一時灑掃之觀是豈浪出而徒然者耶偶臣屬殊方士採製餌服之節度未得相與抃舞歡呼隨萬年之觴一供吾君亦臣子心願目想而深可愧恨慊然者因感而成詩姑有待焉云云豫因是知一物生得其地乃爾悠久彼南嶽之叢與銀臺之本雖逺近之有殊其為深根蒂固無芟翦之患則所托者同也豫方山居小隱當蒔百本以供擷芼雖未䏻擬西河女子之夀亦足豐天隨子之七挾也西河女子杖八十老人者老人是其子因不修真以致衰老怒而杖之熙寧十年京師春旱上心焦勞於後苑瑶津亭建道場祈禱上精誠甚切一夕夢一僧形容甚異於空中吐雲霧以興雨及覺雨遂大注上大恱求其像於佛閣下乃羅漢中第十尊者也元絳厚之時為參政作喜雨詩王禹玉和其韻云紫殿霄祈感聖憂玉毫曽降𣑽王州慈深三界雲常聚法遍諸天雨自流作弻為霖孤宿望神僧吐霧應精求云云時臺省館閣悉和之崔伯易云陽元彌春帝為愁比丘龍起眷神州慈雲遍覆諸天潤惠澤相和萬國流云云人多稱之崔伯陽熙寧二年為國子監直講嘗著熙寧稽古一法百利論五卷逾萬言蓋以久任為要上之召對延和稱㫖自此遂擢用遍歷清要矣豫嘗求是書於其家今亦亡矣惜乎不見於世以此知古人著述亡逸不傳者多矣同時又有臨川吳孝宗子經嘗著三書一曰法語二曰先志三曰巷議舊嘗傳於其姪道宗夢協亦亡於兵火子經豫母之從叔也今聞其從孫家尚有本當復傳之唐庚子西謫惠州時自釀酒二種其醇和者名養生主其稍勁烈者名齊物論子西詩多新意不沿襲前人語如湖上云佳月明作哲好風聖之清獨游云烏攫春祠敏鳶窺野燒癡醉眠云山靜似太古日長如小年又芙蓉溪歌云人間八月溪秋霜嚴芙蓉溪上春酣酣二南變後魯叟筆七國戰處鄒軻談人間二月春光好溪上芙蓉迹如掃周家盛處伯夷枯漢室隆時賈生老小兒造化誰䏻窮幾回枯枿還芳叢只因人老不復少有酒且發衰顔紅比興殊新竒也王直方立之父名棫家多侍兒而小鬟素兒尤妍麗王嘗以臘梅花送眺無咎無咎以詩五絶謝之云有芳菲意淺姿容淺憶得素兒如此梅李豸方叔嘗飲襄陽沈氏家醉中題侍兒小瑩裙帶云旋剪香羅到地垂嬌紅嫩緑寫珠璣花前𣣔作重重結繫定春光不放歸後小瑩歸郭汲使君家更名艷瓊尚存也他日詢之乃襄陽士族家女遂嫁之洛陽牡丹之品見於花譜然未若陳州之盛且多也園户植花如種黍粟動以頃計政和壬辰春豫侍親在郡時園户牛氏忽開一枝色如雞雛而淡其面一尺三四寸髙尺許柔葩重疊約千百葉其本姚黃也而於葩英之端有金粉一暈縷之其心紫蕊亦金粉縷之牛氏乃以縷金黃名之以􅕋蒢作柵屋圍帳復張青帟護之於門首遣人約止游人人輸十金乃得入觀十日間其家𢾗百千豫亦獲見之郡守聞之𣣔剪以進於內府衆園户皆言不可曰此花之變易者不可為常倘他時復來索此品何應之又𣣔移其根亦以此為辭乃已明年花開果如舊物矣此亦草木之妖也豫妹夫王從一太初著東郊語録有云唐人詩云月落烏啼霜滿天江楓漁火對愁眠姑蘇城外寒山寺夜半鍾聲到客船此張繼楓橋夜泊之作也說者謂美則美矣但三更非撞鍾時按南史裴皇后傳載齊永明中上𢾗游幸諸苑囿載宫人從車置內深隱不聞端門鼓漏聲置鍾於景陽樓上應五鼓三鼓宫人聞鐘聲早起粧飾由是言之夜半之鍾有自來矣豫以謂不然非用景陽故事也此蓋吳郡之實耳今平江城中從舊承天寺鳴鍾乃半夜後也餘寺聞承天鍾罷乃相繼而鳴逮今如是以此知自唐而然楓橋去城𢾗里距諸山皆不逺書其實也承天今更名䏻仁云沈遼􅌖逹以書得名楷隸皆妙嘗自湖南泛江北歸舟過冨池直大風波濤駭恐舟師失措幾溺者屢矣富池有吳將甘寧廟往來者必祭焉􅌖達遙望其祠以誠禱之風果小息乃得維岸乃述寧仕吳之竒謀忠節作贊以揚靈威而答神之休自作楷法大軸以留廟中而去其後乃為過客好事者取之是夜神夢於郡守趣使還之明日守使人訊其事果得之復卑廟令掌之近聞今亦不存矣靖康𥘉韓子蒼知黃州頗訪東坡遺跡嘗登赤壁而賦所謂棲鶻之危巢者不復存矣悼悵作詩而歸郡人何頡斯舉者猶及識東坡因次韻獻子蒼云兒時宗伯寄吾州諷誦移文至白頭二賦人間真吐鳳五年江上不驚鷗蟹嘗見水人猶惡鶻有危棲孰肯留珍重使君尋往事西風悵望古城樓然黃之亦壁土人云本赤鼻磯也故東坡長短句云故壘西邉人道是三國周郎赤壁則亦是傳疑而已今嶽陽之下嘉魚之上有烏林赤壁蓋公瑾自武昌列艦風帆便順泝流而上逆戰於赤壁之間也杜甫有寄嶽州李使君詩云烏林芳草逺赤壁健帆開則此真敗魏軍之地也酴醿花或作荼䕷一名木香有二品一種花大而棘長條而紫心者為酴醿一品花小而繁小枝而檀心者為木香題詠者多嘗記范周無外云暖風吹麝入鉛華不肯隨春到謝家半夜粉寒香泣露也應和月怨梨花韓維持國云平生為愛此香濃仰面嘗迎落架風每恐春歸有遺恨典刑元在酒杯中未若張文潜云紫皇寶露張珠幰玉女熏籠覆錦衾萬紫千紅休巧笑人間春色在檀心又未若黃魯直云漢宫嬌額半塗黃入骨濃薰賈女香日色漸遲風力細倚欄偷舞白霓裳俞子容家藏書唐寅校畢墨莊漫録卷第九
