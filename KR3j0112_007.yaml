body:
  text: 墨荘漫録卷第七西施羙人也三尺童子皆知其為越獻於吴以亡吴也吴越春秋云越王使相者得苧羅山鬻薪之女曰西施鄭旦餙以羅縠教以容歩而獻於吴荘子曰西施病心而矉其里之醜人見而美之歸亦捧心而矉孟子云西子蒙不㓗則人皆掩面而過之注云西子古之好女西施也毛嬙亦美人也荘子云毛墙䴡姬人之所美也魚見之而深入鳥見之而髙飛釋音注司馬彪云毛墙古羙女一云越王美姬也麗姬晋獻公嬖之以為夫人崔譔本作西施又慎子云毛嬙西施天下之至姣也按左氏傳越之㓕吴在魯哀公之二十二年孟子嘗見梁惠王齊宣王自哀公二十二年至魏王之元年一百四年至齊宣王之元年一百三十二年乃魏惠王之二十九年也史記荘子傳云名周與梁惠王齊宣同時則荘子與孟盖一時慎子名到與淳與于髠騶奭之徒皆戦國時人亦荘孟一時也又史記表晉獻公五年伐􅌐戎得􅌐姬是歳己酉也至魏惠王之元年三百七年若以毛嬙為越王美姬又與􅌐姬非同時而崔譔以􅌐姬為西施故以為近故說者謂荘孟慎子所言西施皆越之獻吴者然予讀管子小稱篇有云毛嬙西施天下之美人也盛怒氣於面不䏻以為可好史記表齊威公小白之元年丙申也魯𣣔與齊公子紏入後小白齊距魯生致𬋩仲是歳至􅚼吴計二百一十三年而𬋩仲之書己言毛嬙西施是二人者皆前古之人矣豈越之西施冐古之美人以為名耶是有两西施矣而毛嬙亦非越王美姬明甚司馬彪之注乃臆說也當更質於博洽者政和問朝廷求訪三代鼎彜噐程唐為陜西提點茶馬李朝孺為陜西轉運遣人於鳳翔府破商北干墓得銅􅌉徑二尺餘中有欵識一十六字又得玉片四十三枚其長三寸許上圓而銳下濶而方厚半指許玉色明莹以盤獻之于朝玉乃留秦州軍資庫道君皇帝曰前代忠賢之墓安得發掘乃罷朝孺退出其􅌉聖徳髙明有如此者不然丘冢之厄不止此矣其玉乆在秦帑近年王庻知秦州日取之而去祁寛居之嘗見之為予言之然予又見劉褒延仲言比干墓在衞州西山去城𢾗十里有漢唐以來碑刻甚多墓周圍𢾗里生異木摎結不可入而居之言墓在關中未知何也真州六合縣界有山四面平直曰方山山之左右多古墓冢予從甥魏惇紹興十二三年間任天長縣尉日有一監司属官過邑舘于尉司出一襆物云昨過方山得之出以示惇皆美玉也其長二三寸濶一指許厚三四分光潤方正上有小竅約百餘枚不知為何物也惇𣣔丐其一二枚属官靳而不與且云方山民因耕穿一墓得此疑其為玉䇿以予考之此乃两漢以前貴近之墓所謂珠𥜗玉押者古以歛尸惟王公則有之耳盖與比干墓所獲正同爾川峽間有一種惡草羅生於野雖人家庭砌亦有之如此間之蒿蓬也土人呼為䕭麻音㻸其枝葉拂人肌肉即成瘡炮浸淫潰爛乆不䏻愈杜子美除草詩所謂草有害於人曾何生阻修其毒甚蜂蠆其多彌道周盖謂此也劉褒延仲至蜀嘗見之宣和間蔡寳臣致君收南唐後主書𢾗軸来京師以獻蔡絛約之其一乃王師收金陵城垂破時倉皇中作一䟽禱于释氏願兵退之後許造佛像若干身菩薩若干身齋僧若干萬員建殿宇若干所其𢾗皆甚多字畫老草然皆遒劲可愛盖危窘急中所書也又有看經發願文自稱蓮蓬居士李煜又有長短句臨江仙云櫻桃結子春歸盡蝶翻金粉雙飛子規啼月小楼西玉鈎羅幕惆悵捲金泥門巷寂寥人去後望殘煙草低迷而無尾句劉延仲為𥙷之云何時重聴玉騘嘶撲簾飛絮依約夣囬時東坡四時冬詞云真態生香誰畫得玉奴纎手嗅梅花每疑玉奴字殊無意味若以為潘淑妃小字則當為玉兒亦非故實劉延仲嘗見東坡手書本乃作玉如纎方知上下之意相貫愈覺此聮之妙也閩廣多異花悉清芬郁烈而末利花為衆花之冠嶺外人或云抹麗謂䏻掩衆花也至暮則尤香今閩人以陶盎種之轉海而来浙中人家以為嘉玩然性不耐寒極難爱護經霜雪則多死亦土地之異冝也顔慱文持約謫官嶺表爱而賦詩云竹稍脫青錦榕葉堕黄雲嶺頭暑正煩見此緑蕚君𣣔言嬌不吐藏意乆未分最憐月𥘉上濃香夣中聞䔥然六曲屏西施帶㣲醺叢深珊瑚帳枝轉翡翠裙譬如追風騎一抹萬馬群銅缾汲清泚聊復為子勤願言少湏臾對此髯将軍觀此詩則花之清淑柔婉風味不見可知矣京口北固山甘露寺舊有二大鉄鑊梁天監中鑄東坡游寺詩云䔥翁古鉄鑊相對空團團坡陀受百斛積雨生㣲瀾是也予徃來𢾗見之然未嘗稽考本何物為何用也近復游于寺因熟觀之盖有文可讀云天監十八年太歳乙亥十二月丙午朔十日乙卯皇帝親造鉄鑊於觧脫仏古佛字殿前滿漫㓕一字甘泉種以荷葉供養十方一切諸仏以仏神力遍至十方盡虚空界窮未來際令地獄苦鑊變為七珎寳池地獄沸湯化為八功徳水一切四生觧脫衆苦如蓮花在泥清净無染同得安樂到涅槃城斯鑊之用本在烹鮮八珎與染五味生纒我皇净照慈𬒳無邉法喜禅恱何取又漫一字檀縁造斯噐囬成勝縁如含碧水又漫一字發紅蓮道塲供飬永末無遷其後又云帥吴虎子近禁道真㮣懐於佐陳僧圓承宋又漫一字令宣令鄭休之義不可暁疑當時幹造之人耳又一行云五十石鑊然形制不䏻容今之五十石盖古之斗斛小也始知二鑊乃當時植蓮供飬佛之噐耳李端叔有贈人二小詩一云通中玉冷夣偏長花影籠階月浸凉挽断羅巾留不住覺來猶有去時香二云情随榆筴不勝飄心似楊花暖𣣔消儗借瓊林大盈庫約君孤注賭妖嬈盖有所謂也或云是與當塗楊姝者慱者以勝彩注累𢾗者至垂敗者惟有畸零不累注𢾗謂之孤注故端叔戯云韓退之詩云前計頓乖張居然見其贋廣韻及字書云贋五晏切注偽物也東坡嶺外詩云茯苓無人採千歳化虎魄我豈無長鑱真贋苦難識韓非子曰齊伐魯索讒鼎魯以其鴈徃齊曰鴈也魯曰真也古以㕍為贋亦借用也今人若作真鴈人必笑之東坡在黄州陳慥季常在岐亭時相徃來季常喜談飬生自謂吐納有所得後季常因病公以書戯之云公飬生之効有成績今又示病彌月雖使臯陶聴之未昜平反公之養性正如小子之圓覺可謂害脚法師鸚鵡禅五通氣毬黄門妾也前軰相與可謂善謔也崇寧二年三月一日衞州獲嘉縣民職氏殺猪祭神而民劉氏獵犬得其棄首骨㗸之狺狺四日不食民使其子析之其左牡齒臼中得肉如拇諦視之如來像也髻有珠如粟瞑目跏趺瞳子隱然荘嚴畢具觀者萬人眺載之伯宇嘗記其事眺無咎又作賛以稱嘆之政和丁酉予侍親在真州時慈受禅師懐深住持資福寺一日深老謂先君曰近赴村落冨人家齋見群犬争㗸嚙一牛脛骨甚狂噬相嗾不已村人持挺驅逐亦竟不去衆頗異因奪而破之其中血髄已堅凝如玉自成一菩薩形衣紋瓔珞相好竒特雖雕琢有所不及其家乃取去藏之此與職氏猪齒事極相類佛之慈悲化身無所不在此警於好殺者俾生信心哀愍有情故示希有之異闡提者得不少悛乎翟三丈公巽宣和末蔡絛約之用事外召從官七人公巽再以瑣闥召力辭之未至闕有指揮落職宫祠継而復還待制公作謝表有云弹貢禹之冠城非本志奪伯氏之邑其又何言又云惟一與一奪之命無有二三而三仕三己之心敢懐愠喜人多稱之翟公巽謝對衣金帶鞍馬表云顧臣非緇衣之宜敝予又改以吾從大夫之後不可徒行葉少藴謝賜暦日表云豈特千歳之日可坐而致将使百畆之田勿奪其時汪彦章賀進築隆兊二州及城寨表云我陵我阿不以山谿之險有民有社在吾邦域之中皆用經史全語有工者優詞樂語前軰以爲文章餘事然鮮䏻得体王安中履道政和六年天寧節集英殿宴作敎坊致語其誦聖徳云盖五帝其臣莫及自致丕平凡三代受命之符畢彰殊應又云歌太平旣醉之詩頼一代之有慶得乆視長生之道叅萬歳以成純可謂妙語也至放小兒隊詞云戢戢两髦已對㐮城之問翩翩群舞却從沂水之歸放女童詞云奏閬圃之雲謡已瞻天而獻祝曳廣寒之電䄂将偶月以言歸益更巧䴡而切當矣履道之掌内制可謂盡軄凢樂語不必典雅惟語時近俳乃妙如王履道天寧節宴小兒致語云五百里采五百里衞外并有截之區八千歳春八千歳秋共上無彊之夀又正旦宴小児致語云君子有酒多且㫖得盡群心化國之日舒以長對揚萬壽孫近叔詣宣和春晏女童致語云黛耜載耕於帝籍廣十千維耦之彊青娃徃祓於髙禖兆則百斯男之慶皆為得體然未若東坡元祐秋宴教坊致語云南極呈祥侯秋分而老人見西夷慕義渉流沙而天馬來又春宴致語云稍寛中昃之憂一均湛露之澤方将麹蘖群賢而惡㫖酒鼓吹六藝而放鄭聲雖白雪陽春莫致天顔之一笑而献芹負日各畫野人之寸心則又不可跂及矣樂語中有俳諧之言一两聮則伶人於進趋誦詠之間尤覺可觀而警絶如石𢡟敏若外州天寧節賜宴云飛碧篆之爐煙薫為和氣動紅鱗之酒面起作㤙波何安中得之外州上元云五雲縹緲出危嶠於靈鼍九陌荧煌下繁星於陸海暗塵随馬素月流天如熈熈登春䑓舉欣欣有喜色孫仲益和州送交代云渭城朝雨寄別恨於垂楊南浦春波眇愁心於碧草皆為人所膾灸也翟公巽知宻州侯䝉元功自中書侍郎罷政歸郷公有啓云得請真祠歸荣故里雖老成去國之昜而明哲保身之全多士嘆嗟餞韓侯之出祖邦人尉喜詠季子之來歸又云乗安車而過諸子未慕昔賢揮賜金以娯故人用償夙志公平時四六多聱牙髙古而此啓特平昜誠太平太守筆也後元功於里第築臺曰髙藍光旣落成公就䑓張具為宴自作致語有云公槐避寵衣繍歸榮從外方之赤松寄髙懐於緑野珎禽綷羽借雞樹之遺棲曲沼囬塘分鳳池之餘潤晋世語云劉放為中書監孫資為中書令共領樞要夏侯献曹肇心内不平殿中有雞棲樹二人相謂曰此亦乆矣其䏻復幾指放資也又晉書荀朂守中書監毗賛朝政及遷尚書令朂乆在中書專掌機事失之甚愠人有賀者怒曰奪我鳳凰池何賀焉故公用雞樹鳳池皆中書事考之方見其工李昭玘成季自京東西路提刑移東路西路置司在兊東路置司在青州謝上表有云去長安之日雖遥千里之圍望岱宗之雲猶均一雨之潤杜子美佳人詞云合昏尚知時鴛鴦不獨宿本草合歡或曰合昏陳藏噐云葉至暮則合故曰合昏今夜合花是也又徃在詩云當宁䧟玉座白間剥畫蟲文選景福殿賦云皎皎白間㣲㣲列錢注白間牎也又大食刀歌云得君亂絲與君理北史齊文宣帝髙洋神武第三子神武嘗令諸子各理亂絲帝獨抽刀斬之曰亂者湏斬神武以為然范忠宣公薨朝廷賜墓碑之額曰世濟忠直時唐彦猷君益知頴昌為表其居曰忠直坊范公之子正平正思直謂君益曰荷公之意但上之所賜刻於螭首掲於墓隧假寵於范氏若􅑲於康荘以為徃來之觀非朝廷之意也君益曰此州郡之事於君家無與也二公曰先祖先人功名聞於逺邇何待此而顯且十室之邑必有忠信流俗所尚識者所耻異時不獨吾家為人嗤誚公亦寧逃於指議故不得不力請也時李端叔官於許下乃見唐公且言曰頃胡文公㳟宿知蘇州時蒋堂希魯将致政歸文恭昔為諸生嘗受學於蒋公乃即其里第表之為難老坊蔣公見之不樂曰此俚俗歆熖内不足而假之人以為夸者非所望於故人也願即撤去文恭謝之𣣔如其請則營繕已畢乃資其嘗獲芝草之瑞更為靈芝文公退而語人曰識必因徳而後達蒋公之徳盖所畏而其識如此非吾所及也君益聞端叔之言遂撤去之范氏二公聞之乃謝端叔曰非公之語莫遂吾心也因復笑曰凢以伎䏻物貨自营啚售於人則多曰元本某家至於假供御供使州土為名殆與此一類顔子居陋巷一簞食一瓢飲人不堪其憂而不改其樂故與禹稷同道當時未聞表其巷爲何坊也端叔亦笑之後復陳此語於君益君益亦大笑之李資政邦直有與韓魏公書云前書戯問玉梳金箆者侍白鬚翁幾𣣔談死矣然常山頗多老伶人吹弹甚熟日使敎此五六人者近稍便串異時願侍飲期一釂觴也玉梳金箆盖邦直之侍姬也人或問命名之意邦直笑曰此俗所謂和尚置梳箆也又有與魏公書云舊日梳箆固無恙亦嘗曽添三两人更似和尚撮頭帶子尔元祐中哲宗句日一召輔臣於延英閣聴講讀時曽肇子開蘇轍子由自左右史益除中書舎人入侍講筵子由作詩呈同省諸公悉和之邇英延義皆仁宗所建溝記注官賜生飲茶将罷賜湯仍皆免拜無復外廷之禮故子開詩云二閣從容訪古今諸儒葵藿但傾心君臣相對疑賔主誰識昭陵用意深邇英閣前槐後竹雙槐極髙而柯葉拂地状如龍蛇或謂之鳳尾槐子開詩云鳳尾扶踈槐影寒龍吟䔥瑟竹聲乾漢皇恭黙尊儒學不似公孫見不冠子由詩云銅缾洒遍不勝寒雨點匀圓凍未乾囬首曈曨朝日上槐龍對舞覆衣冠並謂此也宣和中予在唐州外氏吴家時㐮陽府光化縣村人耕穴一冢得一噐類鼎而有盖盖及鼎腹皆雷紋中有虬形两耳為饕餮足為蚩尤制作甚精一足㣲蝕損尚可立也表舅唐慤端仲𢾗千得之以予舅氏啚好古愽雅乃以歸之而強名曰虬鼎且作歌以紀之予得熟視焉予以謂古之鼎鼐皆無盖而足皆圓直無作獸形者此乃敦耳端仲以其腹髙如鼎而敦乃形匾故名之為鼎耳其饕餮蚩尤與李伯時古噐圖所畫小敦耳足正同但小敦耳之两獸開口有餙玉䖏古之玉敦多如此也而此噐乃無餙玉之状復無欵識耳又按吕氏春秋云周鼎饕餮有首無身食人未咽害及此身此盖周噐也古噐多為饕餮蚩尤者深戒於貪暴也两舅皆以予言為然乃秪名曰虬敦極寳惜之時京西漕時道陳聞有此噐諷太守王玨來取之舅氏秘而不出後𣣔自携徃京師并關中侯金印獻之上方未㡬而俶優外門避地湘潭平時玩好書畫寳玉悉為賊有不知此噐存亡何所惜哉天下之事每患於無公論狥於一已之好惡則其說必偏雖以曲詞夸語以勝於人然卒不若公論之使人必信也硯之美者無出於端溪之石而唐詢彦猷作硯錄乃以青州黑山紅絲石為冠米芾元章則以唐州方城山葛仙公巖石為冠彦猷則謂紅絲石理黄者其絲紅理紅者其絲黄文之美者則有旋轉其絲凢十餘重次第不亂資質潤羙發墨乆為水所浸漬即有膏液出焉此石之至靈者非他石可與較議故列之於首元章則謂方城􅑐石石理向日視之如玉莹如鑑光而著墨如澄泥不滑稍磨之則已下而不熟生泡發墨生光如􅃮如油歲乆不退常如新成有君子一徳之操色紫可愛聲平而有韻此石近出始見十餘枚矣二公皆於翰學留意者然此說恐未為公也予伯父毅老提學嘗官青社得紅絲石硯雖文采誠如彦猷之說但石理麤慢殊不發墨時堪為几案之竒玩耳予外氏居唐州而方城外邑也予徃來必過仙公山下地名新寨居民多以石為工所貨之硯紫青白三種石也亦作鼎斛盤盂之類其硯如吴郡㠛村石之昜得一枚不過百錢惟有一種曰太陽坑石乃元章所謂近出者坑在山巔其石色如端溪堅重縝宻作硯極挫墨不𢾗磨而已盈硯殊可爱也盖元章性急每用磨墨發艶甚昜故以適意爲快也然多損筆墨故士人謂之筆墨劊子可與端州後歴石相抗焉得居上􅑐下岩之二石之上也予在京西時擇求𢾗年得一巨璞琢爲玉斗檏不知者以爲無眼之端溪也余舅吴衮顯啚爲余銘其背云琢雲根陪玄頴賛斯文貽乆永無磷緇堅以璟之子操同其炳渡江以來之後亡之矣二公之論當否䆒心於文房者必䏻訂評之黄魯直有乞猫詩云秋來䑕軰欺猫死窺甕翻盆攪夜眠聞道貍奴将𢾗子買魚穿桞聘衘蝉蔡天啓乞猫於孫元忠亦有詩云厨廩空虗䑕亦飢終宵咬齧近秋幃腐儒生計惟黄卷乞取衘蝉與護持余友李廣徳卲以二猫送余仍以二詩一云吾家入雪白於霜更有歌鞍似閙裝便請爐邉义手立從他䑕子自跳梁二云衘蝉毛色白勝酥搦絮堆綿亦不如老病毗耶湏减口從今休嘆食無魚墨荘漫録卷第七
