body:
  text: 墨莊漫録卷五宋張邦基撰元豐五年狀元黄裳榜神廟御集英殿唱名至第三甲有暨陶者主師誤呼為暨去聲三呼之無應者蘇丞相頌時為吏部侍郎侍立上顧頌頌曰當呼為居衣切果應而出上曰卿何以知之出何書頌曰臣觀三國時吳有暨豔造營府之論恐其後也問陶鄉里乃建州人上喜曰果吳人褒諭再三大觀三年狀元賈安宅榜徽廟御集英殿唱名至第五甲有甄徹者中書侍郎林攎彦振唱名呼甄為諸延切徹自言姓甄之人切攎猶强辨之近侍皆笑繼而御史有言攎罷而出神廟朝御馬有曰玉逍遥者葢赭白也嘗幸金明池歸乘之胡世将成公為中書舍人兼權給事中與張燾子公同在後省一日胡将上馬忽内逼乃解衣登厠張戯之曰解衣脱冕而行舍人給事取急同音欲尋屬對無有其事後李彌大似矩當尚書知平江府似矩常為宣撫使趙九齡次張忽云子公之句吾有對矣可對棄甲曵兵而走宣撫尚書取常輸字同音聞者莫不大笑且以為的對葢為帥臣常為賊所窘也范文正公長子監簿純佑自幼警悟明敏過人文正公所料事必先知之善能出神公在西邊凡敵情幾事皆預遥知葢出神之邊廷得之故公每制勝料敵如神者監簿之力也因出神為人所驚自此神觀不足未幾而亡時甚少也公之族子誾彥之云邦基外祖父吳豪字特起世家臨川其兄仕於唐州而亡因家江上治田於黄玉二坡遂以多貲聞倜儻尚義潜徳不耀荆公夫人之同祖兄弟也荆公更新法心不喜之将授之官力辭不願自外祖死伯舅元順圖持門户順圖蕭㪚風度雅意翰墨蓄法書名畫甚富烹茶焚香吟詩彈琹而隴畆漫不省也坐是東臯廢弛嵗不暇給乃委仲舅兑悦圖治其隳敗悦圖孝友修愿賙貧樂施有父風未幾多稼復如曩時嵗收數萬斛公心持己無絲髪之私輸載長兄房以聽出納悦圖奉太夫人盡子道待兄弟得怡怡之義四方親舊以貧促者存恤無厭臧獲咸無怨言鄉曲皆得其歡心宣和辛丑秋得病至冬不起視笥中衣無兩襲未嘗有一物私蓄也人始服其亷謹其京師調發科敷動以萬計適丁連嵗旱歉悦圖憂家勤瘁欝欝感病其死數日姪芾夢悦圖云吾有詩爾其志之及覺憶其二句云春風陌上一杯酒回首家園事若何葢悦圖雖死猶不忘家也悲夫僧如璧本撫州士人姓饒初名節少年嘗投書於曽子宣論新法非是不合乃祝髪更名尤長於詩嘗住數刹士大夫多與之㳺後改字徳操咏梅花一聨云遂教天下無雙色來作人間第一春風味亦不淺又答吕居仁寄詩云長憶吟時對短檠詩成重改又雞鳴如今老矣無心力口誦君詩遶竹行居仁甚稱之玉臺新詠梁沈約休文有六憶詩葢艷詞也其後少有效其體者王全玉乃作宫體十憶詩李元膺重見之愛其詞意宛轉且曰讀之動人老狂不能已􅂓復效尤亦作十絶謂憶行憶坐憶飲憶歌憶書憶博憶顰憶笑憶眠憶粧也其一曰屏帳腰支出洞房花枝窣地領巾長裙邊遮定雙鴛小只有金蓮步步香其二云椅上藤花闞面平繡裙斜綽茜羅輕踏青姊妹頻來喚鴛履貪􅃓不意行其三云緑蟻頻催未厭多帕羅香軟襯金荷從教弄酒春衫涴别有風流上眼波其四云一串紅牙碎玉敲碧雲無力駐晴霄也知唱到闗情處緩按餘聲眼色招其五云纎玊參差象管輕蜀箋小研一作砑碧窻明袖紗密掩嗔郎看學寫鴛鴦字未成其六云小閣爭籌畫燭低錦茵圍坐玉相欹嬌羞慣被諸郎戯袖映春葱出注遲其七曰漫注横波無語處輕攏小板欲歌時千愁萬恨闗心曲却使眉尖學别離其八云從來題目值千金無事羞多始見心乍向客前猶掩歛不知已覺鈿窩深其九云泥嬌成困日初長暫䣃輕裙玉簟凉漠漠帳煙籠玉枕粉肌生汗白蓮香其十云宫様梳兒金縷犀釵梁水玊刻蛟螭眉間要㸃雙心事不管蕭郎只畫眉其情致殊妍麗自非風流才思者不能作也藏書之富如宋宣獻畢文簡王原叔錢穆父王仲至家及荆南田氏歴陽沈氏各有書因譙郡祁氏多書號外府太清老氏之藏室後皆散亡田沈二家不肖子盡鬻之京都盛時貴人及賢宗室徃徃聚書多者至萬卷兵火之後焚毁迨盡間有一二流落人間亦書史一時之厄也吳中曽敀彦和賀鑄方回二家書其子獻之朝廷各命以官皆經彦和方回手自讐校非如田沈家貪多務得舛謬訛錯也平江自朱勔用事花木之奇異者盡移供禁御下至墟墓間珍木亦遭發鑿山林所餘惟合抱成圍或擁腫樗散者乃保天年建炎己酉冬洎庚戌春宣撫使周望留姑蘇諸将之兵斧斤日徃樵斫俱盡棟梁之材折而為薪莫敢誰何諸山皆童矣亦草木一時之厄耶吳中魚市以㪷計一斗為二觔半松陵唱和皮日休釣侣詩云一斗霜鱗換濁醪註云吳中買魚論斗酒即稱觔其來逺矣然酒今已用升至市交及蔬反論觔土風不可革也僧謂酒為般若湯鮮有知其説者子偶讀釋氏㑹典乃得其説云有一客僧長慶中届一寺呼淨人沽酒寺僧見之怒其麄暴奪缾擊栢樹其缾百碎其酒凝滯着樹如緑玊揺之不散僧曰某常持般若經須傾此物一盃即諷詠瀏亮乃将缾就樹盛之其酒盡落器中畧無孑遺奄然流啜斯須器㼌音庾酣暢矣酒之廋辭其起此乎樂全先生張安道薨東坡時守潁州於僧寺舉挂參酌古今用唐人服座主緦麻三月又别為文徃祭其柩葢感其知遇也王文公安石為相日奏事殿中忽覺偏頭痛不可忍遽奏上請歸治疾裕陵令且在中書偃臥已而小黄門持一小金杯藥少許賜之云左痛即灌右鼻右即反之左右俱痛並灌之即時痛愈明日入謝上曰禁中自太祖時有此數十方不傳人間此其一也因并賜此方蘇軾自黄州歸過金陵安石傳其方用之如神但目赤少時頭痛即愈法用新蘿蔔取自然汁入生龍腦少許調匀昻頭使人滴入鼻竅舒信道敗荷詩云忍看夜影分殘月别送秋聲入晚風前軰云一郡之政觀於酒一家之政觀於虀葢二物若善則其他可知矣處州縉雲縣簿㕔為武尉司頃有一婦人常現形與人接妍麗閒婉有殊色其來也異香芬馥非世間之香自稱曰英華或曰緑華前後官此者多為所惑建炎中一武尉與之配合如伉儷同僚皆預其宴集慧辨可喜與尉料理家事自言我非妖也不害於人尉以郡檄部兵至揚州時車駕駐蹕淮南英華亦隨而行至揚州南門不肯入謂尉曰天子之所門有守禦之神我不可入我從此而逝矣然君之行若復差徃泗上禍即至矣遂慘别而去尉至御營果令所部兵徃泗州交割尉乃行未幾而北兵至遂不知存亡獨小史得脱而歸英華已先至邑乆俟矣其後有􅃽輝逺永嘉人為邑簿英華出如平時其家母妻不安之而歸輝逺獨在官所英華時復出現其來也香先襲人輝逺不少動心一日謂輝逺曰君索居於此妾欲侍巾櫛可乎而君介然不蒙顧盼亦木心石腹之人也輝逺曰汝宜亟反毋相接也因齋戒具章奏欲訴於天是日復至曰君毋庸訴我某無所舍得一芘身之地不復出矣輝逺曰汝果爾吾為汝立祠以祀如何華感激而去自是不復至輝逺越數日亦忘之時家有素絲數束一旦其絲悉穿繫於窻牖連綿不可解輝逺因悟曰吾許汝立祠而渝約矣即為汝謀之乃於㕔事之偏室塑像以祠香火明日其絲悉已成束若不經手者其怪遂絶予舊聞斯事後見處州士人所説悉同意其為草木之妖也龎寅孫待制一女有容色適毗陵胡道修甚雍睦數年後道修每夜即有一婦人來同寢龎或聞其語言數詰問之道修笑而不答一夜道修先就枕龎牽幔欲入其人自帳中出姿容妍麗自顧已不若也龎亦不懼道修曰子見之否不必怒也我與爾同徃訪之恍惚與道修同至一處如王侯第簾幙華煥廊廡間懸琉璃燈光彩奪目道修與龎方擕手而行上堂有一人自屏後來乃向帳中所出之人也道修龎走從之相挽而去已而對飲堂上龎憤之亟欲走歸顧門宇悉閉鐍倉皇至一處見有斷垣乃大呼踰之而出恍然而寤葢夢也明日道修曰昨宵爾胡不少留乃怒而遁耶自爾無可奈何時寅孫任發運使乃具舟楫迎其女并壻至真州就醫召一道士能使物治病俾令治之道士以一木版一釘付龎戒令伺道修咳聲即以釘釘其版如其言釘之道修大呌曰是甚道理亟來奪之龎懼為所得擲版於河中時寅孫有館客在後舟見之即以手招之其版遂流至船邊館客取之㧞去其釘道修大笑道士悵惋而去卒不可療乃復歸毗陵不復為怪也一日道修謂龎曰來日有人擕一女子來求售可為我得之慎勿靳其直而失之也明日果有一老媪擕一村女來寢陋可駭道修見之喜曰是矣乃以數千得之道修自是嬖惑此婢甚歡而向之人不復至矣葢是怪依附此婢之體而道修見之乃向之人耳龎竟離歸道修與此婢生男女數人亦無他怪待制之猶子温孺潤甫言後問之胡氏信然宣和間朱勔應奉進為節度使子汝賢慶陽軍承宣使汝功静江軍承宣使汝文閤門宣賛舍人弟勣閤門宣賛舍人汝翼朝奉大夫直龍圖閣汝舟明州觀察使汝楫華州觀察使汝明滎州刺史孫絺繹約絢緯綬並閤門宣賛舍人綽紳並閤門祗候一時軒裳之盛未之有也靖康之初籍其家並追奪悉竄嶺外蔡君謨作福守日有一書生投詩來謁云逺入青青疊疊峰峰前真宰讀書宫半嵓冷落高宗雨一枕凄凉吉甫風煙鎻豹眠閒霧露井凋鳳宿舊梧桐九龍山下英雄氣盡屬君家世胄中君謨異之尋令人伺其所歸至一山下忽不見四顧無人唯一社屋爾意其社神也王荆公女適吳丞相之子封長安縣君者能詩嘗見親族婦女有服者帶白羅繫頭子者因戯為詩云香羅如雪縷新裁惹住烏雲不放回還似逺山秋水際夜來吹散一枝梅其姑丞相魚軒李氏侍從徐宥之女也亦能文有詩云絮如栁陌三春雨花落梨園一笛風百尺玉樓簾半捲夜深人在水晶宫皆婦人有才思者可喜也邦基從伯康孫字曼老時彦榜髙科宰溧陽日晨有道士來謁授以藥二粒且以橡栗四十枚付之戒曰此去千日當有大厄宜封識如法勿令妾婦見之庶緩急可為備後至揚州遇母舅錢勰穆父擕二侍姬來偶探藥囊而未及取尋而得疾取藥無有矣計其時正三年竟不起云宣和戊戌冬予道由潁昌之汝墳驛壁間得廖正一明畧手題三詩其一云阿憐二十頗有餘秀眉豐頰氷瓊膚無端欲作商人婦更枉方尋海畔夫其二云阿梅笄嵗得同歡懊惱情深解夢蘭鶯語輕清花裏話栁條弱嫩掌中㸔其三云淮源距襄陽亭候逾十舍征鞍背繡幃雲雨闕四夜雙艷盡傾城一姝偏擅價獨怒蕙心輕誤許商人嫁初不曉其意是年至唐州外氏家因舉是詩邦人任喻義可云頃年明畧與郡之二營妓徃來情好甚篤其一小字憐憐其一名梅時憐憐将為大賈所納明畧既去道過汝墳作詩葢有所感也憐憐竟隨賈去方尋海畔夫用海上有逐臭之夫事譏之也禁中舊有鴨脚子四本俗謂之銀杏大皆合抱其三在翠芳亭之北嵗收實至數斛而所託隂隘無可臨賞之所其一在太清樓之東得地顯敞可以就賞而未嘗著花也裕陵嘗臨觀而興嘆以為事有不能適人意者如此越明年一枝遂花而結實至十餘瑩大可愛裕陵大悦命宴太清樓賞之分賜禁從有差迨次年則不復花矣中官帶御器械石璘者老於禁掖供奉常為何正臣去非言之正臣嘗記是事且謂凡草木之華實葢有常性人主者為起一念乃能感格穹壤使隂陽造化之功為之巧順曲從以適其一時之所欲豈為天子者凡一言動致穹髙之鍳聽若影響之速耶由是觀之為人上者使有宋景公之言時發於誠心則召應豈俟終日哉正臣所論如此邦基嘗以正臣之子薳子楚見其手書因復記之翟三丈公巽少年侍龍圖出守㑹稽時嘗賦猩猩毛筆詩甚奇妙何去非次韻和之云貎妍足巧語軀惡招歋歈賦形具人獸寜脱荆榛居肉嘗登爼鼎餉餽傳甘腴失計墮醉鄉顛躓無與扶柔毫傳束縛航海歸仙癯浴質逸少池摛藻知章湖殺身固有用賦芋從衆狙坐令宣城工無復誇栗鬚宣城出栗䑕鬚也文房甲四寳萬兎慙䝉膚數管友十年閉門賦三都之子信豪邁嗜學每致劬未冠游膠庠已推經行儒蓬山天禄閣崢嶸凌碧虛期予早登躡同舍校魯魚公巽之詩恨未見有緑毛龜詩皆少年所作也予在四明時舶局日同官司户王璪粹昭郡檄徃昌國縣寳陀山觀音洞禱雨歸為予言寳陀山去昌國兩潮山不甚髙峻山下居民百許家以魚鹽為業亦有耕稼有一寺僧五六十人佛殿上有頻伽鳥二枚營巢梁棟間大如鴨頰毛羽紺翠其聲清越如撃玉每嵗生子必引去不知所之山有洞其深罔測莫得而入洞中水聲如􅊲數百面皷􅎏語不相聞其上復有洞穴日光所射可見數十歩外菩薩每現像於其中粹昭既致州郡之命因密禱願有所覩須􅁷見欄楯數尺皆碧玉也有刻鏤之文為闕路如世問宫殿所造者已而復現紋如珊瑚者亦數尺去人不逺極昭然也乆之於深逺處見菩薩像但見下身如腰而上即晦矣白衣瓔珞了了可數但不見其首寺僧云頃有見其面者乃作紅赤色今於山上作塑像正作此色乃當時所現者三韓外國諸山在杳㝠間海舶至此必有祈禱寺有鐘磬銅物皆雞林商賈所施者多刻彼國之年號亦有外國人留題頗有文采者僧云禱於洞者所視之相多不同有見淨缾者纓絡者善財者橋梁者亦有無所覩者洞前大石下有白玉晶瑩謂之菩薩石粹昭平生倔强至是頗信向云唐人詩行役異鄉懐歸感嘆而意相同者如賈島云客舍并州已十霜歸心日夜憶咸陽無端更渡桑乾水却望并州是故鄉竇鞏云風雨荆州二月天問人初雇峽中船西南一望雲和水猶道黔南有四千栁宗元云林邑山聯瘴海秋牂牁水向郡前流勞君更問龍池地正北三千到錦州李商隱云君問歸期未有期巴山夜雨漲秋池何時共翦西窻燭却話巴山夜雨時皆佳作也段承務者醫術甚精貴人奏以不理選受恩澤居宜興非有勢力者不能屈致翟公巽叅政居常熟欲見之託平江守梁仲謨尚書邀之始來乃日平江一富人病求段醫段曰此病不過湯劑數服可愈然非五百千錢為酬不可其家始許其半段拂衣而去竟從其請復以五十星為藥資段復求益増至百星始肯出藥果如其説而差段載其所獲而歸中塗夜夢一朱衣曰上帝以爾為醫而厚取賄賂殊無濟物之心命杖􅆃二十勑左右牽而鞭之既寤猶覺􅆃痛令人視之有捶痕歸家未幾而死東坡性喜飲而飲亦不多在黄州嘗以蜜為釀又作蜜酒歌人罕傳其法每蜜用四觔鍊熟入熟湯相攪成一斗入好麵麯二兩南方白酒餅子米麯一兩半擣細生絹袋盛都置一器中宻封之大暑中冷下稍凉温下天冷即熱下一二日即沸又數日沸定酒即清可飲初全帶蜜味澄之半月渾是佳酎方沸時又鍊蜜半觔冷投之尤妙予嘗試為之味甜如醇醪善飲之人恐非其好也蘇子由在政府子瞻為翰苑有一故人與子由兄弟有舊者來干子由求差遣乆而未遂一日來見子瞻且云某有望内翰以一言為助公徐曰舊聞有人貧甚無以為生乃謀伐冡遂破一墓見一人裸而坐曰爾不聞漢世楊王孫乎裸塟以矯世無物以濟汝也復鑿一冢用力彌艱既入見一王者曰我漢文帝也遺制壙中無納金玉器皆陶瓦何以濟汝復見有二冡相連乃穿其在左者乆之方透見一人曰我伯夷也瘠羸靣有饑色餓於首陽之下無以應汝之求其人嘆曰用力之勤無所獲不若更穿西冢或冀有得也􅇤羸者謂曰勸汝别謀於他所汝視我形骸如此舍弟叔齊豈能為人也故人大笑而去梅摯公儀龍圖景佑初以段中丞知昭州昭號二廣煙瘴水土惡弱處公常為説其畧云仕亦有瘴急催暴歛剥下奉上此租賦之瘴也深文以逞良惡不白此刑獄之瘴也侵牟民利以實私儲此貨財之瘴也盛揀姬妾以娛聲色此帷簿之瘴也有一於此民怨神怒安者必疚疚者必殞雖在輦下亦不可免何但逺方而已仕者或不自知乃歸咎於土瘴不亦謬乎予讀此方慨然有感涖仕者當書於座右亦可為訓也世謂子瞻詩多用小説中事而介甫詩則無有也予謂介甫詩時為之用比子瞻差少耳如酬王賢良松詩云世傳夀可三松倒此語難為常人道夀倒三松見裴鉶傳奇春日晚行云興盡無人檝迎我却隨倦鴉歸薄暮檝迎汝見古樂府王獻之桃葉歌金陵西齋詩云黄奴三倒頻璚樹小砑紅綾鬬詩句小砑紅綾見大業拾遺舒州云巫祝方説茶不救只疑天賜雨工閒雨工見洞庭靈怪傳徽廟見研石有紋如眉者謂之眉子石東坡嘗作眉子石研歌極有連蜷彎環可愛者東海宫聲應中有一硯尉氏孫宗鑑少魏舍人為作銘襄城愁京兆嫵北窻散黛東家翠羽稜稜筆鋒與此等伍胡不類子英氣妙語又曰夕鋒既去碧落方暮澹踈星之㣲明横青霞之數縷想像沉寥夷猶毫楮俾子之文萬丈軒翥梁冀妻孫夀封襄城君作愁眉啼粧詩云北窻朝向鏡錦帳復斜縈嬌羞不肯出猶言粧未成散黛隨眉廣胭脂遂臉生試将持出衆定得可憐名宋玉好色賦東家之子眉如翠羽用斯事也杜子美有憶鄭南玭詩云鄭南伏毒守瀟灑到江心殊不曉伏毒守之義守當作寺按華州圖經有伏毒寺劉禹錫外集有貞元中侍郎舅氏牧華州時予再忝科第前後由華覲謁陪登伏毒嵓今世行本皆作守誤也墨莊漫錄卷五
