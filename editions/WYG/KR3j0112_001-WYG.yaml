body:
  text: 墨莊漫錄卷一宋張邦基撰僕以聞見慮其忘也書藏其篋歸耕山間遇力罷釋耒之壟上與老農憇談非敢示諸好事也其間是非毁譽均無容心焉僕性喜藏書隨所寓榜曰墨莊故題其首曰墨莊漫錄淮海張邦基子賢云范蜀公乞致仕章四上未允第五章言臣所懐有可去者二謂言青苗不見聼一可去薦蘇軾孔文仲不見用二可去章既上遂得請張宣徽安道守成都眷籍娼陳鳯儀後數年王懿敏仲儀出守蜀安道祝仲儀致書與之仲儀至郡呼鳳儀曰張尚書頃與汝留情乎鳳儀泣下仲儀曰亦嘗遺尺牘今且存否曰迨今蓄之仲儀曰尚書有信至汝可盡索舊帖吾欲觀之不可隠也遂悉取呈韜於錦囊甚宻仲儀謂曰尚書以剛勁立朝少與多讐汝毋以此黷公乃取書對鳳儀并囊盡焚之後語安道張甚感之王張姻家也東坡在杭州一日逰西湖坐孤山竹閣前臨湖亭上時二客皆有服預焉久之湖心有一綵舟漸近亭前靚粧數人中有一人尤麗方鼓筝年且三十餘風韻􅈺雅綽有態度二客競目送之曲未終翩然而逝公戲作長短句云鳯凰山下雨初晴水風清晚霞明一朶芙蓉開過尚盈盈何處飛來雙白鷺如有意慕娉婷忽聞江上弄哀筝苦含情遣誰聼煙歛雲収依約是湘靈欲待曲終尋問取人不見數峰青毘陵一士人姓常為蟹詩云水清詎免雙螯黑秋老難逃一背紅葢譏朱勔父子范純仁堯夫丞相薨禮官謚曰忠宣考功鄧忠臣議曰每思捐身而開策常願休兵而息民祇知扶危而濟傾寜恤跋前而疐後又曰讒言亂國而明蔡確之無罪姦黨投石而謂大防之可原當衆人莫敢言之時在偏州無所用之地義形正色憤激至誠非特救當世正人端士之織羅直欲戒後世亂臣賊子之迷國狥公忘已為國惜賢又曰父母之國有時而去股肱之義於是或虧放之江湖忽如草芥紉蘭澤畔更甚屈原之忠占鵩坐隅已分賈生之死又曰側席南望而怏浮雲之蔽趍節東歸而詠零雨之濛又曰法座想見其風采詔書相望於道塗云云時論皆以為允當崇寧初追奪元諡并定諡覆官並罰銅二年六月言者再論忠臣得宫祠東坡作儋耳山詩云突兀隘空虛他山總不如君看道傍石盡是補天餘叔黨云石當作者傳冩之誤一字不工遂使全篇俱病王荆公書清勁峭拔飄飄不凡世謂之横風疾雨黄魯直謂學王濛米元章謂學楊凝式以余觀之乃天然如此武帝建安二十年冬十月始置名號至五大夫與舊列侯闗内侯凡六等以賞軍功名號侯爵十八級銅印龜紐墨綬五大夫十五級銅印環紐亦墨綬皆不食租此印决曹氏物也表舅唐悊端仲見之亦以予言為然乃賦詩云闗中金印豈秦闗想見風流漢已還大饗似書譙縣石蘭亭寧數㑹稽山空餘此日歸囊槖曾是當年雜珮環萬户况將取如斗此章何足繫腰間後范左轄謙叔在方城以書求借舅氏不與也前闕崇寧初既立黨籍臣僚論元祐史官云初大臣挾其私忿濟以邪説力引儇浮與其厚善布列史職或毁詆先烈或鑿空造語以厚誣若范祖禹黄庭堅張耒秦觀是也或隱没盛徳而不錄若曾肇是也或含糊取容而不敢言若陸佃是也皆再謫降時舊史已盡改矣王鞏定國為太常博士常從術士作軌革畫一堂廡庭中有明珠一枚旁置棊局未幾為御史朱光庭所抨得補外東坡在海外瓊州士人姜公弼來從學坡題其扇云滄海何曾斷地脈白袍或作朱厓端合破天荒公弼求足之坡云候汝登科當為汝足後人廣被貢至京師時坡已薨乃謁黄門於許下子由乃為足之云生長芸間已異芳風流稷下古諸姜適從瓊管魚龍窟秀出羊城翰墨場滄海何曾斷地脈白袍端合破天荒錦衣他日千人看始信東坡眼目長國朝宗室例除環衛裕陵始以非袒免補外官繼有登科者然未有為侍從者宣和五年始除子崧徽猷閣待制繼而子淔亦除八年又除子櫟宗室為從官自伯山始然皆外任未有任禁從者紹興三年始除子晝侍郎皆子字也然其他字號未有也十八年始除不棄侍郎不字任禁從自徳夫始香泛釣筒萍雨夜綠揺花塢栁風春舒亶信道詩也信道清才而詩刻削有如此者又有云空外水光風動月暗中花氣雪藏梅又云宿雨閣雲千嶂碧野花弄日一村香又云萬壑水澄知月白千林霜重見松髙皆警句也韓駒子蒼詩云倦鵲遶枝翻凍影征鴻摩月墮孤音誠佳句也但太工矣浮休居士張芸叟久經遷責既還怏怏不平嘗内集分題賦詩其女得蠟燭有云莫訝淚頻滴都縁心未灰浮休有慙色自是無復躁進意司馬朴之室浮休之女也有詩在鄜延路上一寺中一聨云滿目煙含芳草綠倚欄露濕海棠紅或云便是詠燭者紹聖初逐元祐黨人禁中疏出當責人姓名及廣南州郡以水土美惡繫罪之輕重而貶竄焉執政聚議至劉安世器之時蔣之竒頴叔云劉某平昔人推命極好章惇子厚以筆於昭州上點之云劉某命好且去昭州試命一廻杜子美𤣥都壇歌云子規夜啼山竹裂王母晝下雲旗翻説者多不曉王母或以為瑶池之金母也中官陳彦和言頃在宣和間掌禽苑四方所貢珎禽不可殫舉蜀中貢一種鳥狀如燕色紺翠尾甚多而長飛則尾開裊裊如兩旗名曰王母則子美所言乃此禽也葢遐方異種人罕識者子規夜啼山竹裂言其聲清越如竹裂也鄱陽胡詠之朝散生平好道元符初嘗於信州弋陽縣見一道人青巾葛衣神氣特異因揖而延之對飲道人指取大白滿引無算曰君有從軍之行去否胡竦然曰當去葢是時欲就熈河帥姚雄之辟也道人曰西郵方用師好去索紙書詩曰濟世應須不世才調羮重見用鹽梅種成白璧人何處熟了黄梁夢未囘相府舊開延士閤武夷新築望仙臺青雞唱徹函闗曉好巻㳺幃歸去來授詠曰為我以此寄章相公且曰章相公好箇人又錯了路逕也詠叩其説但云未可立談詠問其姓名亦不肯言曰吾早晚亦遊邊可以復相見夜艾詠曰先生可就此寢曰吾歸邸中只在河下乃拂衣去明日遣人往諸邸尋問皆云未嘗有道人因告縣令徧邑物色竟無曾見者詠至京師見王副車詵具告以此欲持詩謁子厚詵曰慎不可上方以邉事倚辦相公丞相得此必堅請去上必疑怪詰其所以然君且得罪詠以為然徑趍姚幕從取青唐暨還闕則子厚已去矣他日子厚北歸聞有此詩就詠求之其真本已為駙車奄有乃錄寄之子厚見詩歎曰使吾早得此詩去位久矣豈復有今日之事乎方詠之在邉日嘗至秦州天慶觀聞説吕先生在此月餘近日方去矣問何以知其為吕道士云道人去時適道衆皆赴隣郡醮道人顧小童曰吾且去借筆書壁侯師歸示之小童辭以觀新修師戒勿令題涴乃曰煩貯火殿鑪吾欲禮三清而去既而行殿後砌下有石池水甚清泚乃以爪畫殿壁留詩云石池清水是吾心漫被桃花倒影沈一到邽山空闕内消閒塵累七絃琴後題囘字衆驚歎以為必吕翁也壁甚髙其字非手可能及邽山即秦山也詠思弋陽所遇有逰邉之約豈非即斯人與此説予聞江元一太初云宿州靈壁縣張氏蘭臯園一石甚竒所謂小蓬萊也蘇子瞻愛之題其上云東坡居士醉中觀此灑然而醒子瞻之意葢取李徳裕平泉莊有醒醉石醉則据之乃醒也蔣頴叔過見之復題云荆溪居士暑中觀此爽然而凉吳右司師禮安中為宿守題其後云紫溪翁大暑醉中讀二題一笑而去張氏皆刻之其石後歸禁中姑蘇士人家有玉蟾蜍一枚皤腹中空每焚香置爐邉煙盡歸腹中久之冉冉復自蟾口噴出亦異物也退之詩風能拆芡胔露亦染梨腮魯直本亦作風稜露液乂與興元宴集詩云莊漫華墨間墨當作黒華陽黒水惟梁州興元梁州也吳安中少年時為堠子詩云行客往來渾望我我於行客本無心喜為人書之李商隠錦瑟詩云莊周曉夢迷蝴蝶望帝春心託杜鵑滄海月明珠有淚藍田日暖玉生煙人多不曉劉貢父詩話云錦瑟令狐綯家青衣亦莫能考瑟譜有適怨清和四曲名四句葢形容四曲耳唐子西嘗見桃李盛開而梅尚存數枝因作詩時張無盡天覺被召乃以詩投之云桃花能紅李能白春來何處無顔色不應尚有一枝梅可是東君苦留客向來開處當嚴冬桃李未在交逰中只今已是丈人行勿與少年爭春風無盡大加稱賞延安夫人蘇氏丞相子容妹曽子宣内也有詞行於世或以為東坡女弟適栁子玉者所作非也崇寧三年邦基伯父文簡公賔老自翰苑拜左丞而伯父倪老後除内相宣和八年文粹中自翰苑拜右丞而其季虛中除内相皆兄弟相代於北扉亦盛事也廣陵先生逢原嘗為暑熱思風詩云力卷雨來無嵗旱盡驅雲去放天髙客有傳示王介甫嘆曰有致君澤民之志惜乎不振也逢原一日與王平甫數人登蔣山相與賦詩而逢原先成舉數聨平甫未屈至聞仰躋蒼厓顛下視白日徂夜半身在髙若騎箕尾居乃嘆曰此天上語非我曹所及遂閣筆襄陽有一曹掾不為郡將所禮屢窘幾殆一日掾被召以詩上郡將而别之有云已覺目光在牛角未信鞭長及馬腹郡將雖嘉賞而愈銜之蔡元度魯公在位錫賚無窮而用度亦廣京師感慈寺修浮圖題三千緡時有吳鍊師者丹陽人辟榖修養館於西園庵中後有隙地吳勸令蒔麥既穫頗厭狼籍公見之題詩於庵曰塔縁便捨三千貫月俸無踰一萬緡却向西園課小麥老來顛倒見愁人胡師文元質侍郎利州一日晝寢書室蹶然而興呼吏問曰適有人投訟牒曰稱吳伴姑吏曰無有斯須復夢如初既覺復呼吏曰倅㕔庖舎在何所其户牖何向吏具白之即命駕至彼率倅同觀指一隅命鍤發之不數尺得一婦人屍倒植水中衣履猶未敗葢前倅子舍之婢因捶死瘞於此人莫知之因命具棺衾薦以佛事復夢婦人云今免倒形以就安宅且將訴於陰府矣感激而去髙郵人徐伯通與直時為館客親見此事杜甫詩東閣觀梅動詩興還如何遜在揚州多不詳遜在揚州之説以本傳考之但言遜天監中為尚書水部郎南平王引為賓客掌書記室薦之武帝與吳均俱進幸後稍失意帝曰吳均不均何遜不遜遜卒於廬陵王記室亦不言在揚州也及觀遜有梅花詩見於藝文類聚初學記云兎園標節物驚時最是梅御霜當路發映雪擬寒開枝横却月觀花遶凌風臺朝灑長門泣夕注臨卭杯應知早凋落故逐上春來余後見别本遜東海剡人舉本州秀才射策為當時之冠歴官奉朝請時南平王殿下為中權將軍揚州刺史望髙右戚實曰賢主擁篲分庭愛客接士東閣一開競収揚馬左席皆啓争趍鄒枚君以詞藝早聞故深親禮引為水部行㕘軍事仍掌文記室云云乃知遜嘗在揚州也葢本傳但言南平引為記室畧去揚州爾然東晉宋齊梁陳皆以建業為揚州則遜之所在揚州乃建業耳非今之廣陵也隋以後始以廣陵名州潤州蘇氏家書畫甚多書之絶異者有太宗賜易簡御書宋玉大言賦并名真戒酒批答鍾繇賀吳滅闗公上文帝表王右軍答會稽内史王述書雪晴寄山陰張侯帖獻之秋風詞梁蕭子雲節班固漢史唐褚遂良模本蘭亭李太白天馬歌賀知章醉中吟張長史書逸人壁顔魯公進文殊碑讀李陽氷篆新泉銘永禪史真草千文齊已題贈並皆真蹟名畫則顧凱之雪霽圖望五老峰圖北齊舞鶴圖閻立本醉道士圖吳道子六甲神薛稷戲鶴陳閎蕃馬韓幹御馬戴嵩牛圖王維卧披圖邉鸞雀竹李將軍曉景屏風李成山水徐熈草蟲黄荃墨竹居寧翎毛董羽龍水劉道士鬼神刁處士竹石鍾隱乳兎物之尤異者有明皇賜蘇小許公四代相玉印贊皇父子石研石兎竹拂連理拄杖陳後主宫娃七寶束帶雷公斧珊瑚筆架玉連環皆希世之寶後皆散逸或有歸御府者今不知流落何處荆公退居金陵蔣山學佛者俗姓吳日供灑掃山下田家子也一日風墮挂壁舊烏巾吳舉之復置於壁公適見之謂曰乞汝歸遺父數日公問幞頭安在吳曰父村老無用貨於市中嘗賣得錢三百文供父感相公之賜也公嘆息之因呼一僕同吳以元價往贖且戒茍以轉售即不須訪索果以弊惡猶存乃贖以歸公命取小刀自於巾脚刮磨粲然黄金也葢禁中所賜者乃復遺吳吳後潦倒竟不能祝髪以竹工居真州政和丙申年予嘗令造竹器親説如此時巳年六十餘貧窶之甚亦命也吕温卿為浙漕既起錢濟明獄又發廖明畧事二人皆廢斥復欲網羅參寥未有以中之會有僧與參寥有隙言參寥度牒冒名葢參寥本名曇潛因子瞻改曰道潛温卿索牒驗之信然竟坐刑之歸俗編管兖州未幾温卿亦為孫傑鼎臣發其贓濫繫獄人以為菑人者人必反菑之孔雀毛著龍腦則相綴禁中以翠尾作帚每幸諸閣擲龍腦以辟穢過則以翠尾掃之皆聚無有遺者亦若磁石引針琥珀拾芥物類相感也中表錢渻子全穆父之孫蒙仲之子三嵗喪父自少刻苦能立好學有節操何㮚榜登科即丁母艱及第十餘年未嘗到官試中學官除濟南府教授車駕駐蹕揚州有薦權國子博士者始入局㕘謁長貳方茶疾作仆地輿歸一夕而殂竟無一日之禄惜哉命薄如此可為奔求躁圖之戒世傳宗室中昔有昏謬俗呼為撥􅐰太尉一日坐宫門見釘鉸者亟呼之命僕取弊履令工以革䕶其首工笑曰非我技也公乃悮曰我謬也誤呼汝矣適欲喚一錮漏俗呼骨路者耳聞者大笑之王黼將明盛時搜求四方瓌竒之物以充玩好有人以桃核半枚來獻中容米三四斗其間題詠之字滿矣李之儀端叔題云觀此桃則退之所謂華山十丈蓮信有之矣今不知存否也子嘗觀洽聞記云吐谷渾桃如大石甕豈非此桃也耶墨莊漫録卷一
