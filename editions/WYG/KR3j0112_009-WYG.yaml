body:
  text: 墨莊漫録卷九宋張邦基撰李淳風論辯真玉云其色溫潤如肥物所染敲之其聲清引若金磬之餘響絶而復起殘聲逺沉徐徐方盡此真玉也予頃在唐州見任布叅政之孫諭字義可收一璧凝滑如脂無有蟻缺惟有兩粟大赤黝葢尸沁也以綿繩挂之撃之其清越之聲餘韻悠揚正如淳風之説與世所見水蒼玉不可同日而語後聞為一中都一貴人取去自是不復再見也政和丁酉嵗真州郊外一家屠一牛買肉歸者往往於刲割之際錚錚有聲視之於肉脉中皆有舍利也大小不一光瑩如玉詢之數家皆有之自爾一村之民不復食牛東坡作長短句洞僊歌所謂氷肌玉骨自清凉無汗者公自敘云予幼時見一老人年九十餘能言孟蜀主時事云蜀主嘗與花蘂夫人夜起納凉於摩訶池上作洞僊歌令老人能歌之予今但記其首兩句力為足之近見李公彦季成詩話乃云楊元素作本事記洞僊歌氷肌玉骨自清凉無汗錢唐有老尼能誦後主詩首章兩句後人為足其意以填此詞其説不同予友陳興祖德昭云頃見一詩話亦題云李季成作乃全載孟蜀主一詩氷肌玉骨清無汗水殿風來暗香滿簾間明月獨窺人欹枕釵横雲鬢亂三更庭院悄無聲時見踈星度河漢屈指西風幾時來只恐流年暗中換云東坡少年遇美人喜洞僊歌又邂逅處景色暗相似故櫽括稍協律以贈之也予以謂此説近之㩀此乃詩耳而東坡自敘乃云是洞僊歌令葢公以此敘自晦耳洞僊歌腔出近世五代及國初未之有也琹阮皆樂之雅者也琹則人多能之而藝精者亦衆至阮則人罕有造其妙者中都盛時有醴泉觀道士王慶之頗有此樂同時有安敏修者以此藝供奉上前徽廟顧遇厚於倫軰二人者其能相抗予在京師皆嘗聼之慶之則閒雅多則古曲優逸不迫敏修則變移宮徵抑怨取興雜以新聲然皆妙手絶藝也後慶之不知存亡敏修被虜北去未幾竄而南歸今習阮者未有能及此二人也劉棐仲忱詩律殊有風致常賦咸陽二絶云父老壺漿迓義旗亡秦誰復為秦悲不曾被虐曾蒙德十二金人合淚垂玉殿珠樓二世中楚人一炬逐煙空却縁火是秦人火只與焚書一様紅殊類唐人題詠他詩亦稱是華亭縣有寒穴泉與無錫惠山泉味相同並嘗之不覺有異邑人知者亦少王荆公嘗有詩云神泉冽氷霜髙穴雪與平空山渟千秋不出嗚咽聲山風吹更寒山月相與清北客不到此如何洗煩酲西京牡丹聞於天下花盛時太守作萬花㑹宴集之所以花為屏帳至於梁棟柱拱悉以竹筒貯水簮花釘挂舉目皆花也揚州産芍藥其妙者不減於姚黄魏紫蔡元長知淮揚日亦效洛陽亦作萬花㑹其後嵗嵗循習而為人頗病之元祐七年東坡來知揚州正遇花時吏白舊例公判罷之人皆鼓舞欣悦作書報王定國云花㑹檢舊案用花千萬朶吏縁為姦乃揚州大害己罷之矣雖殺風景免造業也公為政之惠利於民率皆類此民到於今稱之穆天子傳古書也杜子美多用其事語如天子之馬走千里王命官屬休曾祝沉豪牛歕玉大宛兒凡此四皆出此書也曾皈彦和博學之士予先君有此書彦和借往讐校乃題其後云晉中書監令荀公曾知嵪所上篆文穆天子傳六巻即太康二年汲冢人準盜發魏襄王墓所傳竹書也按束晳傳竹策書凡七十五篇内穆天子傳五篇言周穆王遊行四海見帝臺西王母雜書十九篇周食田法周書論楚事周穆王羙人盛姬死事然則穆天子傳本五篇公曾等所上乃有六卷者今觀第六巻多記盛姬事葢并入雜書中此一篇也書雖殘缺不可盡讀而其所載事物多故志之所無者如世民之吟黄澤之謡黄竹之詩其辭皆雅馴可喜又如虎牢五鹿之所以名亦可以博異聞矣嘗考漢書地理志京北有西鄭河南有新鄭漢中有南鄭京兆之鄭先儒謂之鄭班固曰周宣王弟桓公邑應劭亦曰宣王母弟友所封也其子與平王東遷更稱新鄭臣瓉曰周穆王以下都於新鄭不得以威封初桓公為司徒王室作亂故謀於史伯而寄帑與賄於虢㑹之間幽王既敗二年而滅㑹四年而滅虢居於鄭父之丘是以為鄭桓公無封京兆之文也顔師古曰穆王以下無西鄭之事瓉説非也今按此書自第四卷而下巻末皆書天子之入於南鄭葢瓉所謂穆王之所都者是也第五巻有祭父自圃鄭來謁葢瓉之所謂鄭父之丘者是也理即校書郎中傳瓉乃公曽嵪所部校穆天子傳官屬也故因取此傳以注漢書然傳稱南鄭瓉西鄭所未詳其所以異豈近世傳寫之誤也漢中之鄭為南鄭不應京兆之鄭復稱南鄭其稱西鄭乃以圃鄭為東耳西鄭穆王出遊反必入焉豈非以其所都故耶設非王都亦圻内近地也邦家在畺地畿内諸侯當在邦都其内為縣又其内為都則西鄭之於鎬京殆可為公邑而已亦不足以為國也且是時己有圃鄭矣則不必因桓公之子從周東遷乃得鄭名然謂之新鄭又果何耶雖然如瓉之説亦豈全非哉亦汲冢中竹書唯此書及師春行於世餘如紀年瓉語之類復已亡逸今人家閨房遇春秋社日不作組紃謂之忌作故周美成秋蘂香詞乳鴨池塘水暖風𦂳栁花迎面午粧粉指印窻眼曲理長眉翠淺聞知社日停針線採新燕寶釵落枕夢春逺簾影參差滿院予見張籍吴楚詞云庭前春鳥啄林聲紅夾羅襦縫未成今朝社日停針線起向朱櫻樹下行乃知唐時已有此忌循習至今也李博宣和間仕大府卿因職事陛對徽宗問曰知卿年彌髙而色不衰中外稱卿有内丹之術可具術以進博曰陛下盛德廣淵睿智日新學有緝熙於光明臣雖不學敢以誠對謹領聖訓容臣具術以聞明日乃進曰臣聞内觀所以存其心也外觀所以養其氣也存其心養其氣則真火爐鼎日炎神水華池日盛矣長生乆視上下與天地同流天道運而不積聖人知而行之大道甚易知其易行以簡以簡易而天下之理得也人之所恃以生者氣也氣住則神住神住則形住形住則長生乆視自此始矣葢日月運轉寒暑往來天地所以長乆吹嘘呼吸吐故納新真人所以住世故丹元子曰形以神住神以氣集氣體之充也形神之舍也氣實則成氣虚則敓氣住則生氣耗則滅此廣成子所以保氣而煙蘿子所以煉氣也然則一言而盡保煉之妙者其惟嚥納乎故曰一嚥二嚥雲蒸雨至三嚥四嚥内景充實七嚥九嚥心火下降腎水上昇水火既濟則内丹成可以已疾可以保生可以延年可以超昇臣謹刪其繁紊撮其樞要直書其玅以著於篇上篇曰進火候毎日子後午前若於五更初陽盛時尤佳就坐榻上面東或南握固盤足合目主腰而坐澄心静慮内藏五藏仰靣合口鼻中引出清氣氣極則生要而嚥之毎一嚥縮榖道一縮再引則再如之至再至三若氣極不能任則低頭㣲開口以吹寜出之勿令耳聞出氣之聲如此凡三次是為進火一周天俟氣調匀然後行水下篇曰行水候行水鼻中取鼻涕口中取液聚為一處多多益辦俟甘而熱即閉口仰靣亞腰左顧一嚥正中一嚥分三嚥而下内想一直下丹田毎一嚥亦縮榖道一縮如此一遍是為行水一周天毎進火行水畢然後下榻行履自如後敘曰五行水火為初人生水火為急此是極易之要法上奪天地造化學道修真之士初行須覺臍下如火飲食添進四肢輕快是其騐也行而乆之則髮白再黑齒落重生精神全具復歸嬰兒寒暑不能侵鬼神不能宼千二百嵗夀比彭老漸為真人矣徽宗見而嘉納之梁師成錄其説以示人乃簡易之道第行之者不能悠乆耳或云虞謨君明修養有得亦祗行此法也翰苑嵗供禁中立春端午貼子前後多矣率多擬效舊語故少新意惟能道宫禁一時之事者為妙王履道皇帝閤云彤霞蒨霧繞觚稜樓雪融銀滴半層别繞擬開延福宴夾城先試景龍燈妃嬪閤云玉燕翩翩入鬢雲花風初掠縷金裙神霄宮裏驂鸞侶來侍長生大帝君政和七年所進也有皇后閤云蘂笈琅函受袐文清虚道合玉晨君瑶臺夜静朝真乆金屋春寒閲籙勤妃嬪閤云曈曨曉日上金鋪的皪春氷泮玉壺繡戸緑窻塵不到凝酥㸃就輞川圖重和二年所進也不惟才思清麗皆紀當時事也徐遹子閩人博學尚氣累舉不㨗乆困場屋崇寧二年為特奏名魁時已老矣赴聞喜賜宴於璚林苑歸騎過平康狹邪之所同年所簮花多為群倡所求惟遹至所寓花乃獨存因戯題一絶云白馬青衫老得官璚林宴罷酒腸寛平康過盡無人問留得宮花醒後㸔後仕至朝官知廣徳軍謝事而歸予四明同僚嚴明致養正靖康丙午嵗仕廣徳軍建平尉任滿入城批書舘於郡之開化寺一夕夢一婦麗容服來訴曰妾四明人也乆寓於此未有所歸惟君子哀之為我謀所舍意若求𦵏也既寤詢諸寺僧有云政和間池陽人彭汝雲為郡從事其子婦張氏死乃殯於城西明教院其後改院神霄宮徙其徒入此寺併移其柩於此僧軰常有見之者不以為恠嚴頗疑之未幾考課事竟將返馬時赴郡官㑹暨歸夜參半矣方就枕復見其人立於帳前泣訴曰知君戒行有日前懇何如又云欲竭奴心誓殫素志嚴恍惚驚寤悚悸而起不能悉記其語翌日復詢彭氏則亦託者同也熈寧十年京師春旱上心焦勞於後苑瑶津亭建道場祈禱上精誠甚切一夕夢一僧形容甚異於空中吐雲霧以興雨及覺雨遂大注上大悦求其像於佛閤中乃羅漢中第十尊者也元絳厚之時為叅政作喜雨詩王禹玉和其韻云紫殿宵稱感聖憂玉毫曾降梵王州慈深三界雲常聚法徧諸天雨自流作弼為霖孤宿望神僧吐霧應精求云云人多稱之崔伯易熈寜二年為國子監直講嘗著熈寜稽古一法百利論五卷逾萬言槩以乆任為要上之召對延和稱㫖自此遂擢用徧歴清要矣予嘗求是書於其家今已亡矣惜乎不見於世以此知古人著述亡逸不傳者多矣同時又有臨川吴孝宗子經嘗著三書一曰法語二曰先志三曰巷議舊嘗傳於其姪道宗夢協亦亡於兵火子經予母之從叔也今聞其從孫家尚有本當復傳之唐庚子西謫惠州時自釀酒二種其醇和者名養生主其稍冽者名齊物論子西詩多新意不沿襲前人語如湖上云佳月明作哲好風聖之清獨逰云烏攫春祠敏鳶窺野燒癡醉眠云山静似太古日長如小年又芙蓉溪歌云人間八月秋風嚴芙蓉溪上春酣酣二南變後魯叟筆七國戰處鄒軻談人間二月春光好溪上芙蓉迹如掃周家盛處伯夷枯漢室隆時賈生老小兒造化誰能窮幾回枯枿還芳叢只因人老不復少有酒且發衰顔紅此興殊新竒也臣昔與希真遊衡山朱陵洞天過古蘭若基野客留宿庵下有聞類狗吠希真謂此非人境安得有是客笑曰巖腹枸杞生而酷似此其音也臣憶舊説黎明拉客欲識其處未至百步皆曰彼婆娑出衆榮者是臣與希真將前客急止曰此神物也側常有蛇虎守䕶必待有道之士以歸若等無得輙近自是毎念之或入他山中遇樵蘓又訪問焉云往往有見但苦在深絶不可到之地元豐己未三月陛下親策進士集英殿三舘故事臣得寓直殿廊入在銀臺門少四十步許御溝之上有若洞天所望熟視則枸杞也其本圍尺有咫左紐而連理臣亟詢衛士高者對曰聞天聖前尤盛此荐出苖耳臣益悚然竊語同舍或曰是雖可近而甚袐也曾減仙山神醫巖乎既而嘆曰下誠有物耶孕天地隂陽之至和隱端然不可輙至之神今乃自幸託宮槐禁栁之列備一時灑掃之觀是豈浪出而徒然耶偶臣屬昧方士採製餌服之節度未得相與抃舞歡呼随萬年之觴一供吾君亦臣子心願目想而深可愧恨慊然者因感而成詩姑有待焉云云予因是知一物生得其地乃爾悠乆彼南嶽之叢與銀臺之本雖逺近之有殊其為深根固蒂無芟翦之患則所云云予方居山小隠當蒔百本以供擷芼雖未能擬西河女子之夀亦足豊天随子之七袠也王直方立之父名棫家多侍兒而小鬟素兒尤妍麗王嘗以蠟梅花送晁無咎無咎以詩五絶謝之有云芳菲意淺姿容淺憶得素兒如此梅李廌方叔嘗飲襄陽沈氏家醉中題侍兒小瑩裙帶云旋剪香羅列地垂嬌紅嫩緑冩珠璣花前欲作重重結繫定春光不放歸後小瑩歸郭汲使君家更名艷瓊尚存也他日訪之乃襄陽士族家遂嫁之洛陽牡丹之品見於花譜然未若陳州之盛且多也園户植花如種黍粟動以頃計政和壬辰春予侍親在郡時園户牛氏家忽開一枝色如鵝雛而淡其靣一尺三四寸髙尺許柔葩重疉約千百葉其本姚黄也而於葩英之端有金粉一暈縷之其心紫蕋亦金粉縷之牛氏乃以縷金黄名之以籧篨作棚屋圍幛復張青㡩䕶之於門首遣人約止遊人人輸千錢乃得入觀十日間其家數百千予亦獲見之郡守聞之欲剪以進於内府衆園户皆言不可曰此花之變易者不可為常他時復來索此品何應之又欲移其根亦以此為辭乃已明年花開果如舊品矣此亦草木之妖也予妹夫王從一太初著東郊語錄有云唐人詩云月落烏啼霜滿天江楓漁火對愁眠姑蘓城外寒山寺夜半鐘聲到客船此張繼楓橋夜泊之作也説者謂美則美矣但三更非撞鐘時按南史裴皇后傳載齊永明中上數游幸諸苑囿載宮人從車置内深隠不聞端門皷漏聲置鐘於景陽樓上應五更三皷宮人聞鐘聲早起粧飾由是言之夜半之鐘有自來矣予以為不然非用景陽故事也此葢吴郡之實耳今平江城中從舊承天寺鳴鐘乃半夜後也餘寺聞承天鐘罷乃相繼而鳴迨今如是以此知自唐而然楓橋去城數里距諸山皆不逺書其實也承天今更名能仁云沈遼睿逹以書得名楷𨽻皆妙嘗自湖南泛江北歸舟過富池值大風波濤駭怒舟師失措幾溺者屢矣富池有吴将甘寧廟往來者必祭焉睿逹遥望其祠以誠禱之風果小息乃得維㟁乃述寧仕吴之竒謀忠節作賛以揚靈威而答神之休自作楷法大軸以留廟中而去其後乃為過客好事者取之是夜神夢於郡守使還之明日守使人訊其事果得之復畀廟令掌之近聞今亦不存矣靖康初韓子蒼知黄州頗訪東坡遺迹常登赤壁而賦所謂棲鶻之危巢者不復存矣悼悵作詩而歸又何頡斯舉者猶及識東坡因次韻獻子蒼云兒時宗伯寄吴州諷誦遺文至白頭二賦人間真吐鳯五年江上不驚鷗蟹常見水人猶惡鶻有危棲孰肯留珍重使君尋往事西風悵望古城樓然黄之赤壁土人云本赤鼻磯也故東坡長短句故壘西邉人道是三國周郎赤壁則亦是傳疑而云也今岳陽之下嘉魚之上有烏林赤壁葢公瑾自武昌列艦風帆便順泝流而上遇戰於赤壁之間也牡牧有寄岳州李使君詩云烏林芳草逺赤壁健帆開則此真敗魏軍之地也酴醿花或作荼䕷一名木香有二品一種花大而棘長條而紫心者為酴醿一品花小而繁小枝而檀心者為木香題詠者多常記周無外云暖風吹麝入鉛華不肯随春到謝家半夜粉寒香泣露也應和月怨梨花韓維持國云平生為愛此香濃仰面常迎落架風毎恐春歸有遺恨典刑元在酒盃中未若張文潛云紫皇寶輅張珠幰玉女熏籠覆繡衾萬紫千紅休巧笑人間春色在檀心又未若黃魯直云漢宮嬌額半塗黃入骨濃薫賈女香日色漸遲風力細倚欄偷舞白霓裳墨莊漫録巻九
