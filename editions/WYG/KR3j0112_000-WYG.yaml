body:
  text: 墨莊漫録雜家類三雜説之屬提要臣等謹按墨莊漫録十卷宋張邦基撰邦基字子賢髙郵人仕履未詳自稱宣和癸卯在呉中見朱勔所采太湖黿山石又稱紹興十八年見趙不棄除侍郎則南北宋間人也前有自序稱性喜藏書隨所寓榜曰墨莊故以為名其書多記雜事亦頗及考證如渭州潘源縣土怪周昕父變羊胡師文見呉伴姑明州士人遇裴休葉世寧嚴清闗注諸夢事雖不免為小説家言然如記韓愈詩風稜露液字之異同蘇軾儋耳詩石字者字之訛誤辨杜甫詩王母晝下雲旗翻句還如何遜在揚州句江湖多白鳥句星落黄姑渚句功曹非復漢蕭何句解王珪詩舞急錦腰迎十八酒酣玉醆照東西句解黄庭堅詩爭名朝市魚千里句影落華亭千尺月夢通岐下六州王句皆極典核他如辨碧雲騢為魏泰作辨龍城録雲仙散録為王銍作皆足資考證以及鄭康成注漢宮香方玫瑰油粘葉書旋風葉書與穆䕶為木瓠具理為瓶罌之類亦頗資博識而所載宋時户口轉運諸數尤足與史籍相㕘考宋人説部之可觀者也文獻通攷不著于録殆當時猶未盛傳歟乾隆四十三年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ac1da19262da57c50c25f95c998e6fab2599d8f25e468d6fc44ce0e3a9629d43
