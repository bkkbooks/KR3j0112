body:
  text: 墨莊漫錄卷八宋張邦基撰宗室令穰大年善丹青清潤有竒趣少年讀書以唐王維李思訓畢宏韋偃皆以畫得名乃刻意學之下筆便有自得一時賢士大夫喜與之游皆求其筆亦頗厭其誅求慨然嘆曰懐素有云無學書終為人所使欲絶筆不為但名已著終不得已又善作小草書小字如蝇蚊筆遒而法具諦觀之目力茫然皆合羲獻之體是又所難也米元章謂大年作畫清麗雪景類王維汀渚水鳥有江湖意予在京師時嘗偶得大年所作横卷歸田園竹籬茅舍煙林蔽虧遥岑逺水咫尺千里葭蕪鷗鷺宛若江鄉葢大年得意畫也表舅唐端仲題詩云聞君新得小山川畫手従來郜雍賢不學農夫焉用稼若為王子豈知田我真壠上躬耕客親見人間小隠天始識何年京様熟菊籬寧似景龍邉菊籬景門下景也後為吴舅順圗取此軸去今亡於兵火又有士雷亦妙繪事嘗於錢德輿次權少卿家見所作寒溪小雪横巻翎毛竹木種種皆竒可亞大年云章友直伯益以篆得名召至京師翰林院篆字待詔數人聞其名然心未之服俟其至俱來見之云聞先生之藝乆矣願見筆法以為模式伯益命粘紙各數張作二圗即令洗墨濡毫其一縦横各作十九畫成一碁局其一作十圎圏成一射帖其筆之麄細間架疎宻無毫髪之失諸人見之大驚嘆服再拜而去熙寧五年杭州民裴氏妾夏沉香澣衣井旁裴之嫡子戯誤墮井而死其妻訴於州必以謂沉香擠之而堕也州委録叅杜子方司户陳珪司理戚秉道三易獄皆同沉香從杖一百斷放時陳睦任本路提刑舉駮不當劾三掾皆罷州委秀州倅張濟鞫勘許其獄具即以才薦竟論沉香死故東坡送三掾詩云殺人無騐終不快此恨終身恐難了其後睦還京師乆之未有所授聞廟師邢生頗從仙人遊能知休咎乃往見之叩以來事邢拒之弗答而語所親曰其如沉香何睦聞之悚懼汗下廢食者累日釋氏所云寃懟終不免可不戒哉紹聖初元東坡帥中山得黑石白脉如孫知微所畫石間奔流盡水之變又作白石大盆以盛之激水其上名其室曰雪浪齋公自銘有云玉井芙蓉丈八盆伏流飛空潄其根時四月二十日也閏四月三日乃有英州之命其後謫惠州又徙海外故中山後政以公遷謫雪浪之名廢而不問元符庚辰五月公始被北歸之命明年夏方至吴中時張芸叟守中山方葺治雪浪齋重安盆石方欲作詩寄公九月聞公之薨乃作哀詞有云我守中山乃公舊國雪浪蕭齋於焉食㝛俯察履綦仰㸔梁木思賢閲古皆經貶逐玉井芙蓉一切牽復云云其詞曰石與人俱貶人亡石尚存却憐堅重質不減浪花痕滿酌山中酒重添丈八盆公兮不歸北萬里一招魂思賢閲古皆中山後圃堂名也鎮江府兵火之餘有石一株在瓦礫中勢如掀舞色紺而澤竒物也上有刻字云有唐上元甲子嵗潁川陳良叅叨尹延陵獲此石置西齋之前銘曰嵳嵳峩峩蒼翠其多是禀混元非因琢磨置於庭隅公退常過疑乎乃身居高之阿後期來者見兹若何其後又有令人刻字云皇宋治平丙午嵗仲夏晦日邑令掌文紀於壊垣得之立於此後為都統王候勝所得移置於所居園中有一士大夫見而愛之紿曰此本吾家舊物也先君平昔寶惜之不意尚存於兹願復歸我王欲許之有一將校聞之謂主帥曰不可與之此石上有上元甲子及皇宋治平之語恐朝廷聞之來取之當以此意拒之王用其說遂止今按唐之上元甲子德宗之興元元年也距今紹興上元甲子三百六十年矣堅頑閲世如是之乆信乎金石之夀也婦人之纒足起於近世前世書傳皆無所自南史齊東昏侯為潘貴妃鑿金為蓮花以帖地令妃行其上曰此步步生蓮華然亦不言其弓小也如古樂府玉臺新詠皆六朝詞人纎艷之言類多體狀美人容色之殊麗又言粧飾之華眉目唇口腰肢手指之類無一言稱纒足者如唐之杜牧李白李商隠之徒作詩多言閨幃之事亦無及之者惟韓偓香奩集有詠屧子詩云六寸膚圍光緻緻唐尺短以今校之亦自小也而不言其弓飲席刻木為人而鋭其下置之盤中左右欹側僛僛然如舞狀乆之力盡乃倒視其傳籌所至酬之以盃謂之勸酒胡程俱致道嘗作詩云簿領青州掾風流麴秀才長煩拍浮手持贈合歡盃屢舞回風急傳籌向羽催深慙偃師氏端為破愁來或有不作傳籌但倒而指者當飲木犀花江浙多有之清芬漚欝餘花所不及也一種色黄深而花大者香尤烈一種色白淺而花小者香短清曉朔風香來鼻觀真天芬仙馥也湖南呼九里香江東曰岩桂浙人曰木犀以木紋理如犀也然古人殊無題詠不知舊何名故張芸叟詩云竚馬欲尋無路入問僧曾折不知名葢謂是也王以寜周士道中聞九里香花詩云不見江梅三百日聲斷紫簫愁夢長何許緑裙紅帔客御風來獻返䰟香近人採花蘂以薰蒸諸香殊有典刑山僧以花半開香正濃時就枝頭採擷取之以女貞樹子俗呼冬青者搗裂其汁微用拌其花入有􅣅磁瓶中以厚紙羃之至無花時於宻室中取置盤中其香裛裛中人如秋開時後入器藏可留乆也樹之榦大者可以旋為盂合茶托種種器用以淡金漆飾之殊可佳也􅄯無咎和李秬䨇頭牡丹有云二喬新獲吴宮怯䨇隗初臨晉帳羞月地故應相伴語風前各是一般愁政和間汴都平康之盛而李師師崔念月二妓名著一時􅄯冲之叔用毎㑹飲多召侑席其後十許年再來京師二人尚在而聲名溢於中國李生者門第尤峻叔用追往昔成二詩以示江子之其一云少年使酒來京華縦步曾游小小家㸔舞霓裳羽衣曲聽歌玉樹後庭花門侵楊栁垂珠箔窻對櫻桃捲碧紗坐客半驚随逝水吾人星散落天涯其二云春風踏月過章華青鳥䨇邀阿母家繋馬栁低當户葉迎人桃出隔墻花鬢深釵暖雲侵臉臂薄衫寒玉照紗莫作一生惆悵事鄰州不在海西涯靖康中李生與同軰趙元奴及築毬吹笛袁陶武震軰例籍其家李生流落來浙中士大夫猶邀之以聴其歌然憔悴無復向來之態矣韓退之木居士詩偶然題作木居士便有無窮祈福人葢當時以枯木類人形因以乞靈也在今衡州之耒陽縣北沿流三十里鼇口寺至今人祀之元豐初年旱暵縣令禱之不應為令析而焚之主僧道符乃更刻木為形而事之張芸叟南遷郴州過而見之題詩於壁云波穿火透本無竒初見潮州刺史詩當日老翁終不免後來居士欲奚為山中雷雨誰宜主水底蛟龍睡不知若使天年俱自遂如今已復長孫枝予毎憤南方滛祠之多所至有之陸龜蒙所謂有雄而毅黝而碩者則曰將軍有温而愿哲而少者則曰某郎有媼而尊嚴者則曰姥有婦而容者則曰姑而三吳尤甚所主之神不一或曰太尉或曰相公或曰夫人或曰娘子村民家有疾病不服藥劑惟神是恃事必先禱之謂之問神茍許其請雖冒險以觸憲綱必為之儻不諾其請卒不敢違也凡禱必許以牲牢祀謝刲物命所費不貲禱而不騐病者已殂猶償所許之祭曰弗償其禍必甚無知之俗以神之禦災捍患為可惴惴然不敢少解也豈獨若是乎近時士大夫家亦漸習此風士大夫稍有識者心知其非而見女子之易惑故牽於閨幃之愛亦遂狥俗殊可駭嘆且神聰明正直而一者也豈有以酒食是嗜而竊福以饕餮於愚魯之民豈所謂聰明正直者耶至於嶽也瀆也古先賢徳有功於人載在祀典血食一方者吾敢不欽奉之乎所謂郎者姑者安能禍福於忠信之士吾所未信也世豈無一狄公為一革之木居士既為令之所焚矣彼庸髠者復假托以惑衆此尤可笑云東坡在黄州而王文甫家東湖公毎乗興必訪之一日逼嵗除至其家見方治桃符公戯書一聫於其上云門大要容千騎入堂深不覺百男歡歐陽文忠公本朝第一等人也其前言往行見於國史墓碑及文集諸書中詳矣予復得四事於公之曾孫當世望之云嘗載於瀧岡阡表瀧岡阡葢歐陽氏松楸壠名也今不傳於世惜其遺沒因識於此一云公於為政仁恕多活人性命曰此吾先公之志也嘗曰漢法惟殺人者死後世死刑多矣故凡於死非已殺人者多活之其為河北轉運使所活二千餘人先是保州屯兵閉城叛命田况李昭毫等討之不克卒招降之既開城况等推究反者二千餘人投於八井又其次二千餘人不殺分𨽻河北諸州事已完而富相出為宣撫使懼其復為患謀欲宻委諸州守將同日悉誅之計議已定方作文書會公奉朝㫖權知鎮府與富公相遇於内黄夜半屏人以其事告公公大以為不可曰禍莫大於殺降昨保州叛卒朝廷已降敇榜許以不死而招之八井之戮已不勝其寃此二千人者本以脅從故得不死奈何一旦無辜就戮爭之不能止因曰今無朝㫖而公以便宜處置若諸郡有不達事幾者以公擅殺不肯從命者事既叅差則必生事是欲除害於未萌而反趣其為亂也且某至鎮必不從命富公不得已遂止是時小人譛言已入富范勢力難安既而富公大閲河北之兵將卒有所升黜譛者獻言富某擅命專權自作威福已收却河北軍情北兵不復知有朝廷矣於是京師禁軍亟因大閲多所升擢而富公歸至國門不得入遂罷樞宻知鄆州向若擅殺二千人其禍何可測也然則公之一言不獨活二千人命亦免富公於大禍也二云公於修唐書最後至局專修紀志而已列傳則宋尚書祁所修也朝廷以一書出於兩手體不能一遂詔公㸔詳列傳令刪修為一體公雖受命退而嘆曰宋公於我為前軰且人所見多不同豈可悉如己意於是一無所易及書成奏御史局舊例修書只列書局中官高者一人姓名云某等奉敇撰而公官高當書公曰宋公於列傳亦功深者為日且乆豈可掩其名而奪其功乎於是紀志書公姓名列傳書宋姓名此例皆前未有自公為始也宋公聞而喜曰自古文人不相讓而好相陵掩此事前所未聞也三云范公自言學道三十年所得者平生無怨惡爾公初以范希文事得罪於呂相坐黨人逺貶三峽流落累年比呂公罷相公始被進擢及後為范公作神道碑言西事呂公擢用希文盛稱二人之賢能釋私憾而共力於國家希文子純仁大以為不然刻石時輙削去此一節云我父至死未嘗解仇公亦歎曰我亦得罪於呂丞相者惟其言公所以信於後世也吾嘗聞范公自言平生無怨惡於一人兼其與呂公解仇書見在范集中豈有父自言無怨惡於一人而其子不使解仇於地下父子之性相逺如此公知潁州時呂公著為通判為人有賢行而深自晦黙時人未甚知公後還朝力薦之由是漸見進用四云陳恭公執中素不喜公其知陳州時公自潁移南京過陳拒而不見後公還朝作學士陳為首相公遂不造其門已而陳出知亳州尋罷使相換觀文公當草制自謂必不得好詞及制出詞甚羙至云杜門却掃善避權勢而免嫌處事執心不為毁譽而更守陳大驚喜曰使與我相知深者不能道此此得我之實也手録一本寄門下客李師中曰吾恨不早識此人文忠公又有雜書一巻不載於集中凡九事今亦附於此云秋霖不止文書頗稀叢竹蕭蕭似聽愁滴顧見案上故紙數幅信手學書樞宻院東㕔一云謝希深嘗誦哭僧詩云燒痕碑入集海角寺留真謂此人作詩不必好句只求好意余以謂意好句必好矣賈島有哭僧詩云冩留行道影焚却坐禪身唐人謂燒却活和尚此句之大病也近時凡僧詩極有好句然今人家多不傳如馬放降來地鵰盤戰後雲春生桂嶺外人在海門西今之文士未必有如此句也學書勿浪書事有可記者他時便為故事作詩須多誦古今人詩不獨詩爾其餘文字盡然二云漢之文士善以文言道時事質而不俚兹所以為難往時作四六者多用古人語及廣引故事主衒博而不思述事不暢近時文章變體如蘓氏父子以四六述敘委曲精盡不減古人自學者變於為文殆今三十年始得斯人不惟遲乆而後獲實恐此後未有能繼者耳自古異人間出前後參差不相待余老矣乃及見之豈不為幸哉三云空梁落燕泥未知警絶而楊廣不與薛道衡解讐於泉下豈荒煬所趣止於此耶大風起兮雲飛掦信是英雄之語也若漠漠水田飛白鷺隂隂夏木囀黄鸝終非己有又何必區區於攘竊哉四云作字要熟熟則神氣完實而有餘於静坐中自是一樂事然患少暇豈若以樂處當不足耶書十年不倦當得名虚名已得而真氣耗矣萬事莫不皆然有以寓其意不知身之為勞也有以樂其心不知物之為累也然則自古無不累心之物而有為物所樂之心五云自蘓子美死後遂覺筆法中絶近年君謨獨步當世然謙讓不肻主盟徃年余嘗戯謂君謨學書如泝急流用盡氣力不離故處君謨頗笑以謂能取譬今思此語已十餘年竟何如哉六云學書費紙猶勝飲酒費錢曩時王文康公戒其子弟云吾平生不以全幅紙作封皮文康太原人世以晉人喜嗇而資談笑信有是哉吾年向老亦不欲多耗用物誠未足以有益於人然衰年志思不壯於事少能快然亦其理耳七云蕭條澹泊此難畫之意畫者得之覽者未必識也故飛走遲速意近之物易見而閑和嚴静趣逺之心難形若乃高下向背逺近往復此畫工之藝爾非精鑒之事也不知此論為是否余非知畫者強為之説但恐未必然也然自謂好畫者必不能知此也八云介甫嘗言夏月晝睡方枕為佳問其何理云睡乆氣蒸枕熱則轉一方冷處然則真知睡者耶余謂夜彈琹惟石徽為佳葢金蚌瑟瑟之類皆有光色燈燭照之則炫燿非老翁夜視所宜白石照之無光於目昏者為便介甫知睡真懶者余知徽直以老而目暗耳余家石徽琹得之二十年昨因患病手中指拘攣醫者言惟數運動以導其氣之滯謂惟彈琹為可亦尋理得十餘年已忘諸曲物理損益相因固不能窮至於如此老莊之徒多寓物以盡人情信有以也哉九云唐之詩人類多窮士孟郊賈島之徒尤能刻琢窮苦之言以自喜或問二子其窮孰甚曰閬仙甚也何以知之曰以其詩見之郊曰種稻耕白水負薪斫青山島云市中有樵山我舍朝無煙井底有甘泉釡中乃空然葢孟氏薪水自足而島家柴水俱無誠可笑然二子名稱髙於當世其餘林翁處士用意精到者往往有之若雞聲茅店月人迹板橋霜則覊孤行旅流離辛苦之態見於數字之中至於野塘春水漫花塢夕陽遲則春物融怡之情和暢又有言不能盡之意兹亦精意刻琢之所得者耶往在洛時嘗見謝希深誦曰縣古槐根出官清馬骨髙希深曰清苦之意在言外而見於言中又見晏丞相常愛笙歌歸院落燈火下樓臺晏公曰世傳冦萊公云老覺腰金重慵便枕玉凉以為富貴此特窮相者耳能道富貴之盛則莫如前句亦與希深所評者類耳以二公皆有情味而喜為篇詠者其論如此右永叔所書九事頃在京師貴人家見之書之字畫清勁多栁誠懸筆法愛而録之然其間稱馬放降來地及春生桂嶺外之句并論嚴維栁塘春水漫溫筠雞聲茅店月之工與夫賈島哭僧之誚皆已載於詩話中及晏元獻評富貴之句亦見於歸田録但其言或不同故不敢刪削併録之云何薳子楚作春渚紀聞云闗子明易傳李衛公對問皆阮逸著撰予考之唐藝文志及本朝崇文總目皆無之子楚之言或然也又云龍城記乃王銍性之作樹萱錄劉燾無言作予謂性之之偽作龍城記果不誣而樹萱録唐書藝文志小説類自有此名豈無言所作也此書所載諸事近於寓言而諸篇詩句皆佳絶葢唐人之善詩者為之如江聲兼小雨暝色入啼猿藕隠玲瓏玉花藏縹緲容紅樹醉秋色碧溪彈夜絃網斷蛛猶織梁空燕不歸皆警絶非近人所能也墨莊漫錄巻八
