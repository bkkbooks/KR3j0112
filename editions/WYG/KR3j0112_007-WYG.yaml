body:
  text: 墨莊漫録卷七宋張邦基撰西施美人也三尺童子皆知其為越獻於吳以亡吳也吳越春秋云越王使相者得苧蘿山鬻薪之女曰西施鄭旦飾以羅縠教以容歩而獻於吳莊子曰西施病心而矉其里之醜人見而美之歸亦捧心而矉孟子云西子蒙不潔則人皆掩鼻而過之注云西子古之好女西施也毛嬙亦美人也莊子云毛嬙麗姬人之所美也魚見之而深入鳥見之而髙飛釋音注司馬彪云毛嬙古美女一云越王美姬也麗姬晉獻公嬖之以為夫人崔譔本作西施又慎子云毛嬙西施天下之至姣者也按左氏傳越之滅吳在魯哀公之二十二年孟子嘗見梁惠王齊宣王自魯哀公之二十二年至魏惠王之元年一百四年至齊宣王之元年一百三十二年乃魏惠王之二十九年也史記莊子傳云名周與梁惠王齊宣王同時則莊子與孟蓋一時慎子名到與淳于髠騶奭之徒皆戰國時人亦莊孟一時也又史記表晉獻公五年伐驪戎得驪姬是歳己酉也至魏惠王之元年三百七年若以毛嬙為越王美姬又與驪姬非同時而崔譔以驪姬爲西施故以爲近故說者謂莊孟愼子所言西施皆越之獻吳者然予讀管子小稱篇有云毛嬙西施天下之美人也盛怒起於面不能以爲可好史記表齊桓公小白之元年丙申也魯欲與齊公子紏入後小白齊距魯生致管仲是歲至越滅吳計二百一十三年而管仲之書已言毛嬙西施是二人者皆前古之人矣豈越之西施冐古之美人以為名耶是有兩西施矣而毛嬙亦非越王之美姬明甚司馬彪之注乃臆說也當更質於博洽者政和間朝廷求詢三代鼎彛器程唐爲陜西提㸃茶馬李朝孺為陜西轉運遣人於鳳翔府破商比干墓得銅盤徑二尺餘中有欵識一十六字又得玉片四十三枚其長三寸許上圓而銳下濶而方厚半指玉色明􅉷以盤獻之於朝玉乃留秦州軍資庫道君皇帝曰前代忠賢之墓安得發掘乃罷朝孺退出其盤聖德髙明有如此者不然丘冡之厄不止此矣其玉久在秦帑近年王庶知秦州日取之而去祁寛居之嘗見之為予言之然予又見劉袤延仲言比干墓在衛州西山去城數十里有漢唐以來碑刻甚多墓周囘數里生異木樛結不可入而居之言墓在關中未知何也真州六合縣界有山四面平直曰方山山之左右多古冡墓予從甥魏惇紹興十二三年間任天長縣尉日有一監司屬官過邑館於尉司出一襆物云昨過方山得之出以示惇皆美玉也其長三二寸濶一指許厚三四分光潤方正上有小竅約百餘枚不知為何物也惇欲乞其一二枚屬官靳而不與且云方山民因耕穿一墓獲此疑其為玉䇿以予考之此乃兩漢以前貴近之墓所謂珠􅃭玉匣者古以歛屍惟王公則有之耳葢與比干墓所獲正同爾川峽間有一種惡草羅生於野雖人家庭砌亦有之如此間之蒿蓬也土人呼為䕭音㻸麻其枝葉拂人肌肉即成瘡疱浸滛漬爛久不能愈杜子美除草詩所謂草有害於人曾何生阻修其毒甚蜂蠆其多彌道周葢謂此也劉袤延仲至蜀嘗見之宣和間蔡寶臣致君收南唐後主書數軸來京師以獻蔡絛約之其一乃王師攻金陵城垂破時倉皇中作一䟽禱於釋氏願兵退之後許造佛像若干身菩薩若干身齋僧若干萬員建殿宇若干所其數皆甚多字畫潦草然皆遒勁可愛葢危窘急中所書也又有㸔經發願文自稱蓮峰居士李煜又有長短句臨江僊云櫻桃結子春光歸盡蝶翻金粉雙飛子規啼月小樓西鈎羅幕惆悵捲金泥門巷寂寥人去後望殘煙草低迷而無尾句劉延仲為補之云何時重聽玉驄嘶撲簾飛絮依約夣囘時東坡四時冬詞云真態生香誰畫得玉奴纎手嗅梅花每疑玉奴字殊無意咮若以為潘淑妃小字則當為玉兒亦非故實劉延仲嘗見東坡手書本乃作玉如纎手方知上下之意相貫愈覺此聨之妙也閩廣多異花悉清芬郁烈而末利花為衆花之冠嶺外人或云抹麗謂能掩衆花也至暮則尤香今閩人以陶盎種之轉海而來浙中人家以為嘉玩然性不耐寒極難愛䕶經霜雪則多死亦土地之異宜也顔博文持約謫官嶺表愛而賦詩云竹稍脫青錦榕葉隨黃雲嶺頭暑正煩見此蕚綠君欲言嬌不吐藏意久未分最憐月初上濃香夢中聞蕭然六曲屛西施帶微醺叢深珊瑚帳枝轉翡翠裙譬如追風騎一抹萬馬羣銅瓶汲清泚􅂓復為子勤願言少須􅁷對此髯叅軍觀此詩則花之清淑柔婉風味不言可知矣京口北固山甘露寺舊有二大鐵鑊梁天監中鑄東坡游寺詩云蕭翁古鐵鑊相對空團圓坡陀受百斛積雨生微瀾是也予徃來數見之然未嘗稽考何物本為何用也近復游於寺因熟觀之葢有文可讀云天監十八年太嵗乙亥十二月丙午朔十日乙卯皇帝親造鐵鑊於解脫仏古佛字殿前滿漫滅一字甘泉種以荷蕖供養十方一切諸仏以仏神力遍至十方盡虛空界窮未來際令地獄苦鑊變為七珍寳池地獄沸湯化為八功德水一切四生解脱衆苦如蓮花在泥清淨無染同得安樂到湼槃城斯鑊之用本在烹鮮八珍興染五味生纒我皇淨照慈被無邉法喜禪悅何取又漫一字檀爰造斯器囘成勝縁如含碧水又漫一字發經蓮道場供養永永無邉其後又云帥吳虎子近禁道真槩懐於佐陳僧圓丞宋又漫一字令宣令鄭休之義不可曉疑當時幹造之人耳又一行云五十石鑊然形製不能容今之五十石葢古之斗斛小也始知二鑊乃當時植蓮供養佛之器耳李端叔有贈人二小詩一云通中玉冷夢偏長花影籠堦月浸涼挽斷羅巾留不住覺來猶有去時香一云情隨榆莢不勝飄心似楊花暖欲消擬借瓊林大盈庫約君孤注賭妖嬈葢有所爲也或云是與當塗楊珠者博者以勝彩累注數者至乘敗者唯有畸零不累注數謂之孤注故端叔戱云韓退之詩云前計頓乖張居然見真贋廣韻及字書云贋五晏切注偽物也東坡嶺外詩云茯苓無人採千嵗化虎魄我豈無長鑱真贋苦難識韓非子曰齊伐魯索鑱鼎魯以其贋徃齊曰鴈也魯曰真也古乃以鴈為􅎓亦借用也今人若作真鴈人必笑也東坡在黄州陳慥季常在岐亭時相徃來季常喜談養生自謂吐納有所得後季常因病公以書戱之云公養生之效有成績今又示病彌月雖使臯陶聽之未易平反公之養生正如小子之圓覺可謂害脚法師鸚鵡禪五通氣毬黄門妾也前軰相與可謂善謔也崇寧二年三月一日衛州獲嘉縣民職氏殺猪祭神而民劉氏獵犬得其棄首骨􅋦之狺四日不食民使其子析之其左牡齒臼中得肉如拇諦視之如來像也髻有珠如粟瞑目跏趺瞳子隱然莊嚴畢具觀者萬人􅄯載之伯宇嘗記其事􅄯無咎又作賛以稱嘆之政和丁酉予侍親在真州時慈受禪師懐深住持資福寺一日深老謂先君曰近赴村落富人家齋見羣犬爭銜囓一牛脛骨甚狂噬相嗾不已村人持挺驅逐亦竟不去衆頓異因奪而破之其中血髓已堅凝如玉自成一菩薩形衣紋瓔絡相好奇特雖雕琢有所不及其家乃取去藏之此與職氏齒事極相類佛之慈悲化身無乎不在以警於好殺者俾生信心哀愍有情故視希有之異闡提者得不少悛乎翟三丈公巽宣和末蔡絛約之用事外召從官七人公巽再以瑣闥召力辭之未至闕有㫖落職宫祠繼而復還待制公作謝表有云彈貢禹之冠誠非本志奪伯氏之邑其又何言又云惟一與一奪之命無有二三而三仕三已之心敢懐慍喜人多稱之翟公巽謝對衣金帶鞍馬表云顧臣非緇衣之宜敝予又改以臣從大夫之後不可徒行葉少蘊謝賜厯日表云豈特千嵗之日可坐而致將使百畝之田勿奪其時汪彦章賀進築隆兊二州及城寨表云我陵我阿不以山谿之險有民有社在吾邦域之中皆用經史全語而工者優詞樂語前軰以為文章餘事然鮮能得體王安中履道政和六年天寧節集英殿宴作教坊致語其誦聖德云葢五帝其臣莫及自致太平凡三代受命之符畢彰殊應又云歌太平既醉之詩頼一人之有慶得久視長生之道叅萬歲以成純可謂妙語也至放小兒隊詞云戢戢兩髦已對襄城之問翩翩羣舞却從沂水之歸放女童詞云奏閬圃之雲謡已瞻天而獻祝曳廣寒之霓袖將偶月以言歸益更工麗而切當矣履道之掌内制可謂稱職凡樂語不必典雅惟語時近俳乃妙王履道天軍節宴小兒致語云五百里采五百里衛外并有截之區八千嵗春八千嵗秋共上無疆之壽又正旦宴小兒致語云君子有酒多且㫖得盡羣心化國之日舒以長對揚萬壽孫近叔詣宣和春宴女童致語云黛耜載耕於帝籍廣十千維耦之疆青圭徃袚於髙禖兆則百斯男之慶皆為得體然未若東坡元祐秋宴教坊致語云南極呈祥候秋分而老人見西夷慕義渉流沙而天馬來又春宴致語云稍寛中昃之憂一均湛露之澤方將麴蘖羣賢而惡㫖酒鼓吹六藝而放鄭聲雖白雪陽春莫致天顔之一笑而獻芹負日各盡野人之寸心則又不可跂及矣樂語中有俳諧之言一兩聨則伶人於進趨誦詠之間尤覺可觀而警絶如石懋敏若外州天寧節鍚宴云飛碧篆之爐煙薫為和氣動紅鱗之酒靣起作風波何安州得之外州上元云五雲縹緲出危嶠於靈鼉九陌熒煌下繁星於陸海暗塵隨馬素月流天如熙熙登春臺舉欣欣有喜色孫仲益和州送交代云渭城朝雨寄别恨於垂楊南浦春波𦕈愁心於碧草皆為人所膾炙也翟公巽知宻州侯蒙元功自中書侍郎罷政歸鄉公有啟云得請真祠歸榮故里雖老成去國之易而明哲保身之全多士嘆嗟餞韓侯之出祖邦人慰喜詠季子之來歸又云乘安車而過諸子未慕昔賢揮賜金以娛故人用償夙志公平時四六多聱牙髙古而此啟特平易誠大手筆也後元功於里第築臺曰高藍光既落成公就臺張具為宴自作致語有云公槐避寵衣繡歸家從方外之赤松寄髙懐於緑野珍禽綷羽借雞樹之遺棲曲沼囘塘分鳳池之餘潤晉世語云劉放為中書監孫資為中書令共領樞要侯獻曹肇心内不平殿中有雞棲樹二人相謂曰此亦久矣其能復幾指放資也又晉書荀朂守中書監毗賛朝政及遷尚書令朂久在中書專掌機事失之甚慍人有賀者怒曰奪我鳳凰池何賀焉故公用雞樹鳳池皆中書事考之方見其切李昭玘成季自京西路提刑移東路置司在兖東路置司在青州謝上表有云去長安之日雖遥千里之違望岱宗之雲猶均二州之潤杜子美佳人詞云合昏尚知時鴛鴦不獨宿草本合歡或曰合昏陳藏器云葉至暮即合故曰合昏今夜合花是也又徃在詩云當宁䧟玉座白間剥畫蟲文選景福殿賦云皎皎白間微微列錢注白間窻也又大食刀歌云得君亂􅁝與君理北史齊文宣帝高洋神武第三子神武嘗令諸子各理亂􅁝帝獨抽刀斬之曰亂者須斬神武以為然范忠宣公薨朝廷賜墓碑之額曰世濟忠直時唐彥猷君益知潁昌為表其居曰忠直坊范公之子正平正思謂君益曰荷公之意但上之所賜刻於螭首揭於墓隧假寵於公若施於康莊以為徃來之觀非朝廷之意也君益曰此州郡之事於君家無與也二公曰先祖先人功名聞於逺邇何待此而顯且十室之邑必有忠信流俗所尚識者所耻異時不獨吾家為人嗤誚公亦寧迯於指議故不得不力請也時李端叔官於許下乃見唐公且言曰頃胡文恭宿知蘇州時蔣堂希魯將致政歸文恭昔為諸生嘗受學於蔣公乃即其里第表之為難老坊蔣公見之不樂曰此俚俗歆熖内不足而假之人以為誇者非所望於故人也願即撤去文恭謝之欲如其請則營繕已畢乃咨其嘗獲芝草之瑞更為靈芝文恭退而語人曰識必因德而後逹蔣之德葢所畏而其識如此非吾所及也君益聞端叔之言遂撤去之范氏二公聞之乃謝端叔曰非公之語莫遂於心也因復笑曰凡以伎能物貨自營圖倍於人則名曰元本某家至於假供御供使州土為名殆與此一類顔子居陋巷一簞食一瓢飲人不堪其憂囘不改其樂故與禹稷同道當時未聞表其巷何坊也端叔亦笑之後復陳此語於君益君益大笑之李資政邦直有與韓魏公書云前書戱問玉梳金箆者侍白髪翁幾欲淡死矣然常山頗多老伶人吹彈甚熟日使教此五六人近者稍便串異時願傳飲期一釂觴也玉梳金箆葢邦直之侍姬也人或問命名之意邦直笑曰此俗所謂和尚置梳箆也又有與魏公書云舊日梳箆固無恙亦嘗増添三兩人更似和尚撮頭帶子爾元祐中哲宗旬日一召輔臣於邇英閣聽講讀時曽肇子開蘇轍子由自左右史並除中書舍人入侍講筵子由作詩呈同省諸公悉和之邇英延羲皆祖宗所建講讀之所記注官賜坐飲茶將罷賜湯仍皆免拜無復外廷之禮故子開詩云二閣從容訪古今諸儒葵藿但傾心君臣相對疑賓主誰識昭陵用意深邇英閣前槐後竹雙槐極髙而柯葉拂地狀如龍蛇或謂之鳳尾槐子開詩云鳳尾扶踈槐影寒龍吟蕭瑟竹聲乾漢皇恭黙尊儒學不似公孫見不冠子由詩云銅瓶灑遍不勝寒雨㸃勻圓凍未乾囘首曈曨朝上日槐龍對舞覆衣冠並謂此也宣和中予客唐州外氏吳家時兗陽府光化縣村人耕穴一冡得一器類鼎而有蓋蓋及鼎腹皆雷紋中有虬形兩耳為饕餮足為蚩尤制作甚精一足微蝕損尚可立也表勇唐悊端仲數金得之以與舅氏順圖好古博雅乃以歸之而强名曰虬鼎且作歌以記之予得熟觀焉予以為古之鼎鼐皆無蓋而足皆圓直無作獸形者此乃敦耳端仲以其腹髙如鼎而敦乃形匾故名之為鼎耳其饕餮蚩尤與李伯時古器圖所畫小敦耳足正同但小敦耳之兩獸間口有飾玉處古之玉敦多如此也而此器乃無飾玉之狀狀復無欵職耳有按吕氏春秋云周鼎饕餮有首無身食人未咽害及其身此葢周器也古器多為饕餮蚩尤者深戒於貪暴也兩舅皆以予言為然乃秪名曰虬敦極寳惜之時京西漕時道陳聞有此器諷太守王牲來取之舅氏祕而不出後欲自携徃京師幷闗中侯金印獻之上方未㡬而俶擾外氏避地湘潭平時玩好書畫寳玉悉為賊有不知此器存亡何所惜哉敦酒器天下之事每患於無公論狥於一己之好惡則說必偏雖以曲詞誇語以勝於人然則不若公論之使人必信也硯之美者無出於端溪之石而唐詢彦猷作硯錄乃以青州黒山紅􅁝石為冠米芾元章則以唐州方城山葛仙公巖石為冠彦猷則為紅􅁝石理黄者其􅁝紅理紅者其􅁝黄文之美者則有旋轉其􅁝凡十餘重次第不亂資質潤美發墨久為水所浸漬即有膏液出焉此石之至靈者非他石可與較議故列之於首元章則謂方城巖石石理白者視之如玉瑩如鑑光而着墨如澄泥不滑稍磨之則己下而不熱生泡發墨生光如漆如油歳久不退常如新成有君子一德之操色紫可愛聲平而有韻此石近出始見十餘枚矣二公皆於翰墨留意者然此說恐未為公也予伯父毅老提學嘗官青社得紅􅁝石硯雖文彩誠如彦猷之說但石理麄慢殊不發墨特堪為几案之奇玩耳予外氏居唐州而方城下邑也予徃來必過仙公山下地名新寨居民多以石為工所貨之硯紫青白三種石也亦作鼎斛盂之類其硯如吳郡㠛村石之易得一枚不過百錢惟有一種曰太陽坑石乃元章所謂近出者坑在山頂其石色如端溪堅重縝宻作硯極剉墨不數磨而已盈硯殊可愛也葢元章性急每用磨墨發艶甚易故以適意為快也然多損筆墨故士人謂之筆墨劊子可與端州後歴石相抗焉得居上巖下巖二石之上也予在京西時擇求數年得一巨璞琢為玉斗樣不知者以為端溪也予舅吳兗顯圖為予銘其背云琢雲根陪𤣥頴賛斯文貽久永無磷緇堅以璟之子操同其炳渡江以來之後亡之矣二公之論當否究心於文房者必能訂評之黄魯直有乞猫詩云秋來䑕輩欺猫死窺甕翻盆攪夜眠聞道貍奴將數子買魚穿桞聘衘蟬蔡天啓乞猫於孫元忠亦有詩云㕑廪空虛䑕亦饑終霄咬齧近秋帷腐儒生計惟黃卷乞取衘蟬與䕶持予友李璜德邵以二猫送予仍以二詩一云家家入雪白於霜更有欹鞍似閙裝便請爐邉义手坐從他䑕子自跳梁二云衘蟬毛色白勝酥搦絮堆綿亦不如老病毗邪須减口從今休嘆食無魚墨莊漫錄卷七
