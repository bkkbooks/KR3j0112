body:
  text: 墨莊漫錄卷三宋張邦基撰明州士人陳生失其名不知何年間赴舉京師家貧治行後時乃於定海求附大賈之舟欲航海至通州而西焉時同行十餘舟一日正在大洋忽遇暴風巨浪如山舟失措俄視前後舟覆溺相繼也獨相寄之舟人力健㨗張篷隨風而去欲葬魚腹者屢矣凡東行數日風方止恍然迷津不知涯涘葢非常日所經行也俄聞鐘聲春容指顧之際見山川甚邇乃急趍焉果得浦溆遂維矴近㟁陳生驚悸稍定乃登㟁前有徑路因跬步而前左右皆佳木薈蔚珎禽鳴弄行十里許見一精舍金碧明煥榜曰天宫之院遂瞻禮而入長廊幽閒寂無讙譁堂上一老人據牀而坐龎眉鶴髪神觀清臞方若講説環侍左右皆白袍烏巾約三百餘人見客皆驚問其行止告以飄風之事惻然憫之授館於一室懸錦帳乃饌客焉器皿皆金玉食飲精㓗蔬茹皆藥苗極甘美而不識名老人自言我軰皆中原人自唐末巢冦之亂避地至此不知今幾甲子也中原天子今誰氏尚都長安否陳生為言自李唐之後更五代凡五十餘年天下泰定今皇帝趙氏國號宋都於汴海内承平兵革不用如唐虞之世也老人首肯嘆嗟之又命二弟子相與逰處因問二人此何所也老人為誰曰我軰號處士非神仙皆人也老人唐丞相裴休也弟子凡三等每等二百人皆授學於先生者復引登山觀覽﨑嶇而上至於峻極有一亭榜曰笑秦意以秦始皇遣徐福求三山神藥為可笑也二人遥指一峰突兀干霄峰頂積雪皓白曰此蓬萊島也山脚有蛟龍蟠繞故異物畏之莫可犯干也陳生留彼久之一日西望浩然有歸思口未言也老人者微笑曰爾乃懐家耶爾以夙契得踐此地豈易得也而乃俗緣未盡此别無復再來矣然爾既得至此吾當助爾舟楫一至蓬萊登覽勝境而後去遂使具舟倐已至山下時夜已暝曉見日輪晃曜傍山而出波聲先騰沸洶湧澎湃聲若雷霆赤光勃鬱洞貫太虛頃之天明見重樓複閣翬飛雲外迨非人力之所為但不見有人居之唯瑞霧葱蘢而已同來處士云近世常有人跡至此羣仙厭之故超然逺引鴻濛之外矣唯吕洞賔一嵗兩來卧聼松風耳乃復至老人所陳生求歸甚力老人曰當送爾歸山中生人葠甚大多如人形陳生欲乞數本老人曰此物為鬼神所䕶惜持歸經涉海洋恐貽禍也山中良金美玉皆至寳也任爾取之老人再三教告皆修心養性為善逺惡之事仍云世人慎勿卧而語言為害甚大又云楞嚴經乃諸佛心地之本當循習之陳生再拜而辭復令人導之登一舟轉盻之久已至明州海次矣時元祐間也比至里門則妻子已死矣皇皇無所之方悔其歸復欲求往不可得也遂為人言之後病而狂未幾而死惜哉予在四明見郡人有能言此事者又聞舒信道常記之甚詳求其本不獲乃以所聞書之睦冦方臘未起之前一年歙州生麟即死後十日州人葉世寧夢乗麟而登山山東北有洞乃舍麟而登入二武士執而問之世寧以實對且言幸得放還當有重報一武士笑曰誤矣吾即歙州某橋南停紙朱慶也與子不熟頗識其面此洞有三堂四室試令子觀之遂引而前中堂垂簾曰此堂待陳公文帳堆壅吏不敢登左堂簾捲其半慶曰天符已差羅浮天王居此諸司往迓矣既昇有牌牌有三字世寧惟記一定字右堂無簾上有衣紫袍曳杖而行吏數十軰隨之二武士止世寧立世寧熟視即尚書彭公汝礪也遽出拜之公勞之曰近到饒州否曰去歲到饒州公無恙公何以至此公曰吾位髙不當治獄以吾最知本末故受命至此汝何能來也世寧驟對乗洞前石馬而來公曰獸今安在二武士趨出曰介獸誤取去公曰杖之百朱慶者唯而出一武士領世寧欲去世寧曰願一觀四室不敢泄於人公逡巡首肯一吏持鑰而下引世寧往開東室有十餘人露首愁坐竹器數十封鑰甚固旁有金帶十餘條持鑰者復開一室架大木於兩楹之間有官者九人亦露頂蹲踞其上見人皆泣下持鑰者未嘗少佇世寧請入他室持鑰者曰西有貴臣閹人及前唐後唐未具獄囚法嚴不可輙近言未既忽有聲如雷震見巨蛇自屋東垂首而下火舌電目口鼻氣出如烟世寧懼而走持鑰者曰東將入西室矣此類甚多豈可近耶世寧因問何以至是曰吁吾姓嚴前唐宦者親見當時中官勢盛士人知有中官不知有朝廷吾私竊笑而薄之有能言中官太盛者吾必起嗟嘆嘗聞近代亦然業力所招也世寜不盡記大畧如此復往謝彭公則堂已虛矣世寧不敢問心動求出持鑰者復曰吾在此司無過即世後凡三領江淮要職此事了則吾為地下主者矣汝到人間為吾誦金光明經具疏燒與嚴直事吾能報汝世寧拜辭獨與武士出洞見朱慶騎麟自山頂來下而揖世寧撫麟乃石也慶曰山髙不可陟遵河甚徑煩語慶家人蘄黄間卜居甚善鄉中當大亂慶亦自以夢報得子言當信而不疑也一武士曰金光明經亦望垂賜得免追取之勞幸矣世寧曰仍為公等設醮及水陸二人以手加額世寧曰此洞何名慶曰洞名金源司名某凡四字世寧不曉而問之忽失足墜河而寤汗浹背病瘖三日而愈其後歙人稍稍聞之宣和改元揚州學吏嚴清晝寢夢人叩門呼之清一手挈㡌以趨見植牌於康莊清不暇讀斯須入一門兵衛森然吏引造庭鞠躬曰嚴清至清戰汗伏不能拜自上擲一巨板縱横萬釘布如棊局斜倚於階傳呼令上一人衮冕而坐紫衣侍左朱衣侍右清竊視之衮冕者乃前太守劉尚書極也朱衣者兩浙運副劉何也尚書問清茶鹽法更張否對曰清學吏耳茶鹽法所不知又問學法更張否對曰仍舊但近日興建道學遂命朱衣取簿令清自閱其姓名毎葉大書一人姓名郷里其下有細書若功與過一有識者中一葉乃清姓名細書極少尚書曰後十旬汝當來此又命紫衣導清過西壁以手排之壁間見衆罪人雜老幼男女或汚血其衣帶繫其頸悲哀愁苦幽咽墮淚可畏可憐紫衣復導清出尚書曰汝當治此獄俟取某人及淮南鹽香提舉黄敦信清逡巡攝衣循板而下吏以手招清使出清過舊路仰視其牌書曰辨正司既寤言其事於教官錢耜良仲時黄敦信一路氣焰赫然未幾盛怒間暴得疾一夕而卒清後卧病果死揚人多知之予數詢鄉人乃得其詳秦少㳺侍兒朝華姓邉氏京師人也元祐癸酉歲納之嘗為詩云天風吹月入欄杆鳥鵲無聲子夜閒織女明星來枕上了知身不在人間時朝華年十九也後三年少㳺欲修真斷世縁遂遣朝華歸父母家資以金帛而嫁之朝華臨别泣不已少㳺作詩云月霧茫茫曉柝悲玉人揮手斷腸時不須重向燈前泣百歲終當一别離朝華既去二十餘日使其父來云不願嫁却乞歸少㳺憐而復取歸明年少㳺出倅錢唐至淮上因與道友論議嘆光景之遄歸謂華曰汝不去吾不得修真矣亟使人走京師呼其父來遣朝華隨去復作詩云玉人前去却重來此度分携更不廻腸斷龜山離别處夕陽孤塔自崔嵬時紹聖元年五月十一日少㳺嘗手書記此事未幾遂竄南荒去歐陽文忠公與韓子華吳長文王禹玉同直玉堂嘗約五十八嵗即致仕子華書於柱上其後過限七年方踐前志作詩寄子華曰俗諺云也賣弄得過裏其詩曰人事從來無處定世塗多故踐言難誰知潁水閒居士十頃西湖一釣竿劉貢父詩話云文士用事誤錯雖為缺失然不害其美杜甫詩云功曹無復漢蕭何按光武紀帝謂鄧禹曰何以不掾功曹乂曹參嘗為功曹云鄼侯非也貢父之意直以少陵誤耳然前漢髙紀云單父人吕父善沛令辟仇從之客因家焉沛中豪傑吏聞令有重客皆往賀蕭何為主吏主進令諸大夫曰進不滿千錢坐之堂下云云注孟康曰主吏功曹也然則少陵用此非誤也第貢父偶思之未至耳嘉州凌雲寺大像記韋臯文張綽書其碑甚豐字畫雄偉頃於潘義榮處見之閬州州治大㕔梁間有一函書前後人莫敢取視者有一太守之子必欲開之人勸之不從竟取之乃三國蜀時斷一大辟案文耳復置舊所未幾守遂死河南縣尉司印前後相傳不敢開匣開必境内有盜起但以一木朱記用代行移新舊官交易但易匣之封耳商州州治㕔角有一刻成壓角石兎以碧紗籠䕶之吏軰獻紙錢者堆積焉人不敢正視吏軰輙視者必遭刑闕二十一字積甚憚之云夜即相馳逐於圃中三事皆聞之耿宗醇彦純云徐州有營妓馬盼者甚慧麗東坡守徐日甚喜之盼能學公書得其彷彿公嘗書黄樓賦未畢盼竊効公書山川開合四字公見之大笑畧為潤色不復易之今碑中四字盼之書也崔鶠徳符潁昌陽翟人元祐中畢漸榜登科不汲汲於仕宦宣和中監西京洛南稻田務時中官容佐掌宫鑰於洛郡僚事之惟恐不及惟徳符不肯見之容極銜之徳符一日送客於㑹節園時梅花已殘與客飲梅下已而容奏陳以㑹節園為景華御苑徳符初不知也明年暮春復騎􅇤馬從老兵徑入園中梅下哦詩曰去年白玉花結子深林間小憇藉清影低顰啄微酸故人不復見春事今已闌繞樹尋履迹空餘土花斑徘徊而去次日容見地有馬跡問園吏吏以崔對容怒其輕已遂劾奏鶠徑入御苑以此罪廢累年靖康初起為右正言未幾卒贈直龍圖閣歸葬郟城詩文甚髙東坡為翰苑元祐三年供端午帖子有云上林珎木暗池臺蜀産吳苞萬里來不獨盤中見盧橘時於粽裏得楊梅每疑粽裏楊梅之句玉臺新詠徐君舊共内人夜坐守歲詩酒中喜桃子粽裏覔楊梅今人未見以楊梅為粽徐公乃守歲詩楊梅夏熟歲暮安有此果豈昔人以乾實為之耶東坡以角黍為午日之饌故借言之耳無錫惠山泉水久留不敗政和甲午歲趙霆始貢水於上方月進百樽先是以十二樽為水式泥卵置泉亭中每貢發以之為則靖康丙午罷貢至是開之水味不變與他水異也寺僧法皥言之北京壓沙寺梨謂之御園其栽接之故先植棠梨木與棗木相近以鵞梨條接於棠梨木上候始生枝條又於棗木大枝上鑿一竅度接活梨條於其中不一二年即生合乃斫去􅀥之上枝又斷棠梨下幹根脉即梨條已接於􅀥本矣結實所以甘而美者以此頃又見北人云以胡桃條接於栁本易活而速實章聖時煉丹一爐在翰林司金丹閣日供炭五秤至熈寧元年猶養火不絶劉袤延仲之父被㫖裁減百司此一項在經費之數有㫖罷之其丹作鐵色詔藏天章閣張忠定公安道居南都煉丹一爐養火數十年丹成不敢服時張芻聖民守南都嬴瘠殊甚聞有此丹堅求餌之安道云不敢吝也但此丹服火之久不有大功必有大毒不可遽服聖民求之甚力乃以一粒如粟大以與之且戒宜韜藏慎勿輕餌聖民得之即吞焉不數日便血不止五臓皆糜潰而下竟死云二事聞之劉延仲宣和間有㫖蘇軾追復職名時衛仲逹逹可當行詞因戲之云逹可宜刻意為此詞葢須焚黄耳聞者莫不大笑許道寧京兆人少亦業儒性頗跌宕不羈畫山水法李成獨造其妙可與營丘抗衡亦工傳神每見人寢陋者必戲寫貌於酒肆識者皆笑之為其人毆擊之碎衣敗面而竟不悛後逰太華見其峰巒􅒞崒始有意於山水清潤髙秀穠纎得法不愧前人矣杜祁公帥長安道寧恃其技犯公公怒捕之道寧懼欲竄避或謂道寧曰杜公嚴毅汝乃干犯汝將何之雖走夷狄必獲汝矣時种師誼守環州道寧乃往投誼杜公聞之笑曰道寧真善自為謀者乃遺書种公俾善遇之在環歲餘乃歸環學從祀弟子乃道寧所作筆也予舅吳順圖有道寧畫終南積雪圖八幅真絶品也亡於兵火惜哉長安凉榭大屏面亦道寧所作殊竒偉也晁无咎謫玉山過徐州時陳無己廢居里中无咎置酒出小姬娉娉舞梁州無己作減字木蘭花長短句云娉娉裊裊芍藥梢頭紅様小舞袖低囘心到郎邉客已知金樽玉酒勸我花前千萬夀莫莫休休白髪簪花我自羞无咎嘆曰人疑宋開府鐵石心腸及為梅花賦清艷殆不類其為人無巳清通雖鐵石心腸不至於開府而此詞巳過於梅花賦矣元祐六年七夕日東坡時知揚州與發運使晁端彦吳倅晁无咎大明寺汲塔院西廊井與下院蜀井二水校其髙下以塔院水為勝玫瑰油出北方其色瑩白其香芬馥不可名狀用為試香法用衆香煎煉北人貴重之每報聘禮物中祇一合奉使者例獲一小􅑥其法秘不傳也宣和間周武仲憲之使敵過磁州時葉著宣逺為守祝周云囘日願以此油分餉既反命以油贈之葉云今不須矣近禁中厚賂敵使遂得其法煎成賜近臣色香勝北來者婦翁蔡京新寄數合且云公還朝必有取者今反獻一合周亦不受也北人方物不過一合貴惜如此而貴近之家贈遺若此之多足知其侈靡之甚也蔡肇天啟久官京師日有藪澤之思常於尺素作平岡老木極有清思因授李伯時令於餘地加逺水歸鴈作扁舟以載天啟及題小詩曰鴻鴈歸時水拍天平岡老木尚寒煙付君餘地安漁艇乞我寒江聼雨眠伯時懶不能竟他日王漁之彦舟取去以示宗子令戩即取筆點染如詩中意天啟見之愛其佳後天啟汎舟宿横塘遇雨閉篷而卧夜分不寢聞歸鴈聲因復為詩云平野風煙入夢思殷勤作畫更題詩扁舟卧聼横塘雨恰遇江南歸鴈時此畫後入貴家予嘗見之𣺌然有江湖之思晁无咎作慶州使宅記黄魯直云大為佳作蘇明允作成都府張公安道畫像記魯直讀之云司馬子長復出也王逢原作過唐論介甫云可方賈誼過秦論不及而馳騁過之裴鉶傳竒載成都古僊人吳彩鸞善書小字嘗書唐韻鬻之今蜀中導江迎祥院經藏世稱藏中佛本行經六十巻乃彩鸞所書亦異物也今世間所傳唐韻猶有闕旋風葉字畫清勁人家往往有之建炎庚戍二月二十五日敵兵陷平江府兩浙宣撫使周望移軍退保崑山縣泊舟馬鞍山下湖邉吏方用印忽有風旋轉入舟印與文移盡巻墮水相視駭愕使水工探之不獲望懼北兵之來襲也欲亟走屯惠通鎮為失印所撓留吏求之吏禱於馬鞍山神曰静濟侯者曰茍不獲且將得罪必焚廟而行縣宰亦懼乃作堰捍水以踏車涸之畚揷如雲鑿數尺始得之已淪於泥中矣頃有一士人每於班列中好與秘閣諸公交語好事者戲目之為館職裏行李廌方叔祭東坡文有云皇天后土鑒平生忠義之心名山大川還千古英靈之氣兵部郎中莫卞居塲屋日因赴浙漕夢人就旅邸報姓莫人作狀元卞出迎之乃云名儔非卞也時卞已投巻是舉登科明年得子因名儔後二十四年儔作大魁卞對賀客言之朱勔喪父作黄籙醮請茅山道士陳亦夷字彦真拜章囘得報應但見金甲神人杖劒叱云朱勔父子罪惡貫盈上天不赦汝焉得為拜章彦真不敢言於勔私為親宻者道不踰三年勔敗李去偽紹聖初知通州静海縣至夜即入一室判冥外人皆聞訊問枷鎻聲因目為李見鬼去替宻邇㑹集同官出二子拜縣尉陳噩噩不敢當乃云去偽老矣不及見公之貴若長子儔雖自成立不能逺大次子僖異日與公有恩契當令今日先識面耳衆皆罔測政和初噩為司勲郎官主銓試文僖中乙授西京偃師簿又三年為噩婿果符恩契之言噩終徽猷閣待制僖終朝請大夫儔登科未及祿而卒崇寧間平江府天平山白雲寺有數僧行山間得蕈一叢共煮食之至夜發吐内三人急取鴛鴦草生啖遂愈其二人不噉者吐至死鴛鴦草藤蔓而生黄白花對開傍水依山處處有之治癰疽腫毒尤妙或服或傅皆可葢沈存中良方所載金銀花又曰老翁須者本草名忍冬山谷詩云爭名朝市魚千里予問諸學士魚千里多云此齊民要術載范蠡種魚事法池中作九墩然初無千里字心頗疑之後因讀闗尹子云以盆為沼以石為島魚環逰之不知其幾千萬里不窮也乃知前軰用事如此該博字皆有來處班行李質人材魁㟁磊落甚偉徽廟朝欲求一人相稱者為對竟無可儷當時同列目為察隻子京師俚語謂無對者為察隻建炎三年擢權殿帥蘇黄門子由薨於許下王鞏定國作挽詞三首其一云憶昔持風憲防微意獨深一時經國慮千載愛君心坤道存終始乾綱正古今當時人物盡惆悵獨知音注云元祐中議冊后宣仁御文徳殿發册公語余宻告吕丞相微仲母后御前殿兹不可啟微仲明日留身宣仁詔宫中本殿發册時人無知者二云已矣東門路空悲未盡情交親踰四紀憂患共平生此去音容隔徒多涕淚横蜀山千萬疊何處是佳城注云公前年寄書約予至許田曰有南齋翠竹滿軒可與定國為十日之飲此老年未盡之情也其三云静者宜膺夀胡為忽夢楹傷嗟見行路優典識皇情徒泣巴山路終悲蜀道程弟兄仁逹意千古各垂名注云公與子瞻嘗泊巴江夜雨相約伴還蜀竟不果歸今子瞻塟汝公歸眉王祥有言歸塟仁也留塟逹也右三詩予在髙郵於公之子處見其遺藁因錄之皆當時事今公之後邈然家集不復存惜其亡也因附於此晏叔原聚書甚多每有遷徙其妻厭之謂叔原有類乞兒般漆椀叔原戲作詩云生計唯兹椀般擎豈憚勞造雖從假合成不自埏陶阮杓非同調顔瓢庶共操朝盛負餘米暮貯藉殘糟幸免墦間乞終甘澤畔逃桃宜笻作杖捧稱葛為袍儻受桑間餉何堪井上螬綽然真自許嘑爾未應饕世久輕原憲人方逐子敖願君同此器珎重到霜毛墨莊漫錄卷三
