body:
  text: 墨荘漫録卷四宋張邦基撰山谷作釣亭詩有云影落華亭千尺月夢通岐下六州王上句盖用華亭船子和尚詩云千尺絲綸直下垂一波􅂊動萬波隨夜静水寒魚不食滿船空載月明歸下句盖用文王夢吕望事然六州王事見毛詩漢廣云文王之道被於南國䟽云言南國則一州也於時三分天下有其二故雍梁荆豫徐揚之人咸被其徳而從之云云山谷用事深逺其工如此可為法也王禹玉丞相寄程公闢詩云舞急錦腰迎十八酒酣玉􅊦照東西樂府六么曲有花十八古有玉東西杯其對甚新也陳輔輔之丹陽人能詩荆公深愛之嘗訪建康楊驥徳逄留詩壁間云北山松粉未飄花白下風輕麥脚斜身似舊時王謝燕一年一度到君家荆公見之笑謂曰輔之罵君作尋常百姓也東京城北有祅廟呼煙切祅神本出西域盖胡神也與大秦穆䕶同入中國俗以火神祠之京師人畏其威靈甚重之其廟祝姓史名世爽自云家世為祝累代矣藏先世補受之牒凡三有曰懐恩者其牒唐咸通三年宣武節度使令狐給令狐者丞相綯也有曰温者周顯徳三年端明殿學士權知開封府王所給王乃朴也有曰貴者其牒亦周顯徳五年樞密使權知開封府王所給亦朴也自唐以來祅神已祀於汴矣而其祝乃能世繼其職踰二百年斯亦異矣今池州郭西英濟王祠乃祀梁昭明太子也其祝周氏亦自唐開成年掌祠事至今其子孫今分為八家悉為祝也噫世禄之家能箕裘其業奕世而相繼者盖亦甚鮮曾二祝之不若也鎮江府朱方門之東城上乃有祆神祠不知何人立也本朝玉輅乃隋朝所造唐顯徳中嘗修之凡三到泰山故張芸叟郊祀慶成詩云大裘依古制玉輅自隋傳范忠宣公堯夫謫居永州以書寄人云此中羊麵無異北方每日閉門飱餺飥不知身之在逺也孫覿仲益尚書四六清新用事切當宣和中與家兄子章同為兵部郎未幾子章出知無為軍仲益繼遷言官亦出知和州時淮南漕俞􅀈以無為嵗額上供米後時委知州取勘無為當職官吏仲益得檄漫不省也置而不問亦不移文已而米亦辦子章徳仲益以啟謝之仲益答之有云苞茅不入敢加問楚之師輔車相依自作全虞之計人頗稱賞以為精切也許洛兩都軒裳之盛士大夫之淵藪也黨論之興指為許洛兩黨崔鷃徳符陳恬叔易皆戊戌生田晝承君李廌方叔皆己亥生並居潁昌陽翟時號戊巳四先生以為許黨之魁也故諸公皆坐廢之乆杜甫有云星落黄姑渚秋辭白帝城之句説者但見古詩云東飛伯勞西飛燕黄姑織女時相見意謂黄姑乃牽牛然不見其所出不曉黄姑之説故楊億大年荷花詩云舒女清泉滿黄姑别渚通劉筠子儀七夕詩云伯勞東翥燕西飛又報黄姑織女期大年和云天孫已度黄姑渚阿母還來漢帝家皆用此事予後讀緯書始見引張平子天象賦云河鼔集軍以嘈雜􅓐張茂先李淳風等注云河鼓三星在牽牛星北主軍鼔盖天子三軍之像昔傳牽牛織女見此星是也故爾雅河鼓謂之牽牛又古詩云東飛伯勞西飛燕黄姑織女時相見黄姑即河鼔也音訛而然今之學者或謂是列舍牽牛而㑹織女故於此析其疑又張茂先小家賦曰九坎至牽牛織女期河鼓石鍊注云河鼔星在牽牛北天鼓也主軍鼓主鉞鈇李淳風云自昔相傳牽牛織女七月七日相見者乃此星也予因此始知黄姑乃河鼓為牽牛之别名昔人云開卷有益信然杜甫大歴三年春白帝城放船出瞿塘峽将適江陵詩四十韻其末有云五雲髙太甲六月控摶扶之句鮑欽正鄧睿思范元實及世行所謂王原叔注者諸家皆不詳五雲太甲之義予讀唐王勃文集有大唐九隴縣孔子廟堂銘序云帝車造指遁七曜於中階華葢西臨載五雲於太甲雖使星辰蕩越三元之軌躅可㝷雲雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬象之運不足多矣握瑶鏡而臨事業則方幾之湊不足大矣云云然則五雲太甲之義葢為𤣥象而言矣第未見其所出之書當俟博洽君子請問之惟酉陽雜爼云王勃每為碑頌先磨墨數升引被覆面而卧忽起一筆書之人謂之腹藁燕公嘗讀夫子學堂碑自帝車至太甲四句悉不解訪之一公一公言北斗建午七曜在南方有是之祥無位聖人當出華盖以下卒不可悉然則五雲太甲一公燕公不知之况餘人乎東北冬月寒甚夜氣塞空如霧著於林木凝結如珠玉旦起視之真薄雪也見睍乃消釋因風飄落齊魯人謂之霧淞諺云霧淞重霧淞窮漢置飯甕葢嵗穰之兆也曽子固在齊州有冬夜詩云香清一榻氍毹暖月淡千門霧淞寒又有霧淞詩云園林初日靜無風霧淞開花處處同記得集英深殿裏舞人齊挿玉籠鬆葢謂是也東坡在定武送曹仲錫詩亦云斷蓬飛葉落黄沙祗有千林䰒鬆花應謂王孫朝上國珠幢玉節與排衙亦謂此也霧淞音夢送䰒鬆皆同音東坡自儋耳北歸臨行以詩留别黎子雲秀才云我本儋州人寄生西蜀州忽然跨海上譬如事逺遊平生生死夢三者無劣優知見不再見欲去且少留後批云新釀甚佳求一具理臨行寫此以折菜錢宣和中予在京相藍見南州一士人携此帖來粗厚楮紙行書塗抹一二字類顔魯公祭姪文甚奇偉也具理南荒人缾􅑥劉安世器之在都下僧化成見之曰公在胞胎中當有不測驚危幼年復有惡疾幾為廢人然卒無恙葢器之父航赴官蜀中時母方娠遇棧道天雨新霽磴滑危甚忽石隕馬蹶夫人已墜崖下矣衆皆驚泣無復生望試使下瞰厓腹有巨木葛藟縈結蟠屈如葢落葉委藉夫人安坐於上呼之即應乃縋而上了無所傷至官未幾而育器之後十餘嵗居京師苦赤目甚惡睛溢於外百醫莫差一日有客云某有一相識來調官畜惡目藥甚效昨日來别云已陛辭早晚即行試遣人徃求之時行李已出房云藥誠有之匆匆忘記在某篋中初發一篋藥乃在焉遂得之令以藥傅睛上軟帛纒䕶戒七日方開一傅痛即止及開睛以内眸子瞭矣二事器之自為劉勉中言蘇隂和尚作穆䕶歌又地里風水家亦有穆䕶歌皆以六言為句而用側韻黄魯直云黔南巴􅈎間賽神者皆歌穆䕶其略云聽唱商人穆䕶四海五湖曽去因問穆䕶之名父老云葢木瓠耳曲木状如瓠擊之以節歌耳予見淮西村人多作炙手歌以大長竹數尺刳去中節獨留其底築地逢逢若皷聲男女把臂成圍撫髀而歌亦以竹筒築地為節四方風俗不同吳人多作山歌聲怨咽如悲聞之使人酸辛栁子厚云欸乃一聲山水緑此又嶺外之音皆此類也濟南為郡在歴山之隂水泉清冷凡三十餘所如舜泉爆流金線真珠洗鉢孝感玉環之類皆奇李格非文叔皆為歴下水記叙述甚詳文體有法曽子固作詩以爆流為趵突未知孰是發運使淳化四年始建官焉六路轉輸於京師者至六百二十萬石通泰楚海四州煮海之鹽以供六路者三百二十餘萬石復運六路之錢以供中都者常不下五六十萬貫淳化四年以内殿崇班楊允武恭為都大管勾江南諸州綱船般運鹽糧錢帛茶貨當時殿直蔡崇道供奉官劉全信同管勾五年七月允恭授西京作坊使逐次添管職事乃立制置發運使額至乾興元年十二月文武官二員皇祐元年施昌言以天章閣待制充使自後多除兩制置統六路年額上供米六百二十萬石内四百八十五萬石赴闕一百三十五萬石南京畿送納淮南一百五十萬石赴闕二十萬石咸平尉氏五萬石太康江南東路九十九萬一千一百石七十四萬五千一百石赴闕二十四萬五千石赴拱州江南西路一百二十萬八千九百石一百萬八千九百石赴闕二十萬石赴南京湖南六十五萬石盡赴闕湖北三十五萬石盡赴闕兩浙一百五十五萬石八十四萬五千石赴闕四十萬三千三百五十二石陳留二十五萬一千六百四十八石雍丘東坡知徐州作黄樓未幾黄州安置為定帥作松醪賦有云遂從此而入海𣺌翻天之雲濤俄貶惠州移儋耳竟入海矣在京師送人入蜀云莫欺老病未歸身玉局他年第幾人比歸果得提舉成都玉局觀三事皆䜟也京師五嶽觀後凝祥池有黄色蓮花甚奇他處少見本也安惇處厚初謫潭州過儀真見客河亭有一丐者遽前自言有戯術願陳一笑安心異之欣然延禮丐者求一硯及素筆幅紙香爐乃取土以唾和呵之成墨矣又取土呵之悉成薫陸焚之芬馥乃研墨謂安曰吾不能書命小吏持筆題詩曰佳人如玉酒如油醉卧鴛鴦帳􅂻頭咫尺洞庭君不到長生不死最風流處厚讀之不曉自以無嗜欲乆矣豈有佳人如玉醉卧鴛鴦之事乎且謂洞庭君不到是謂我不可仙矣遂謝丐者與酒一壺一飲而盡長揖而去安行将過洞庭之日被命鐫消官資放歸田里乃悟前詩之異丐者必異人也詩中似隱神仙秘訣人不識耳東坡自常州赴登州經過揚州石塔寺長老戒公來别東坡云經過草草恨萬一别石塔塔起立云這箇是磚浮圖耶坡云有縫答云若無縫何以容得世間螻螘坡首肯之元豐八年八月二十七也明日坡又作詩贈之云竹西失却上方老石塔還逢惠照師我亦化身東漢去姓名莫遣世人知崔公度伯易赴宣州守江行夜見一舟相隨而行寂然無聲挽船得港而泊所見之舟亦正近岸公疑之遣人視之乃空舟也舟中有血痕於舟尾得皂絛一條繫文字一紙取觀之乃雇舟契也因得其人姓名及牙保之屬至郡檄廵尉緝捕盡獲其人盖船主殺雇舟之商取其物而棄其舟遂伏於法豈鬼物銜寃而訴乎文潞公丞相出鎮西京奉詔於瓊林苑燕餞從列皆預賦詩送行王禹玉時為内相詩云都門秋色滿旌旗祖帳容陪醉御巵功業逈髙嘉祐末精神如破貝州時匣中寳劒騰霜鍔海上仙桃壓露枝昨日更聞褒詔下别刋名姓入周彛時以為警絶曽絃伯容為予言此詩第一句便見體靣之大若非上公大僚詎敢於都門而張旌旗耶此餘人所不可當也白居易獻裴度丞相詩云聞説風情筋力在只如初破蔡州時禹玉用此事也鎮江府甘露寺在北固山上江山之勝煙雲顯晦萃於日前舊有多景樓尤為登覽之最盖取李賛皇題臨江亭詩有多景懸窻牖之句以是命名樓即臨江故基也裴煜守潤日有詩云登臨每憶衛公詩多景惟於此處宜海岸千艘浮若芥邦人萬室佈如棋江山氣象回環見宇宙端倪指㸃知禪老莫辭勤候迓使君官滿有歸期自經兵火樓今廢近雖稍復營繕而樓基半已侵削殊可惜也王荆公退居金陵建宅於半山盖自城至鍾山寳公塔路之半因以得名宅後有謝公墩乃謝安石居東山之所也荆公云我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公其後公捨宅為報寜寺寺今亦廢未復舊而墩巋然獨存宣和二年睦㓂方臈起幫源浙西震恐士大夫相與犇竄闗注子東在錢塘避地擕家於無錫之梁溪明年臈就擒離散之家悉還桑梓子東以貧甚未能歸乃僑寓於毗陵郡崇安寺古栢院中一日忽夢臨水有軒主人延客可年五十儀觀甚偉𤣥衣而美鬚髯揖坐使兩女子以銅盃酌酒謂子東曰自來歌曲新聲先奏天曹然後㪚落人間他日東南休兵有樂府曰太平樂汝先聽其聲遂使兩女子舞主人抵掌而為之節已而恍然而覺猶能記其五拍子東因詩記云𤣥衣仙子從雙鬟緩節長歌一解顔滿引銅盃効鯨吸低回紅袖作弓彎舞㽞月殿春風冷樂奏鈞天曉夢還行聽新聲太平樂先傳五拍到人間後四年子東始歸杭州而先廬已焚於兵火因寄家菩提寺復夢前羙髯者腰一長笛手披書冊舉以示子東紙白如玉小朱欄界間行似譜有其聲而無其詞笑謂子東曰将有待也徃時在梁溪曽按太平樂尚能記其聲否乎子東因為之歌美髯者援腰間笛復作一弄亦能記其聲盖是重頭小令已而遂覺其後又夢至一處榜曰廣寒宫宫門夾兩池水瑩淨無波地無纎草仰視嵬峩若洞府然門鑰不啟或有告之者曰但曵鈴索呼月姊則門開矣子東從其言試曵鈴索果有譍者乃引入至堂宇見二仙子皆眉目踈秀端莊靚麗冠青瑶冠衣彩霞衣似錦非錦似繡非繡因問引者曰此謂誰曰月姊也乃引子東升堂皆再拜月姊因問徃時梁溪曽令雙鬟歌舞傳太平樂尚能記否又遣紫髯翁吹新聲亦能記否子東曰悉記之因為歌之月姊喜見顔靣復出一紙書以示子東曰亦新詞也姊歌之其聲宛轉似樂府昆明池子東因欲强記之姊有難色顧視手中紙化為碧字皆滅迹矣因揖而退乃覺時已夜闌矣獨記其一句云深誠杳隔無疑亦不知為何等語也前後三夢後多忘其聲惟紫髯翁笛聲尚在乃倚其聲而為之詞名曰桂華明云縹緲神清開洞府遇廣寒宫女問我雙鬟梁溪舞還記得當時否碧玉詞章敎仙女為按歌宮羽皓月滿窻人何處聲永斷瑶䑓路子東嘗自為予言之王禹玉為翰苑治平三年二月十五日召對蕋珠殿時賜紫花墩令坐踰數刻方罷明年英廟上仙珪作挽詞有云曽陪蕋珠殿獨賜紫花墩盖謂是也金釵雙捧玉纎纎星宿光芒動滿奩解笑詩人誇博物祗知紅果味酸甜曽子固荔枝詩也白樂天荔枝詩曰津液甘酸如醴酪杜子美詩云紅顆甜酸祗自知故前詩譏二公也政和初閩中貢連株者移植禁中次年結實不减土出道君御製詩云玉液乍凝仙掌露絳紗初脱水晶丸盖體物之工矣時羣臣皆應制焉髙郵禪居寺大殿佛髻珠一日為盗竊去往來夜中不得出僧怪之曰汝徃來何求曰欲求門以出僧指曰此門也又復他之竟不見也僧詰問具以竊珠為對即引盗納珠令投哀引咎乃識塗而去僧因抆拭佛供見座下有敗經腐爛狼籍䑕巢其中小䑕數枚尚未能走或少足或𦕈目欠尾者無耳者迨無一全形殊可怪也王将明後房曰田令人者顔貎殊倫真國色也靖康改元正月将明死田自都携一婢竄至亳州居逆旅中郡知之為拘管數月其家遣人迎歸蔡元長後房曰武恭人亦妙麗不凡元長謫嶺表武在京師為一使臣姓孫人所蓄乃携孫竄至南京亦為郡所拘七月開封差人擒之送入京師時予適在二郡皆見之錢塘僧淨暉子照曠學琹於僧則完全仲遂造精妙得古人之意宣和間乆居中都出入貴人之門嘗得一舊琹修治之磨去舊漆三數重隱隱若有字痕重加磨礲得古篆霜鏞二字黄金填之字畫勁妙有法中官陳彥和以七百千得之别以馬價珠為徽白玉為軫修成彈之清越聲壓數琹非雷氏未易臻此也靖康丁未辛道宗将趙萬叛九月二十八日䧟鎮江府時彥和在京口挺身而走琹遂不携又宗室士􅀈立之時知南外大宗正亦在郡所服犀𢃄乃道君解賜淵聖淵聖解賜士􅀈者正透盤龍亦亡焉龍屈若飛翔之状予嘗見之郭熙河陽温縣人以畫得名其子思後登科熙喜甚乃於縣庠宣聖殿内圖山水窠石四壁雄偉清潤妙絶一時自云平生所得極意於此筆矣熙能為逺景意趣益新畧不相雜亦名手也貴人家收熙一景山水二十四幅挂髙堂上森然若在林壑間未易得也思後為待制乃重資以收父畫欲晦其迹也杜子美㣲意深逺考之可見如丹青引贈曹覇詩也有云至尊含笑催賜金圉人太僕皆惆悵説者謂帝喜覇之能寫真畫馬也故催金賜之而圉人太僕自歎其無技以䝉恩賚耳如此説則意短無工殊不知此畫深譏肅宗也考是詩始云先帝天馬玉花驄畫工如山貎不同是日牽來赤墀下逈立閶闔生長風帝既見先帝之馬當軫羮墻之念反含笑而賜金曽不若圉僕見馬能惆悵而懐先帝也又寄劉峽州伯華使君長篇尾句云江湖多白鳥天地亦青蠅人多指白鳥為鷺非也按月令仲秋之月羣鳥養羞註引夏小正曰九月丹鳥盖白鳥説者謂蚊蚋也又金樓子云齊桓公卧於栢寢白鳥營饑而求飽公開翠紗之厨而進焉有知禮者不食而退有知足者雋肉而退有不知足者長嘘短吸而食及其飽者腹為之潰盖戒夫貪也又詩人以青蠅刺䜛然則公詩盖言天下多貪䜛之人耳㤗陵時蔡元長為學士故事供貼子皇太后皇帝皇后閤各有詞諸妃閤同用四首而已時昭懐劉太后充貴妃元長特撰四首以供之有三十六宫人第一玉樓深處夢熊羆荆公退居鍾山常獨遊山寺有人擁數卒按膝據牀而坐驕氣滿容謾罵左右為之辟易公問為誰僧云押綱張殿侍也公即索筆題一詩於扉云口㘅天憲手持鈞已是龍墀第一人回首三千大千界此身猶是一㣲塵王洙原叔内翰常云作書冊粘葉為上乆脱爛茍不逸去尋其次第足可抄録屢得逸書以此獲全若縫繢嵗久斷絶即難次序初得董氏繁露數冊錯亂顛倒伏讀嵗餘尋繹綴次方稍完復乃縫繢之弊也嘗與宋宣獻談之宋悉令家所録者作粘法予嘗見舊三館黄本書及白本書皆作粘葉上下欄界出於紙葉後在髙郵借孫莘老家書亦如此法又見錢穆父所畜亦如此多只用白紙作標硬黄紙作狹簽子盖前軰多用此法予性喜傳書他日得奇書不復作縫繢也陜州大河南岸有物如鐡石狀謂之鐡牛舊有祠宇唐末封號順正廟大中祥符四年真宗祀汾隂幸其廟作鐡牛詩泗州普照寺僧伽㙮建炎戊申二月二日災秀州華亭普照寺亦以是日焚其塔亦甚雄盛可亞於泗上也西京進花自李廸相國始杜子美祭房相國九月用茶藕蓴鯽之奠蓴生於春至秋則不可食不知何謂而晉張翰亦以秋風動而思菰菜蓴羮鱸鱠鱸固秋物而蓴不可曉也晁文元公逈深明理性嘗作七審於四威儀中嘗自考校以代曽子三省之義道力淺深自審方知一一切妄念能息否二一切外縁稍簡省否三一切觸境能不動否四一切語言能慎密否五一切黒白減分别否六夢想之間不顛倒否七方寸之間得恬愉否予讀公所作内典諸書得此若有所省當書諸座右以警昏憒張芸叟作鳳翔吳生畫記秦少㳺作五百羅漢圖記皆法韓退之畫記俱無愧也墨莊漫錄卷四
