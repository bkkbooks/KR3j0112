body:
  text: 墨莊漫録卷六宋張邦基撰本朝能書世推蔡君謨然得古人𤣥妙者當遜米元章米亦自負如此嘗有論書一篇及雜書十篇皆中翰墨之病用鷄林紙書贈張太亨嘉甫盖米老得意書也今附於此論書云歴觀前賢論書徵引迂遠比况奇巧如龍跳天門虎卧鳳闕是何等語或遣辭求工去法愈逺無益學者故吾所論要在人人不為溢辭吾書小字行書有如大字惟家藏直蹟䟦尾間或為之不以與求書者心既注之隨意落筆皆得自然備其古雅壯歲未能立家人謂吾書為集古字葢取諸家長處總而成之既老始自成家人見之不知以何為祖也江南吳􅣰登州王子韶大𨽻題榜有古意吾小兒尹仁大𨽻題榜與之等又㓜兒尹知代吾名書碑及手書大字更無辨門下許侍郎尤愛其小楷云每小簡可使令嗣書之謂尹知也老杜作薛稷惠普寺詩云欝欝三大字蛟龍岌相纒今有石本得而視之乃是勾勒倒收筆鋒畫畫如蒸餅普字如人握兩拳伸臂而立醜恠難狀以是論之古無真大字明矣葛洪天台之觀飛白為大字之冠古今第一歐陽詢道林之寺寒儉無精神桞公權國清寺大小不相稱費盡筋骨裴休率意寫碑乃有真趣不䧟醜恠真字甚易惟有體勢難為不如畫筭勻而勢活也字之八靣惟尚真楷見之大小各自有分智永有八靣己少鍾法丁道䕶歐虞始勻古法亡矣柳公權師歐不及逺甚而為醜恠惡札之祖自柳世始有俗書唐官告在世為禇陸徐嶠之體殊有不俗者開元以來縁明皇字體肥俗始有徐浩以合時君所好經生字亦自此肥開元以前古氣無復有矣唐人以徐浩比王僧䖍甚失當徐浩大小一倫是猶吏楷也僧䖍蕭子雲傳鍾法與子敬無異大小各有分不一倫徐浩為真卿辟客書韻自張顛血脉來教顔大字促令小小字展令大非古也石刻不可學但自書使人刻之己非己書也故必須真蹟觀之乃得趣如顔真卿每使家僮刻字故㑹主人意修改波撇致大失真惟吉州廬山題名題訖而去後人刻之故皆得其真無做作凡俗差佳乃知顔出於禇也又真蹟皆無蠶頭燕尾之筆與郭知運爭坐位帖有篆籕氣顔傑思也柳出歐陽為醜怪惡札之祖自此世人始有為俗書蓋緣時君所好其弟公綽乃不俗於其兄筋骨之說出於柳世人但以怒張為筋骨不知不怒張自有筋骨凡大字要如小字小字要如大字唯禇遂良小字如大字其後經生祖述間有造妙者大字如小字未之見也世人多寫大字時用力捉筆字愈無筋骨神氣作圓筆頭如蒸餅大可鄙笑要須如小字鋒勢備全都無刻意做作乃佳自古及今余不敏實得之榜字固已滿世自有識者知之石曼卿作佛號都無囘互轉摺之勢小字展令大大字促令小是張顛教顏真卿􅍝論葢字自有大小相稱且如寫太一之殿作四窠分豈可將一字肥滿一窠以對殿字乎葢自有相稱大小不當展促也予嘗書天慶之觀天之二字皆四筆慶觀多畫在下各隨其相稱寫之挂起氣勢自帶過皆如大小一般雖真有飛動之勢也書至𨽻興大篆古法大壞矣篆籕各隨字形大小故百物之狀活動圓健各各自足𨽻乃始有展促之勢而三代法亡矣其雜書十篇云歐虞禇桞顔皆一筆書也安排費工豈能垂世李邕脫子敬體乏纎濃徐浩晚年用力過更無氣骨不如作郎官時婺州碑也董孝子不空皆晚年惡札全無妍媚此自有識者知之沈傳師變格自有超世真軌徐不及也御史蕭誠書太原題名唐人無出其右為司馬係南嶽真君觀碑極有鍾王軌轍餘皆不及矣智永臨集書千文秀潤圓勁八靣具備有眞蹟自顛沛字起在唐林夫處他人収不及也半山莊臺上故多文公書今不知存否文公學楊凝式書人尠知之予語其故公大賞其見鑒金陵幕山樓臺榜乃闗蔚宗二十年前書想六朝宫殿榜皆如是智永硯心成臼乃能到右軍若穿透始到鍾繇也可不勉之一日不書便覺思澁想古人未嘗片時廢書也因思蘇之才桓公至洛帖字字用意相鈎連非復便一筆至到底也若旋安排即虧活勢耳字要骨格肉須裹筋筋須藏肉帖乃秀潤在布置穩不俗險不恠老不枯潤不肥變態貴形不貴苦苦生怒怒生恠貴形不貴作作入畫畫入俗皆字病也顔魯公行字可教真便入俗品萬等古人書不如此學吾家多小兒作草字大叚有意思少存若天性習慣如自然茲古語也吾夢古衣冠人授以摺紙書法自此差進寫與他人却不曉蔡元度見而驚曰法何太遽異耶此公亦具眼人章子厚以真自名獨稱吾行草欲吾書如排筭子然真草須有體製乃佳耳薛稷書慧普寺老杜以謂蛟龍岌相纒今見其本乃如奈重兒擡蒸餅勢信老杜不能書也學書須得趣他好俱忘乃入妙别為一好縈之便不工也海嶽以書學士召對上問本朝以書名世者凡數人海嶽各以其人對曰蔡京不得筆蔡卞得筆而少逸韻蔡襄勒字沈遼排字黄庭堅描字蘇軾畫字上復問卿書如何對曰臣書刷字予嘗謂米公人物英邁鑒裁精髙翰墨場中當推獨歩平生所書遍於天下石刻中如青州南陽石橋記鄼縣京觀記無為軍天王記漣水軍數碑皆逺追鍾王寧獨今人所難唐人亦鮮及也蔡天啓為公墓誌云舉止頡頏不能與世俯仰故仕數困躓冠服用唐人規制所至人聚觀之性好潔置水其旁數頮而不說未嘗與人同器視其眉宇軒然進趨䄡如音吐鴻暢雖不識者亦謂其米元章也云云此迨實録云松陵唱和皮日休新秋即事云酒坊吏到常先見鶴俸符來毎探支註云吳都有鶴料案殊未詳鶴俸之説曽文彦和博學之士也知滁州有次韻趙仲美表弟西齋自遣詩云謫守凄凉卧郡齋夫君失意偶同來海邊故國𣺌何許城上新樓空幾廻寧羡一囊供鶴料㑹看千里躍龍媒清吟未免縈機慮只恐飛鷗便見猜註云唐幕府官俸謂之鶴料今嵗敇頭所得止此仲美省試下故云彥和用事必有所據當更考之又宋宣獻有送黄祕丞倅蘇臺云鶴料署文移鮆場収賦筭此宣獻用皮日休所云吳郡事也蔡仍子因之妻九院王家女也忽患瘵疾沉綿數年既死已就小歛時上皇宫中聞之曰惜其不早以䧟氷丹賜之今雖已死試令救之因命中使馳賜一粒時息氣已絶乃强灌之須㬰遂活數日後而安但齒皆焦落後十五年方死宋景文公詩曰蟹美持螯日魴甘抑鮓天用楊淵五湖賦云連瓶抑鮓蔡丞相確持正常有治命遺訓云吾没之後歛以平日閒居之服棺但足以周衣衾作壙不得過楚公塟時制棺前設一坐陳瓦器以衣衾巾履數事及筆硯置左右自初歛至於祖載襄塟悉從簡質稱吾平生毋煩公家毋干恩典毋受賻遺毋求人作埋銘神道碑二處但刻石云宋清源蔡某墓而紀塟之嵗月於其旁可矣夫逹人君子安於性命之際而不憂窮乎死生之變而不惑超然自得與道消息生以形骸為寓死奚丘壟之念哉吾雖鄙薄亦粗聞大道之方矣欲效楊王孫與沐徳信則必傷汝曹之意又干矯俗之稱故命送終􅂓為中制將使子孫近者視吾藏足以無憾逺尚及見吾墓道之石足以伸敬如是而已汝曹其遵吾言慎勿易也其字畫清勁高如六朝人書其言可法也又有雜書一篇云楚公時少年讀書於石梯山精舎布衣蔬食志趣超然其仕雖不逹以清名直氣聞士大夫間陳恭公孫威敏公皆嗟嘆公所為每為公言潁川陳氏公慙卿卿慙長以徳不以位也在建陽八年去日不賫一串茶邑人思公至今不衰致仕居貧以席蔽戸誦詠猶不倦其清白淳亮甘貧樂道汝曹能使人謂真楚公之子孫則善矣楚公名黄裳故任太子右賛善大夫致仕忠懐公之父也文潞公為相日赴祕書省曝書宴令堂吏視閣下芸草乃公徃守蜀日以此草寄植舘中也因問蠧出何書一坐黙然蘇子容對以魚豢典畧公喜甚即借以歸主帥取青唐時大軍始集下寨治作壕塹鑿土遇一壙得一琉璃缾瑩徹如新缾中有大髑髏其長盈尺缾口僅數寸許不知從何而入主帥命復瘞之斯亦異矣近世墨工多名手自潘谷陳贍張谷名振一時之後乂有常山張順九華朱覲嘉禾沈珪金華潘衡之徒皆不愧舊人宣政間如關珪關瑱梅鼎張滋田守元曽知唯亦有佳者唐州桐栢山張浩製作精緻妙法甚奇舅氏吳順圖每歲造至百觔遂壓京都之作矣前日數工所製好墨者徃徃韜藏至今存者尚多予舊有此癖收古今數百笏種種有之渡江時為人疑篋之重以為金玉竊取之殊可惜也今尚餘一巨挺極厚重印曰河東解子誠又一圭印曰韓偉昇膠力皆不乏精采與新製敵可與李氏父子甲乙也士大夫留意詞翰者徃徃多喜收蓄唯李格非文叔獨不喜之嘗著破墨癖說云客有出墨一函其製為璧為丸為手握凡十餘種一一以錦囊之詫曰昔李廷珪為江南李國主父子作墨絶世後二十年乃有李承晏又二十年有張遇自是墨無繼者矣自吾大父始得兩丸於徐常侍鉉其後吾父為天子作文章書碑銘法當賜黃金或天子寵異則以此易之余於是以兩手當心捧硯惟謹不敢議真贋然余恠用薛安潘谷墨三十餘年皆如吾意不覺少有不足不知所謂廷珪墨者用之當何如也他日客又出墨余又請其說甚辯余曰噓余可以不愛墨矣且子之言曰吾墨堅可以割然余割當以刀不以墨也曰吾墨可以置水中再宿不腐然吾貯水當以盆罌不用墨也客復曰余說未盡凡世之墨不過二十年膠敗輒不可用今吾墨皆百餘年不敗余曰此尤不足貴余墨當用二三年者何苦用百年墨哉客辭窮曰吾墨得多色凡用墨一圭他墨兩圭不迨余曰余用墨每一二歲不能盡一圭徃徃失去乃易墨何嘗苦少墨也唯是説刷碑印文書人乃常常少墨耳客心欲取勝曰吾墨黒余曰天下固未有白墨雖然使其誠異他墨猶足尚乃使取研屏人雜錯以他墨書之使客自辨客亦不能辨也因恚曰天下奇物要當自有識者余曰此正吾之所以難也夫碔砆之所以不可以為玉魚目之所以不可以為珠者以其用之才異也今墨之用在書茍有用於書與凡墨無異則亦凡墨而已焉烏在所寶者嗟乎非徒墨也世之人不考其實用而眩於虛名者多矣此天下寒弱禍敗之所由兆也吾安可以不辨於墨文叔詞翰之好乃不喜於墨此不可曉故并載之近時士大夫學佛者不行佛之心而行佛之迹者皆是談慈悲而行若蜂蠆乃望無上菩提吾之未信梁武帝之奉佛可謂篤矣至捨身為寺奴宗廟供麵牲乃築浮山堰灌壽春欲取中原一夕而殺數萬人其心豈佛也哉揚州呂吉甫觀文宅乃晉鎮西將軍謝仁祖宅也在唐為法雲寺有雙檜存焉猶當時物也劉禹錫有詩云雙檜蒼然古貌奇含煙吐霧欝叅差晚依禪客當金殿初對將軍映􅀞旗龍象界中成寶蓋鴛鴦瓦上出高枝長明燈是前朝熖曾照青青年少時吉甫家居時檜尚依然李之儀端叔用夢得詩韻云故迹悲凉古木奇相公庭下蔚相差霜根半露出林虎畫影全舒破賊旗寶界曾囘鋪地色節旄遠映挿雲枝劉郎風韻知誰敵儒帥端能表異時建炎兵火樹遂亡矣予後到鄉里訪其遺迹不可得矣李端叔云樂毅論髙紳為湖北轉運使道中聞砧聲清逺因視之乃樂毅論石刻覆於下也而已斷裂矣遂載歸完理緝綴櫝以木箱所可辨者如此故世之傳布皆止於海字則其碎而不可緝者良可惜也端叔之說如是予又嘗見一本在章申公家聞今尚存是唐人臨本不知即髙紳所得者否或别本也白樂天作長恨歌元微之作連昌宮詞皆紀明皇時事也予以為微之之作過白樂天之歌白止於荒淫之語終篇無所規正元之詞乃微而顯其荒縱之意皆可考卒章乃不忘箴諷為優也其詞有云上皇正在望仙樓太真同憑欄杆立樓上樓前盡珠翠炫轉熒煌照天地又云初過寒食一百六店舍無煙宮樹綠夜半月髙絃索嗚賀老琵琶定場屋力士傳呼覔念奴念奴潜伴諸郎宿須㬰覔得又連催特敇街中許然燭又云飛上九天歌一聲二十五郎吹管逐逡巡大徧梁州徹色色龜茲轟錄續李謩擪􅅇傍宮墻偷得新飜數般曲又云平明大駕發行宫萬人鼓舞途路中百官隊仗避岐薛楊氏諸姨車闘風明年十月東都破御路猶存禄山過云云禄山以天寳十四載反於漁陽䧟東京則幸連昌時乃十三載也巡幸而諸弟諸姨悉扈從百司供頓亦擾矣念奴名妓也帝歲幸華清時巡東洛有司潜遣隨行以備宣喚而每為諸王所邀致方寒食火禁而中夜宫中張樂不已聲聞於外遣中官傳呼追覔念奴特呼然燭於街衢呼呌於靜皆不可以訓既終夕喧樂黎明六飛又復西去王者慎動當如是乎此書深譏其荒淫無度也是歲帝年七十一而太真年三十六矣然考之本紀十三載乃無幸洛之事豈史逸耶微之去天寳不逺必不鑿空而云也李謩擪􅅇字玉篇云擪烏協切指按於笛而云擪此字之妙也世俗以阿阿則則為歎息之聲李端叔云楚令尹子西將死家老則立子玉為之後子玉直則則於是遂定昭奚恤過宋人有饋彘肩者昭奚恤阿阿以謝爾後阿阿則則更為歎息聲常疑其自得於此李文叔常有雜書論左馬班范韓之才云司馬遷之視左丘明如麗倡黠婦長歌緩舞間以諧笑傾蓋立至亦可喜矣然而不如絶代之女方且却鈆黛曵縞紵施帷幄裴徊微吟於髙堂之上使滛夫穴隙而見之雖失氣疾歸不食以死而終不敢意其一啟齒而笑也班固之視馬遷如韓魏之壯馬短鬛大腹服千鈞之重以䇿隨之日夜不休則亦無所不至矣而曽不如騕褭之馬方且脱驤逸駕驕嘶顧影俄而縱轡一騁千里即至也范曄之視班固如勤師勞政手胝簿版口倦呼叱毫舉縷詰自以為工不可復加而僅足為治曾不如武健之吏不動聲色提一二綱目羣吏為之趨走而境内晏然也韓愈之視班固如千室之邑百家之聚有儒生崛起於蓬蓽之下詩書傳記鏘鏘常欲鳴於齒頰間忽遇夫奕世公卿不學無術之子弟乘髙車從虎士而至雖顧其左右偃蹇侮笑無少敬其主之容雖鄙惡而體己下之矣又文叔嘗雜書論文章之横云余嘗與宋遐叔言孟子之言道如項羽之用兵直行曲施逆見錯出皆當大敗而舉世莫能當者何其横也左丘明之於辭令亦甚横自漢後十年唯韓退之之於文李太白之於詩亦皆横者近得眉山篔簹谷記經藏記又今世横文章也夫其横乃其自得而離俗絶畦徑間者故衆人不得不疑則人之行道文章政恐人不疑耳七言絶句唐人之作徃徃皆妙頃時王荆公多喜為之極為清婉無以加焉近人亦多佳句其可喜者不可槩舉予每愛俞紫芝秀老歲杪山中云石亂雲深客到稀鶴和殘雪在髙枝小軒日午貪濃睡門外春風過不知舒亶信道村居云水遶陂田竹遶籬榆錢落盡槿花稀夕陽牛背無人卧帶得寒鴉兩兩歸崔鶠德符秋日即事云秋草門前已没鞾更無人過野人家離離踈竹時聞雨淡淡輕煙不隔花又黃州道中云莫愁微雨落輕雲十里長亭未墊巾流水小橋山下路馬頭無處不逢春劉次莊中叟桃花云桃花雨過碎紅飛半逐溪流半染􅅺何處飛來雙燕子一時銜在畫梁西僧如璧德操偶成云松下柴門晝不開只有蝴蝶雙飛來蜜蜂兩脾大如蠒應是山前花又開吳可思道病酒云無􅂓病酒對殘春簾幙重重更掩門惡雨斜風花落盡小樓人下欲黃昏又春霽云南國春光一半歸杏花零落淡胭脂新晴院宇寒猶在曉絮欺風不肯飛趙士掞才孺登天清閣云夕陽低盡已西紅百尺樓髙萬里風白髮年年何處得只應多在倚欄中李怤去言春晚云花瘦煙羸可奈何不關渠事鳥聲和無人掃地驚闕二字分付輕紅上碧莎趙䶵之子雍春日云拂牀欹枕晝初長好夢驚囘燕語忙深竹有花人不見直應風轉得幽香曾紆公衮江樾軒書事云卧聴灘聲㶁㶁流泠風凄雨似深秋江邉石上烏桕樹一夜水長到梢頭胡直孺少汲春日云風雲吹絮柳飛花睡起鈎簾日半斜四海隨人雙燕子相逄處處作生涯曾繹仲成還家塗中云踈林殘嶺起昏鴉臘盡行人喜近家江北江南春信早傍籬穿竹見梅花劉無極希顔漾花池云一池春水緑如苔水上新紅取次開閑倚東風㸔魚樂動揺花片却驚猜王銍性之山村云家依溪口破殘村身伴渡頭零落雲更向空山拾黄葉姓名那有世人聞陳與義去非秋夜云中庭淡月照三更白露洗空河漢明莫遣西風吹葉落只愁無處着秋聲如此之類甚多不愧前人東坡作梅花詞云髙情已逐曉雲空不與梨花同夢注云唐王建有夢㸔梨花雲詩予求王建詩行世甚少唯印行本一卷乃無此篇後得之於晏元獻類要中後又得建全集七卷乃得全篇題云夢㸔梨花雲歌薄薄落落霧不分夢中喚作梨花雲瑶池水光蓬莱雪青葉白花相次發不從地上生枝柯合在天頭遶宫闕天風㣲微吹不破白豔却愁春涴露玉房綵女齊㸔來錯認仙山鶴飛過落英散粉飄滿空梨花顔色同不同眼穿臂短取不得取得亦如從夢中無人為我解此夢梨花一曲心珍重或誤傳為王昌齡非也瘞鶴銘潤州揚子江焦山之足石巖下惟冬序水退始可模打世傳以為王逸少書然其語不類晉人是可疑也歐陽永叔以為華陽真逸乃顧况之道號或是况所作然亦未敢以為然也予嘗以窮冬至山中觀銘之側近復有唐王瓉刻詩一篇字畫差小於鶴銘而筆勢八法乃與瘞鶴極相類意其是瓉所書也因摸一本以歸以示知書者亦以為然其題云冬日與羣公泛舟此山江水初不凍今年寒復遲衆芳且未歇近臘仍裌衣載酒適我情興來趣漸㣲方舟大川上環酌對落暉兩片青石稜波際無因依三山安可到欲到風引歸滄溟壯觀多心目豁暫時况得窮日夕乗槎何所之謫丹陽功曹掾王瓉今此刻亦漸漫漶尚可讀也有好事者當試求之以驗予言之或是也應邵漢官儀曰周澤為太常齋有疾其妻憐其年老闚内問之澤大怒以為干齋遂收送詔獄自劾論者譏其詭激時諺云生世不諧為太常妻一歲三百六十日三百五十九日齋一日不齋醉如泥予觀稗官小說乃得其說云南海有蟲無骨名曰泥在水則活失水則醉如一堆泥然後又讀五國故事云偽閩王王延慶為長夜之飲因醉屢殺大臣以銀葉作杯柔弱為東𤓰片名曰醉如泥酒旣盈不可寘杯唯盡乃已蓋取此義也韓維持國詩格甚奇如寄范德儒云睥睨峯高㢠廻過鴈琵琶宵寂語流鶯和兄康公罷相云移病早休丞相筆坐闕猶着侍臣冠和曽存之云自愧效陶無好語敢煩凌杜發新章皆佳句也恨世少傳者曽誠存之元符間任舘職嘗與同舍諸公飲王詵都尉家有侍兒輩侍香求詩求字者以煙濃近侍香為韻存之得濃字賦詩云俛仰佳人㸔墨蹤和研親炷寶熏濃詩情過筆當千里妙思凝香欲萬重山盎洩雲傾白酒越羅霑露浥黃封從來粉黛宜燈燭妙手慿誰寫醉容又有七夕王都尉邀同舍置酒聴琵琶詩云寶檻凌雲結綺髙小奩爭巧暮分曹春䓗細撚龍香撥秀頸偏明邏逤槽牛既冩形呈粔籹馬軍馳酒送蒲萄淚珠散作人間露最覺更䦨潤錦絛道山學士尚與貴戚駙車過從宴飲真太平盛事也其後禁之詵元豐中㘴與子瞻交結嘗竄均州矣後復與諸名士游葢風流好事不忘於情寧獲譴戾是可尚也故事西京每歲貢牡丹花例以一百枝及南庫酒賜舘職韓子蒼去國後嘗有詩云憶將南庫官供酒共賞西京勅賜花白髮思春醒復醉豈知流落到天涯衢州㕔事下舊有土勢隆起篠本叢生相傳云古冡也舊有碑其文云五百年刺史為吾守墓以此前後相承皆畏而不敢慢紹聖元年齊安孫賁公素為守問之左右以是對公命毁去之官吏大恐闔府叩頭以諫公曰藉令土中有賢者骨當以禮法遷之乃為文自祭而除之斸深丈餘了無他異但有二石峰長五六尺堅瘦泔潤又有大木之根蟠踞其下羣疑遂定石上有刻云乾符五年五月三日安於此押衙徐諷龍山起此石處得二石刺史季闕題又刻云開寳七年重疊峨嵋山於㕔事前於郡齋文㑹閣移季公之石安置於此刺史慎知禮題時公方修州治南韶光園重建清泠臺堂成乃移二石於堂下名曰雙石嗟乎慎公移石去季公之得石凡九十七年公素之破疑冡出石去慎公又一百二十一年物之顯晦抑自有數第不知峨嵋之廢乃冒冡之名自何時也公素一旦戱笑為之遂釋千百年之惑張芸叟有詩云芝蘭雖好忌當門何况庭前惡土墩畚鍤纔興雙劍出狐狸盡去老松蹲百年守冡真堪笑一日開軒亦可尊安得擲從天外去成都石笋至今存公素可謂剛毅正直自信之君子也墨莊漫録卷六
