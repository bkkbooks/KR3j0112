body:
  text: 墨莊漫録卷十宋張邦基撰崔伯易嘗有金華神記舊編入聖宋文選後集中今亡此集近讀曲轅集復見之因載之以廣所聞云汴人有吴生者世為富人而生以娶宗女得官於三班嘉祐中罷任髙郵廼寓其家於治所而獨與兄子賫金繒數百千南適錢唐道出晉陵􅋈舟於望亭堰下是夜月明風髙生乃危坐舷上頽然殊不有寢意乆之忽有緋衣被髮持刅炬自竹林間出者後引一女子冠玉鳳冠曵蛟綃文錦之衣顔色甚麗而年十八九耳生見而驚俄頃至㟁側回叱緋衣者曰可去矣無乆留也於是滅炬泣拜而去女子即登舟靣生坐謂生曰見向來緋衣者乎此君之夙讐也而索君且數十年矣乃今方得之第以我故得免不然今夕君當死其手生聞益驚駭不自安女子笑曰君怯耶即以金縷衣置肩上生稍安乃問曰若神歟其鬼耶女子曰我非人亦非鬼葢金華神也過去生中嘗與君為姻好竊知將有所不濟故相救爾今事已我亦當去君矣遂去不復返顧生以目送至於林中不見将掩闗忽覩女子坐其後生大驚女子笑曰知君怯故相戱安有數十年暌索一得邂逅而遽往者耶遂相與入舟中取酒共飲其言諧謔悉如常人然生誡曰毋髙聲恐兄子之知女子曰我聲特君可聞他人雖厲聲亦不能聞也生益疑竊自懼曰此果神也固無所憚儻鬼則必有所畏矣因出劔鏡二物示之女子曰此劔鏡耳精與鬼則畏夫劔陽物而有威者也鬼隂物而無形者也以無形而遇有威是故銷鑠其妖而不能勝故鬼畏劔也鏡亦陽明而至明者也精亦隂物而偽變者也以偽而當至明是故暴著其形而不能逃故精畏鏡也昔抱朴子嘗言其畧而我知之且乆矣乃欲以相畏乎生懼起謝曰誠無他意至明起謂生曰舟檝已有曉色勢不能乆留當與君子訣矣君後十年遊華山日多置朱粉於路隅梧桐下揚之雖然君今不可終此行恐復不濟也因索筆題詩一章曰羅襪香消九九秋淚痕空對月明流塵埃不見金華路滿日西風總是愁書已輙復流涕歔欷而去明日思其言遂回棹不復南去復以其事語人人或詰其兄子果亦不知也曲轅先生又嘗作傳記陳明逺再生事云明逺陳氏字也名公闢興化軍人嘗舉進士皇祐三年春過泗州遊普照王寺時羣僧㑹齋於南院明逺遶浮圖自西廂趍大殿兩廡人甚譁獨老僧敝衣庭下倚樹讀青紙書其文光彩射百許歩明逺遽往揖之僧小舉手就視其書則金字金剛經繋以梁朝傅大士之頌者僧細諷自若明逺從後聼之既乆僧回顧笑謂明逺曰子亦樂此耶明逺對之稍恭僧讀竟遂以經授明逺曰江南李氏所施觀子之貌且當持此明逺喜受之歸明旦取映日則無復光彩一讀之經藏書籠中明年從父官海陵忽得疾不可治已死三日家人將大歛覺其體復温移刻稍蘓又食頃乃能言其族反驚明逺自言方疾革時見四卒深目虎喙持文書有大印字莫可辨共執明逺桎兩手驅西北行其勢甚暴所經依約皆廣野塵埃射人不可輙視漸逼大河府署嚴宻門外坐卒數十悉持挺内有考掠聲三卒先入一守明逺於大門外如竢命者須臾坐卒盡起擎跪明逺回視一僧乗虚而行過門見明逺植杖而立意若哀憫明逺不覺手桎盡解熟視其狀即泗州嘗遇授經者也因拜祈之僧顧卒取文書畧視徐曰府君知耶纔欲入門而聞府中呼應甚遽有二人服紫服朱趍出迎之其侍衛之盛若世之達官二人禮僧極恭僧為語二人俞喜旁睨明逺若夙有罪者僧呼明逺前使自懴悔俄二人詔吏聽還二人亦謝僧去後有吏馳出呼明逺則明逺季父釴釴太學進士有聞亡已三年矣既見訪明逺家事云我當録寃簿三年纔二年爾非佳職也爾歸持尊勝七俱闕呪祈以免我又有故服藏某處幸焚之遺我寄聲親戚如平生復告明逺言世之人寃慎勿復復之勢如索綯焉若有迨百千生不能解者故吾此局置吏甚多而簿書期㑹常若不及神君聖靈尤深厭此言未竟若有呼之者因疾馳去僧引明逺遊旁兩大廡下見繋囚不啻數百亦有禽獸諸蟲悉能人言與囚對辨羣吏見僧悉拜有械囚繫以大鐵鏁左右文書沒其首口嘗囁嚅出血卒守之若使自讞輕重不當又鞭之其餘幾壊明逺竊視之乃其表舅鄭生生為閩吏喜以法自名死且十年餘見明逺泣下頻以手拱僧且目明逺僧笑少以杖指之鏁械俱墮然莫敢起而口囁嚅出血未已也又見坐沙門五六人前列敗壊飲食數十甕氣色殊惡僧曰此嘗棄世中供養且重使食且僧亦不甚念復引明逺出前大河上虹橋蜿蜒望彼㟁城府樓觀煙霧出其上明逺請往觀焉僧不許曰子過此無復歸矣亟随僧趍東南來井閭人物差類人世但天氣乖慘似欲雨時而塗中所遇往往皆昔嘗所見危冠大馬出處前後吏卒替更而迭趍人指以為名勢挾侈决意不屈之士皆趦趄狼狽狀若為物所廹甚者咨嗟涕淚悔怏自擲意求有以亡匿而不可得俄及前所過廣野遇溪水漲甚思始來時則無有也明逺憂不能渡僧乃執杖端以末授明逺而𨗳之始涉亦甚淺中流明逺失據將溺因驚呼而甦明逺之復生也桎縛之跡隠然在臂家人持葷飲餉之雖數十年輙掩鼻急遣去瞻視間僧已在室中香氣異常親族齋戒祈見者必暫覩裙衲杖屨而已僧自是日以先授經義教明逺對其情品説一切世間所有之法即心是佛煩惱塵勞究竟虚妄其音靚圓若霜鍾在庭户外之人一歴耳驩然自信終身不能忘其聲毎謂明逺曰吾即詣某寺齋既去食頃後還又某氏齋私飲某僧酒獨不齋耳他時為之未免有罪時多疑以僧伽大師者明逺請焉僧曰僧伽吾師也幾一月明逺軀體復壯僧告去曰後十四年吾待子於祖山明逺問祖山曰廬阜遂去陳氏後求釴故衣果得於其處緇徒呪而火之明逺母素好釋氏悉疏其齋雖逺數百里必使人騐之明逺并告以類狀具言有是爾飲僧家聞之終身不飲酒然明逺嚮所懴之罪今反不復能記豈昔偶萌之於心不自引悔而神道已録以為非耶抑他生所為不復自省而幽𡨕記人功過誅賞有時而宴安人之茍為得以自闕則跬步之間不可以為恐懼耶至和三年八月明逺歸莆田以故人訪予且出所授經具道其事欲予記之予固以恠其人爽辨謙畏不類向時其志真若有所得然未暇從其請也今年其兄公輔調官京師特過予復以為言予與公輔逰十五年矣今示稱其弟所為如予嘗所恠者則明逺由是而有聞儻求之益勤修之益明守其話言不為富貴貧賤毁譽之所遷則其所至也豈易量哉因起奮筆直載始末明逺所述葢多其間有與佛經外史若世人已傳之事畧相同者不復更録明逺父名鑄今為尚書都官郎中通判廣州曲轅子記予觀崔公所記抑亦異矣彼鄭生者以法自名而獲罪若是吁可畏哉三尺者輕重不可踰而法家流鮮恩寡恕多論刻茍容於心已不迯於隂譴矣若能平反明慎天必以善應之臨政者於淑問詳讞寧可忽諸襄陽天僊寺在漢江之東津去城十里許正殿大壁畫大悲千手眼菩薩像世傳唐武徳初寺尼作殿求良工圗繪有夫婦携一女子􅀿命期尼以扃殿門七日乃開至第六日尼頗疑之乃闢户閴其無人有二白鴿飜然飛去視壁間聖像已成相好竒者非世工所能獨其下有二長臂結印手未足乃二鴿飛去之應也郡有畫工武生者獨能摹傳其本大觀初有梁寛大夫寓居寺中心無信向頗輕慢之武生云菩薩之面正長一尺寛以為誕必欲自度之乃升梯欲以足加菩薩面忽梁間有聲如雷寛震悸而墜損其左手僧教寛悔過自懴後嵗餘方如舊兹禦侮於像法事者怒其慢凟耳章丞相申公子厚以能書自負性喜揮翰雖在政府暇時日書數幅予嘗見雜書一巻凡九事乃抄之今因載於此一云東漢魏晉皆以八分題宮殿榜蔡邕作飛白是八分字耳是以古云飛白是八分之輕者衛恒作散𨽻是用飛白筆作𨽻字也故又云散𨽻終飛白金石刻東漢魏晉皆用八分唯小小鉛刻之隂或刻𨽻字也許昌羣臣勸進與受禪壇碑皆八分之妙者近世有荒唐士人妄謂為𨽻書而不知𨽻書乃今正書耳世俗亦往往從而謂之𨽻書且相尚學焉不知彼將以何等為古八分又將以今正書為何等耶嗚呼目前淺近之事畧涉古者便自可知何至昏蒙妄惑不可指示之如此耶顧欲與其論書學之本與用筆作字之微妙㫖逺而意深者安可得哉葢不趐於鍾皷樂鷃周公之服被猿狙也事之類此者多矣二云書云六藝之一古人列之於學以相傳授則學者始習之已乆詳知其規矩法度與所以為書之意矣精而熟之不妙且神何待耶戰國秦漢以來其學猶未絶也故學者尚有前世之風烈至於名家乃多父子祖孫豈不由師授傳習之有素乎崔張鍾杜衛索王庾諸人是也㑹之於繇真父子也逸少子敬殆將鴈行矣三云吾頃見蘓浩然兄弟言其曽祖叅政所收古書畫盡付幼子掌之既薨諸兄弟以其素所愛不復取悉以畀之所與共者十一二而已其後叅政之幼子官洪州卒于官因不歸其子幼弱已而遂絶書畫皆散失不復存今諸房所共有者是十一二之粗者爾然足以多甲士族也使其在者不知其當如何也必有魏晉名迹矣惜哉四云宣州筆有名耳未必佳也凡筆擇毫淨捲心圎便是工夫鋒之長短尖齊在臨時耳處處皆能要自指教令精意而已無他竒也五云張侍禁筆甚佳一管小字筆冩二十萬字尚冩得如此是少比也盧管使十倍不及是其手生也凡習熟之與生疎豈不相逺哉學者須先曉規矩法度然後加以精勤自入能品能之至極心悟妙理心手相應出乎規矩法度之外無所適而非妙者妙之極也由妙入神無復蹤跡直如造化之生成神之至也然先曉規矩法度加以精勤乃至於能能之不已至於心悟而自得乃造於妙由妙之極遂至於神要之不可無師授與精勤耳凡用筆日益習熟日有所悟悟之益深心手日益神妙矣力在手中而不在手中必須用力而不得用力應須在意而不得在意此可以神遇而不可以言傳也學佛者悟吾此語可以撒手到家矣妙哉妙哉真至理也六云吾毎論學書當作意使前無古人凌厲鍾王直出其上始可即自立少分若直爾低頭就其規矩之内不免為之奴矣縦復脱灑至妙猶當在子孫之列耳不能鴈行也况於抗衡乎此非茍作大言乃至妙之理也禪家有云見過於師方堪傳授見與師齊減師半德悟此語者乃能曉吾言矣夫於師法不傳字學廢絶數百年之後欲興起之以繼古人之迹非至强神悟不能至也七云學書須先極取骨力骨力充盈有羨乃漸變化收藏至於潛伏不露始為精妙若直爾暴露便是栁公權之比張筋努骨如用紙武夫不足道也八云楊小漕言其兄官江夏有道人自稱呂亢圭時時延之學院中二姪幼小頗勤待之或言事往往有騐一日忽再三言云惡人將至矣須急避之時衆人亦不甚留之暫爾徑渡江表人但訝其所謂惡人者何也是夜忽提刑喻君涉至州州郡都不知之乃是乗便風一日行六七程徑至㟁下耳喻到則遣人訪求呂不見踪跡喻乃親自宻問得與一人往還至熟呼之至即岑文秀也詰其所得云無有喻作聲色且將笞之岑終言無喻不信遣熟事吏往搜其家乃於神堂壁中得所與岑長歌一首是言内事岑乃云呂實付此詩云汝今未曉異日當為子詳説之喻乃云呂即呂先生也其名亢圭是解拆先生二字耳亦不知其定如何也衆乃悟所謂惡人者指喻耳是恐其迫逼求之也九云吾今日取君謨墨迹觀之益見其學之精勤但未得微意爾亦少骨力所以格弱而筆嫩也使其心自得者何謝唐人李建中學書宗王法亦非不精熟然其俗氣特甚葢其初出於學張從申而已君謨少年時乃師周越中始知其非而變之所以恨弱然已不謂其能變之至此也吾若少年時便學書至今必有所至所以不學者常立意若未見鍾王妙蹟終不妄學故不學耳比見之則已遲晚故悟學皆遲今但恐手中少力耳若手中不乏力不甚衰疲更二十年决至熟妙處此須常精勤乃可若不極精勤亦不能至也凡學者可以不自勉乎元祐六年十一月五日西齋東窻大滌翁書時卜至後一日也重和戊戌嵗平江有盤門外大和宮相近耕夫數人穴一塜初入隧道甚深其中極寛如厦屋然復有數門扃鐍不可開耕者得古器物及鴈足鐙之類以為銅也欲貸之熟視之乃金因分爭至官時􅀿安道逢原為都守盡令追索元物到官乃遣郡官數人往閉其穴觀者如堵其中四壁皆繪畫嬪御之屬丹青如新畫手殊竒妙有一祕色香爐其中灰炭尚存焉諸卒爭取破之塜之頂皆畫天文𤣥象此特初入之室未見棺柩意其在重室内也又得數器而出乃掩之後考圗經云呉孫破虜堅之墓也然考之吴志堅薨𦵏曲阿未詳此果何人也宋次道春明録退朝録云王侍郎子融言天聖中歸其鄉里青州時滕給事渉為守盛冬濃霜屋瓦皆成百花之狀以紙摹之其家尚餘數幅政和丙申嵗先君為真州教官時朝廷頒雅樂下方州儀真學中建大學庫屋積新瓦於地一夕霜後皆成花紋極有竒巧者折枝桃梨牡丹海棠寒蘆水藻種種可玩如善畫者所作詹度安世為太守諷學中圗繪以瑞為言欲諛於朝先君不從乃已俞紫芝秀老荆公客也能詩公極善之嘗有詠草一篇云滿目芊芊野渡頭不知若個解忘憂細随緑水侵離舘逺帶斜陽過别洲金谷園中荒映月石頭城下碧連秋行人悵望王孫去買斷金釵十二愁為人所稱賞世畫骨觀作美人而頭顱白骨者僧德操題其上云白骨纎纎巧畫眉髑髏楚楚被羅衣手持紈扇空相對笑殺傍觀自不知元祐以後宗室以詞章知名者如士暕士字叔益令時䶵之皆有篇釋聞於時然近屬環衛中能翰墨尤多如嗣濮王仲御喜作長短句嘗見十許篇於王之孫闕二字皆可儷作者不能盡載如上元扈蹕作瑶臺第一層云嶰管聲催人報道嫦娥步月來鳳燈鸞炬寒輕簾箔光泛樓臺萬里正春未老更旁郷日月蓬萊從仙仗㸔星河銀界錦繡天街歡陪千官萬騎九霄人在五雲堆赭袍光裏星毬宛轉花影徘徊未央宮漏永散異香龍闕崔嵬翠輿囘奏仙韶歌吹寶殿樽罍毎使人歌此曲則太平熙熙之象恍然在夢寐間也楊緯字文叔濟州任城人以明經中第累任州縣皆有能稱後為廣州觀察推官元祐二年正月以疾卒於官道逺䘮未還郷其姪珣一日晡時恍然如􅋨夢中見其叔騎從甚都來其家珣亟拜之既坐言語如平時珣問叔今代滿耶曰我今為忠孝節義司判官矣所主人間忠臣孝子義夫節婦事也其職甚髙而閑逸故來别汝也人但見珣若與人言語時且拜也至夜珣乃省乆而方言曰適廣州叔來其言如是衆方悲駭知緯死矣珣曰叔臨去有紫衣吏曰府君好范山下石臺可即臺立祠以祀之後呼工為像一塑遂肖其容狀州縣以緯别無功績不敢聞於朝而鄉人嵗時但即其墓而祭之宋宣獻公綬宮梅詩云閬苑春多非世境層城花早出宮欄用梁簡文帝梅花賦曰層城之宮靈苑之中梅花特早偏能識春之語也山谷在荆州時鄰居一女子閑静妍美綽有態度年方筓也山谷殊歎惜之其家葢閭閻細民也未幾嫁同里而夫亦庸俗貧下非其偶也山谷因和荆南太守馬瑊中玉水仙花詩有云淤泥解作白蓮藕糞壤能開黃玉花可惜國香天不管随縁流落小民家葢有感而作後數年此女生二子其夫鬻於郡人田氏家憔悴頓挫無復故態然猶有餘妍乃以國香名之濟州士人鄧御夫字從義隠居不仕嘗作農歴一百二十卷言耕織芻牧種蒔耘穫養生備荒之事較之齊民要術尤為詳備濟守王子韶嘗上其書於朝今未見傳於世嘗訪於藏書之家或有見者王禹偁元之乆為從官而未嘗知舉有詩云三入承明不知舉㸔人門下放門生王岐公珪在翰苑凡十七八年三為主文常在試闈戱書考簿後云黃州才藻舊詞臣幾歎門生未有人自笑晚遊金馬客曽來三鏁貢闈春龍眠李亮工家藏周昉畫羙人琹阮圗殊有宮禁富貴氣旁有竹馬小兒欲折檻前栁者亮工官長沙時黄魯直謫宜州過而見之歎愛彌日大書一詩於黄素上云周昉富貴女衣飾新舊兼髻重髪根急薄粧無意添琹阮相與娱聴絃不停手敷腴竹馬郎跨馬要折栁其畫後歸禁中而詩不見於集也江彦章四六之工自少年即妙崇寧三年霍端友榜瓊林苑宴謝頒氷彦章作謝表有云使𠻳潤而吮清得除煩而滌穢順時致養俯同豳雅之春開受命知榮固異衛人之夕飲又云深防履薄之危不昧至堅之漸子孫傳誦記御林金盌之香生死不忘動宮井玉壺之潔韓子蒼與曾公衮吴思道戯作冷語子蒼云石崖蔽天雪塞空萬􅌇隂壑號悲風纎纊不御當𤣥冬霜寒墜落氷谿中斵氷直侵河伯宮未若冷語清心胷公衮云萬山雲雪隂霾空千林霿􅟶水揺風凍河徹底連三冬嘉平曉獵崤函中十二律呂相與宮安得此候䟽煩胷思道云闕十八字思如冬露下紫微花影中長哦白雪明光宮衆泉湧此萬卷胷此格起於晉人之危語也湯泉有處甚多大熱而氣烈乃硫黄湯也唯利州褒禪山相近地名平痾鎮湯泉溫溫可探而不作火氣云是朱砂湯也人傳昔有兩美人來浴既去異香郁郁累日不散李端叔過浴池上作詩云華清賜浴記當年偶託荒山結勝縁未必興衰異今昔曾經天女卸金鈿晁説之以道作感事詩云干戈難作墻東客疾病猶存硯北身用避世墻東王君公事而硯北身乃漢上題襟集段成式書云杯宴之餘常居硯北又云長䟽硯北天機素少又云筆下詞文硯北諸生葢言几案面南人坐硯之北也予少年在湘陽曽絃伯容云唐人能造竒語者無若劉夢得作連州㕔壁記云環峰宻林激清儲隂海風敺溫交戰不勝觸石轉柯化為深凉颸城壓岡踞髙負陽土伯嘘濕抵堅而散襲山逼谷化為鮮雲葢前人未道者不獨此爾其他刻峭清麗者不可概舉學為文者不可不成誦也墨莊漫録卷十
