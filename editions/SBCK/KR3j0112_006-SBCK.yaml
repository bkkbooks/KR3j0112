body:
  text: 墨荘漫録卷第六本朝䏻書世推蔡君謨然得古人玄妙者當還米元章米亦自􅀒如此嘗有論書一篇及雜書十篇皆中翰墨之病用雞林􅁓書贈張大亨嘉甫盖米老得意書也今附於此論書云歴􅀚前賢論書徵引迂逺比况竒巧如龍跳天門虎卧鳳閣是何等語或遣辭求工去法愈逺無益學者故吾所論要在入人不為隘辭吾書小字行書有如大字惟家藏真跡䟦尾間或為之不以與求書者心旣貯之随意落筆皆得自然備其古雅世或未能立家人謂吾書為集古字盖取諸家長䖏搃而成之旣老始自成家人見之不知以何為祖也江南吴􅣰登州王子詔大􅀠提榜有古意吾小兒友仁大􅀠題榜與之等又㓜兒友知代吾名書碑及手書大字更無辨門許侍郎􅀹爱其小楷云每示簡可使令嗣書之謂友知也老杜作薛稷惠普寺詩云欝欝三大字蛟龍岌相􅆞今有石本得而視之乃視勾勒􅀵筆􅄡書之如蒸餅普字如人握两手伸臂而立醜恠難状以是論之古無真大字明矣􅁑洪天台之􅀚飛白為大字之魁今第一歐陽詢道林之寺寒儉無精神桞公􅁠􅀦清寺大小不相稱費盡筋骨裴休率意冩碑乃有真趣不䧟醜恠真字甚昜惟有體􅀔難謂不如畫筭匀而􅀔活也字之八面惟向真楷見之大小各自有分智勇有八面已少鍾法丁道護毆虞始匀古法亡矣桞公􅁠師歐不及逺甚而為醜恠惡札之祖自桞始世有俗書唐官告在世為禇陸徐嶠之體殊有不俗者開元以来縁明皇字體肥俗始有徐浩以合時君所好􅀴生亦自此肥開元以前古氣無復有矣唐人以徐浩比王僧䖍甚失當以浩大小一倫是猶吏楷也僧䖍䔥子雲傳鍾法與子敬無異大小各有分不一倫徐浩為顔真卿辟客書匀自張顛血脉来教顔大字促令小小字展令大非古也石刻不可學但自書使人刻之已非已書也故必湏真蹟􅀚之乃得趣如顔真卿每使家僮刻字故會主人意修改波撇致大失真惟吉州廬山題名題訖而去後人刻之故皆得其真無做作凢俗差佳乃知顔出於禇也又真跡皆無􅅙頭燕尾之筆與郭知運争座位帖有􅂐籕氣顔傑思也桞出歐為醜恠惡札之祖自此世人始有為俗書盖縁時君所好其弟公綽乃不俗於其兄筋骨之說出於桞世人但以怒張為筋骨不知不怒張自有筋骨凢大字要如小字小字要如大字唯禇遂良小字如大字其後􅀴生祖􅄒間有造妙者大字如小字未之見也世人多冩大字時用力捉筆字愈無筋骨神氣作圓筆如蒸餅大可鄙􅀏要湏如小字􅄡􅀔備全都無刻意故作乃佳自古及今余不敏實得之榜字固已满世自有識者知之石曼卿佛號都無囬互轉摺之􅀔小字展令大大字促令小是張㒹敎顔真卿謬論盖字有大小相稱且如冩太一之殿作四窠分豈可将一字肥滿一窠以對殿字乎盖自有相􅁛大小不當展促也予嘗書天慶之􅀚天之二字皆四筆慶􅀚多在下各随其相􅁛之掛起氣自帶過皆如大小一般真有飛動之􅀔也書至􅀠大􅂐古法大壊矣􅂐籕各随字形大小故百物之状活動圓俻各各自足􅀠乃始有展促之􅀔而三代法亡矣其雜書十篇云歐虞禇桞顔皆一筆書也安排費工豈䏻垂世李邕脫子敬體乏纎濃徐浩晚年用力過更無氣骨不如作郎官時婺州碑也董孝子不空皆晚年惡札全無妍媚此自有識者知之沈傳師變格自有超世真􅁤徐不及也御史䔥誠書大原題名唐人無出其右為司馬係南嶽真君􅀚碑極有鍾王􅁤轍餘皆不及矣智永臨集書千文秀􅃳圓劲八面具備有真跡自顛沛字起在唐林夫䖏他人􅀵不及也半山荘䑓上故多文公書今不知存否文公學楊凝式書人尠知之予語其故公大賞其見鍳金陵幙山楼􅀠榜乃􅀜蔚宗二十年前書想六朝宫殿榜皆如是智永硯心成臼乃䏻到右軍􅀂穿透始到鍾索也可不勉之一曰不書便覺思澁想古人未嘗片時廢書也因思蘇之才桓公至洛帖字字用意殊有功為天下法書第一古所謂一筆書者謂意相鈎連非復便一筆至到底也􅀂旋安排即􅃜活􅀔耳字要骨格肉湏裹筋筋藏肉貼乃秀潤生布置穏不俗險不恠老不枯潤不肥變態真形不貴苦苦生怒怒生恠貴形不貴作作入畫畫入俗皆字病也魯顔公行字可敎真便入俗品萬等古人書不如此學吾家多小児作草字大叚有意思少成若天性習慣如自然兹古語也吾夣古衣冠人授以摺􅁓書法自此差進冩與他人􅁍不暁蔡元度見而驚曰法何太􅃍異耶此公亦具眼人章子厚以真自名獨稱吾行草􅁒吾書如排筭􅏧然其字湏有體製乃佳耳薛稷書慧普字老杜以謂蛟龍岌相纒今見其本乃如童兒擡蒸餅􅀔信老杜不䏻書也學書湏得趣他好俱忘乃入妙别為一好縈之便不工海嶽以書學士召對上問本朝以書名世者凡􅂾人海嶽各以其人對曰蔡京不得筆蔡卞得筆而乏􅇣韻蔡㐮勒字沈遼排字廣廷堅描字蘇軾􅀞字上復問卿書何如對曰臣書刷字曰黄廷堅抺字蘇軾刷字上復問曰卿書何如對曰臣書畵字􅀚蘇黄米蔡之書果如其說恐此記者有謬予嘗謂米公人物英邁鍳裁精髙翰墨塲中當推獨歩平生所書遍於天下石刻中如青州南洋石橋記鄼縣京􅀚記無為軍天王記漣水軍􅂾碑皆逺追鍾王寧獨今人所難唐人亦鮮及也蔡天啓為公墓誌銘舉止頡頏不䏻與世俯仰故仕􅂾困躓冠服用唐人規制所至人聚􅀚之姓好潔置水其傍􅂾頮而不帨未嘗與人同噐視其眉宇軒然進趋䄡如音吐鴻暢雖不識者亦知其為米元章也云云此迨實録云松陵唱和皮日休新秋即事云酒坊吏到常先見鶴俸符来每探枝注云吴郡有鶴料案殊未詳鶴料之􅀃曽旼彦和􅀶學之士也知滁州有次韻趙仲美表弟西齋自遣詩云謫守凄凉臥郡齋夫君失意偶同来海邉故􅀦渺何許城上新楼空幾逥寧羡一嚢供鶴料會看千里躍龍煤清吟未免萦機慮只􅂲飛鷗便見猜注云唐幕府官俸謂之鶴料今􅀊敕頭所得止此仲美省試下故云彦和用事必有所㩀當更考之又宋宣獻有送黄祕丞倅蘇䑓云鶴料署文移鮆塲􅀵賦筭此宣獻用皮日休所云吴郡事也蔡仍子因之妻九院王家女也忽患瘵疾沈綿􅂾年旣死已就小歛時上皇宫中聞之曰惜其不早以䧟氷丹賜之今雖已死試令救之因命中使馳賜一粒時氣息已絶乃強􅈅之須􅁷遂活􅂾日後向安但齒皆焦落後十五年方死宋景文公詩云蠏美持螯日魴甘抑鮓天用楊淵五湖賦云連瓶抑鮓蔡丞相􅃀持正嘗有治命遺訓云吾沒之後歛以平日閑居之服棺但足以周衣衾作壙不得過楚公塟特制棺前設一坐陳瓦噐以衣衾巾􅂂􅂾事及筆硯置右左自􅀄歛至於祖載㐮塟悉從簡質􅁛吾平生母煩公家母干恩典母受􅉠遺母求人作埋名神道碑二䖏但刻石云宋清源蔡某墓而紀塟之􅀊月於其旁可矣夫逹人君子安於性命之際而不􅁨窮乎死生之變而不惑超然自得與道消息生以形骸為寓死奚丘隴之念哉吾雖鄙薄亦粗聞大道之方矣􅁒効楊王孫與沐徳信則必傷汝曹之意又干矯俗之􅁛故命送終為制将使子孫近者視吾藏足以無憾逺者尚及見吾墓道之石足以伸敬如是而􅢍芳曹其遵吾言慎勿昜也其字畫清劲如女朝人書其言可法也又有雜書一篇云楚公少年時讀書於石梯山精舎布衣􅂼食志趣超然其仕雖不逹以清名直氣聞士大夫間陳恭公孫威敏公皆嗟嘆公所為每為公屈頴川陳氏公慙卿卿慚長以徳不以位也在建陽八年去日不賫一串茶邑人思公至今不衰致仕居貧以席蔽户誦詠猶不惓其清白淳亮甘貧樂道汝曹䏻使人謂真楚公之子孫則善矣楚公名黄裳故任太子右賛善大夫致仕忠懐公之父也文潞公為相日赴祕書有曝書宴令堂吏視閣下芸草乃公徃守蜀日以此草􅀉植舘中也因問芸辟蠹出何書一坐黙然蘇子容對以魚豢典畧公喜甚即借以歸王師取青唐時大軍始集下寨治作壕塹鑿土遇一壙得一琉璃瓶莹澈如新瓶中有大髑髅其長盈尺瓶口僅数寸許不知從何而入主帥命復􅄟之斯亦異矣近世墨工多名手自潘谷陳瞻張谷名振之曕之後又有常山張順九華朱覲嘉禾沈珪金華潘衡之徒皆不愧舊人宣政間如閞珪􅀜瑱梅鼎張滋田守元曽知㣲亦有佳者唐州桐栢山張浩制作精緻膠法甚竒舅氏吴順啚每歳造至百斤遂壓京都之作矣前者􅂾工所制好墨者徃徃韜藏至今存者尚多予舊有此癖􅀵古今􅂾百笏種種有之渡江時為人疑篋之重以為金玉􅀼取之殊可惜也今尚餘一巨挺極重厚印曰河東觧子城又一圭印曰韓偉昇膠力皆不乏精采與新製敵可與李氏父子甲乙也士大夫留意詞翰者徃徃多喜􅀵蓄唯李格非文叔獨不喜之嘗著破墨癖說云客有出墨一凾其製為壁為丸為手握凢十餘種一一以錦嚢之詫日昔李廷珪為江南李􅀦主父子作墨絶世後二十年乃有李承宴又二十年有張遇自是墨無継者矣自吾大父始得两丸於徐常侍鉉其後吾父為天子作文章書碑銘法當賜黄金或天子寵異則以此昜之余於是以两手當心捧硯惟謹不敢議旣􅀻恠予用薛安潘谷墨三十餘年皆如吾意不覺少有不足不知所謂廷珪墨者用之當何如也他日客又出墨余又請其說甚辯余曰嘘余可以不愛墨矣且子之言曰吾墨堅可以割然余割當以刀不以墨也曰吾墨可以置水中两􅀫不腐然吾貯水當以盆罃不用墨也客復曰余說未盡凢世之墨不過二十年膠敗輙不可用今吾墨皆百餘年不敗余曰此􅀹不足貴余墨當用二三年者何苦用百年墨哉客辭窮曰吾墨淂色多凢用墨一圭他墨两圭不迨余曰余用墨每一二歳不䏻盡一圭徃徃失去乃昜墨何嘗苦少墨也唯是刷碑印文書人乃常常少墨耳客心􅁒取勝曰吾墨黒余曰天下固未有白墨雖然使其誠過他墨猶足尚乃使取研屏人雜錯以他墨書之使客自辦客亦不䏻辨也因恚曰天下竒物要當自有識者余曰此正吾之所以難也夫碔砆之所以不可為玉魚目之所以不可為珠者以其用之不異也今墨之用在書苟有用於書與凢墨無異則亦凡墨而已焉烏在所寳哉嗟乎非徒墨也世之人不考其日用而昡于虚名者多矣此天下寒弱禍敗之所由召也吾安可以不辨于墨文叔詞翰之好乃不喜于墨此不可暁故併載之近時士大夫學佛者不行佛之心而行佛之迹者皆是也日談慈悲而行􅀂􅉕蠆乃望無上菩提吾未之信梁武帝之奉佛可謂䔍矣至捨身為寺奴宗廟供麺牲乃築浮山愝灌壽春􅁒取中原一夕而殺􅂾萬人其心豈佛心哉􅀭州吕􅁻甫觀文宅乃晋鎮西将軍謝仁祖宅也在唐為法雲寺有􅀟檜存焉猶當時物也劉禹稷有詩云􅀟檜蒼然古貌竒含煙壮霧欎參差晚依禅客當金殿初對将軍看􅀞旗龍􅁚界中成寳盖鴛鴦瓦上出髙枝長明燈是前熖曽照青青年少時􅁻甫家居時檜尚依然李之儀端叔用夣得詩韻云故迹悲凉古木竒􅀔分庭下蔚相差霜根半露出林虎􅀞影全舒破賊旗寳界曽囬鋪地色節旄逺映挿雲枝劉􅀰風韻知誰敵儒帥端䏻表異時建炎兵火􅀣遂亡矣予後到郷里訪其遺迹不可得矣李端叔云樂毅論髙紳爲湖北轉運使道中聞砧聲清逺因視之乃樂毅論石刻覆於下也而已断裂矣遂載歸完理緝綴續以木箱所可辨者如此故世之傳布皆止于海字則其碎而不可緝者良可惜也端叔之說如是予又嘗見一本在張申公家聞今尚存是唐人臨夲不知即髙紳所得者否或别本也白樂天作長恨歌元㣲之作連昌宫詞皆紀明皇時事也予以謂㣲之之作過樂天白之歌止於荒􅁋之語終篇無所規正元之詞乃㣲而顯其荒縱之意皆可考卒章乃不忘箴諷為􅄖也其詞有云上皇正在望仙楼太真同憑欄干立楼上楼前盡珠翠炫轉荧煌照天地又云初過寒食一百六店舎無煙村樹緑夜半月髙絃索鳴賀老琵琶定塲屋力士傳呼覔念奴念奴潜伴諸􅀰􅀫湏􅁷覔得又連催特敕街中許燃燭又云飛上九天歌一聲二十五􅀰吹􅃹逐逡廵大徧梁州徹色色􅀛兹轟録續李謩擪笛傍宫墻偷得新翻数般曲又云平明大駕發行宫萬人歌舞􅂗路中百官隊仗避岐薛楊氏諸姨車闘風明年十月東都破御路猶存禄山過云云禄山以天寶十四載反于漁陽䧟東京則幸連山時乃十三載也廵幸而諸弟諸姨悉扈從百司供頓亦擾矣念奴名妓也帝歳幸華清時廵東洛有司潜遣随行以俻宣喚而每為諸王所邀致方寒食火大禁而中夜宫中張樂不已聲聞于外遣中官傳呼追覔念奴特呼燃燭于御街呼呌於静夜皆不可以訓旣終夕喧樂􅀺明六飛又復西去王者順動當如是乎此詩深議其荒􅁋無度也是歳帝年七十一而太真年三十六矣然考之本紀十三載乃無幸洛之事豈史􅇣耶㣲之去天寳不逺必不鑿空而云也李謩擪笛字玉篇云擪烏恊切指按也於笛而云擪此一字之妙也世俗以阿阿則則為嘆息之聲李端叔云楚令尹子西将死家老請立子玉為之後子玉直視則則於是遂定昭莫恤過宋人有饋彘肩者昭奚恤阿阿以謝尔後阿阿則則更為嘆息聲嘗疑其自得於此李文叔嘗有雜書論左馬班范韓之才云司馬遷之視左丘明如麗倡􅃛婦長歌緩舞問以諧􅀏傾盖立至亦可喜矣然而不如絶代之女方且却鈆黛紵施帷幄裴􅆦㣲吟於髙堂之上使􅁋夫冗􅂩而見之雖失氣疾歸不食以死而終不敢意其一啓齒而􅀏也班固之視馬遷如韓魏之壮馬短鬛大腹服千鈞之重以䇿随之日夜不休則亦無所不至矣而曽不如騕􅒁之馬方且脫􅋮􅇣駕驕嘶顧影俄而縱轡一騁千里即至也范曄之視班固如勤師劳政手胝簿版口倦呼叱毛舉縷誥自以為工不可復加而僅足為治曽不如威徤之吏不動聲色提一二綱目群吏為之趨走而境内晏然也韓愈之視班固如千室之邑百家之聚有儒生崛起於􅅾蓽之下詩書傳記鏘鏘常􅁒鳴于齒頰間忽遇夫奕世公卿不學無術之子弟乗髙車從虎士而至雖顧其左右偃蹇侮􅀏無少敬其主之容雖鄙惡而體已下之矣又文叔又嘗雜書論文章之横云余嘗與宋遐叔言孟子之言道如項羽之用兵直行曲施逆見錯出皆當大敗而舉世莫䏻當者何其横也左丘明之于辭令亦甚横自漢後千年唯韓退之之于文李太白之于詩亦皆横者近得眉山篔簹谷記􅀴藏記又今世横文章也夫其撗乃其事得而絶俗雜畦徑間者故衆人不得不疑則人之行道文章恐人不疑耳七言絶句唐人之作徃徃皆妙頃時王荆公多喜為之極為清婉無以加焉近人亦多佳句其可喜者不可槩舉予每愛俞紫芝秀老􅀊杪山中云石亂雲深客到稀鶴和殘雪在髙枝小軒日午貪濃睡門外春風過不知舒亶信道村居云水遶陂田竹遶籬榆錢落盡槿花稀夕陽牛背無人卧帶得寒鴉两两歸崔鶠徳符秋日即事云秋草門前巴没鞾更無人過野人家羅羅踈竹時聞雨淡淡􅁿煙不隔花又黄州道中云莫愁㣲雨落􅁿雲十里長亭未墊巾流水小橋山下路馬頭無䖏不逄春劉次荘中叟桃花云桃花雨過碎紅飛半逐溪流半染泥何䖏飛来􅀟燕子一時啣在杏梁西僧如壁徳操偶成云松下柴門晝不開只有蝴蝶􅀟飛來宻􅉕两髀大如蠒􅀿是山前花又開吴可思道病酒云無􅂓病酒對殘春簾幙重重又掩門細雨斜風花落盡小楼人下􅁒黄昏又春霽云南􅀦春光一半歸杏花零落淡燕脂新晴院宇寒猶在暁絮欺風不肯飛趙士掞才儒登天清閣云夕陽低盡已西紅百尺楼䑓萬里風白髮年年何䖏得只􅀿多在􅀝欄中李怤去言春晚云花痩煙羸可柰何不􅀜渠事鳥聲和無人掃地驚風在分付􅁿紅上碧紗趙䶵之子雍春日云拂牀欹枕晝初長好夣驚囬燕語忙深竹有花人不見直􅀿風轉得幽香曽紆公衮江樾軒書事云卧聴灘聲㶁㶁流冷風凄雨似深秋江邉石上烏桕樹一夜水長到稍頭胡直孺少汲春日云風園吹絮桞飛花睡起鈞簾日正斜四海随人􅀟燕子相逄䖏䖏作生涯曾繹仲成還家途中云踈林殘嶺起昏鴉臘盡行人喜近家江北江南春信早傍籬穿竹見梅花劉無極希顔漾花池詩云一池春水緑如苔水上妍紅取次開閑􅀝東風看魚樂動摇花片却驚猜王銍性之山村云住依溪口破殘村身伴渡頭零落雲更向空山拾黄葉姓名那有世人聞陳與義去非秋夜云中庭淡月照三更白露洗空和漢明莫遣西風吹葉落只愁無䖏着秋聲如此之􅀋甚多不愧前人也東坡作梅花詞云髙情已逐暁雲空不與梨花同夣注云唐王建有夣看梨花雲詩予求王建詩世所行印本雕一卷乃無此篇後得之於宴元獻􅀋要中後又得建全集七卷乃得全篇題云夣好梨花歌薄薄落落霧不分夣中喚作梨花雲瑶池水光􅅾萊雪青葉白花相次發不從地上生枝柯合在天頭遶宫闕天風㣲㣲吹不破白􅃩􅁍愁春涴露玉房綵女齊看來錯認仙山鶴飛過落英㪚粉飄滿空梨花顔色同不同眼穿臂短取不得取得亦如從夣中無人為我觧此夣梨花一曲心珍重或誤傳為王昌齡非也􅄟鶴銘在潤州楊子江焦山之足石岩下惟冬序水退始可模打世傳以為王􅇣少書然其語不􅀋晉人是可疑也歐陽永叔以為華陽真􅇣乃顧况之道號或是况所作然亦未敢以為然也予嘗以窮冬至山中􅀚銘之側近復有唐王瓉刻詩一篇字畫差小於鶴銘而筆􅀔八法乃與鶴銘極相􅀋意其是瓉所書也因模一本以歸以示知書者亦以為然其題云冬日與群公泛舟此山隈江水􅀄不凍今年寒復遲衆芳且未歇近臘仍裌衣載酒適我情興來趣漸㣲方舟大川上環酌對落暉两片青石稜波際無因依三山安可到􅁒到風引歸滄溟壮􅀚多心目豁暫時况得窮日夕乗桴何所之謫丹陽功曹􅁺王瓉今此刻亦漸漫漶尚可讀也他時好事者當試求之以騐予言之或是也􅀿劭漢官儀曰周澤為太常齋有疾其妻憐其年老闚内問之澤大怒以為干齋遂􅀵送詔獄自劾論者譏其詭激時諺云生世不諧為太常妻一歳三百六十日三百五十九日齋一日不齋醉如泥予􅀚禆官小􅀃乃得其說云南海有蟲無骨名曰泥在水則活在失水則醉如一堆泥然後又讀五􅀦故事云偽閩王王延慶為長夜之飲因醉屡殺大臣以銀葉作杯柔弱為冬􅀲片名曰醉如泥酒旣盈不可覆盃惟盡乃已盖取此義也韓維持􅀦詩格甚竒如􅀉范徳孺云睥睨風髙逥過鴈琵琶宵寂語流鶯和兄康公罷相云移病早休丞相筆坐談猶著侍臣冠和曽存之云自愧効陶無好語敢煩凌杜發新章皆佳句也恨世少傳者曽誠存之元符間任館職嘗與同舎諸公飲王詵都尉家有侍兒軰試香求詩求字者以煙濃近侍香為韻存之得濃字賦詩云俛仰佳人看墨蹤和研新炷寳薫濃詩情過筆當千里妙思凝香􅁒萬重盎洩雲傾白酒越羅霑露浥黄封從來粉黛冝燈燭妙手憑誰冩醉容又有七夕王都尉邀同舎置酒聴琵琶詩云寳鑑凌雲結綺髙小奩争巧暮分曹春葱細撚龍香撥秀􅖪偏明邏逤槽牛厩冩形成粔籹馬軍馳酒送蒲萄涙珠㪚作人問露最覺更䦨􅃳錦絛道山學士尚與貴戚附車過從宴飲真太平盛事也其後禁之詵元豊中坐與子瞻交結嘗􅇡均州矣後復與諸名士游盖風流好事不忘于情寧􅀗譴戾是可尚也故事西京每􅀊貢牡丹花例以一百枝及南庫酒賜館職韓子蒼去􅀦後嘗有詩云憶将南庫官供酒共賞西京敕賜花白髮思春醒復醉豈知流落在天涯衢州􅈦事下舊有土􅀔􅂭起篠木叢生相傳云古冢也􅁬有碑其文云五百年刺史為吾守墓以前後相承皆畏而不敢慢紹聖元年齊安孫賁公素為守問之左右以是對公命毁去之官吏大恐闔府叩頭以諌公曰藉令土中有賢者骨當以禮法遷之乃為文自􅀕而除之􅓯深丈餘了無他異但有二石􅄘長五六尺堅瘦紺潤又有大木之根蟠蜛其下群疑遂定石上有刻云乾符五年五月三日安於此押衙徐諷龍山起砦䖏得二石刺史季題又刻云開寳七年重疊娥媚山於􅆹事前於郡齋文會閣移季公之石安置于此刺史慎知禮題時公素方修州治南韶光園重建清冷堂堂成乃移二石於堂下名曰􅀟石嗟乎慎公移石去季公之得石凢九十七年公素之破疑冢出石去慎公又一百二十一年物之􅂋晦抑自有􅂾第不知娥媚之廢乃冐冢之名自何時也公素一旦戯􅀏爲之遂釋千百年之惑張芸叟有詩云芝蘭雖好忌當門何况庭前惡土墩畚􅓩􅅻興􅀟劔出狐狸盡去老松蹲百年守􅊘真堪􅀏一日開軒亦可尊安得擲從天外去成都石笋至今存公素可謂剛毅正直自信之君子也墨荘漫録卷第六俞子容家藏書晉昌唐寅校畢
