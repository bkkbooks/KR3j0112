body:
  text: 墨荘漫録卷第二蔡絛約之西清詩話云人之好惡固自不同杜子羙在蜀作悶詩乃云捲簾惟白水􅀮几亦青山􅀂使予居此􅀿從王逸少語吾當卒以樂死豈復更有悶乎予以謂此時約之未契此語耳人方􅁨愁亡􅂓雖清歌妙舞满前無適而非悶子美居西川一飯未嘗忘君其􅁨在王室而又生理不具與死為隣其悶甚矣故對青山青山悶對白水白水悶平時可愛樂之物皆寓之為悶也約之䖏冨貴所欠二物耳其後竄斥􅀴歴﨑嶇險阻必悮此詩之為工也東坡贈黄照道人詩云面臉照人元自赤眉毛覆眼見来烏王立之詩話云元自見来皆俚語也杜子美詩云鏁石藤梢元自落􅀝天松骨見來枯坡句法此而為之俚語立之未之思耳建炎改元冬予閑居􅀭州里廬因閱太平廣記每過予兄子章家夜集談記中異事以供􅀏語時子章舘客天長觧飬直剛中因言頃聞一異事云元符末年渭州潘原縣民方耕田有民自地間湧出耕者見之驚怛棄犁而走則斥逐擊之不得走執耕者及縣縣吏遇之輙毆縣吏吏皆㪚走見縣令馬敦古又毆令令亦走俄而赴於庭奄然一土偶人也視之則歳所嘗奉土牛傍所謂勾芒神者於是共舁出之未幾復有至者亦事皆同日十􅂾至不䏻禦官吏皇恐令不敢復視事居􅀂干日有物人􅀋􅅾首黒而痤肥降令舎莫知所從耒令罔測乃曰爾無庸恐吾也我為爾食盡芒児矣爾恭事我乃汛洒􅈦事之東室居之凢十餘人其長者自稱天神其次曰王褒李貴其餘有姓名有婦人二曰雲英月英日謹伺􅀱供億其飲食嘗闔自竇中出入有所湏召則其長者呼王褒李貴而令焉置吏門外為傳呼事之甚􅃊自是土恠不至民亦以其無他用止恠頗安焉令猶徳之乆之題􅀧刑獄程棠行縣問令所以室中􅃍呼曰王褒為我傳語提刑適贈詩不省已得乎置吏以告棠起立曰某適至此已晚不敢見也所賜詩者實未得吏去復至曰詩在提刑汗衫上􅃝視之果然乃不敢復語相與􅃍起先是渭州都廵檢侯㤙老矣其為人剛方不撓好面折人一州號為木強自聞見恠獨心常易之方棠廵按時恩如州界方奉迎從至縣恩以職事從在縣衙獨踞胡床坐􅈦事傍俄有物自東隅来階下两手扳堦基首與堦平徐過恩坐恩徒手摶得之號掣不放觸其體若氷石有力䏻反曵人恩素有力一手捽其領捩左手著胡牀從之卒不放至所謂恠室者两足入户内引恩手戞户頰乆乃放之一縣大驚令猶恐失舉止徃來語曰都廵都廵敗我事矣棠亦愈惶恐徘􅆦夜中不聞有聲棠乃罷歸􅀫于縣驛明旦棠盛服至上謁令洒掃設香案以俟恩亦戎服待事謁入不出日髙稍稍摩户視之􅞔其無人室中凝塵尺餘亦不見有人跡令猶愕曰竟為都廵所誤禍至􅀂何恩曰某已為除害去之矣何禍為棠乃從令及恩共入視之壁間得細書一行云侯公正直予等謹退自後恠遂两絶侯公者開封人字澤之有子名傳為天長廵檢常為人言此曰某是時侍親渭上目所見也傳又曰今天長尉賈壇時亦待其父在焉觧生聞此事於廵撿後賈尉亦䏻言之又得程棠王褒李貴之姓名不疑尚有闕者皆㓜不記也異哉異哉杜子美秦州詩云馬驕珠汗落胡舞白題斜題或作蹄莫暁白題之語南史宋武帝時有西北逺邉有滑國遣使入貢莫知所出裴子野云漢頴隂侯白題将一人服䖍注曰白題胡名也又漢定逺侯擊虜入滑此其後乎人服其博識予嘗疑之盖白題胡名對珠汗似無意後見李長民元叔云在京師圍城中戎􅀐入城有胡人風吹氊笠墮地後􅀐告云落下白題其胡下馬拾之始悟白題乃胡人謂氊笠也子美所謂胡舞白題斜胡人多為旋舞笠之斜也似乎謂此也周昕大夫居鄧州父中㪚卒􅂾十年矣一夕昕妻夣中㪚如平生謂曰我且為羊今在某坊某氏屠肆五更即死當速見贖烏頭者即我也覺而語昕以為夣中語勿信斯湏復夣於昕時已四鼓亟遣㒒推門至屠家且問有烏頭羊否屠伯云適有一頭㒒曰幸勿殺周宅􅁒求為厭勝之用乃倍直牽歸視昕有喜色遂飬之每昕自外歸􅈳趨懐中得食乃已如是􅂾年羊乃死王定􅀦􅀉詩於東坡坡答書云新詩篇篇皆竒老拙此囬真不及矣窮人之具輙􅁒交割與公魏道輔見而􅀏曰定國亦難作交代祗是且權攝耳仁宗嘗問孝粛包公拯歴代編户多少之􅂾公悉考以對以謂三代雖盛其户莫得而詳前漢元始二年人户千二百二十三萬三千後漢光武兵革之後户四百二十七萬六百三十永壽三年増至一千六十七萬九百六十三􅀦䁀峙版籍歳减才百四十餘萬晋武帝平吴之後户二百四十五萬九千八百南北朝少者不盈百萬多者不過三倍隋文帝大業二年户八百九十萬七千五百三十六唐􅀄户不滿二百萬髙宗永徽元年増至三百八十萬明皇天寳十三載只及九百六萬九千一百五十四自安始之亂乾元已後僅满一百二萬武宗㑹昌中増至四百九十五萬五千一百五十一降及五代四方􅀼㩀大約各有􅂾十萬太祖建􅂭之初有户九十六萬七千三百五十三開寳九年漸加至三百九萬五百四户太宗至道二年増至四百五十一萬四千二百五十七眞宗天禧五年又増至八百六十七萬七千六百七十七陛下御宇以來天聖七年户一千一十六萬二千六百八十九慶暦二年増至一千三十萬七千六百四十八年又増至一千九十六萬四千四百三十四拯以謂自三代以降跨唐越漢未有􅀂今之盛者拯又言􅃖􅃖之生聚蕃息衰耗一出於時政之所􅀜陶化明主知其然也必薄賦歛寛力役救荒歉三者不失然後㓜有所飬老有所終此乃陛下日慎一日以致其盛遂與之休飬則可封之俗不秪二帝之盛矣宣和乙巳十二月四日夜讀公奏録節出嗚呼盛徳之語乃如此梓州織八丈濶幅絹獻宫禁前世織工所未䏻為也茄根并枝􅁀乾焼作􅁅為香煤甚竒䏻飬火延夕余嘗自製鼻􅀚香有一種蕭洒風度非閨幃間惱人破禈香味也其法用沉水香一两屑之取榠楂液漬之過一指三日泣其液降真香半两以建茶闘品二錢七作漿漬一日以濕竹􅁓五七重包之火煨少時丁香一錢新極鮮新者不見火玄參二錢鮮去塵埃宻煼令香真茅山黄連香一錢白檀香三錢麝半錢婆律一錢熖硝一字俱為細末濃煎皂角膠和作餅子宻噐􅀵之焼時極慢火題䟦最為難事惟東坡山谷每題必有佳思山谷徐熈􅀞菜云士大夫不可不知此味不可使斯民有此色唐來鵬有􅀚懴會美人詩云囬眸緑水波初起合掌白蓮花未開嘉祐中有王永年者取宗女求舉於竇卞楊繪得􅁥金耀門書庫永年嘗置酒延卞繪出其妻間坐妻以左右手掬酒以飲卞繪謂之白玉蓮花盞可謂善休物者也然意亦取鵬之詩云江南李後主嘗於黄羅扇上書詩以賜宫人慶奴云風情漸老見春羞到䖏消䰟感舊游多謝長條似相識強垂煙態拂人頭想見其風流也扇至今傳在貴人家洛中花工宣和中以藥壅培於白牡丹如玉千葉一百五玉楼春等根下次年花作淺碧色號歐家碧􅀊貢禁府價在姚黄上嘗賜近臣外廷所未識也都尉王詵為王定􅀦􅀞煙江疊嶂圖東坡作詩所謂江上愁心千疊山者定􅀦死其子由以􅀞貨與髙郵冨人茅生以献章獻或云禁中喻陟明仲睦州人持節􅂾政績藹著雅善㪚􅀠􅀹妙長笛每按行至山水佳䖏馬上臨風快作􅂾弄殊風流簫㪚也嘗有馬上吹笛詩云云􅀉張芸叟和􅀉云越客思歸黯不平閑持長笛冩秦聲羡君氣海如斯壮愽我詞􅄘孰敢争江上梅花開又落隴頭流水咽還驚豈知不􅄰鰥魚眼獨坐山堂對月明又手帖云舜民已三請外􅀂得西道一局􅂯託舊徳便冀掃榻更需洗水晶杯也水晶杯明仲珍惜物非佳客不出故芸叟戯云夀春村農暁耕於野每見青雀五枚翔集桑上毛羽紺翠天明即見心頗異之一日偶拈石擊之正中其一隕地視之乃青銅雀已折矣因於其下􅓯之不􅂾尺得銅香爐盖上一雀四足而闕其一矣後為方㑹給事家所得工製簡檏亦無他異魏㤗道輔自號臨漢􅀮居著東軒雜録續録訂誤詩話等書又有一書譏評巨公偉人闕失目曰碧雲騢取荘獻明粛太后垂廉時西域貢名馬頸有旋毛文如碧雲以是不得入御閑之意嫁其名曰都官貟外􅀰梅尭臣撰實非聖俞所著乃㤗作也㐮邑義塘村出一種􅀲大者如拳破之色如黛味甘如􅁡餘􅀲莫及頃歳貢之以其子蒔他䖏即變而稍大味亦减矣康節邵先生尭夫在洛中嘗與司馬温公論易􅂾推園中牡丹云某日某時當毀是日温公命数客以􅀚日向午花方穠盛客頗疑之斯湏两馬相踶絶衘断轡自外突入馳驟欄上花果壊焉嘗言天下可傳此者司馬君實章子厚耳而君實不肯學子厚不可學也臨終焚其書不傳秪以皇極經世行於世唐曁潜亨質粛公猶子余母之舅也早退􅀮居㐮陽著春秋正典以周官定􅆇否鄒完為序娶陳氏蜀人令徳純茂􅀹工文章大􅀚中先君為郡學官代還以詩送别余母一云念别每驚魂流年多病身惟我延陵子情真意更親分携無淚盡望逺起愁新老眼将何暖音書不厭頻二云雪意亂江雲江梅漸放春㕍歸人去後愁與歳華新荣路君方振玄居我豈貧惟餘􅁨我念相憶莫沾巾宣和間宫中重異香廣南䔍耨龍涎亞悉金顔雪香􅄄香軟香之􅀋䔍耨有黒白二種黒者每貢􅂾十斤白者止一二斤以􅉚壺盛之香性熏漬破之可暁號瓠香白者價直八十千黒者三十千外廷得之以為珎異也又貢異物圓如龍眼實色􅀂緑葡萄號猫児眼睛䏻息火燃炭方熾􅄬之即㓕又云䏻觧蠱毒之藥前世所紀異物多矣未聞此種也荔枝皮不可焼其香引屍虫睡香花其香清婉在餘花上窠株少見大者㐮陽唐表舅家一株面濶一丈二三尺婆娑如盖下可坐胡牀趙岍西知㐮陽􅁒取之竟不與也兵火之後不復存焉豈歸閬苑耶李居仁大夫嘗言舒州山中深􅑐間附石生一株髙二三丈下可坐十客不可移也今浙中以丁香本接者芬芳極短不如天生者其香漚欝清烈也不十年即瘦悴就槁矣顧臨子敦為翰􅁐每言趙廣漢尹京有治聲使我為之不難當出其上子瞻戯曰君作尹湏改姓顧曰何姓曰姓茅喚作茅廣漢禹餘粮石形以多恠磈礧百出或正􅀋蝦䗫中空藏白粉去其粉可貯水作硯滴出鼎州祗闍山者多此􅀋他亦有之然不及也長老祖秀曇頴􅀃黄魯直謂荀中令喜焚香故名縮砂湯曰荀令湯朱雲喜直言切諌苦口逆耳故名三稜湯曰朱雲湯任夣臣任西川路提􅀧刑獄以㢘節稱卧病不起家四壁立二女賢甚趙清獻公守城都率僚属以俸􅂇之二女辭不受力拒之云豈敢以此汚先君之清徳趙倅成伯䔍意勉之遂納於公宇之東廡旣行以元物􅀂干榜於門壁付之守禦吏無毫髮所損二女㢘㓗如此文筆議論士夫所不逮也後􅂾年清獻皆以子姪妻之蘇頌子容丞相慱學無所不通熈寧十年爲大遼生辰國信使在虜中適遇冬至時本朝暦先北朝一日北朝暦後一日北人問公孰是公曰暦家筭術小異遲速不同謂如亥時節氣相交則猶是今夕􅀂踰􅂾刻則属子時爲明日矣暦家布筭容有遲速或先或後故有一日之異皆各從本朝之暦可也虜人深以為然遂各以其日為節慶賀使還奏之上喜曰朕思之此最難䖏卿之所對極中事理近時傳一書曰龍城録云栁子厚所作非也乃王銍性之偽為之其梅花􅀑事盖遷就東坡詩月黒林間逄縞􅃑及月落参横之句耳又作雲仙㪚録􅀹為恠誕殊誤後之學者又有李歜注杜甫詩及注東坡詩事皆王性之一手殊可駭􅀏有識者當自知之黄寔師是弟宰方叔坐上書譏訕事下御史時相􅁒寘極典中丞盧航彦濟乞降元書看詳時禁中已焚其書有㫖令宰執就䑓供析其言有云蔡京姦邪用之誤􅀦童貫閹官祗可洒埽宫庭不冝預廟謀宻筭刪去謗訕之語遂得寛貸時相猶忿􅁒寘决彦濟復争之迺流海島後􅂾年定武帥梁子美奏邉事有云某事乞依黄寔知本州日申明徽宗忽顧左右曰寔有弟而今在何䖏近臣奏先因上書得罪流海島即日内批與量移後遇赦放還便終於家張稚圭元老荆公客也為江東漕攝金陵府事􅃊酷鮮恕喜與方士游門下嘗􅂾客一日行郡圃老卒項繫念珠公曰汝誦􅀴乎卒曰􅂾息爾公異之呼至室内問其得所論飬生吐納内丹皆造精㣲又曰運使平生殊錯用心酷虐用刑非所以為子孫福延方士皆非有道之士此曹特覬公賄耳公曰汝䏻傳我乎卒曰正􅁒授公然湏今夜半潜至某室當以傳公初亦難之不得已許焉旣歸與魚軒劉議之劉曰不可公以􅃊毅人素苦之夜中獨出事有不測柰何太夫人㣲聞之潜鎻其􅆍室竟不得出􅀺明視事衙校報守圃卒是夜四更跌坐而化公大悵惋􅂾月感疾遂卒舒信道謫居四明幾二十年獨以詩爲樂嘗得句云春禽得意千般語澗草無名百種香自喜之旣而曰此聮可入箋注不可以示人遂改去不用之東坡先生知􅀭州一夕夣在山林間忽見一虎來噬公方驚怖有一紫􅂁黄冠以䄂障公叱虎使去明日有道士投謁曰昨夜不驚畏否公曰䑕子乃敢尔本􅁒杖汝脊吾豈不知子夜術也道士駭懼而退余友人相訪指案間荆公日録曰僕不喜閱此書余問其故客曰凢􅁛上曰某事如何則言曰予不然凢􅁛某事予則曰如何則言上曰極是此􅀹可􅀏也濠州州宇含桃閣下因􅓯土得一石匣始羙疑中藏金玉開之得巨編􅂾帙乃陳留鄭向所述五代開皇紀三十卷乾興元年向以尚書屯田貟外􅀰為郡守􅄟此書於閣下中有銘曰自朱矯命終紫游位二十四年一十三帝興亡行事魚貫珠綴􅄟藁於斯如地之利此書亦行於世山谷先生作蘇李􅀞枯木道士賦云懼夫子之獨立而矢來無向乃作女蘿施於木末婆娑成隂與世宴息而嘗以矢來無郷問人少有䏻說者後因􅀚韓非子有云矢來有郷郷方也有來從之方則積鐡以備一郷謂聚鉄於身以備一䖏即甲之不全者矢來無郷則鐡室以盡備之謂甲之不全者自首至足無不有鉄故曰鉄室備之則體無傷故彼以盡備之不傷此以盡之無姦也言君亦當盡備於臣皆所防疑則姦絶也山谷用事僻逺此􅀧化格也不知者豈知其工云王逄原作假山詩云鯨牙鯤鬛相磨捽巨靈戯撮天凹突舊山風老狂雲根重湖凍脫秋波骨我來謂恠非得真醉掲碧海瞰蛟窟不然禹鼎魑魅形神㒹􅀑脅相撑揬夏倪均父謂予言此詩竒險不蹈襲前人韓退之所謂惟陳言之是去者非筆力豪放不䏻為也范致虚謙叔與蔡元長相迕乆䖏間㪚宣和初自唐州方城召還提舉寳籙宫未幾執政時元長以五日一造朝居西第廼與謙叔釋憾一日觴於西園主禮勤渥元長作詩見意云一日趋朝四日閒荒園薄酒願交驩三􅈐崛起無平地二􅂀争流有激湍極目榛蕪惟野蔓忘情魚鳥自波瀾满􅂳載得圭璋重更掬珠璣洗眼看三􅈐二􅂀雖皆園中景盖有激而云時罷政未乆王黼靈素師成軰方盛也􅀭州蜀岡上大明寺平山堂前歐陽文公忠手植桞一株謂之歐公桞公詞所謂手種堂前楊桞別來幾度春風薛嗣昌作守相對亦種一株自傍曰薛公桞人莫不嗤之嗣昌旣去為人伐之不度徳有如此者漢宫香方鄭康成注沈水香二十四銖著石􅁡􅃨湯鬻銅銕軰皆並香以指嘗試䏻飲甲則已南海賈胡貴一種香木末如􅁡房銳澤正黄可㓕甲以寒水炭四焙之青木香十二之一可酌損之雞舌香以其子勿以其母青木香用二錢合擣爲糜沈水得鬻􅁡煙黄而氣欝􅄬初鬻􅁡中媒使相恱閟以黄堥􅁡隙塪不津地霾之火􅂯中許出之􅄬龍腦六銖麝損半一爐注如芡子薫欝欝畧聞百歩中人也今太官加􅁡鬻紅螺如射外家効之以殊勝此方魏㤗道輔強記面䟽以示洪炎玉父意其實古語其後於相國庭寺中買得古葉子書雜抄有此法改正十餘字又一貴人家見一編號古粧䑓記證数字甚妙予恐失之因附于此予在􅀭州一日獨游石塔寺訪一髙僧坐小室中僧於骨董袋中取香如芡許炷之覺香韻不凢與諸香異似道家嬰香而清烈過之僧􅀏曰此魏公香也韓魏公喜焚此香乃傳其法用黒角沉半两欝金香一錢一字麸炒丁香一分上等臘茶一分碾細分作两䖏麝香當門子一字右先􅀧一半茶澄取清汁研麝漬之次屑三物入之以餘茶和半盞許令衆香蒸過入磁噐有油者地窖窨一月荆公病革甚吴夫人令蔡元度詣茅山謁劉混康問状劉曰公之病不可爲已適見道士􅂾十人徃迎公前二人執幡旛面有字􅀂金書然左曰中亟法性右曰外習塵紛元度自言如此或者又云荆公臨薨頗有隂譴恠異之事與此不同未知孰是世傳吕公得道之士唐僖宗時進士䏻作詩傳者僅百首徃徃賣墨世間毗陵士人姓邵忘其名善談易衆請講於佛舎至小畜有墨者青巾布衣褰幃直入邵惡之捲卷而問曰何來曰賣墨耳適聞講易至小畜其􅀃非是邵驚􅃍揖之坐墨者脫屦置案上取墨一丸曰此墨價十千一坐皆􅀏墨者納􅋰取硯滌之試墨置日影中貯墨而出曰抵暮復來當知十千非貴也邵且􅀏且駭少頃視墨硯之所濡徹底爲黄金與日影相耀邵惋恨不已必吕公也廣陵牛氏家堂燕方育鶵而雌為猫所斃雄啁哳乆之飜然而逝少選一雌偕來共哺其子明日有雛墜地至晚群雛畢死取視之满吭皆卷耳實盖為雌所毒也嗟乎禽鳥嫉其前雛一至於此而終不悟悲夫晋昌唐寅子畏校畢墨荘漫録卷第二
