front:
  text: 墨荘漫録卷第四山谷作釣亭詩有云影落華亭千尺月夢通岐下六州王上句盖用華亭船子和尚詩云千尺􅁝綸直下垂一波􅅻動萬波随夜静水寒魚不食滿􅂳空載月明歸下句盖用文王夢吕望事然六州王事見毛詩漢廣云文王之道􅀍于南􅀦䟽云言南􅀦則一州也于時三分天下有其二故雍梁荆豫徐􅀭之人咸􅀍其德而從之云云山谷用事深逺其工如此可爲法也王禹玉丞相􅀉程公闢詩云舞急錦腰迎十八酒酣玉醆照東西樂府六么曲有花十八古有玉東西杯其對甚新也陳輔輔之丹陽人䏻詩荆公深愛之嘗訪建康楊驥德逄留詩壁間云北山松粉未飄花白下風􅁿麥脚斜身似舊時王謝燕一年一度到君家荆公見之􅀏謂徳逄曰輔之罵君作尋常百姓也東京城北有祅廟呼煙切祅神本出西域盖胡神也與大秦穆護同入中國俗以火神祠之京師人畏其威靈甚重之其廟祝姓史名世爽自云家世爲祝累代矣藏先世􅀘受之牒凡三有曰懐㤙者其牒唐咸通三年宣武節度使令狐給令狐者丞相綯也有曰温者周􅂋德三年端明殿學士􅁠知開封府王所給王乃朴也有曰貴者其牒亦周顯德五年樞宻使權知開封府王所給亦朴也自唐以来祅神巳祀於汴矣而其祝乃䏻世継其軄踰二百年斯亦異矣今池州郭西英濟王祠乃祀梁昭明太子也其祝周氏亦自唐開成年掌祠事至今其子孫今分為八家悉爲祝也噫世禄之家䏻箕裘其業奕世而相継者盖亦甚鮮曾二祝之不􅀂也鎮江府朱方門之東城上乃有祅神祠不知何人立也本朝玉輅乃隋朝所造唐顯德中嘗修之凡三到泰山故張芸叟郊祀慶成詩云大裘依古制玉輅自隋傳范忠宣公堯夫謫居永州以書􅀉人云此中羊􅔇無異北方每日閉門飡餺飥不知身之在逺也孫覿仲益尚書四六新清用事切當宣和中與家兄子章同為兵部郎未㡬子章出知無爲軍仲益継遷言官自南亦出知和州時淮南漕俞以無爲歳額上供米後時委知州取勘無爲當軄官吏仲益得檄漫不省也置而不問亦不移文巳而米亦辦子章德仲益以啓􅒜之仲益答之有云苞茅不入豈敢加問楚之師輔車相依自作全虞之計人頗稱賞以爲精切也許洛两都軒裳之盛士大夫之淵薮也黨論之興指爲許洛两黨崔鶠徳符陳恬叔陽皆戊戌生田晝承君李豸方叔皆己亥生並居頴昌陽翟時號戊巳四先生以爲許黨之魁也故諸公皆乆廢之杜甫有云星落黄姑渚秋辭白帝城之句􅀃者但見古詩云東飛伯劳西飛燕黄姑織女時相見意謂黄姑乃牽牛然不見正所出不暁黄姑之􅀃故揚億大年荷花詩云舒女清泉满黄姑别渚通劉筠子儀七夕詩云伯劳東翥燕西飛又報黄姑織女期大年和云天孫已度黄姑渚阿母還来漢帝家皆用此事予後讀緯書始見引張平子天􅁚賦云河鼓集軍以嘈雜􅓐張茂先李淳風等注云河鼓三星在牽牛星北主軍鼓盖天子三軍之􅁚昔傳牽牛織女見此星是也故爾雅河鼓謂之牽牛又古詩云東飛伯劳西飛燕黄姑織女時相見黄姑即河鼓也音訛而然今之學者或謂是列舎牽牛而會織女故於此折其疑又張茂先小家賦曰九坎至牽牛織女期河鼓石鍊注云河鼓星在牽牛北天鼓也主軍鼓主鈇􅃏李淳風自昔相傳牽牛織女七月七日相見者乃此星也予因此始知黄姑乃河鼓也爲牽牛之别名昔人云開卷有益信然杜甫大暦三年春白帝城放船出瞿塘峽􅀅適江陵詩四十韻其末有云五雲髙太甲六月控摶扶之句鮑欽止鄧睿思范元實及世行所謂王原叔注者諸家皆不詳五雲太甲之義予讀唐王勃文集有大唐九隴縣孔子廟堂銘序云帝車造指遁七矅於中階華盖西臨載五雲於太甲雖使星辰蕩越三元之􅁤躅可尋雲雨沸騰六氣之􅀴綸有序然則撫銅渾而􅀚變化則萬􅁚之運不足多矣握瑶鏡而臨事業則萬幾之湊不足大矣云云然則五雲太甲之義盖爲玄􅁚而言矣第未見正所出之書當俟􅀶洽君子請問之惟酉陽雜爼云王勃毎爲碑頌先墨磨数升引􅀍覆面而臥忽􅁸一筆書之人謂之腹稿燕公嘗讀夫子學堂碑自帝車至太甲四句悉不觧訪之一公一公言北斗建午七矅在南方有是之祥無爲聖人當出華盖以下卒不可悉然則五雲太甲一公燕公不知之况餘人乎一公謂一行禅師也東北冬月寒甚夜氣塞空如霧着於林木凝結如珠玉旦起視之真薄雪也見日乃消釋因風飄落齊魯人謂之霿淞諺云霿淞重霿淞窮漢置飯甕盖􅀊穣之兆也曽子固之齊州有冬夜詩云香清一榻氍毹煖月淡千門霿淞寒又有霿淞詩云園林􅀄日静無風霿淞開花䖏䖏同記得集英深殿􅂻舞人齊挿玉籠鬆盖謂是也東坡在定武送曹仲􅃬詩亦云㫁􅅾飛葉落黄沙秪有千林䰒淞花􅀿謂王孫朝上􅀦珠幢玉節與排衙亦謂此也霿淞音夢送䰒鬆皆同音東坡自儋耳北歸臨行以詩留别􅀺子雲秀才云我本儋州民􅀉生西蜀州忽然跨海上譬如事逺游平生生死夣三者無劣􅄖知見不􅂯見􅁒去且少留後批云新醸佳甚求一具理臨行寫此以折菜錢宣和中予在京師相藍見南州一士人携此帖来麄厚楮􅁓行書􅂗抹一二字􅀋顔魯公􅀕姪文甚竒􅊆也具理南荒人缾􅑥名也劉安世噐之在都下僧化成見之曰公在胞胎中當有不測驚危㓜年復有惡疾㡬為廢人然卒無恙盖噐之父航赴官蜀中時母方娠遇棧道天雨新霽磴滑危甚忽石隕馬蹶夫人已墜崖下矣衆皆驚泣無復生望試使下瞰厓腹有巨木􅁑藟縈結盤屈如盖落葉委籍夫人安坐于上呼之即􅀿乃以衾㡡懸縋而上了無所傷至官未㡬而育噐之後十餘歳居京師苦赤目甚惡精溢于外百醫莫差一日有客云某有一相識来調官畜惡目藥甚効昨日来别云已陛辭早晚即行試遣人徃求之時行李己出房云藥誠有之匆匆忘記在某篋中􅀄發一篋藥已在焉遂得之令以藥􅀓精上軟綿􅆞護戒七日方開一傅痛即止及開精已内眸子瞭然矣二事噐之自為劉勉中言蘇隂和尚作穆護歌又地理風水家亦有穆護歌皆以六言爲句而用側韻黄魯直云黔南巴
