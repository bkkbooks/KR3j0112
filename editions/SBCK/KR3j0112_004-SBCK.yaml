body:
  text: 􅈎間賽神者皆歌穆䕶其略云聴唱商人穆䕶四海五湖曽去因問穆䕶之名父老云盖木􅉚耳曲木状如瓠擊之以節歌耳予見淮泗村人多作炙手歌以大長竹􅂾尺刳去中節獨留其底築地逄逄􅀂鼓聲男女把臂成圍擴髀而歌亦以竹筒築地爲節四方風俗不同吴人多作山歌聲怨咽如悲聞之使人酸辛桞子厚云欵乃一聲山水緑此又嶺外之音皆此􅀋也濟南爲郡在歴山之隂水泉清冷凢三十餘所如舜泉爆流金線真珠洗鉢孝感玉環之􅀋皆竒李格非文叔爲歴下水記叙述甚詳文體有法曽子固作詩以爆流爲趵突未知孰是發運使淳化四年始建官焉六路轉輸於京師者至六百二十萬石通㤗楚海四州煮海之塩以供六路者三百二十餘萬石復運六路之錢以供中都者常不下五六十萬貫淳化四年以内殿崇班楊􅁢武恭爲都大􅃹勾江南諸州綱􅂳搬運塩粮錢帛茶貨當時殿直蔡崇道供奉官劉全信同􅃹勾五年七月􅁢恭授西京作坊使逐次添􅃹軄事乃立制置發運使額至乾興元年十二月文武官二員皇祐元年施昌言以天章閣待制充使自後多除两制統六路年額上供米六百二十萬石内四百八十五萬石赴闕一百三十五萬石南京畿送納淮南一百五十萬石一百二十五萬石赴闕二十萬石咸平尉氏五萬石太康江南東路九十九萬一千一百石七十四萬五千一百石赴闕二十四萬五千石赴拱州江南西路一百二十萬八千九百石一百萬八千九百石赴闕二十萬石赴南京湖南六十五萬石盡赴闕湖北三十五萬石赴闕两浙一百五十五萬石八十四萬五千石赴闕四十萬三千三百五十二石陳留二十五萬一千六百四十八石雍丘東坡知徐州作黄楼未幾黄州安置爲定帥作松醪賦有云遂從此而入海渺翻天之雲濤俄貶惠州移儋耳竟入海矣在京師送人入蜀云莫欺老病未歸身玉局他年第㡬人北歸果得提舉成都玉局􅀚三事皆䜟也京師五嶽􅀚後凝祥池有黄色蓮花甚竒他䖏少見本也安惇䖏厚初謫潭州過儀真見客河亭有一丐者􅃍前白言有戯術願陳一􅀏安心異之欣然延禮丐者求一硯及素􅁓幅􅁓香炉乃取土以唾和呵之成墨矣又取土呵之悉成薫陸焚之芬馥乃研墨謂安曰吾不䏻書命小吏持筆題詩曰佳人如玉酒如油醉臥鴛鴦帳􅂻頭咫尺洞庭君不到長生不死最風流䖏厚讀之不恱自以無嗜􅁒乆矣豈有佳人如玉醉卧鴛鴦之事乎且謂洞庭君不到是謂我不可仙矣遂謝丐者與酒一壼一引而盡長揖而去安行将過洞庭之日􅀍命鐫削官資放歸田里乃悟前詩之異丐者必異人也然詩中似􅀮神仙祕訣人不暁耳東坡自常州赴登州經過揚州石塔寺長老戒公来謁東坡坡云經過草草恨不一別石塔塔起立云􅃒箇是磚浮啚耶坡云有􅒌塔云􅀂無􅒌何以容得世間蝼螘坡首肯之元豊八年八月二十七日也明日坡又作詩贈之云竹西失􅁍上方老石塔還􅑮惠照師我亦化身東漢去姓名莫遣世人知崔公度伯易赴宣州守江行夜見一舟相随而行寂然無聲晚􅂳得港而泊所見之舟亦止近岸公疑之遣人視之乃空舟也舟中有血痕於舟尾得皂絛一條繫文字一􅁓取􅀚之乃顧舟契也因得其人姓名及牙保之属至郡檄廵尉緝􅀗盡􅀗其人盖􅂳主殺雇舟之商取其物而棄其舟遂伏于法豈􅀑物衘􅁈而訴乎文潞公丞相岀鎮西京奉詔於瓊林􅁐燕餞從列皆預賦詩送行王禹玉時爲内相詩云都門秋色满旌旗祖帳容陪醉御巵功業逈髙嘉祐末精神如破貝州時匣中寳劒騰霜鍔海上僊桃壓露枝昨日更聞褒詔下别看名姓入彞時以爲警絶曾紘伯容爲予言此詩第一句便見體面之大􅀂非上公大僚詎敢於都門而張旌旗耶此餘人所不可當也白居易献裴度丞相詩云聞說風情筋力在只如初破蔡州時禹玉用此事也鎮江府甘露寺在北固山上江山之勝煙雲顯晦萃於目前舊有多景楼尤爲登覧之最盖取李賛皇題臨江亭詩有多景懸牎牖之句以是命名楼即臨江故基也裴煜守潤日有詩云登臨每憶衞公詩多景惟於此䖏冝海岸千艘浮􅀂芥􅀖人萬室布如旗江山氣象囬環見宇宙端倪指􅀧知禪老莫辭勤候迓使君官滿有歸期自􅀴兵火楼今廢近雖稍復營繕而楼基半已侵削殊可惜也王荆公退居金陵建宅於半山盖自城至鍾山此寳公塔路之半因以得名宅後有謝公墩乃謝安石居東山之所也荆公詩云我名公字偶相同我屋公墩在眼中公去我來墩属我不􅀿墩姓尚随公其後公捨宅為報寧寺寺今亦廢未復舊而墩巋然􅍦存宣和二年睦冦方臘起幫源浙西震􅂲士大夫相與奔􅇡関注子東在錢塘避地携家於無􅃬之梁溪明年臘就擒離㪚之家悉還桑梓子東以貧甚未䏻歸乃僑寓於毗陵郡崇安寺古栢院中一日忽夣臨水有軒主人延客可年五十儀觀甚偉玄衣而美􅂡髯揖坐使两女子以銅盃酌酒謂子東曰自來歌曲新聲先奏天曹然後㪚落人間他日東南休兵有樂府曰太平樂汝先􅃪其聲遂使两女子舞主人抵掌而為之節已而恍然而覺猶䏻記其五拍子東因作詩記云玄衣仙子從􅀟鬟緩節長歌一觧顔滿引銅盃効鯨吸低囬紅䄂作􅃓彎舞留月殿春風冷樂奏鈞天暁夢還行􅃪新聲太平樂先傳五拍到人間後四年子東始歸杭州而先廬已焚於兵火因􅀉家菩提寺復夣前美􅂡者腰一長笛手披書冊舉以示子東􅁓白如玉小朱欄界間行以譜有其聲而無其詞􅀏謂子東曰将有待也徃時在梁溪曽按太平樂尚䏻記其聲否乎子東因為之歌美􅂡者援腰間笛復作一弄亦􅀻記其聲盖是重頭小令已而遂􅁴其後夢又至一䖏榜曰廣寒宫宫門夾两池水莹净無波地無纎草仰􅀚巍峩􅀂洞府然門鑰不啓或有告之者曰但曵鈴索呼月姊則門開矣子東從其言試曵鈴索果有􅀿者乃引至堂宇見二仙子皆眉目踈秀端荘靚麗冠青瑶冠衣彩霞衣似錦非錦似綉非綉因問引者曰此謂誰曰月姊也乃引子東升堂皆􅂯拜月姊因問徃時梁溪曽令奴鬟歌舞傳太平樂尚䏻記否又遣紫髥翁吹新聲亦䏻記否子東曰悉記之因為歌之月姊喜見顔面復出一􅁓書以示子東曰亦新詞也姊歌之其聲宛轉似樂府昆明池子東因􅁒強記之姊有難色顧視手中􅁓化為碧字皆㓕迹矣因揖而退乃覺時已夜䦨矣􅍦記其一句云深誠杳隔無疑亦不知為何等語也前後三夣後多忘其聲惟紫􅂡翁笛聲尚在乃􅀝其聲而為之詞名曰桂花明云縹緲神清開洞府遇廣寒宫女問我􅀟鬟梁溪舞還記得當時否碧玉詞章教仙語為按歌宫羽皓月满窓人何䖏聲未断瑶䑓路子東嘗自為予言王禹玉為翰苑治平三年二月十五日召對蕋珠殿時賜紫花衣墩令坐踰􅂾刻方罷明年英廟上仙珪作挽詞有云曽陪蕋珠殿獨賜紫花墩盖謂是也金􅁫􅀟捧玉纎纎星􅀫光芒動满奩觧􅀏詩人誇􅀶物秪知紅顆味酸甜曽子固荔枝詩也白樂天荔枝詩曰津液甘酸如醴酪杜子美詩云紅顆甜酸秪自知故前詩譏二公也政和初閩中貢連珠者移植禁中次年結實不减土出道君御製詩云玉液乍凝仙掌露絳紗􅀄脱水晶丸盖體物之貢矣時群臣皆􅀿制焉髙郵禪居寺大殿佛髻珠一日為盗􅀼去徃來夜中不得出僧恠之曰汝徃來何求曰􅁒求門以出僧指之曰此門也又復他之竟不見也僧詰問具以􅀼珠對即引盗對納珠令􅄬哀引咎乃識途而去僧因抆拭佛供見座下有敗􅀴腐爛狼籍䑕巢其中小䑕􅂾枚尚未䏻走或少足或眇目欠尾者無耳者殆無一全形殊可恠也王将明後房曰田令人者顔貌殊倫真􅀦色也靖康改元正月将明死田自都携一婢􅇡至亳州居逆旅中郡知之爲拘􅃹􅂾月其家遣人迎歸蔡元長後房曰武恭人亦妙麗不凢元長謫嶺表武在京為一使臣姓孫人所畜乃携孫竄至南京亦為郡所拘七月開封差人擒之送入京師時予適在二郡皆見之錢唐僧净暉字照曠學琴於僧則全完仲遂造精妙得古人之意宣和間乆居中都出入貴人門嘗得一舊琴修治之磨去舊􅃮三􅂾重􅀮􅀮􅀂有字痕重加磨礲得古􅂐霜鏞二字黄金填之字畫劲妙有法中官陳彦和以七百千得之别為馬價珠為徽白玉為軫修成弹之清越聲壓􅂾琴非雷氏未易臻此也靖康丁未辛道宗将趙万叛九月二十八日䧟鎮江府時彦和在京口挺身而走琴遂不携又宗室士㒟立之時知南外大宗正亦在郡所服犀􅅁乃道君觧賜淵聖淵聖觧賜士㒟者正透盤龍亦亡焉龍屈􅀂飛翔之状予嘗見之郭熈和陽温縣人以􅀞得名其子思後登科熈喜甚乃於縣庠宣聖殿内啚山水窠石四壁雄偉清䦞妙絶一時自云平生所得極意扵此筆矣熈䏻為逺景意趣益新略不相雜亦名手也貴人家􅀵熈一景山水二十四幅掛高堂上森然􅀂在林壑間未易得也思後為待制乃重資以收父􅀞􅁒晦其迹也杜子美㣲意深逺考之可見如丹青引贈曹覇詩也有云至尊含􅀏催賜金圉人太僕皆惆悵􅀃者謂帝喜覇之䏻寫眞􅀞馬也故催金賜之而圉人太僕自嘆其無技以􅂪㤙賚耳如此說則意短無工殊不知此畫深譏肅宗也考是詩始云先帝天馬玉花騘畫工如山貌不同是日牽來赤墀下逈立閶闔生長風帝旣見先帝之馬當軫􅃵墙之念反含􅀏而賜金曽不􅀂圉僕見馬䏻惆悵而懐先帝也又􅀉劉峽州伯華使君長篇尾句云江湖多白鳥天地亦青蝇人多指白鳥為鷺非也按月令仲秋之月群鳥飬羞注引夏小正曰九月丹鳥羞白鳥􅀃者謂蚊蚋也又金楼子云齊威公臥於栢􅆍白鳥营飢而求飽公開緑紗之厨而進焉有知禮者不食而退有知足者雋肉而退有不知足者長嘘短吸而食及其飽者腹為之潰盖戒夫貪也又詩人以青蝇刺讒然則公詩盖言天下多貪讒之人耳泰陵時蔡元長為學士故事供貼子皇太后皇帝皇后閣各有詞諸妃閣同用四首而已時昭懐劉太后充貴妃元長特撰四首以供之有三十六宫人第一玉楼深䖏夢熊羆荆公退居鍾山嘗獨游山寺有人擁􅂾卒按􅂰㩀􅇃而坐驕氣满容慢罵左右為之辟易公問為誰僧云押綱張殿侍也公即索筆題一詩於扉云口衘天憲手持鈞已是龍墀第一人囬首三千大千界此身猶是一㣲塵王洙原叔内翰嘗云作書冊粘葉為上乆脫爛苟不􅇣去尋其次第足可抄録屡得􅇣書以此􅀗全􅀂􅒌􅘛歳乆断絶即難次序初得董氏繁露􅂾冊錯亂㒹倒伏讀歳餘尋繹綴次方稍完復乃縫􅘛之弊也嘗與宋宣献談之公悉令家所録者作粘法予嘗見舊三舘黄本書及白本書皆作粘葉上下欄界皆界出於􅁓葉後在髙郵借孫莘老家書亦作此法又見錢穆父所蓄亦如是多只用白􅁓作褾硬黄􅁓作狹簽子盖前軰多用此法予性喜傳書他日得竒書不復作􅒌􅘛也陜州大河南岸有物如鉄石状俗謂之鉄牛舊有祠宇唐末封號順正廟大中祥符四年真宗祀汾隂幸其廟作鉄牛詩泗州普照寺僧伽塔建炎戊申二月二日灾秀州華亭普照寺亦以是日焚其塔亦甚雄盛可亞於泗上也西京進花自李迪相國始杜子美􅀕房相􅀦九月用茶藕蓴鯽之奠蓴生於春至秋則不可食不知何謂而晋張翰亦以秋風動而思菰菜蓴􅃵鱸鱠鱸固秋物而蓴不可暁也􅄯文元公逈深明理性嘗作七審於四威儀中嘗自考校以代曽子三省之義道力深淺自審方知心一一切妄念䏻息否二一切外縁稍簡省否三一切觸景䏻不動否四一切語言䏻慎宻否五一切黒白减分别否六夣想之間不顛倒否七方寸之間得恬愉否予讀公所作内典諸書得此􅀂有所省當書左右以警昏憒張芸叟作鳳翔吴生􅀞記秦少游作五百羅漢圖記皆法韓退之􅀞記俱無愧也墨荘漫録卷第四
