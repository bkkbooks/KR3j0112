body:
  text: 墨荘漫録卷第十崔伯易書有金華神記舊編入聖宋文選後集中今無此集近讀曲轅集復見之因載之以廣所聞云汴人有吴生者世爲冨人而生以娶宗室女得官於三班嘉祐中罷任髙郵乃寓其家於治所而獨與兄子賫金繒􅂾百千南適錢唐道出晉陵艤舟於望亭堰下是夜月明風髙生乃危坐舷上頓然殊不有􅆍意乆之忽有緋衣􅀍髮持两炬自竹林間出者後引一女子冠玉鳳冠曵蛟綃文錦之衣顔色甚䴡而年十八九耳生見而驚俄頃至岸側囬叱緋衣者曰可去矣無乆留也於是㓕炬泣拜而去女子即登舟面生坐謂生曰見向來緋衣者乎此君之夙􅄷也而索君且􅂾十年矣乃今方得之第以我故得免不然今夕君當死其手生聞益驚駭不自安女子􅀏曰君怯耶即以金􅈁衣置肩上生稍安乃問曰若神與其􅀑耶女子曰我非人亦非􅀑盖金華神也過去生中嘗與君爲姻好􅀼知将有所下濟故相救耳今事已我亦當去君矣遂去不復返顧生以目送至竹林中不見􅀅掩門忽覩女子坐其後生大驚女子􅀏曰知君怯故相戯安有􅂾十年睽索一得觧后而􅃍徃者耶遂相與入舟中取酒共飲其言諧謔悉如常人然生誡曰母髙聲􅂲兄子知之女子曰我言特君可聞他人雖厲聲亦不䏻聞也生益疑􅀼自懼曰此果神也固無所惮倘􅀑則必有所畏矣因出劍鏡二物示之女子曰此劍鏡耳精與􅀑則畏夫劒陽物而有威者也􅀑隂物而無形者也以無形而遇有威是謂銷鑠其妖而不䏻勝故􅀑畏劒也鏡亦陽明而至明者也精亦隂物而為變者也以偽而當至明是故􅁀著其形而不䏻逃故精畏鏡也昔抱朴子嘗言其略而我知之且乆矣乃􅁒以相畏乎生懼起謝曰誠無他意至明起謂生曰舟檝已有暁色􅀔不䏻乆留當與君子决矣君後十年遊華山日多置朱粉於路隅梧桐下楊之雖然君今不可終此行􅂲復不濟也因索筆題詩一章曰羅襪香消九九秋涙痕空對月明流塵埃不見金華路滿目西風緫是愁書已輙復流涕歔欷而去明日思其言遂囬棹不復南去後以其事語人人或詰其兄子果亦不知也曲轅先生又嘗作傳記陳明逺􅂯生事云明逺陳氏子也名公闢興化軍人嘗舉進士皇祐三年春過泗州游普照王寺時群僧會齋于南院明逺遶浮啚自西廂趣大殿两廡人甚譁獨老僧弊衣庭下􅀝樹讀青􅁓書其文光彩射百許歩明逺􅃍徃揖之僧小舉手就視其書則金字金剛􅀴繫以梁朝傳大士之頌者僧細諷自􅀂明逺從後聴之疑其光徙日所記乆僧囬顧􅀏謂明逺曰子亦樂此耶明逺對之稍㳟僧讀竟遂以􅀴授明逺曰江南李氏所施􅀚子之貌且當持此明逺喜受之以歸明且取映日則無復光彩一讀之徑藏書籠中明年從父官海陵忽得疾不可治以死三日家人􅀅大歛覺其體復温移刻稍蘇又食頃乃䏻言其族驚明逺自言方疾革時見四卒深目虎喙持文書有大印字莫可辨共執明逺桎两手驅西北行其􅀔甚􅁀所􅀴依約皆廣野塵埃射人不可輙視漸逼大河府署􅃊宻門外坐卒􅂾十悉持挺内有考掠聲三卒先入一守明逺於大門外如竢命者湏􅁷坐卒盡起擎跪明逺囬視一僧乗虚而行過門見明逺植杖而立意􅀂哀憫明逺不覺手桎盡觧熟視其状即泗州嘗遇授􅀴者也因拜祈之僧顧卒取文書略視曰府君知耶􅅻􅁒入門而聞府中呼􅀿甚􅃍有二人服紫服朱趋出迎之其侍衞之盛􅀂世之逹官二人禮僧極恭僧語二人語愈喜旁睨明逺􅀂夙有罪者僧呼明逺前使自懴悔俄二人詔吏聴還二人亦謝僧去復有吏馳出呼明逺則明逺季父釴釴大學進士有聞亡已三年矣旣見訪明逺家事云我當録􅁈簿三年􅅻二年尔非佳職也尔歸持尊勝七俱胝呪祈以免我又有故服藏某䖏幸焚之遺我􅀉聲親戚如平生復告明逺言世之人􅁈慎勿復復之後􅀔如索綯為􅀂有迨百千生不䏻觧者故吾此局置吏最多而簿書期會常若不及神君聖靈􅀹深厭此言未竟􅀂有呼之者因疾馳去僧引明逺游旁两大廡下見繫囚不啻􅂾百亦有禽獸諸虫悉䏻人言與囚對辨群吏見僧悉拜有械囚縶以大鉄繅左右文書沒其首口嘗囁嚅出血卒守之􅀂使自讞􅁿重不當又鞭之其餘幾壊明逺􅀼視之乃其表舅鄭生生為閩吏喜以法自名死且十年餘見明逺泣下頻以手向僧且目明逺僧􅀏出以杖指之鏁械俱墮然莫敢起而口囁嚅出血也則未已也又見坐沙門五六人前列敗壊飲食􅂾十甕氣色殊惡僧曰此嘗棄世中供飬且重使食耳僧亦不甚念復引明逺出前大河上虹橋蜿蜒望彼岸城府楼􅀚煙霧出其上明逺請徃􅀚焉僧不許曰子過此無復歸矣亟随僧趣東南井閭人物差􅀋人世但天氣垂惨似􅁒雨時而途中所遇徃徃皆昔嘗所見危冠大馬出䖏前後吏卒替更而迭趋人指以為名􅀔挾侈快意不屈之士皆超趄狼狽状􅀂為物所迫甚者咨嗟涕涙悔怏自擲意求有以亡匿而不可得俄及前所過廣野遇溪水漲甚始思來時則無有也明逺􅁨不䏻渡僧乃執杖端以末授明逺而導之始渉亦甚淺中流明逺失㩀􅀅溺因驚呼而甦明逺之復生也桎縳之跡􅀮然在臂家人持葷飲餉之雖􅂾十年輙掩鼻急遣去瞻視間僧已在室中香氣異常親族齋戒祈見者必暫覩裙衲杖􅂂而已僧自是日以先授􅀴義教明逺對其情品􅀃一切世間所有之法即心是佛煩惱塵劳䆒竟虚妄其音靚圓􅀂霜鍾在庭户外之人一歴耳驩然自信終身不䏻忘其聲每謂明逺曰吾即詣某寺齋旣去食頃復還又言某氏齋􅀻飲某僧酒猶不齋耳他時爲之未免有罪時多疑以僧伽大師者明逺請焉僧曰僧伽吾師也㡬一月明逺軀體復壮僧告去曰後十四年吾傳子於祖山明逺問祖山曰廬阜遂去陳氏後求釴故衣果得於其䖏緇徒呪而火之明逺母素好釋氏悉䟽其齋雖逺􅂾百里必使人騐之明逺并告以言状具言有是爾飲僧家聞之終身不飲酒然明逺向所懴之罪今反不復䏻記豈昔偶萌之於心不自引悔而神道已録以為非􅁘抑他生所為不復自省而幽􅁳記人功過誅賞有時而宴安人之苟為得以自将則跬歩之間不可以為恐懼耶至和三年八月明逺歸莆田以故人訪予且出所授􅀴具道其事予􅁒記之予固已恠其人爽辨謙畏不􅀋向時其志真􅀂有所得然未睱從其請也今年其兄公輔調官京師特過予復為言予與公輔游十五年矣今亦􅁛其弟所為如予嘗所恠者則明逺由是而有聞倘求之益勤修之益明守其話言不為冨貴貧賤之所遷則其所至也豈易量哉因奮筆直載始末明逺所述盖多其間有與佛􅀴外史􅀂世人已傳之事略相同者不復更録明逺父名鑄今為尚書都官郎中通判廣州曲轅子記予􅀚崔公所記抑亦異矣彼鄭生者以法自名而􅀗罪􅀂是吁可畏哉三尺者􅁿重不可踰而法家流鮮恩寡怒多論刻苟容於心已不逃於隂譴矣􅀂䏻平反明慎天必以善􅀿之臨政者於問詳讞寜可忽諸㐮陽天仙寺在漢江之東津去城十里許正殿大壁􅀞大悲千手眼菩薩像世傳唐武徳初寺尼作殿求良工啚繪有夫婦携一女子􅀿命期尼以扃殿門七日乃開至弟六日尼頗疑之乃闢户􅞔其無人有二白鴿翻然飛去視壁間聖像已成相好竒特非世工所䏻獨其下有二長臂結印手未足乃二鴿飛去之􅀿也郡有􅀞工武生者獨䏻模傳其本大􅀚初有梁寛大夫寓居寺中心無信向頗􅁿慢之武生云菩薩之面正長一尺寛以為誕必􅁒自度之乃升梯􅁒以以尺加菩薩面忽梁間有聲如雷寛震悸而墮損其左手僧教寛悔過自懴後歳餘方如舊兹禦侮於像法事者怒其慢瀆耳章丞相申公子厚以䏻書自􅀒性喜揮翰雖在政府睱時日書􅂾幅予嘗見雜書一卷凢九事乃抄之因載於此一云東漢魏晉皆以八分題宫殿榜蔡邕作飛白是八分字耳是以古云飛白是八分之􅁿者衞恒作㪚􅀠是用飛白筆作􅀠字也故又云散􅀠終是飛白金石刻東漢魏晉皆用八分唯小小碑刻之或䕃刻􅀠字也許昌群臣􅂆進與授禅坻碑皆八分之妙者近世有荒唐士人妄謂為􅀠書而不知􅀠書乃今正書耳世俗亦徃徃從而謂之􅀠書且相尚學焉不知彼􅀅以何等為古八分又􅀅以今正書為何等耶嗚呼目前淺近之事略渉古者便自可知何至昏􅂪妄惑不可指示之如此耶顧􅁒與其論書學之本與用筆作字之㣲妙㫖逺而意深者安可得哉盖不趐於以鐘鼔樂鷃周公之服􅀍猿狙也事之􅀋此者多矣二云書者六藝之一古人列之於學以相傳授則學者始習之已盡詳知其規矩法度與所以為書之意矣精而熟之不妙且神何待耶􅀾􅀦秦漢以來其學猶未絶也故學者尚有前世之風烈至於名家乃多父子祖孫豈不由師傳授習之有素乎崔張鍾杜衞索王􅁃諸人是也會之於繇真父子也􅇣少子敬殆􅀅鴈行矣三云吾頃見蘇浩然兄弟言其曽祖叅政所􅀵古書盡付㓜子掌之旣薨諸兄弟以其素所爱不復取悉以􅂌之所與共者十一二而已其後叅政之㓜子官洪州卒官因不歸其子㓜弱已而遂絶書􅀞皆㪚失不復存今諸房所共有者是十一二之粗者耳然足以多甲士族也使具在者不知其當何如也必有魏晉名迹矣惜哉四云宣州筆有名耳未必佳也凢筆擇毫净捲心圓便是工夫􅄡之長短尖齊在臨時耳䖏䖏皆􅀎要自指教令精意而已無他竒也五云張侍禁筆甚佳一管小字筆冩二十萬字尚冩字如此是少比也盧􅃹使十倍不及是其手生也凢習熟之與生踈豈不相逺哉學書湏先暁規矩法度然後精苦勤功自入䏻品䏻之至極心悟妙理心手相􅀿出乎規矩法度之外無所適而非妙者妙之極也由妙入神無復蹤跡直如造化之生成神之至也然先暁規矩法度加以精勤乃至於䏻䏻之不已至於心悟而自得乃造於妙由妙之極遂至於神要之不可無師授與精勤耳凢用筆日益習熟日有所悟悟之益深心手日益神妙矣力在手中而不在手中必湏用力而不得用力􅀿湏在意而不得在意此可以神遇而不可以言傳也學佛者悟吾此語可以􅐰手到家矣妙哉妙哉真至理也六云吾每論學書當作意使前無古人凌厲鍾王直出其上始可即自立分􅀂直尔低頭就其規矩之内不免為之奴矣縱復脱洒至妙猶當在子孫之列耳不䏻㕍行也况於抗行乎此非苟為大言乃至妙之理也禪家有云見過於師方堪傳授見與師齊减師半徳悟此語者乃䏻暁吾言矣夫於師法不傳字學廢絶􅂾百千年之後􅁒興起之以継古人之跡非至強神悟不䏻至也七云學書湏先極取骨力骨力充盈有羡乃漸變化􅀵藏至於潜伏不露始為精妙􅀂直尔􅁀露便是桞公􅁠之比張筋弩骨如角觝武夫不足道也八云楊小漕言其兄官江夏有一道人自稱吕元圭時時延之學院中二姪㓜小頗勤待之或言事徃徃有騐一日忽􅂯三言云惡人􅀅至矣湏急避之時衆人亦不甚留之暫耳􅈳渡江去人但訝其所謂惡人者何也是夜忽然提刑喻君渉至州州郡都不知之乃是乗便風一日行六七程􅈳至岸下耳喻至則遣人訪求吕不見踪跡喻乃素自宻問得與一人徃還至熟呼之至即岑文秀也詰其所得云無有喻以聲色且􅀅笞之岑終言無喻不信遣熟事吏徃搜其家乃於神堂壁中得所與岑長歌一首是言内事岑乃云吕實付此詩云汝今未暁異日當為子詳說之喻乃云吕即吕先生也其名元圭是觧拆先生二字耳亦不知其定何如也众乃悟所謂􅁖人者指喻耳是恐其廹逼求之也九云吾今日取君謨墨迹􅀚之益見其學之精勤但未得㣲意尔亦少骨力所以骨弱而筆嫩也使其心自得者何謝唐人李建中學書宗王法亦非不精熟然其俗氣特甚盖其初出於學張從申而巳君謨少年時乃師周越中始知其非而變之所以恨弱然已不意其䏻變之至此也吾少年時便學書至今必有所至所以不學者常立意􅀂未見鍾王妙蹟終不妄學故不學耳比見之則已遲晚故學遅􅂲今但手中少力耳􅀂手中不乏力不甚衰疲更二十年决至熟妙䖏此湏常精勤乃可􅀂不極精勤亦不䏻至也凢學者可以不自勉乎元祐六年十一月五日京西齋東􅈦大滌翁書時小至後一日也重和戊戍歳平江府盤門外大和宫相近耕夫􅂾人穴一冢初入隧道甚深其中極寛如䖏室然復有􅂾門皆扄鐍不可開耕者得古噐物及㕍足鐙之􅁼以為銅也􅁒貨之熟視之乃金因紛争至官時􅀿安道逄原為郡首盡令追索元物到官乃遣郡官􅂾人徃閉其穴􅀚者如覩其中四壁皆繪􅀞嬪御之属丹青如新􅀞手殊竒妙有一秘色香爐其中􅁅炭尚存焉諸卒争取破之冢之頂皆􅀞天文玄􅁚此特􅀄入之室未見棺柩意其在重室内也又得􅂾噐而出乃掩之後考啚􅀴云吴孫破虜堅之墓也然考之吴志堅薨塟曲阿未詳此果何人也宋次道春明退朝録云王侍郎子融言天聖中歸其郷里青州時􅅬給事渉為守盛冬濃霜屋瓦皆成百花之状以􅁓摹之其家尚餘􅂾幅政和丙申歳先君為真州敎官時朝廷頒雅楽下方州儀真學中建大樂庫屋積新瓦于地一夕霜後皆成花紋極有竒巧者折枝桃梨牡丹海棠寒蘆水藻種種可玩如善􅀞者所作詹度安世為太守諷學中啚繪以瑞為言􅁒䛕于朝先君不從乃巳俞紫芝秀老荆公客也䏻詩公極善之嘗有詠草一篇云满目䘚芊野渡頭不知􅀂箇觧忘􅁨細随緑水侵籬舘逺􅅁斜􅊙過別洲金谷園中荒映月石頭城下碧連秋行人悵望王孫去買断金􅁫十二愁為人所􅁛賞世􅀞骨觀作羙人而頭顱白骨者饒徳操題其上云白骨纎纎巧􅀞眉髑髅楚楚破羅衣手持紈扇空相對􅀏殺傍人自不知元祐以後宗室以詞章知名者如士暕士宇叔益令畤䶵之皆有篇什聞於時然近属環衞中䏻翰墨􅀹多如嗣濮王仲御喜作長短句嘗見十許篇於王之孫不皆可􅓻作者不䏻盡載如上元扈蹕作瑶䑓第一層云嶰􅃹聲催人報道常娥歩月來鳳燈鸞炬寒􅁿簾箔光泛楼䑓萬年春未老更帝郷日月􅅾萊從仙杖看星河銀界錦綉天街􅂬陪千官萬􅀐九霄人在五雲堆紫􅂁光裏星毬宛轉花影徘􅆦未央宫漏永㪚異香龍闕崔嵬翠輿囬奏仙歌韶吹寳殿罇罍每使人歌此曲則太平之􅁚恍然在夣􅄰間也楊緯字文叔濟州任城人以明􅀴中第累任州縣皆有䏻稱後為廣州􅀚察推官元祐二年正月以疾卒於官道逺䘮未還郷其姪珣一日晡時恍然如醉夣中見其叔􅀐從甚都來其家珣亟拜之旣坐言語如平時珣問叔今代满耶曰我今爲忠孝節義司判官矣所主人間忠臣孝子義夫節婦事也其職髙甚而閑􅇣故來別汝也人但見珣􅀂與人言語時且拜也至夜珣乃省乆而方言曰適廣州叔來其言如是衆方悲駭知緯死矣洵曰叔臨去有紫衣吏曰府君好范山下石䑓可即臺立祠以祀之後呼工爲像一塑遂肖其容状州縣以緯别無功績不敢聞於朝而郷人歳時但即其墓而􅀕之爾宋宣獻公綬宫梅詩云閬􅁐春來非世境層城花早出宫欄用梁簡文帝梅花賦曰層城之宫靈􅁐之中梅花特早偏識春之語也山谷在荆州時鄰居一女子閑静妍羙綽有態度年方笄也山谷殊嘆息之其家盖閭閻小民也未幾嫁同里而夫亦庸俗貧下非其偶也山谷因和荆南太守馬瑊中氷玉水仙花詩有云淤泥觧作白蓮藕糞壌䏻開黄玉花可惜􅀦香天不􅃹随縁流落小民家盖有感而作後􅂾年此女生二子其夫鬻於郡人田氏家憔悴頓挫無復故態然猶有餘妍乃以􅀦香名之濟州士人鄧御夫字從義隠居不仕嘗作農暦一百二十卷言耕織芻牧種蒔耘穫飬生備荒之事較之齊民要術􅀹為詳備濟守王子韶嘗上其書於朝今未見傳於世嘗訪於藏書之家或有見者王禹偁元之乆為從官而未嘗知舉有詩云三入承明不知舉㸔人門下放門生王岐公在翰苑凡十七八年三為主文常在試幃戯書考簿後云黄州才藻舊詞臣幾嘆門生未有人自􅀏晚游金馬客曽來三鏁貢闈春龍眠李亮工家藏周昉􅀞美人琴阮啚殊有宫禁冨貴氣旁有竹馬小兒􅁒折檻前桞者亮工官長沙時黄魯直謫冝州過而見之歎愛彌日大書一詩於黄素上云周昉冨貴女衣餙舊新兼髻重髮根急薄粧無意添琴阮相與娱聴絃不停手敷膄竹馬􅀰跨馬要折桞其􅀞後歸禁中而詩不見於集也汪彦章四六之工自少年即妙崇寕三年霍端友榜瓊林宴謝頒氷彦章作謝表有云使嗽􅃳而吮清得除煩而滌穢順時致卷俯同豳雅之春開受命知荣固異衞人之夕飲又云深防􅂂薄之危不昧至堅之漸子孫傳誦記御林金盌之香生死不忘動宫井玉壼之㓗韓子蒼與曽公衮吴思道戯作冷語子蒼云石崖蔽天雪塞空萬􅌇隂壑號悲風纎絺不禦當玄冬霜寒墜落氷溪中斵氷直侵河泊宫未􅀂冷語清心胷公衮云萬山雲雪隂霾空千林霿􅟶水揺風凍河徹底連三冬嘉平暁獵崤凾中十二律吕相與宫安得此􅀱䟽煩胸思道云御栁隂森蔽煙空尚記玉宇來清風月旁九霄凛如冬露下紫􅅔花影中長哦白雪明光宫众泉湧此萬卷􅅐此格起於晉人之危語也湯泉有䖏甚多多大􅀬而氣烈乃䟽黄湯也唯利州褒禅山相近地名平痾鎮湯泉温温可探而不作􅆨氣云是朱砂湯也人傳昔有两美人來浴旣去異香郁郁累日不散李端叔過浴池上作詩云華清賜浴記當年偶託荒山結勝縁未必興衰異今昔曽􅀴羙女缷金鈿􅄯說之以道作感事詩云干戈難作墻東客疾病猶存硯北身用避世墙東王君公事而硯北身乃漢上題􅁭集叚成式書云杯宴之餘常居硯北此又云長鉄硯北天機素少又云筆下詞友硯北諸生盖言几案面南人坐硯之北也予少年在㐮陽曽見絃伯容云唐人䏻造竒語者無􅀂劉夣得作連州􅆹壁記云環􅄘宻林激清儲隂海風敺温交􅀾不勝觸石轉柯化為凉颸城壓赭岡踞髙􅀒陽土伯嘘濕抵堅而㪚襲山逗谷化為鮮雲盖前人所未道者不獨此爾其他刻峭清䴡者不可槩舉學為文者不可不成誦也俞子容先生家藏書晉昌唐寅借校一一刪過其間魯魚甚多百不䏻􅀘其一二然裨益見聞亦為不少至􅀂􅁒人熟連州碑所未觧也墨荘漫録卷第十終
