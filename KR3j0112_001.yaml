body:
  text: 因上之道君曰斯物寧人臣家所蓄縝以元𣣔獻表言之止得賜幣焉此則亦脫首簡毗陵一士人姓常為蟹詩云水清詎免雙螯黑湯老難逃一背紅蓋譏朱勔父子田衍魏泰居襄陽郡人畏其吻謡曰襄陽二害田衍魏泰未幾李豸方叔亦來郡居襄陽人憎之曰近日多磨又添一豸唐庚子西嘗見桃李盛開而梅尚存𢾗枝因作詩時張無盡天覺𬒳召乃以詩投之云桃花能紅李能白春來無處無春色不應尚有𢾗枝梅可是東君苦留客向來開處當嚴冬李桃未在交遊中只今已是丈人行勿與年少爭春風無盡大加稱賞延安夫人蘇氏丞相子容妹曾子宣內也有詞行於世或以為東坡女弟適桞子玉者所作非也崇寧三年邦基伯父文簡公賔老自翰宛拜左丞而伯父倪老後除內相宣和八年宇文粹中自翰苑拜右丞而其季虛中除內相皆兄弟相代於北扉亦盛事也廣陵先生王逢原嘗詠暑熱思風詩云力卷雨來無歲旱盡驅雲去放天髙客有傳示王介甫嘆曰有致君澤民之志惜乎不振也逄原一日與王平甫𢾗人登蔣山相與賦詩而逄原先成舉𢾗聮平甫未屈至聞仰躋蒼崖顛下視白日徂夜半身在髙若騎箕尾居乃嘆曰此天上語非我曹所及遂閣筆襄陽有一曹掾不為郡將所禮屢窘幾殆一日掾𬒳召以詩上郡將而别之有云已覺目光在牛角未信鞭長及馬腹郡將雖嘉賞而愈銜之蔡元長魯公在位賜賚無窮而用度亦廣京師感慈走修浮啚一題三千緡時有吳錬師者丹陽人辟榖修飬館于西園庵中後有隙地吳勸令蒔麥既穫頗厭狼籍公見之題詩于庵曰塔緣便入三千貫月俸無餘一萬緡却向西園課小麥老來顛倒見愁人胡師文元質侍郎知利州一日晝寢書室蹶然而興呼吏問曰適有人投訟牒自稱吳伴姑吏無有斯須復夢如𥘉既覺復呼吏曰倅􅈦庖舍在何所其户牖何向吏具白之即命駕至彼率倅同觀指一隅命􅓩發之不𢾗尺得一婦人尸倒植土中衣履猶未敗蓋前倅子舍之婢因捶死瘞於此人莫知之因命具棺衾薦以佛事復夢婦人云今免倒形以就安宅且將訴於隂府矣感激而去髙郵人徐伯通與直時為館客親見此事杜甫詩東閣觀梅動詩興還如何遜在揚州多不詳遜在揚州之説以本傳考之但言遜天監中為尚書水部郎南平王引為賔客掌書記室薦之武帝與吳均俱進幸後稍失意帝曰吳均不均何遜不遜遜卒於廬陵王記室亦不言在揚州也及觀遜有梅花詩見於藝文類聚初學記云兔園標節物驚時最是梅銜霜當路發映雪擬寒開枝橫却月觀花繞凌風臺朝灑長門泣夕注臨卭杯應知早雕落故逐上春來余後見别本遜文集乃有此詩而集首有梁王僧儒所作序乃云遜東海郯人舉本州秀才射䇿為當時之魁歷官奉朝請時南平王殿下為中權將軍揚州刺史望髙右戚曰賢主擁篲分庭愛客接士東閣一開競收揚馬左席暫起爭趨鄒枚君以詞藝早聞故深親禮引為水部行參軍事仍掌文記室云云乃知遜嘗在揚州也蓋本傳但言南平引為記室略去揚州耳然東晉宋齊梁陳皆以建業為揚州則遜之所在揚州乃建業耳非今之廣陵也隋以後始以廣陵名州潤州州蘇氏家書畫甚多書之絶異者有太宗賜易簡御書宋玉大言賦并名真戒酒批答鍾繇賀吳滅關羽上文帝表王右軍答會稽內史王述書雪晴寄山隂張侯帖獻之秋風詞梁蕭子雲節班固漢史唐禇遂良模本蘭亭李太白天馬歌賀知章醉中吟張長史書逸人壁顔魯公進文殊碑讃李陽冰篆新泉銘永禪師真草千文齊已題贈並皆真迹名畫則顧凱之雪霽圖望五老峯啚北齊舞鶴啚閻立本醉道啚吳道子六甲神薛稷戲鶴陳宏蕃馬韓幹御馬戴嵩牛啚王維臥披啚邉鸞雀竹李將軍曉景屏風李成山水徐熙草蟲黃筌墨竹居寧翎毛董羽龍水劉道士鬼神刀處士竹石鍾隱乳兔物之尤異者有明皇賜蘇小許公四代相玉印贊皇父子石研石兔竹拂連理拄杖陳後主宫娃七寶束帶雷公斧珊瑚筆架玉連環皆希世之寶皆散逸或有歸御府者今不知流落何處荆公退居金陵蔣山學佛者俗姓吳日供灑掃山下田家子也一日風墮挂壁舊烏巾吳舉之復置于壁公適見之謂曰乞汝歸遺父𢾗日公問幞頭安在吳曰父村老無用貨於市中嘗賣得錢三百金供父感相公之賜也公嘆息之因呼一僕同吳以原價往贖且戒苟以轉售即不須訪索果以弊惡猶存乃贖以歸公命取小刀自於巾腳刮磨燦然黃金也蓋禁中所賜者乃復遺吳吳後潦倒竟不能祝髮以竹工居真州政和丙申年豫嘗令造竹器親説如此時已年六十餘貧窶之甚亦命也呂溫卿為浙漕既起錢濟明獄又發廖明略事二人皆廢斥復𣣔網羅參寥未有以中之會有僧與參寥有隙言參寥度牒冒名蓋參寥本名曇潛因子瞻改曰道潛溫卿索牒驗之信然竟坐刑之歸俗編管兖州未幾溫卿亦為孫傑鼎臣發其贓濫繫獄人以為災人者人必反災之孔雀毛著龍腦則相綴禁中以翠羽作帚每幸諸閣擲龍腦以辟穢過則以翠羽掃之皆聚無有遺者亦若磁石引針琥珀拾芥物類相感然也中表錢洎子全穆父之孫蒙仲之子三歲喪父自少刻苦能立志好學有節操何栗榜登科即丁母艱及第十餘年未嘗到官試中學官除濟南府教授車駕駐蹕揚州有薦權國子博士者始入局參謁長二方茶疾作仆地輿歸一夕而殂竟無一日之祿惜哉命薄如此可為奔啚躁求之戒世傳宗室中昔有昏􅍝俗呼為厥撤太尉一日坐宫門見釘鉸者亟呼之命僕取弊履令工以革護其首工笑曰非我技也公乃悮曰我謬也誤呼汝矣適𣣔喚一錮漏俗呼骨路者耳聞者大笑之王黼將明盛時搜求四方瓌竒之物以充玩好有人以核桃半枚來獻中容米三四斗其間題詠之字滿矣李之儀端叔題云觀此桃則退之所謂華山十丈蓮信有之矣今不知存否也豫嘗觀洽聞記云吐谷渾桃大如六石甕豈非此桃也耶晉昌唐寅校畢墨莊漫録卷第一
