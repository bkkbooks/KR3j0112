body:
  text: 因上之道君曰斯物寧人臣家所蓄縝以元𣣔獻表言之止得賜幣焉此則亦脫首簡毗陵一士人姓常為蠏詩云水清詎免雙螯黒湯老難逃一背紅盖譏朱勔父子田衍魏泰居㐮陽郡人畏其吻謡曰㐮陽二害田衍魏泰未幾李豸方叔亦來郡居㐮陽人憎之曰近日多磨又添一豸唐庚子西嘗見桃李盛開而梅尚存𢾗枝因作詩時張無盡天覺𬒳召乃以詩投之云桃花䏻紅李䏻白春來無䖏無春色不應尚有𢾗枝梅可是東君苦留客向来開䖏當嚴冬李桃未在交游中只今已是丈人行勿與年少争春風無盡大加稱賞延安夫人蘇氏丞相子容妹曾子宣内也有詞行於世或以為東坡女弟適桞子玉者所作非也崇寧三年邦基伯父文簡公賔老自翰宛拜左丞而伯父倪老後除内相宣和八年宇文粹中自翰苑拜右丞而其季虚中除内相皆兄弟相代於北扉亦盛事也廣陵先生王逢原嘗詠暑熱思風詩云力卷雨來無歲旱盡驅雲去放天髙客有傳示王介甫嘆曰有致君澤民之志惜乎不振也逄原一日與王平甫𢾗人登蒋山相與賦詩而逄原先成舉𢾗聮平甫未屈至聞仰躋蒼崖顛下視白日徂夜半身在髙若騎箕尾居乃嘆曰此天上語非我曹所及遂閣筆㐮陽有一曹掾不為郡将所禮屡窘幾殆一日掾𬒳召以詩上郡将而别之有云已覺目光在牛角未信鞭長及馬腹郡将雖嘉賞而愈衘之蔡元長魯公在位賜賚無窮而用度亦廣京師感慈走修浮啚一題三千緡時有吴錬師者丹陽人辟榖修飬舘于西園庵中後有隙地吴勸令蒔麥旣穫頗厭狼籍公見之題詩于庵曰塔縁便入三千貫月俸無餘一萬緡却向西園課小麥老來㒹倒見愁人胡師文元質侍郎知利州一日晝寝書室蹶然而興呼吏問曰適有人投訟牒自稱吴伴姑吏無有斯湏復夣如𥘉旣覺復呼吏曰倅􅈦庖舎在何所其户牖何向吏具白之即命駕至彼率倅同觀指一隅命􅓩發之不𢾗尺得一婦人尸倒植土中衣履猶未敗盖前倅子舎之婢因捶死瘞於此人莫知之因命具棺衾薦以佛事復夣婦人云今免倒形以就安宅且将訴於隂府矣感激而去髙郵人徐伯通與直時為舘客親見此事杜甫詩東閣觀梅動詩興還如何遜在揚州多不詳遜在揚州之說以本傳考之但言遜天監中為尚書水部郎南平王引為賔客掌書記室薦之武帝與吴均俱進倖後稍失意帝曰吴均不均何遜不遜遜卒於廬陵王記室亦不言在揚州也及觀遜有梅花詩見於藝文類聚初學記云兔園標節物驚時最是梅衘霜當路發映雪擬寒開枝横却月觀花遶凌風䑓朝洒長門泣夕注臨卭杯應知早彫落故逐上春來余後見别本遜文集乃有此詩而集首有梁王僧儒所作序乃云遜東海郯人舉本州秀才射䇿為當時之魁歴官奉朝請時南平王殿下為中權将軍揚州刺史望髙右戚曰賢主擁篲分庭愛客接士東閣一開競收揚馬左席暫起争趨鄒枚君以詞藝早聞故深親禮引為水部行參軍事仍掌文記室云云乃知遜嘗在揚州也盖本傳但言南平引為記室畧去揚州耳然東晋宋齊梁陳皆以建業為揚州則遜之所在揚州乃建業耳非今之廣陵也隋以後始以廣陵名州潤州州蘇氏家書畫甚多書之絶異者有太宗賜易簡御書宋玉大言賦并名真戒酒批荅鍾繇賀吴㓕關羽上文帝表王右軍答會稽内史王述書雪晴寄山隂張侯帖献之秋風詞梁䔥子雲節班固漢史唐禇遂良模本蘭亭李太白天馬歌賀知章醉中吟張長史書逸人壁顔魯公進文殊碑讃李陽冰篆新泉銘永禅師真草千文齊已題贈並皆真跡名畫則顧凱之雪霽圖望五老峯啚北齊舞鶴啚閻立本醉道啚吴道子六甲神薛稷戯鶴陳宏蕃馬韓幹御馬戴嵩牛啚王維臥披啚邉鸞雀竹李将軍暁景屏風李成山水徐熈草虫黄筌墨竹居寧翎毛董羽龍水劉道士鬼神刀䖏士竹石鍾隱乳兎物之尤異者有明皇賜蘇小許公四代相玉印賛皇父子石研石兎竹拂連理拄杖陳後主宫娃七寳束帯雷公斧珊瑚筆架玉連環皆希世之寳皆㪚逸或有歸御府者今不知流落何䖏荆公退居金陵蒋山學佛者俗姓吴日供洒掃山下田家子也一日風堕掛壁舊烏巾吴舉之復置于壁公適見之謂曰乞汝歸遺父𢾗日公問幞頭安在吴曰父村老無用貨於市中嘗賣得錢三百金供父感相公之賜也公嘆息之因呼一僕同吴以原價徃贖且戒苟以轉售即不湏訪索果以弊惡猶存乃贖以歸公命取小刀自於巾脚刮磨燦然黄金也盖禁中所賜者乃復遺吴吴後潦倒竟不䏻祝髪以竹工居真州政和丙申年予嘗令造竹噐親說如此時已年六十餘貧窶之甚亦命也呂温卿為浙漕旣起錢濟明獄又發廖明略事二人皆廢斥復𣣔網羅叅寥未有以中之㑹有僧與叅寥有隙言叅寥度牒冒名盖叅寥本名曇潜因子瞻改曰道潜温卿索牒騐之信然竟坐刑之歸俗編管兖州未幾温卿亦為孫傑鼎臣發其贓濫繫獄人以為菑人者人必反菑之孔雀毛着龍腦則相綴禁中以翠羽作帚每幸諸閣擲龍腦以辟穢過則以翠羽掃之皆聚無有遺者亦若磁石引針琥珀拾芥物類相感然也中表錢洎子全穆父之孫蒙仲之子三歳䘮父自少刻苦䏻立志好學有節操何㮚榜登科即丁母艱及第十餘年未嘗到官試中學官除濟南府敎授車駕駐蹕揚州有薦權國子博士者始入局參謁長貳方茶疾作仆地輿歸一夕而殂竟無一日之禄惜哉命薄如此可為奔啚躁求之戒世傳宗室中昔有昏􅍝俗呼為厥撤太尉一日坐宫門見釘鉸者亟呼之命僕取弊履令工以革護其首工笑曰非我技也公乃悮曰我謬也誤呼汝矣適𣣔喚一錮漏俗呼骨路者耳聞者大笑之王黼将明盛時搜求四方瓌竒之物以充玩好有人以核桃半枚來獻中容米三四斗其間題詠之字滿矣李之儀端叔題云觀此桃則退之所謂華山十丈蓮信有之矣今不知存否也予嘗觀洽聞記云吐谷渾桃大如六石甕豈非此桃也耶晉昌唐寅校畢墨荘漫録卷第一
