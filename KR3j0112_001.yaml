front:
  text: 墨荘漫録卷第一僕以聞見慮其忘也書藏其篋歸耕山間遇力罷釋耒之壟上與老農憇談非敢示諸好事也其間是非毁譽均無容心焉僕性喜藏書随所寓榜曰墨荘故題其首曰墨荘漫録淮海張邦基子賢范蜀公乞致仕章四上未允第五章言臣所懐有可去者二謂言青苗不見聴一可去薦蘇軾孔文仲不見用二可去章旣上遂得請張宣徽安道守成都眷籍娼陳鳳儀後𢾗年王懿敏仲儀出守蜀安道祝仲儀致書與之仲儀至郡呼鳳儀曰張尚書頃與汝留情乎鳳儀泣下仲儀曰亦嘗遺尺牘今且存否曰迨今蓄之仲儀云尚書有信至汝可盡索舊帖吾𣣔觀之不可隱也遂悉取呈韜於錦嚢甚宻仲儀謂曰尚書以剛勁立朝少與多仇汝母以此黷公乃取書付鳳儀并嚢盡焚之後語安道張甚感之王張姻家也東坡在杭州一日遊西湖坐孤山竹閣前臨湖亭上時二客皆有服預焉乆之湖心有一綵舟漸進亭前靚粧𢾗人中有一人尤麗方鼓筝年且三十餘風韻閒雅綽有態度二客競目送之曲未終翩然而逝公戯作長短句云鳯凰山下雨𥘉晴水風清晚霞明一朶芙蓉開過尚盈盈何䖏飛來雙白鷺如有意慕娉婷忽聞江上弄哀箏并郡宅後池光亭臺上白公檜世傳白樂天手植也此朱勔進后事首有脫字以上是一事創造以下别是一事創造二大舟費八千緡以獻時常潤間河渠淺淤重載不前乃先繪圖以聞宸翰賜石名神運昭功敷慶萬年之峯時人莫不目擊余時𥘉至吴中亦獲一觀是秋方至京師詔置于艮嶽范純仁尭夫丞相薨禮官謚曰忠宣考功鄧忠臣議曰每思捐身而開䇿嘗願休兵而息民秪知扶危而濟傾寧恤䟦前而㚄後又曰讒言亂國而明蔡確之無罪姦黨投石而謂大防之可原當衆人莫敢言之時在偏州無所用之地義形色正憤激至誠非特救當世正人端士之織羅直𣣔戒後世亂臣賊子之迷國狥公忘已為國惜賢又曰父母之國有時而去股肱之義於是或虧放之江湖忽如草芥紉蘭澤畔更甚屈原之忠占鵩坐隅已分賈生之死又曰側席南望而快浮雲之蔽趋節東歸而詠零雨之濛又曰法座想見其風采詔書相望於道塗云云時論皆以為允當崇寧𥘉追奪元謚并定謚覆官並罰銅二年六月言者再論忠臣得宫祠東坡作儋耳山詩云突兀隘空虗他山㧾不如君看道傍石盡是𥙷天餘叔黨云當作者傳冩之誤一字不工遂使全篇俱病王荆公書清劲峭㧞飄飄不凢世謂之横風疾雨黄魯直謂學王濛米元章謂學楊凝式以余觀之乃天然如此武帝建安二十年冬十月始置名號至五大夫與舊列侯關内侯凡六等以賞軍功名號侯爵十八級關中侯爵十七級皆金印紫綬又置關内外侯十六級銅印亀紐墨綬五大夫十五級銅印環紐亦墨綬皆不食租此印决曹氏物也表舅唐悊端仲見之亦以予言為然乃賦詩云關中金印豈秦關想見風流漢已還大饗似書譙縣石蘭亭寧𢾗會稽山空餘此日歸嚢槖曽是當年雜佩環萬户兄将取如斗此章何足繫腰間後范左轄謙叔在方城以書求借舅氏不與也此則亦缺首簡崇寧初旣立黨籍臣僚論元祐史官云初大臣挾其私忿濟以邪說力引儇浮與其厚善布列史職毁詆先烈或鑿空造語以厚誣若范祖禹黄庭堅張耒秦觀是也或隱沒盛徳而不録若曾肇是也或含糊取容而不敢言若陸佃是也皆再謫降時舊史已盡改矣王鞏定國為太常博士常從術士作軌革畫一堂廡庭中有明珠一枚旁置棊局未幾為御史朱光庭所抨得𥙷外東坡在海外瓊州士人姜公弼來從學坡題其扇云滄海何曾断地脉白𫀆或作朱厓端合破天荒公弼求足之坡云候汝登科當為汝足後入廣𬒳貢至京師時坡已薨乃謁黄門於許下子由乃為足之云生長間已異風流稷下古諸姜適從瓊𬋩魚龍窟秀出羊城翰墨埸滄海何曽断地䐂白𫀆端合破天荒錦衣他日千人看始信東坡眼目長國朝宗室例除環衞𥙿陵始以非袒免𥙷外官継有登科者然未有為侍從者宣和五年始除子崧徽猷閣待制継而子植亦除八年又除子櫟宗室為從官自伯山始然皆外任未有任禁從者紹興三年始除子晝侍郎皆子字也然其他字號未有也十八年始除不棄侍郎不字任禁從自徳夫始香滿釣筒萍雨夜緑揺花塢栁風春舒亶信道詩也信道清才而詩刻削有如此者又有云空外水光風動月暗中花氣雪藏梅又云宿雨閣雲千嶂碧野花弄日一村香又云萬壑水澄知月白千林霜重見松髙皆警句也韓駒子蒼詩云倦鵲遶枝翻凍影征鴻摩月墮孤音誠佳句也但太費工夫浮休居士張芸叟乆經遷旣還鞅鞅不平嘗内集分題賦詩其女得蠟燭有云莫訝涙頻滴都縁心未灰浮休有慙色自是無復躁進意司馬朴之室浮休之女也有詩在鄜延路上一寺中一聮云滿地煙含芳草緑倚欄露泣海棠紅或云便是詠燭者紹聖初逐元祐黨人禁中䟽出當責人姓名及廣南州郡以水土美惡係罪之輕重而貶竄焉執政聚議至劉安世噐之時蒋之竒頴叔云劉某平昔人推命極好章惇子厚以筆於昭州上點之云劉某命好且去昭州試命一廵杜子美玄都壇歌子規夜啼山竹裂王母晝下雲旗翻說者多不暁王母或以謂瑶池之金母母也中官陳彦和言頃在宣和間掌禽苑四方所貢珎禽不可殚舉蜀中貢一種鳥状如燕色紺翠尾甚多長飛則尾開顫裊如两旗名曰王母則子美所言乃此禽也盖遐方異種人罕識者子規夜啼山竹裂言其聲清越如竹裂也鄱陽胡詠之朝散生平好道元符初嘗於信州弋陽縣見一道人青巾葛衣神氣特異因揖而延之對飲道人止取大白滿引無筭曰君有從軍之行去否胡竦然曰當去盖是時𣣔就熈和河帥姚雄之辟也道人曰西陲方用師好去索𥿄書詩曰濟世湏應不世才調羹重見用塩梅種成白璧人何䖏熟了黄梁夣未囬相府舊開延士閣武夷新築望仙䑓青雞唱徹亟關暁好卷游幃歸去來授詠曰爲我以此寄章相公且曰章相公好箇人又錯了路徑也詠叩其說但云未可立談胡問其姓名亦不肯言曰吾非晚亦游邉可以復相見夜艾詠曰先生可就此寝曰吾歸邸中只在河下乃拂衣去明日遣人徃諸邸尋問皆云未嘗有道人因告縣令徧邑物色竟無曾見者詠至京師見王副車詵具告以此𣣔持詩謁子厚詵曰不可上方以邉事倚辨相公丞相得此必堅請去上必疑恠詰其所以然君且得罪詠以為然徑趋姚幕從取青唐曁還闕則子厚已去矣他日子厚北歸聞有此詩就詠求之其真本已為附車奄有之乃録寄子厚見詩歎曰使吾早得此詩去位乆矣豈復有今日之事乎方詠之在邉日嘗至秦州天慶觀聞說吕先生在此月餘近日方去矣問何以知其為吕道士云道人去時適道人衆赴隣郡醮道人顧小童曰吾且去借筆書壁侯師歸示之小童辭以觀新修師戒勿令題涴乃曰煩貯火殿鑪吾𣣔禮三清而去旣而行殿後砌下有石池水甚清泚乃以瓜畫殿壁留詩云石池清水是吾心漫𬒳桃花倒影沉一到邽山空闕内消閑塵累七絃琴囬後看題衆驚嘆以為必吕翁也壁甚髙其字非手可䏻及邽山即㤗山也詠因思弋陽所遇有游邉之約豈非斯人歟此說予聞江元一太𥘉云宿州靈璧縣張氏蘭臯園一石甚竒所謂小蓬萊也蘇子瞻愛之題其上云東坡居士醉中觀此􅎈然而醒子瞻之意盖取李徳𥙿平泉荘有醒醉石則踞之乃醒也蒋頴叔過見之復題云荆溪居士暑中觀此爽然而凉吴右司師禮安中為宿守題其後云紫溪翁大暑醉中讀二題一笑而去張氏皆刻之石後歸禁中姑蘇士人家有玉蟾蜍一枚皤腹中空每焚香置爐邉煙盡歸腹中乆之冉冉復自蟾口噴出亦異物也退之詩風䏻折黄觜露亦染梨腮魯直本亦作風稜露液又與興元宴集詩有云茫漫華墨間墨當作黒華梁黒水惟梁州興元梁州也吴安中少年時為堠子詩云行客徃来渾望我我於行客本無心喜為人書之李啇隱錦瑟詩云荘周暁夣迷蝴蝶望帝春心托杜䳌滄海月明珠有涙藍田日煖玉生煙人多不暁劉貢父詩話云錦瑟令狐綯家青衣亦莫䏻考瑟譜有適怨清和四曲名四句盖形容四曲耳方亞夫幾仲興化人乙軍五百至省闈皆不捷嘗夣廷試而無試卷甚惡之晚以八行舉詔免廷試賈安宅榜唱名排入第一甲以通直郎終崇寧中𥘉興書畫學米芾元章方為太常博士奉詔以黄庭小楷作千文以獻継以所藏法書名畫来上賜白金十八笏是時禁中萃前代筆蹟號宣和御覧宸翰序之詔丞相蔡京跋尾芾亦𬒳㫖預觀已而出知無為軍復召為書學博士便殿賜對詢移晷因上其子友仁楚山清暁圖旣退賜御書畫扇各二遂除春官外郎人以為荣十八笏盖戯之耳宣和癸卯平江朱勔採石太湖黿山得一石長四丈有竒廣得其半玲瓏嵌空竅穴百千非雕刻所䏻成也此則即并郡宅後云云首簡
