body:
  text: 墨莊漫録卷第八宗室令穰大年善丹青清潤有竒趣少年讀書慕唐王維李思訓畢宏韋偃皆以畫得名乃刻意學之下筆便有自得一時賢士大夫喜與之遊皆求其筆亦頗厭其誅求慨然嘆曰懷素有云無學書終為人所使𣣔絶筆不為但名已著終不得已又善作小草書小字如蠅蚊筆遒而法具諦觀之目力茫然皆合羲獻之體是又所難也米元章謂大年作畫清麗雪景類王維汀渚水鳥有江湖意豫在京師時嘗偶得大年所作橫卷歸田圖竹籬茅舍煙林蔽虧遙岑逺水咫尺千里葭蕪鷗鷺宛若江鄉蓋大年得意畫也表舅唐端重題詩云聞君新得小山川畫手來從郜雍賢不學農夫焉用稼若為王子豈知田我真隴上躬耕客親見人間小隱天始識阿年京樣熟菊籬寧似景龍邉菊籬景龍門下景也後為吳舅順啚取此軸去今亡於兵火又有士雷亦妙繪事嘗於錢德輿次權少卿家見所作寒溪小雪橫卷翎毛竹木種種皆竒可亞大年云章友直伯益以篆得名召至京師翰林院篆字待詔𢾗人聞其名然心未之服俟其至俱來見之云聞先生之藝久矣願見筆法以為模式伯益命粘𥿄各𢾗張作二啚即令泚墨濡毫其一縱橫各作十九畫成一棋局其一作十圓圈成一射帖其筆之粗細間架踈密無毫髮之失諸人見之大驚嘆服再拜而去熙寧五年杭州民裴氏妾夏沉香浣衣井旁裴之嫡子戲誤墜井而死其妻訴於州必謂沉香擠之而墜也州委録參杜子方司户陳圭司理戚秉道三易獄皆同沉香從杖一百斷放時陳睦任本路提刑舉駁不當劾三掾皆罷州委秀州倅張若濟鞠勘許其獄具即以才薦竟論沉香死故東坡送三掾詩云殺人無驗終不快此恨終身恐難了其後睦還京師久之未有所授聞廟帥邢生頗從仙人遊能知休咎乃往見之叩以來事邢拒之弗答而語所親曰其如沉香何睦聞之悚懼汗下廢食者纍日釋氏所云冤懟終不可免可不戒哉紹聖𥘉元東坡帥中山得黑石白脈如孫知微所畫石間奔流盡水之變又作白石大盆以盛之激水其上名其室曰雪浪齋公自銘有云玉井芙蓉丈八盆伏流飛空潄其根時四月二十日也閏四月三日乃有英州之命其後謫惠州又徙海外故中山後政以公遷謫雪浪之名廢而不問元符庚辰五月公始𬒳北歸之命明年夏方至吳中時張藝叟守中山方葺治雪浪齋重安盆石方𣣔作詩寄公九月聞公之薨乃作哀詞有云我守中山乃公舊國雪浪簘齋於焉食宿俯察履綦仰看梁木思賢閲古皆經貶逐玉井芙蓉一切牽復云云其詞曰石與人俱貶人亡石尚存却憐堅重質不減浪花痕滿酌中山酒重添丈八盆公兮不歸些萬里一招魂思賢閲古皆中山後圃堂名也鎮江府兵火之餘有石一株在瓦礫中勢如掀舞色紺而澤竒物也上有刻字云有唐上元甲子歲頴川陳良參叨尹延陵獲此石置西齋之前銘曰嵳嵳峩峩蒼翠其多是稟混元非因琢磨置于庭隅公退常過冝乎乃身居髙之阿後期來者見兹若何其後又有今人刻字云皇宋治平丙午歲仲夏晦日邑令掌文紀於壞垣得之立于此後為都統王侯勝所得移置于所居園中有一士大夫見而愛之紿曰此本吾家舊物也先君平音寶惜之不意尚存於兹願復歸我王侯𣣔許之有一將校聞之謂主將曰不可與之此石上有上元甲子及皇宋治平之語恐朝廷聞之來取之當以此意拒之王侯用其説遂止今按唐之上元甲子德宗之興元元年也距今紹興上元甲子三百六十年矣堅頑閲世如是之久信乎金石之夀也婦人之纒足起於近世前世書傳皆無所自南史齊東昏侯為潘貴妃鑿金為蓮花以帖地令行其上曰此步步生蓮花然亦不言其弓小也如古樂府玉臺新詠皆六朝詞人纎艷之言類多體狀美人容色之姝麗又言粧飾之華眉目唇口腰支手指之類無一言稱纏足者如唐之杜牧李白李啇隱之徒作詩多言閨幃之事亦無及之者惟韓偓香奩集有詠􅓏子詩云六寸膚圍光緻緻唐尺短以今校之亦自小也而不言其弓飲席刻木為人而鋭其下置之盤中左右欹側僛僛然如舞狀久之力盡乃倒視其傳籌所至酬之以杯謂之勸酒胡程俱致道嘗作詩云簿領青州掾風流麴秀才長煩拍浮手持贈合歡杯屢舞回風急傳籌白羽催深慚偃師氏端為破愁來或有不作傳籌但倒而指者當飲木犀花江浙多有之清芬漚欎餘花所不及也一種色黃深而花大者香尤烈一種色白淺而花小者香短清曉朔風香來鼻觀真天芬仙馥也湖南呼九里香江東曰岩桂浙人曰木犀以木紋理如犀也然古人殊無題咏不知舊何名故張藝叟詩云佇馬𣣔尋無路入問僧曽折不知名蓋謂是也王以寧周士道中聞九里香花詩云不見江梅三百日聲斷紫簘愁夢長何許緑裙紅帔客御風來送返魂香近人採花蕊以薰蒸諸香殊有典刑山僧以花半開香正濃時就枝頭採擷取之以女真樹子俗呼冬青者搗裂其汁微用拌其花入有油磁瓶中以厚𥿄羃之至無花時於密室中取置盤中其香裛裛中人如秋開時復入器藏可久留也樹之幹大者可以旋為盂蓋茶托種種器用以淡金􅃮飾之殊可佳也眺無咎和李秬雙頭牡丹有云二喬新獲吳宮怯雙隗𥘉臨晉帳羞月地故應相伴語風前各是一般愁政和間汴都平康之盛而李師師崔念月二妓名著一時眺沖之叔用每會飲多召侑席其後十許年再來京師二人尚在而聲名溢于京國李生者門地尤峻叔用追感往昔成二詩以示江子之其一云少年使酒來京華縱步曽遊小小家看舞裳霓羽衣曲聽歌玉樹後庭花門侵楊栁垂珠箔窗對櫻桃捲碧紗坐客半驚隨逝水吾人星散落天涯其二云春風踏月過章華青鳥雙邀阿母家繫馬栁低當户葉迎人桃出隔墻花鬢深叉暖雲侵臉臂簿衫寒玉照紗莫作一生惆悵事鄰州不在海西涯靖康中李生與同輦趙元奴及築毬吹笛袁陶武震輩列籍其家李生流落來浙中士大夫猶邀之以聽其歌然憔悴無復向來之態矣韓退之木居士偶然題作木居士便有無窮祈福人蓋當時以枯木類人形因以乞靈也在今衡州之耒陽縣北沿流三十里鼇口寺至今人祀之元豐初年旱暵縣令禱之不應為令折而焚之主僧道符乃更刻木為形而事之張藝叟南遷郴州過而見之題詩于壁云波穿火透本無竒初見潮州刺史詩當日老翁終不免後來居士𣣔奚為山中雷雨冝誰主水底蛟龍睡不知若使天年俱自遂如今已復長新枝豫每憤南方淫祠之多所至有之陸龜蒙所謂有雄而毅􅉳而碩者則曰將軍有溫而願哲而少者則曰某郎有媪而尊嚴者則曰姥有婦而容者則曰姑而三吳尤甚所主之神不一或曰太尉或曰相公或曰夫人或曰娘子村氓家有疾病不服藥劑惟神是恃事必先禱之謂之問神苟許其請雖冒險以觸憲綱必為之倘不諾其請卒不敢違也凡禱必許以牲牢祀謝封敕命物所費不資禱而不驗病者已殂猶償所許之祭曰弗償其禍必甚無知之俗以神之禦災捍患為可倚惴惴然不敢少懈也豈獨若曹乎近時士大夫家亦漸習此風士夫稍有識者心知其非而見女子之易惑故牽於閨幃之愛亦遂徇俗殊可駭嘆且神聰明正直而一者也豈有以酒食是嗜而竊福以叨餮於愚魯之民豈又所謂聰明正直者也至於嶽也瀆也古先賢德有功於人載在祀典血食一方者吾敢不欽奉之乎所謂郎者姑者安能禍福於忠信之士吾所未信也世豈無一狄公為一革之木居士既為令之所焚矣彼庸髠者復假托以惑衆此尤可嘆云東坡在黃州而王文甫家東湖公每乘興必訪之一日逼歲除至其家見方治桃符公戲書一聮於其上云門大要容千騎入堂深不覺少年歡歐陽文公本朝第一等人也其前言往行見於國史墓碑及文集諸書中詳矣豫復得四事於公之曽孫當世望之云嘗載於瀧岡阡表瀧岡阡蓋歐陽氏松楸壠名也今不傳於世惜其遺沒因識於此一云公於為政仁恕多活人性命曰此吾先公之志也嘗曰漢法惟殺人者死後世死刑多矣故凡於死非已殺人者多活之其為河北轉運使所活二千餘人先是保州屯兵閉城叛命田況李昭亮等討之不克卒招降之既開城况等推究反者二千餘人投於八井又其次二千餘人不殺分隸河北諸州事已定而富相出為宣撫使恐其復為患謀𣣔密委諸州守將同日悉誅之計議已定方作文書會公奉朝旨權知鎮府與冨公相遇於內黃夜半屏人以其事告公公大以為不可曰禍莫大於殺降昨保州叛卒朝廷已降敕榜許以不死而招之八井之戮已不勝其冤此三千人者本以脅從故得下死奈何一旦無辜就戮爭之不能止因曰今無朝旨而公以便冝處置若諸郡有不逹事機者以公擅殺不肯從命事既參差則必生事是𣣔除害於未萌而反趣其為亂也且某至鎮必不從命冨公不得已遂止是時小人譛言已入冨范勢已難安既而冨公大閲河北之兵將卒多所升黜譛者獻言冨某擅命專權自作威福已收却河北軍情北兵不復知有朝廷矣於是京師禁軍亟因大閲多所升擢而冨公歸至國門不得入遂罷樞密知鄆州向若擅殺二千人其禍何可測也然則公之一言不獨活二千人命亦免冨公於大禍也二云公於修唐書最後至局專修紀志而已列傳則宋尚書祁其所修也朝廷以一書出於兩手體不能一遂詔公看詳列傳令刪修為一體公雖受命退而嘆曰宋公於我為前輩且人所見多下同豈可悉如已意於是一無所易及書成奏御史白舊例修書只列書局中官髙者一人姓名云某等奉敕撰而公官髙當書公曰宋公於列傳亦功深者為日且久豈可掩其名而奪其功乎於是紀志書公姓名列傳書宋姓名此例皆前未有自公為始也宋公聞而喜曰自古文人不相讓而好相陵掩此事前所未聞也三云公自言學道三十年所得者平生無怨惡爾公初以范希文事得罪于吕相坐黨人逺貶三峽流落纍年北吕公罷相公始𬒳進擢後為范公作神道碑言西事吕公擢用希文盛稱二人之賢能釋私憾而共力於國家希文子純仁大以為不然刻石時輒削去此一節云我父至死未嘗解仇公亦嘆曰我亦得罪於吕丞相者惟其言公所以信於後世也吾嘗聞范公自言平生無怨惡於一人兼其與吕公解仇書見在范集中豈有父自言無怨惡於一人而其子不使解仇於地下父子之性相逺如此公知穎州時吕公著為通判為人有賢行而深自晦默時人未甚知公後還朝力薦之由是漸見進用四云陳恭公執中素不喜公其知陳州時公自頴移南京過陳拒而不見後公還朝作學士陳為首相公遂不造其門已而陳出知亳州尋罷使相換觀文公當草制自謂必不得好詞及制出詞甚美至云杜門却掃善避權勢而免嫌處事執心不為毁譽而更守陳大驚喜曰使與我相知深者不能道此此得我之實也手録一本寄門下客李師中曰吾恨不早識此人文忠公又有雜書一卷不載於集中凡九事今亦附於此云秋霖不止文書頗稀叢竹蕭蕭似聽愁滴顧見案上故𥿄𢾗幅信手學書樞密院東􅈦一云謝希深嘗誦哭僧詩云燒痕碑入集海角寺留真謂此人作詩不必好句只求好意余以謂意好句亦好矣賈島有哭僧詩云寫留行道影焚却坐禪身唐人謂燒却活和尚此句之大病也近時九僧詩極有好句然今人家多不傳如馬放降來地雕盤戰後雲春生桂嶺外在人在海門西今之文士未必有如此句也學者勿浪書事有可記者他時便為故事作詩須多誦古今人詩不獨詩爾其餘文字盡然二云漢之文士善以文言道時事質而不俚兹所以為難往時作四六者多用古人語及廣引故事主衒博而不思述事不暢近時文章變體如蘇氏父子以四六述敘委曲精盡不減古文自學者變格為文殆今三十年始得斯人不惟遲久而後獲實恐此後未有能繼者耳自古異人間出前後參差不相待余老矣乃及見之豈不為幸哉三云空梁落燕泥未為警絶而揚廣不與薛道衡解仇於泉下豈荒焬所趨止於此耶大風起雲飛揚信是英雄之語也若漠漠水田飛白鷺隂隂夏木囀黃鸝終非已有又何必區區於攘竊哉四云作字要熟熟則神氣完實而有餘於靜坐中自是一樂事然患少睱豈若以樂處常不足耶書十年不倦當得名虛名已得而真氣耗矣萬事莫不皆然有以寓其意不知身之為勞也有以樂其心不知物之為纍也然則自古無不纍心之物而有為物所樂之心五云自蘇子美死後遂覺筆法中絶近年君謨獨步當世然謙讓不肯主盟往年余嘗戲謂君謨學書如泝急流用盡氣力不離故處君謨頗笑以謂能取譬今思此語已十餘年竟何如哉六云學書費𥿄猶勝飲酒費錢曩時嘗見康文公戒其子弟云吾平生不以全幅𥿄作封皮文康太原人世以晉人喜嗇而資談笑信有是哉吾年尚老亦不𣣔多耗用物誠未足以有益於人然衰年志思不壯於事少能快然亦其理耳七云蕭條淡泊此難畫者覽者未必識也故飛走遲速意近之物易見而間和嚴靖趣逺之心難形若乃髙下向背逺近重復此畫工之藝耳非精鑿之事也不知此論為是否余非知畫者強為之説但恐未必然也然自謂好畫者必不能知此也八云介甫嘗言夏月晝睡方枕為佳問其何理云睡久氣蒸枕熱則轉一方冷處然則真知睡者耶余謂夜彈琴惟石徽為佳蓋金蚌瑟瑟之類皆有光色燈燭照之則炫耀非老翁夜視所冝白石照之無光於目昏者為便介甫知睡真懶者余知琴得之二十年昨因患病兩手中指拘攣醫者言惟𢾗運動以導其氣之滯謂惟彈琴為可亦尋得十餘年已忘諸曲物理損益相因固不能窮至於如此老莊之徒多寓物以盡人情信有以也哉九云唐之詩人類多及窮士孟郊賈島之徒尤能刻琢窮苦之言以自喜或問二子其窮孰甚曰閬仙甚也何以知之曰以其詩見之郊曰種稻耕白水負薪斫青山島云市中有樵山我舍朝無煙井底有甘泉釡中乃空然蓋孟氏薪水自足而島家柴水俱無誠可笑然二子名稱髙於當世其餘林翁處士用意精到者往往有之若雞聲茅店月人迹板橋霜則羇孤行李流離辛苦之態見於𢾗字之中至於野塘春水漫花塢夕陽遲則春物融怡之情和暢又有言不能盡之意兹亦精意刻琢之之所得者耶往在洛時嘗見謝希深誦曰縣古槐根出官清馬骨髙又見晏丞相常愛笙歌歸院落燈火下樓臺希深曰清苦之意在言外而見於言中晏公曰世傳䓻萊公云老覺腰金重慵便枕玉涼以為冨貴北特窮相者耳能道冨貴之盛則莫如前句亦與希深所評者類耳以二公皆有情味而喜為篇詠者其論如此右永叔所書九事頃在京師貴人家見之當時人謁狀收書之字畫清徑多桞誠懸筆法愛而録之然其間稱馬放降來地及春生桂嶺外之句并論嚴維桞塘春水漫溫庭筠雞聲茅店月之工與夫賈島哭僧之誚皆已載於詩話中及晏元獻評冨貴之句亦見於歸田録但其言或不同故不敢刪削併録之云何薳子楚作春渚紀聞云關子明易傳李衛公對問皆阮逸著撰豫考之唐藝文志及本朝崇文總目皆無之子楚之言或然也又云龍城記乃王銍性之作樹萱録唐書藝文志小説類自有此名豈無言所作也此書所載諸事近於寓言而諸篇詩句皆佳絶蓋唐人之善詩者為之如江聲兼小雨暝色入啼猿藕隱玲瓏玉花藏縹眇容紅樹醉秋色碧溪彈夜絃網斷蛛猶織梁空燕不歸等句皆警絶非近人所能也墨莊漫録卷第八
