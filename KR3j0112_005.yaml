body:
  text: 墨莊漫録卷第五元豐五年狀元黃裳榜神廟御集英殿唱名至第三甲有暨陶者主司誤呼為暨去聲三呼之無應者蘇丞相頌時為吏部侍郎侍立上顧頌頌曰當呼為居乙切果應而出上曰卿何以知之出何書頌曰臣嘗觀三國時吳有暨豔造營府之論恐其後也問陶鄉里乃建州人上喜曰果吳人褒諭再三大觀三年狀元賈安宅榜徽廟御集英殿唱名至五甲有甄徹者中書侍郎林攄彥振唱名呼為甄籍延切徹自言姓甄之人切攄猶強辨之近侍匿笑繼而御史有言攄罷而出神廟朝御馬有曰玉逍遙者蓋赭白也嘗幸金明池歸乘之胡世將成公為中書舍人兼權給事中與張夀子公同在後省一日胡將上馬忽內逼乃解衣奏厠張戲之曰解衣脫冕而行舍人給事取急事同音𣣔尋屬對無有其事後李彌大似矩尚書知平江府似矩嘗為宣撫使趙九齡次張忽云子公之句吾有對矣可對棄甲曵兵而走宣撫尚書取常輸字同音聞者莫不大笑且以為的對蓋為帥臣嘗為賊所窘也范文正公長子監簿純佑自幼警悟明敏過人文正公所料事必先知之善能出神公在西邉凡虜情幾事皆預遙知蓋出神至虜廷得之故公每制勝料敵如神者監簿之力也一日因出神為人所驚自此神觀不足未幾而亡時甚少也公之族子誾彥和云邦基外祖父吳豪字特起世家臨川其兄仕於唐州而亡因家沿上治田於黃玉二陂遂以多資聞倜儻尚義潛德不曜荆公夫人之同祖兄弟也荆公更新法心不喜之將授之官力辭不願自外祖死伯舅元順啚持門户順啚蕭散風度雅意翰墨畜法書名畫甚冨烹茶焚香吟詩彈琴而己隴畝漫不省也坐是東臯廢弛歲不睱給乃委仲舅兊恱啚其墮敗悅啚孝友修願賙貧樂施有父風未幾多稼復如曩時歲收𢾗萬斛公心持已無絲髮之私輸載長兄房以聽出納恱啚奉太夫人盡子道待兄弟得怡怡之義四方親舊以貧投者存恤無厭臧獲咸無怨言鄉曲皆得其􅌚心宣和辛丑秋得病至冬不起視笥中衣無兩襲未嘗有一物私蓄也人始服其廉謹時京師調發科敷動以萬計適丁連年旱歉恱啚憂家成瘁鬱鬱感病其死𢾗日姪芾夢恱啚云吾有詩爾其志之及覺憶其二句云春風陌上一杯酒回首家原事若何蓋恱啚雖死猶不忘家也悲夫僧如壁乃江西進士饒節次子也少年嘗投書於曾子宣論新法非是不合乃祝髮更名尤長於詩嘗住𢾗剎士大夫多與之遊後改字德操梅花一聮云遂教天下無雙色來作人間第一春風味亦不淺又答吕居仁寄詩云長憶他時對短檠詩成重改又雞鳴如今老矣無心力口誦君詩繞竹行居仁甚稱之玉臺新咏梁沈約休文有六憶詩蓋艷詞也其後少有效其體者王全玉乃作宫體十憶詩李元􅈾重見之愛其詞意宛轉且曰讀之動人老狂不能已聊復效尤亦作十絶謂憶行憶坐憶飲憶歌憶書憶博憶顰憶笑憶眠憶粧也其一曰屏帳腰支出洞房花枝窣地引巾長裙邉遮定雙鴛小只有金蓮步步香其二云椅上􅃮花闞面平繡裙斜綽茜羅輕踏青姊妹頻來喚鴛履貪弓不意行其三云緑蟻頻傾不厭多帕羅香軟襯金荷從教弄酒春衫涴别有風流上眼波其四云一串紅牙碎玉𫾣碧雲無力駐晴霄也知唱到關情處緩按餘聲眼色招其五云纎玉參差象𬋩輕蜀箋小研一作砑碧窗明袖紗密映嗔郎看學寫鴛鴦字未成其六云小閣爭蒲畫燭低錦茵團坐玉相欹嬌羞慣𬒳諸郎戲袖映春䓤出注遲其七云漫注橫波無語處輕籠小板𣣔歌時千愁萬恨關心曲却使眉尖學别離其八云從來題目直千金無事羞多始見心乍向客前猶掩斂不知己覺鈿窩深其九云泥嬌成困日初長暫缷輕裙玉簟涼漠漠帳煙籠玉枕粉肌生汗白蓮香其十云宫樣梳兒金縷犀叉梁氷玉刻蛟螭眉間要點雙心字不𬋩蕭郎只畫眉其情致殊妍麗自非風流才思者不能作也藏書之冨如宋宣獻畢文簡王原叔錢穆父王仲至家及荆南田氏歷陽沈氏各有書目譙郡祁氏多書號外府太清老氏之藏室後皆散亡田沈二家不肖子盡鬻之京都盛時貴人及賢宗室往往聚書至多者萬卷兵火之後焚毀逮盡間有一二留落人間亦書史一時之厄也吳中曽旻彥和賀鑄方回二家書其子獻之朝廷各命以官皆經彥和方回手自讐校非如田沈家貪多務得舛謬訛錯也平江自朱勔用事花木之竒異者盡移供禁籞下至墟墓間珍木亦遭發鑿山林所餘惟合抱成圍或臃腫散者乃保天年建炎已酉冬洎庚戌春宣撫使周望留姑蘇諸將之兵斧斤日往樵斫俱盡棟梁之材析而為薪莫敢誰何諸山皆童矣亦草木一時之厄耶吳中魚市以斗計一斗謂二斤半松陵唱和皮日休釣似詩云一斗霜鱗換濁醪注云吳中買魚論斗酒即稱斤其來蓋逺矣然酒今已用升至市芡及𬞞反論斤土風不可革也僧謂酒為般若湯鮮有知其説者豫偶讀釋氏會要乃得其説云有一客僧長慶中留一寺呼淨人酤酒寺僧見之怒其粗暴奪瓶擊柏樹其瓶百碎其酒凝滯著樹如緑玉搖之不散僧曰某常持般若經須預飲此物一杯即諷詠瀏亮乃將瓶就樹盛之其酒盡落器中略無孑遺奄然流啜斯須器窳音庾酣暢矣酒之廋辭其起此乎樂全先生張安道薨東坡時守頴州於僧寺舉挂參酌古今用唐人服座主緦麻三月又别為文往祭其柩蓋感其知遇也王文公安石為相日奏事殿中忽覺偏頭痛不可忍遽奏上請歸治疾𥙿陵令且在中書偃臥已而小黃門持一小金杯藥少許賜之云左痛即灌右鼻右即反之左右俱痛並灌之即時痛愈明日入謝上曰禁中自太祖時有此𢾗十方不傳人間此其一也因并賜此方蘇軾自黃州歸過金陵安石傳其方用之如神但目赤少時頭痛即愈法用新四蔔取自然汁入生龍腦少許調勻昻頭使人滴入鼻竅舒信道敗荷詩云忍看夜影分殘月别送秋聲入晚風前輩云一郡之政觀於酒一家之政觀於虀蓋二物若善則其他可知矣處州縉雲縣簿􅈦舊為武尉司頃有一婦人常現形與人接妍麗間婉有殊色其來也異香芬馥非世間之香自稱曰英華或曰緑華前後官此者多為所惑建炎中一武尉與之配合如伉儷同僚皆預其宴集慧辨可喜與尉料理事家自言我非妖媚不害於人尉以郡檄部兵至楊州時車駕駐蹕淮南英華亦隨而行至揚州南門不肯入謂尉曰天子之所門有守禦之神我不可入我從此而逝矣然君之行若復差往泗上禍即至矣遂慘別而去尉至御營果令所部兵往泗州交割尉乃行未幾而北兵至遂不知存亡獨小得脫而歸英華已先至邑久矣其後有蔣敦書字輝逺永嘉人為邑簿英華出如平時其家母妻不安之而歸輝逺獨在官所英華時復出現其來也香先襲人輝逺不少動心一日謂輝逺曰君索居於此妾𣣔事巾櫛可乎而君介然不蒙眄顧亦木心石腸之人也輝逺曰汝冝亟反母相接也因齋戒具章奏𣣔祈天是夕復至曰君母庸訴我某無所舍得一芘身之地不復出矣輝逺曰汝果爾吾為汝立祠以祀何如華感激而去自是不復至輝逺越𢾗日亦忘之時家有素絲𢾗束一旦其絲悉穿繫於窗牗連絡不可解輝逺因悟曰吾許汝立祠而逾約矣即為汝謀之乃於􅈦事之偏室塑像以祠香火明日其絲悉已成束若不經手者其怪遂絶余舊聞斯事後見彼州士人所説悉同意其為草木之妖也龎寅孫待制一女有容色適毗陵胡道修甚雍睦數年後道修每夜即有一婦人來同寢龎或聞其語言𢾗詰之道修笑而不答一夜道修先就枕龎牽幔𣣔入其人自帳中出姿容妍麗自顧已不若也龎亦不懼道修曰子見之否不必怒也我與你同往訪之恍惚與道修同至一處如王侯第簾幕華煥廊廡間懸琉璃燈光彩奪目道修與龎方携手而行至一堂有一人自屏後來乃向帳中所出之人也道修捨龎走從之相挽而去已而對飲堂上龎憤之亟𣣔走歸顧門字悉關鐍倉皇至一處見有斷垣乃大呼踰之而出恍然而窹蓋夢也明日道修曰昨宵胡不少留乃怒而遁也自爾無可奈何時寅孫任發運使乃具舟楫迎其女并壻至真州召就醫召一道士能使物治病俾令治之道士以一木板一釘付龎戒令伺道修咳聲即以釘釘其板如其言釘之道修大呌曰是甚道理亟來奪之龎懼為所得擲板於河中時寅孫有館客在後舟見之即以手招之其板遂流至船邉館客取之拔去其釘道修大笑道士悵惋而去卒不可療乃復歸毗陵不復為怪也一日道修謂龎曰來日有人携一女子來求顧可為我得之慎勿靳其直而失之也明日果有人携老媪一村女來寢陋可駭道修見之喜曰是矣乃以𢾗千得之道修自是嬖惑此婢甚歡而向之人不得至矣蓋是怪依附此婢之體而道修見之乃向之人耳龎竟離歸道修與此婢生男女𢾗人亦無他怪待制之猶子溫孺潤甫言後問之胡氏信然宣和間朱勔應奉進為節度使子汝賢慶陽軍承宣使汝功靜江軍承宣使汝文閣門宣贊舍人弟績閣門宣贊舍人汝翼朝奉大夫直龍啚閣汝舟明州觀察使汝楫華州觀察使汝明榮州刺史孫絺繹約絢緯綬並閣門宣贊舍人綽紳並閣門祗候一時軒裳之盛未之有也靖康之𥘉籍其家並追奪悉竄嶺外蔡君謨作福守日有一書生投詩來謁云逺入青青疊疊峰峯前真宰讀書公半嵓冷落髙宗雨一枕凄涼吉甫風煙鎖豹眠間霧露井凋鳳宿舊梧桐九龍山下英雄氣盡屬君家世胄中君謨異之尋令人伺其所歸至一山下忽不見四顧無人唯一社屋爾意其社神也王荆公女適吳丞相之子封長安縣君者能詩嘗見親族婦女有服者帶白羅繫頭子者因戲為詩云香羅如雪􅍢新詩惹住烏雲不放回還似逺山秋水際夜來吹散一枝梅其姑丞相魚軒李氏侍從徐宥之女也亦能文有詩云絮飛栁陌三春雨花落梨園一笛風百尺玉樓簾半捲夜深人在水晶宫皆婦人有才思者可喜也邦基從伯康孫字曼老時彥榜髙科宰溧陽日晨有道士來謁授以藥二粒且以橡栗四十枚副之戒曰此去千日當有大厄冝封識如法勿令妾婦見之庶緩急可為備後至揚州遇母舅錢協穆父携二侍姬來偶探藥囊而未及取尋而得疾取藥無有矣計其時正三年竟不起云重和戊戌冬豫道由頴昌之汝墳驛壁間得廖正一明略手題三詩其一云阿憐二十頗有餘秀眉豐頰氷瓊膚無端𣣔作商人婦更枉方尋海畔夫其二云阿梅笄歲得同歡懊惱情深解夢蘭鶯語輕清花裡活桞條弱軟掌中看其三云淮源距襄陽亭候逾十舍征鞭背繡幃雲雨虛四夜雙艷盡傾城一姝偏擅價獨怒蕙心輕誤許商人嫁初不曉其意是年至唐州外氏家因舉是詩邦人任喻義可云頃年明略與郡之二營妓往來情好甚篤其一小字憐憐其一名梅時憐憐將為大賈所納明略既去道過汝墳作詩蓋有所感也憐憐竟隨賈去方尋海畔夫用海上有逐臭之夫事譏之也禁中舊有鴨腳子四本俗謂之銀杏大皆合抱其三在翠芳亭之北歲收實至𢾗斛而所托隂溢無可臨賞之所其一在太清樓之東得地顯敞可以就賞而未嘗著花也𥙿陵嘗臨觀而興嘆以謂事有不能適人意者如此越明年一枝遂花而結實至千餘瑩大可愛𥙿陵大恱命宴太清樓賞之分賜禁從有差逮次年則不復花矣中官帶御器械石璘者老於禁掖供奉嘗為何正臣去非言之正臣嘗記是事且謂凡草木之華實蓋有常性人主者為起一念乃能感格穹壤使隂陽造化之工為之巧徙曲成以適其一時之所𣣔豈為天子者凡一言動致蓋髙之鑒聽若影響之速耶由是觀之為人上者使有宋景公之言時發於城心則召應豈俟終日哉正臣所論如此邦基嘗從正臣之子薳子楚見其手書因復記之翟三丈公巽少年侍龍啚公守會稽時嘗賦猩猩毛筆詩甚竒妙何去非次韻和之云貌妍足巧語軀惡招歋􅟧賦形具人獸寧脫荆榛居肉嘗登䁀爼餉餽傳甘腴失計墮醉鄉顛躓無與扶柔毫就束縛航海歸仙癯浴質逸少池摛藻知章湖弒身固有用賦芧從衆狙坐令宣城工無復誇栗鬚宣城出栗鼠須筆文房甲四寶萬兔慙蒙膚𢾗管支十年閉門賦三都之子信豪邁嗜學每致劬未冠遊膠庠已推經行儒蓬山天祿閣峥嶸陵碧虛期子早登躡舍校魯魚公巽之詩恨未見有緑毛龜詩皆少年所作也豫在四明市舶局日同官司户王操粹昭郡檄往昌國縣普陀山觀音洞禱雨歸為豫言普陀山去昌國兩潮山不甚髙峻山下居民百許家以魚鹽為業亦有耕稼有一寺僧五六十人佛殿上有頻伽鳥二枚營窠梁棟間大如鴨頰毛羽紺翠其聲清越如擊玉每歲生子必引去不知所之山有洞其深罔測莫得而入洞中水聲如􅊲𢾗百面鼓語不相聞其上復有洞穴日光所射可見𢾗十步外菩薩每現像於其中粹昭既致州郡之命因密禱願有所覩須臾見欄楯𢾗尺皆碧玉也有刻􅍢之文為毬路如世間宫殿所造者已而復現紋如珊瑚者亦𢾗尺去人不逺極昭然也久之於深逺處見菩薩像但見下身如腰而上即晦矣白衣瓔珞了了可𢾗但不見其首寺僧云頃有見其面者乃作紅赤色今於山上作塑像正作此色乃當時所見者東望三韓外國諸山在杳冥間海舶至此必有所禱寺有鐘磬銅物皆雞林啇賈所施者多刻彼國之年號亦有外國人留題頗有文彩者僧云禱于洞者所現之相有不同有見淨瓶者有見纓絡者善財者橋梁者亦有無所覩者洞前大石下有白玉晶瑩謂之菩薩石粹昭平生倔強至是頗信向云唐人詩行役異鄉懷歸感嘆而意相同者如賈島云客舍并州已十霜歸心日夜憶咸陽無端更度桑乾水却望并州是故鄉竇鞏云風雨荆州二月天問人初雇峽中船西南一望雲和水猶道黔南有四千桞宗元云林邑山聮瘴海秋牂柯水向郡前流勞君更問龍池地正北三千到錦州李啇隱云君問歸期未有期巴山夜雨漲秋池何時共剪西窗燭却語巴山夜雨時皆佳作也假承務者醫術甚精貴人奏以不理選限恩澤居冝興非有勢者力不能屈致翟公巽參政居常熟𣣔見之托平江守梁仲謨尚書邀之始來乃回平江一冨人病求假醫假曰此病不過湯劑𢾗服可愈然非五百千足為酬不可其家始許其半假拂衣而去竟從其請復以五十星為藥資假復求益增至百星始肯出藥果如其説而差假其載所獲而歸中塗夜夢一朱衣曰上帝以爾為醫而厚取賄賂殊無濟物之心命杖脊二十敕左右牽而鞭之既窹猶覺脊痛令人視之有捶痕歸家未幾而死東坡性喜飲而飲亦不多在黃州嘗以蜜為釀又作蜜酒歌人罕傳其法每蜜用四斤煉熟入熟湯相攪成一斗入好麵麯二兩南方白酒餅子米麯一兩半搗細生絹袋盛都置一器中密封之大暑中冷下稍涼溫下天冷即熱下一二日即沸又𢾗日沸定酒即清可飲初全帶蜜味澄之半月渾是佳酎方沸時又煉蜜半斤冷投之尤妙豫嘗試為之味甜如醇醪善飲之人恐非其好也蘇子由在政府子瞻為翰苑有一故人與子由兄弟有舊者來干子由求差遣久而未遂一日來見子瞻且云某有望內翰以一言為助公徐曰舊聞有人貧甚無以為生乃謀伐冢遂破一墓見一人祼而坐曰爾不聞漢世楊王孫乎祼葬以矯無物以濟汝也復鑿一冢用力艱既入見一王者曰我文帝也遺制壙中無納金玉器皆陶瓦何以濟汝復見有二冢相連乃穿其在左者久之方透見一人曰我伯夷也羸瘠面有飢色餓于首陽之下無以應汝之求其人嘆曰用力之勤無所獲不若更穿西冢或冀有得也羸瘠者謂曰勸汝别謀於他可汝視我形骸如此舍弟叔齊豈能為人也故人大笑而去梅摯公儀龍啚景祐初以殿中丞知昭州昭號二廣煙瘴水土惡弱處公嘗為瘴説其略云仕亦有瘴急催暴斂剝下奉上此租賦之瘴也深文以逞良惡不白此刑獄之瘴也侵牟民利以實私儲此貸財之瘴也盛揀姬妾以娛聲色此帷薄之瘴也有一於此民怨神怒安者必疚疚者必隕雖在輦下亦不可免何但逺方而已仕者或不自知乃歸咎於土瘴也不亦謬乎豫讀此文慨然有感涖仕者當書座右亦可為訓也世謂子瞻詩多用小説中事而介甫詩則無有也豫謂介甫詩亦為用之比子瞻差少耳如酬王賢良松詩云世傳壽可三松倒此語難為常人道夀倒三松見裴鉶傳竒春日郊步云興盡無人楫迎汝却隨倦鵲歸鄰舂楫迎汝見古樂府王獻之桃葉歌金陵西齋詩云黃奴三倒類瓊樹小砑紅綾鬪詩句小砑紅綾見大業拾遺舒州云巫祝萬端曽不救只疑天賜雨工間雨工見洞庭煙傳徽州硯石有紋如眉者謂之眉子石東坡常作眉子石硯歌極有連姢環可愛者東海宫聲應中有一硯尉氏孫宗鑑少魏舍人為作銘曰襄城愁京兆嫵北窗散黛東家翠羽稜稜筆鋒與此等伍胡不纍子英氣妙語又曰夕鋒既去碧落方暮淡踈星之微明橫青霞之𢾗縷想像泬寥夷猶毫楮俾子之文萬丈軒翥梁冀妻孫壽封襄城君作愁眉啼粧詩云北窗朝向鏡錦帳復斜縈嬌羞不肯出猶言粧未成散黛隨眉廣胭脂逐臉生試將持出衆定向可憐名宋玉好色賦東家之子眉如翠羽用斯事也杜子美詩云江閣要賔許馬迎午時坐起自天明晉王修字敬仁語林曰敬仁有異才時賢皆重之王右軍在郡迎敬仁叔仁輒同車每惡其遲後以馬迎之敬仁雖復風雨亦不以車也杜子美有憶鄭南北玭詩云鄭南伏毒守蕭灑到天心殊不曉伏毒守之義守當作寺按華州啚經有伏毒寺劉禹錫外集有貞元中侍郎舅氏牧華州時豫再忝科第前後由華覲謁陪登伏毒嵓今世行本皆作守誤也正德辛已夏五月端五後一日燈下勘畢姑蘇唐寅借勘俞子容家鈔書墨莊漫録卷第五
