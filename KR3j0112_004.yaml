body:
  text: 𤏡間賽神者皆歌穆護其略云聽唱商人穆護四海五湖曽去因問穆護之名父老云蓋木瓠耳曲木狀如瓠擊之以節歌耳豫見淮泗村人多作炙手歌以大長竹𢾗尺刳去中節獨留其底築地逄逄若鼓聲男女把臂成圍擴髀而歌亦以竹筒築地為節四方風俗不同吳人多作山歌聲怨咽如悲聞之使人酸辛桞子厚云欵乃一聲山水緑此又嶺外之音皆此類也濟南為郡在歷山之隂水泉清冷凡三十餘所如舜泉爆流金線真珠洗鉢孝感玉環之類皆竒李格非文叔為歷下水記敘述甚詳文體有法曽子固作詩以爆流為趵突未知孰是發運使淳化四年始建官焉六路轉輸於京師者至六百二十萬石通泰楚海四州煮海之鹽以供六路者三百二十餘萬石復運六路之錢以供中都者常不下五六十萬貫淳化四年以內殿崇班楊允武恭為都大𬋩勾江南諸州綱船搬運鹽糧錢帛茶貨當時殿直蔡崇道供奉官劉全信同𬋩勾五年七月允恭授西京作坊使逐次添𬋩職事乃立制置發運使額至乾興元年十二月文武官二員皇祐元年施昌言以天章閣待制充使自後多除兩制統六路年額上供米六百二十萬石內四百八十五萬石赴闕一百三十五萬石南京畿送納淮南一百五十萬石一百二十五萬石赴闕二十萬石咸平尉氏五萬石太康江南東路九十九萬一千一百石七十四萬五千一百石赴闕二十四萬五千石赴拱州江南西路一百二十萬八千九百石一百萬八千九百石赴闕二十萬石赴南京湖南六十五萬石盡赴闕湖北三十五萬石赴闕兩浙一百五十五萬石八十四萬五千石赴闕四十萬三千三百五十二石陳留二十五萬一千六百四十八石雍丘東坡知徐州作黃樓未幾黃州安置為定帥作松醪賦有云遂從此而入海渺翻天之雲濤俄貶惠州移儋耳竟入海矣在京師送人入蜀云莫欺老病未歸身玉局他年第幾人北歸果得提舉成都玉局觀三事皆讖也京師五嶽觀後凝祥池有黃色蓮花甚竒他處少見本也安惇處厚初謫潭州過儀真見客河亭有一丐者遽前白言有戲術願陳一笑安心異之欣然延禮丐者求一硯及素𥿄幅𥿄香爐乃取土以唾和呵之成墨矣又取土呵之悉成薰陸焚之芬馥乃研墨謂安曰吾不能書命小吏持筆題詩曰佳人如玉酒如油醉臥鴛鴦帳裡頭咫尺洞庭君不到長生不死最風流處厚讀之不恱自以無嗜𣣔久矣豈有佳人如玉醉卧鴛鴦之事乎且謂洞庭君不到是謂我不可仙矣遂謝丐者與酒一壼一引而盡長揖而去安行將過洞庭之日𬒳命鐫削官資放歸田里乃悟前詩之異丐者必異人也然詩中似隱神仙祕訣人不曉耳東坡自常州赴登州經過揚州石塔寺長老戒公來謁東坡坡云經過草草恨不一別石塔塔起立云遮箇是磚浮啚耶坡云有縫塔云若無縫何以容得世間螻蟻坡首肯之元豐八年八月二十七日也明日坡又作詩贈之云竹西失却上方老石塔還􅑮惠照師我亦化身東漢去姓名莫遣世人知崔公度伯易赴宣州守江行夜見一舟相隨而行寂然無聲晚船得港而泊所見之舟亦止近岸公疑之遣人視之乃空舟也舟中有血痕於舟尾得皂絛一條繫文字一𥿄取觀之乃顧舟契也因得其人姓名及牙保之屬至郡檄巡尉緝獲盡獲其人蓋船主殺雇舟之商取其物而棄其舟遂伏于法豈鬼物銜冤而訴乎文潞公丞相出鎮西京奉詔於瓊林苑燕餞從列皆預賦詩送行王禹玉時為內相詩云都門秋色滿旌旗祖帳容陪醉御巵功業逈髙嘉祐末精神如破貝州時匣中寶劒騰霜鍔海上仙桃壓露枝昨日更聞褒詔下别看名姓入彞時以為警絶曾紘伯容為豫言此詩第一句便見體面之大若非上公大僚詎敢於都門而張旌旗耶此餘人所不可當也白居易獻裴度丞相詩云聞説風情筋力在只如初破蔡州時禹玉用此事也鎮江府甘露寺在北固山上江山之勝煙雲顯晦萃於目前舊有多景樓尤為登覽之最蓋取李贊皇題臨江亭詩有多景懸窗牖之句以是命名樓即臨江故基也裴煜守潤日有詩云登臨每憶衛公詩多景惟於此處冝海岸千艘浮若芥邦人萬室布如旗江山氣象回環見宇宙端倪指點知禪老莫辭勤候迓使君官滿有歸期自經兵火樓今廢近雖稍復營繕而樓基半已侵削殊可惜也王荆公退居金陵建宅於半山蓋自城至鍾山此寶公塔路之半因以得名宅後有謝公墩乃謝安石居東山之所也荆公詩云我名公字偶相同我屋公墩在眼中公去我來墩屬我不應墩姓尚隨公其後公捨宅為報寧寺寺今亦廢未復舊而墩巋然􅍦存宣和二年睦冦方臘起幫源浙西震恐士大夫相與奔竄關注子東在錢塘避地携家於無錫之梁溪明年臘就擒離散之家悉還桑梓子東以貧甚未能歸乃僑寓於毗陵郡崇安寺古柏院中一日忽夢臨水有軒主人延客可年五十儀觀甚偉玄衣而美鬚髯揖坐使兩女子以銅杯酌酒謂子東曰自來歌曲新聲先奏天曹然後散落人間他日東南休兵有樂府曰太平樂汝先聽其聲遂使兩女子舞主人抵掌而為之節已而恍然而覺猶能記其五拍子東因作詩記云玄衣仙子從雙鬟緩節長歌一解顔滿引銅杯效鯨吸低回紅袖作弓彎舞留月殿春風冷樂奏鈞天曉夢還行聽新聲太平樂先傳五拍到人間後四年子東始歸杭州而先廬已焚於兵火因寄家菩提寺復夢前美鬚者腰一長笛手披書册舉以示子東𥿄白如玉小朱欄界間行以譜有其聲而無其詞笑謂子東曰將有待也往時在梁溪曽按太平樂尚能記其聲否乎子東因為之歌美鬚者援腰間笛復作一弄亦私記其聲蓋是重頭小令已而遂覺其後夢又至一處榜曰廣寒宫宫門夾兩池水瑩淨無波地無纎草仰觀巍峩若洞府然門鑰不啓或有告之者曰但曵鈴索呼月姊則門開矣子東從其言試曵鈴索果有應者乃引至堂宇見二仙子皆眉目踈秀端莊靚麗冠青瑶冠衣彩霞衣似錦非錦似繡非繡因問引者曰此謂誰曰月姊也乃引子東升堂皆再拜月姊因問往時梁溪曽令奴鬟歌舞傳太平樂尚能記否又遣紫髯翁吹新聲亦能記否子東曰悉記之因為歌之月姊喜見顔面復出一𥿄書以示子東曰亦新詞也姊歌之其聲宛轉似樂府昆明池子東因𣣔強記之姊有難色顧視手中𥿄化為碧字皆滅迹矣因揖而退乃覺時已夜闌矣􅍦記其一句云深誠杳隔無疑亦不知為何等語也前後三夢後多忘其聲惟紫鬚翁笛聲尚在乃倚其聲而為之詞名曰桂花明云縹眇神清開洞府遇廣寒宫女問我雙鬟梁溪舞還記得當時否碧玉詞章教仙語為按歌宫羽皓月滿窗人何處聲未斷瑶臺路子東嘗自為豫言王禹玉為翰苑治平三年二月十五日召對蕊珠殿時賜紫花衣墩令坐踰𢾗刻方罷明年英廟上仙圭作挽詞有云曽陪蕊珠殿獨賜紫花墩蓋謂是也金叉雙捧玉纎纎星宿光芒動滿奩解笑詩人誇博物秪知紅顆味酸甜曽子固荔枝詩也白樂天荔枝詩曰津液甘酸如醴酪杜子美詩云紅顆甜酸秪自知故前詩譏二公也政和初閩中貢連珠者移植禁中次年結實不減土出道君御製詩云玉液乍凝仙掌露絳紗𥘉脫水晶丸蓋體物之貢矣時群臣皆應制焉髙郵禪居寺大殿佛髻珠一日為盜竊去往來夜中不得出僧怪之曰汝往來何求曰𣣔求門以出僧指之曰此門也又復他之竟不見也僧詰問具以竊珠對即引盜對納珠令投哀引咎乃識途而去僧因抆拭佛供見座下有敗經腐爛狼籍鼠巢其中小鼠𢾗枚尚未能走或少足或眇目欠尾者無耳者殆無一全形殊可怪也王將明後房曰田令人者顔貌殊倫真國色也靖康改元正月將明死田自都携一婢竄至亳州居逆旅中郡知之為拘𬋩𢾗月其家遣人迎歸蔡元長後房曰武恭人亦妙麗不凡元長謫嶺表武在京為一使臣姓孫人所畜乃携孫竄至南京亦為郡所拘七月開封差人擒之送入京師時豫適在二郡皆見之錢唐僧淨暉字照曠學琴於僧則全完仲遂造精妙得古人之意宣和間久居中都出入貴人門嘗得一舊琴修治之磨去舊􅃮三𢾗重隱隱若有字痕重加磨礲得古篆霜鏞二字黃金填之字畫徑妙有法中官陳彥和以七百千得之别為馬價珠為徽白玉為軫修成彈之清越聲壓𢾗琴非雷氏未易臻此也靖康丁未辛道宗將趙万叛九月二十八日陷鎮江府時彥和在京口挺身而走琴遂不携又宗室士㒟立之時知南外大宗正亦在郡所服犀帶乃道君解賜淵聖淵聖解賜士㒟者正透盤龍亦亡焉龍屈若飛翔之狀豫嘗見之郭熙和陽溫縣人以畫得名其子思後登科熙喜甚乃於縣庠宣聖殿內啚山水窠石四壁雄偉清閏妙絶一時自云平生所得極意于此筆矣熙能為逺景意趣益新略不相雜亦名手也貴人家收熙一景山水二十四幅挂高堂上森然若在林壑間未易得也思後為待制乃重資以收父畫𣣔晦其迹也杜子美微意深逺考之可見如丹青引贈曹霸詩也有云至尊含笑催賜金圉人太僕皆惆悵説者謂帝喜霸之能寫真畫馬也故催金賜之而圉人太僕自嘆其無技以蒙恩賚耳如此説則意短無工殊不知此畫深譏肅宗也考是詩始云先帝天馬玉花驄畫工如山貌不同是日牽來赤墀下逈立閶闔生長風帝既見先帝之馬當軫羹墻之念反含笑而賜金曽不若圉僕見馬能惆悵而懷先帝也又寄劉峽州伯華使君長篇尾句云江湖多白鳥天地亦青蠅人多指白鳥為鷺非也按月令仲秋之月群鳥飬羞注引夏小正曰九月丹鳥羞白鳥説者謂蚊蚋也又金樓子云齊威公臥於柏寢白鳥營飢而求飽公開緑紗之厨而進焉有知禮者不食而退有知足者雋肉而退有不知足者長噓短吸而食及其飽者腹為之潰蓋戒夫貪也又詩人以青蠅刺讒然則公詩蓋言天下多貪讒之人耳泰陵時蔡元長為學士故事供貼子皇太后皇帝皇后閣各有詞諸妃閣同用四首而已時昭懷劉太后充貴妃元長特撰四首以供之有三十六宫人第一玉樓深處夢熊羆荆公退居鍾山嘗獨遊山寺有人擁𢾗卒按膝據牀而坐驕氣滿容慢罵左右為之辟易公問為誰僧云押綱張殿侍也公即索筆題一詩於扉云口銜天憲手持鈞已是龍墀第一人回首三千大千界此身猶是一微塵王洙原叔內翰嘗云作書册粘葉為上久脫爛苟不逸去尋其次第足可抄録屢得逸書以此獲全若縫䙡歲久斷絶即難次序初得董氏繁露𢾗册錯亂顛倒伏讀歲餘尋繹綴次方稍完復乃縫䙡之弊也嘗與宋宣獻談之公悉令家所録者作粘法豫嘗見舊三館黃本書及白本書皆作粘葉上下欄界皆界出於𥿄葉後在髙郵借孫莘老家書亦作此法又見錢穆父所蓄亦如是多只用白𥿄作褾硬黃𥿄作狹簽子蓋前輩多用此法豫性喜傳書他日得竒書不復作縫䙡也陜州大河南岸有物如鐵石狀俗謂之鐵牛舊有祠宇唐末封號順正廟大中祥符四年真宗祀汾隂幸其廟作鐵牛詩泗州普照寺僧伽塔建炎戊申二月二日災秀州華亭普照寺亦以是日焚其塔亦甚雄盛可亞於泗上也西京進花自李迪相國始杜子美祭房相國九月用茶藕蓴鯽之奠蓴生於春至秋則不可食不知何謂而晉張翰亦以秋風動而思菰菜蓴羹鱸鱠鱸固秋物而蓴不可曉也眺文元公逈深明理性嘗作七審於四威儀中嘗自考校以代曽子三省之義道力深淺自審方知心一一切妄念能息否二一切外緣稍簡省否三一切觸景能不動否四一切語言能慎密否五一切黑白減分别否六夢想之間不顛倒否七方寸之間得恬愈否豫讀公所作內典諸書得此若有所省當書左右以警昏憒張藝叟作鳳翔吳生畫記秦少遊作五百羅漢圖記皆法韓退之畫記俱無愧也墨莊漫録卷第四
