front:
  text: 墨莊漫録卷第四山谷作釣亭詩有云影落華亭千尺月夢通岐下六州王上句蓋用華亭船子和尚詩云千尺絲綸直下垂一波才動萬波隨夜靜水寒魚不食滿船空載月明歸下句蓋用文王夢吕望事然六州王事見毛詩漢廣云文王之道𬒳于南國疏云言南國則一州也于時三分天下有其二故雍梁荆豫徐揚之人咸𬒳其德而從之云云山谷用事深逺其工如此可為法也王禹玉丞相寄程公闢詩云舞急錦腰迎十八酒酣玉盞照東西樂府六么曲有花十八古有玉東西杯其對甚新也陳輔輔之丹陽人能詩荆公深愛之嘗訪建康楊驥德逄留詩壁間云北山松粉未飄花白下風輕麥腳斜身似舊時王謝燕一年一度到君家荆公見之笑謂德逄曰輔之罵君作尋常百姓也東京城北有祅廟呼煙切祅神本出西域蓋胡神也與大秦穆護同入中國俗以火神祠之京師人畏其威靈甚重之其廟祝姓史名世爽自云家世為祝纍代矣藏先世輔受之牒凡三有曰懷恩者其牒唐咸通三年宣武節度使令狐給令狐者丞相綯也有曰溫者周顯德三年端明殿學士權知開封府王所給王乃朴也有曰貴者其牒亦周顯德五年樞密使權知開封府王所給亦朴也自唐以來祅神巳祀於汴矣而其祝乃能世繼其職踰二百年斯亦異矣今池州郭西英濟王祠乃祀梁昭明太子也其祝周氏亦自唐開成年掌祠事至今其子孫今分為八家悉為祝也噫世祿之家能箕裘其業奕世而相繼者蓋亦甚鮮曾二祝之不若也鎮江府朱方門之東城上乃有祅神祠不知何人立也本朝玉輅乃隋朝所造唐顯德中嘗修之凡三到泰山故張藝叟郊祀慶成詩云大裘依古制玉輅自隋傳范忠宣公堯夫謫居永州以書寄人云此中羊􅔇無異北方每日閉門餐餺飥不知身之在逺也孫覿仲益尚書四六新清用事切當宣和中與家兄子章同為兵部郎未幾子章出知無為軍仲益繼遷言官自南亦出知和州時淮南漕俞以無為歲額上供米後時委知州取勘無為當職官吏仲益得檄漫不省也置而不問亦不移文巳而米亦辦子章德仲益以啓􅒜之仲益答之有云苞茅不入豈敢加問楚之師輔車相依自作全虞之計人頗稱賞以為精切也許洛兩都軒裳之盛士大夫之淵藪也黨論之興指為許洛兩黨崔鶠德符陳恬叔陽皆戊戌生田晝承君李豸方叔皆己亥生並居頴昌陽翟時號戊巳四先生以為許黨之魁也故諸公皆久廢之杜甫有云星落黃姑渚秋辭白帝城之句説者但見古詩云東飛伯勞西飛燕黃姑織女時相見意謂黃姑乃牽牛然不見正所出不曉黃姑之説故揚億大年荷花詩云舒女清泉滿黃姑别渚通劉筠子儀七夕詩云伯勞東翥燕西飛又報黃姑織女期大年和云天孫已度黃姑渚阿母還來漢帝家皆用此事豫後讀緯書始見引張平子天象賦云河鼓集軍以嘈雜噆張茂先李淳風等注云河鼓三星在牽牛星北主軍鼓蓋天子三軍之象昔傳牽牛織女見此星是也故爾雅河鼓謂之牽牛又古詩云東飛伯勞西飛燕黃姑織女時相見黃姑即河鼓也音訛而然今之學者或謂是列舍牽牛而會織女故於此折其疑又張茂先小家賦曰九坎至牽牛織女期河鼓石鍊注云河鼓星在牽牛北天鼓也主軍鼓主鈇鉞李淳風自昔相傳牽牛織女七月七日相見者乃此星也豫因此始知黃姑乃河鼓也為牽牛之别名昔人云開卷有益信然杜甫大曆三年春白帝城放船出瞿塘峽將適江陵詩四十韻其末有云五雲髙太甲六月控摶扶之句鮑欽止鄧睿思范元實及世行所謂王原叔注者諸家皆不詳五雲太甲之義豫讀唐王勃文集有大唐九隴縣孔子廟堂銘序云帝車造指遁七矅於中階華蓋西臨載五雲於太甲雖使星辰蕩越三元之軌躅可尋雲雨沸騰六氣之經綸有序然則撫銅渾而觀變化則萬象之運不足多矣握瑶鏡而臨事業則萬幾之湊不足大矣云云然則五雲太甲之義蓋為玄象而言矣第未見正所出之書當俟博洽君子請問之惟酉陽雜爼云王勃每為碑頌先墨磨數升引𬒳覆面而臥忽起一筆書之人謂之腹稿燕公嘗讀夫子學堂碑自帝車至太甲四句悉不解訪之一公一公言北斗建午七矅在南方有是之祥無為聖人當出華蓋以下卒不可悉然則五雲太甲一公燕公不知之况餘人乎一公謂一行禪師也東北冬月寒甚夜氣塞空如霧著於林木凝結如珠玉旦起視之真薄雪也見日乃消釋因風飄落齊魯人謂之霿淞諺云霿淞重霿淞窮漢置飯甕蓋歲穰之兆也曽子固之齊州有冬夜詩云香清一榻氍毹暖月淡千門霿淞寒又有霿淞詩云園林𥘉日靜無風霿淞開花處處同記得集英深殿裡舞人齊插玉籠鬆蓋謂是也東坡在定武送曹仲錫詩亦云斷蓬飛葉落黃沙秪有千林䰒淞花應謂王孫朝上國珠幢玉節與排衙亦謂此也霿淞音夢送䰒鬆皆同音東坡自儋耳北歸臨行以詩留别黎子雲秀才云我本儋州民寄生西蜀州忽然跨海上譬如事逺遊平生生死夢三者無劣優知見不再見𣣔去且少留後批云新釀佳甚求一具理臨行寫此以折菜錢宣和中豫在京師相藍見南州一士人携此帖來粗厚楮𥿄行書塗抹一二字類顔魯公祭姪文甚竒偉也具理南荒人瓶􅑥名也劉安世器之在都下僧化成見之曰公在胞胎中當有不測驚危幼年復有惡疾幾為廢人然卒無恙蓋器之父航赴官蜀中時母方娠遇棧道天雨新霽磴滑危甚忽石隕馬蹶夫人已墜崖下矣衆皆驚泣無復生望試使下瞰崖腹有巨木葛藟縈結盤屈如蓋落葉委籍夫人安坐于上呼之即應乃以衾㡡懸縋而上了無所傷至官未幾而育器之後十餘歲居京師苦赤目甚惡精溢于外百醫莫差一日有客云某有一相識來調官畜惡目藥甚效昨日來别云已陛辭早晚即行試遣人往求之時行李己出房云藥誠有之匆匆忘記在某篋中𥘉發一篋藥已在焉遂得之令以藥傳精上軟綿纏護戒七日方開一傅痛即止及開精已內眸子瞭然矣二事器之自為劉勉中言蘇隂和尚作穆護歌又地理風水家亦有穆護歌皆以六言為句而用側韻黃魯直云黔南巴
