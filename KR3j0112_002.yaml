body:
  text: 墨莊漫録卷第二蔡絛約之西清詩話云人之好惡固自不同杜子美在蜀作悶詩乃云捲簾惟白水隱几亦青山若使豫居此應從王逸少語吾當卒以樂死豈復更有悶乎豫以謂此時約之未契此語耳人方憂愁亡聊雖清歌妙舞滿前無適而非悶子美居西川一飯未嘗忘君其憂在王室而又生理不具與死為鄰其悶甚矣故對青山青山悶對白水白水悶平時可愛樂之物皆寓之為悶也約之處冨貴所欠二物耳其後竄斥經歷﨑嶇險阻必悮此詩之為工也東坡贈黃照道人詩云面臉照人元自赤眉毛覆眼見來烏王立之詩話云元自見來皆俚語也杜子美詩云鎖石藤梢元自落倚天松骨見來枯坡句法此而為之俚語立之未之思耳建炎改元冬豫間居揚州里廬因閲太平廣記每過豫兄子章家夜集談記中異事以供笑語時子章館客天長解飬直剛中因言頃聞一異事云元符末年渭州潘原縣民方耕田有民自地間湧出耕者見之驚怛棄犁而走則斥逐擊之不得走執耕者及縣縣吏遇之輒毆縣吏吏皆散走見縣令馬敦古又毆令令亦走俄而赴於庭奄然一土偶人也視之則歲所嘗奉土牛傍所謂勾芒神者於是共舁出之未幾復有至者亦事皆同日十𢾗至不能禦官吏皇恐令不敢復視事居若干日有物人類蓬首黑而痤肥降令舍莫知所從耒令罔測乃曰爾無庸恐吾也我為爾食盡芒兒矣爾恭事我乃汛灑􅈦事之東室居之凡十餘人其長者自稱天神其次曰王褒李貴其餘有姓名有婦人二曰雲英月英日謹伺候供億其飲食嘗闔自竇中出入有所須召則其長者呼王褒李貴而令焉置吏門外為傳呼事之甚嚴自是土怪不至民亦以其無他用止怪頗安焉令猶德之久之題點刑獄程棠行縣問令所以室中遽呼曰王褒為我傳語提刑適贈詩不省已得乎置吏以告棠起立曰某適至此已晚不敢見也所賜詩者實未得吏去復至曰詩在提刑汗衫上袒視之果然乃不敢復語相與遽起先是渭州都巡檢侯恩老矣其為人剛方不撓好面折人一州號為木強自聞見怪獨心常易之方棠巡按時恩如州界方奉迎從至縣恩以職事從在縣衙獨踞胡床坐􅈦事傍俄有物自東隅來階下兩手扳階基首與階平徐過恩坐恩徒手摶得之號掣不放觸其體若氷石有力能反曵人恩素有力一手捽其領捩左手著胡牀從之卒不放至所謂怪室者兩足入户內引恩手戞户頰久乃放之一縣大驚令猶恐失舉止往來語曰都巡都巡敗我事矣棠亦愈惶恐徘徊夜中不聞有聲棠乃罷歸宿于縣驛明旦棠盛服至上謁令灑掃設香案以俟恩亦戎服待事謁入不出日髙稍稍摩户視之􅞔其無人室中凝塵尺餘亦不見有人迹令猶愕曰竟為都巡所誤禍至若何恩曰某已為除害去之矣何禍為棠乃從令及恩共入視之壁間得細書一行云侯公正直豫等謹退自後怪遂兩絶侯公者開封人字澤之有子名傳為天長巡檢常為人言此曰某是時侍親渭上目所見也傳又曰今天長尉賈壇時亦待其父在焉解生聞此事於巡撿後賈尉亦能言之又得程棠王褒李貴之姓名不疑尚有闕者皆幼不記也異哉異哉杜子美秦州詩云馬驕珠汗落胡舞白題斜題或作蹄莫曉白題之語南史宋武帝時有西北逺邉有滑國遣使入貢莫知所出裴子野云漢頴隂侯白題將一人服虔注曰白題胡名也又漢定逺侯擊虜入滑此其後乎人服其博識豫嘗疑之蓋白題胡名對珠汗似無意後見李長民元叔云在京師圍城中戎騎入城有胡人風吹氊笠墮地後騎告云落下白題其胡下馬拾之始悟白題乃胡人謂氊笠也子美所謂胡舞白題斜胡人多為旋舞笠之斜也似乎謂此也周昕大夫居鄧州父中散卒𢾗十年矣一夕昕妻夢中散如平生謂曰我且為羊今在某坊某氏屠肆五更即死當速見贖烏頭者即我也覺而語昕以為夢中語勿信斯須復夢於昕時已四鼓亟遣㒒推門至屠家且問有烏頭羊否屠伯云適有一頭㒒曰幸勿殺周宅𣣔求為厭勝之用乃倍直牽歸視昕有喜色遂飬之每昕自外歸徑趨懷中得食乃已如是𢾗年羊乃死王定國寄詩於東坡坡答書云新詩篇篇皆竒老拙此回真不及矣窮人之具輒𣣔交割與公魏道輔見而笑曰定國亦難作交代祗是且權攝耳仁宗嘗問孝肅包公拯歷代編户多少之𢾗公悉考以對以謂三代雖盛其户莫得而詳前漢元始二年人户千二百二十三萬三千後漢光武兵革之後户四百二十七萬六百三十永壽三年增至一千六十七萬九百六十三國䁀峙版籍歲減才百四十餘萬晉武帝平吳之後户二百四十五萬九千八百南北朝少者不盈百萬多者不過三倍隋文帝大業二年户八百九十萬七千五百三十六唐𥘉户不滿二百萬髙宗永徽元年增至三百八十萬明皇天寶十三載只及九百六萬九千一百五十四自安始之亂乾元已後僅滿一百二萬武宗會昌中增至四百九十五萬五千一百五十一降及五代四方竊據大約各有𢾗十萬太祖建隆之初有户九十六萬七千三百五十三開寶九年漸加至三百九萬五百四户太宗至道二年增至四百五十一萬四千二百五十七真宗天禧五年又增至八百六十七萬七千六百七十七陛下御宇以來天聖七年户一千一十六萬二千六百八十九慶曆二年增至一千三十萬七千六百四十八年又增至一千九十六萬四千四百三十四拯以謂自三代以降跨唐越漢未有若今之盛者拯又言蚩蚩之生聚蕃息衰耗一出於時政之所關陶化明主知其然也必薄賦斂寬力役救荒歉三者不失然後幼有所飬老有所終此乃陛下日慎一日以致其盛遂與之休飬則可封之俗不秪二帝之盛矣宣和乙巳十二月四日夜讀公奏録節出嗚呼盛德之語乃如此梓州織八丈濶幅絹獻宫禁前世織工所未能為也茄根并枝暴乾燒作灰為香煤甚竒能飬火延夕余嘗自製鼻觀香有一種蕭灑風度非閨幃間惱人破禈香味也其法用沉水香一兩屑之取榠楂液漬之過一指三日泣其液降真香半兩以建茶鬪品二錢七作漿漬一日以濕竹𥿄五七重包之火煨少時丁香一錢新極鮮新者不見火玄參二錢鮮去塵埃密煼令香真茅山黃連香一錢白檀香三錢麝半錢婆律一錢熖硝一字俱為細末濃煎皂角膠和作餅子密器收之燒時極慢火題跋最為難事惟東坡山谷每題必有佳思山谷徐熙畫菜云士大夫不可不知此味不可使斯民有此色唐來鵬有觀懴會美人詩云回眸緑水波初起合掌白蓮花未開嘉祐中有王永年者取宗女求舉於竇卞楊繪得監金耀門書庫永年嘗置酒延卞繪出其妻間坐妻以左右手掬酒以飲卞繪謂之白玉蓮花盞可謂善休物者也然意亦取鵬之詩云江南李後主嘗於黃羅扇上書詩以賜宫人慶奴云風情漸老見春羞到處消魂感舊遊多謝長條似相識強垂煙態拂人頭想見其風流也扇至今傳在貴人家洛中花工宣和中以藥壅培於白牡丹如玉千葉一百五玉樓春等根下次年花作淺碧色號歐家碧歲貢禁府價在姚黃上嘗賜近臣外廷所未識也都尉王詵為王定國畫煙江疊嶂圖東坡作詩所謂江上愁心千疊山者定國死其子由以畫貨與髙郵冨人茅生以獻章獻或云禁中喻陟明仲睦州人持節𢾗政績藹著雅善散隸尤妙長笛每按行至山水佳處馬上臨風快作𢾗弄殊風流簫散也嘗有馬上吹笛詩云云寄張藝叟和寄云越客思歸黯不平間持長笛寫秦聲羡君氣海如斯壯博我詞峯孰敢爭江上梅花開又落隴頭流水咽還驚豈知不寐鰥魚眼獨坐山堂對月明又手帖云舜民已三請外若得西道一局再託舊德便冀掃榻更需洗水晶杯也水晶杯明仲珍惜物非佳客不出故藝叟戲云夀春村農曉耕於野每見青雀五枚翔集桑上毛羽紺翠天明即見心頗異之一日偶拈石擊之正中其一隕地視之乃青銅雀已折矣因於其下􅓯之不𢾗尺得銅香爐蓋上一雀四足而闕其一矣後為方會給事家所得工製簡檏亦無他異魏泰道輔自號臨漢隱居著東軒雜録續録訂誤詩話等書又有一書譏評巨公偉人闕失目曰碧雲騢取莊獻明肅太后垂廉時西域貢名馬頸有旋毛文如碧雲以是不得入御間之意嫁其名曰都官貟外郎梅堯臣撰實非聖俞所著乃泰作也襄邑義塘村出一種瓜大者如拳破之色如黛味甘如蜜餘瓜莫及頃歲貢之以其子蒔他處即變而稍大味亦減矣康節邵先生堯夫在洛中嘗與司馬溫公論易𢾗推園中牡丹云某日某時當毀是日溫公命數客以觀日向午花方穠盛客頗疑之斯須兩馬相踶絶銜斷轡自外突入馳驟欄上花果壞焉嘗言天下可傳此者司馬君實章子厚耳而君實不肯學子厚不可學也臨終焚其書不傳秪以皇極經世行於世唐暨潛亨質肅公猶子余母之舅也早退隱居襄陽著春秋正典以周官定臧否鄒完為序娶陳氏蜀人令德純茂尤工文章大觀中先君為郡學官代還以詩送别余母一云念别每驚魂流年多病身惟我延陵子情真意更親分携無淚盡望逺起愁新老眼將何暖音書不厭頻二云雪意亂江雲江梅漸放春堆歸人去後愁與歲華新榮路君方振玄居我豈貧惟餘憂我念相憶莫沾巾宣和間宫中重異香廣南篤耨龍涎亞悉金顔雪香褐香軟香之類篤耨有黑白二種黑者每貢𢾗十斤白者止一二斤以瓠壺盛之香性熏漬破之可曉號瓠香白者價直八十千黑者三十千外廷得之以為珍異也又貢異物圓如龍眼實色若緑葡萄號貓兒眼睛能息火燃炭方熾投之即滅又云能解蠱毒之藥前世所紀異物多矣未聞此種也荔枝皮不可燒其香引尸蟲睡香花其香清婉在餘花上窠株少見大者襄陽唐表舅家一株面濶一丈二三尺婆娑如蓋下可坐胡牀趙岍西知襄陽𣣔取之竟不與也兵火之後不復存焉豈歸閬苑耶李居仁大夫嘗言舒州山中深􅑐間附石生一株髙二三丈下可坐十客不可移也今浙中以丁香本接者芬芳極短不如天生者其香漚鬱清烈也不十年即瘦悴就稿矣顧臨子敦為翰苑每言趙廣漢尹京有治聲使我為之不難當出其上子瞻戲曰君作尹須改姓顧曰何姓曰姓茅喚作茅廣漢禹餘糧石形以多怪磈礧百出或正類蝦蟆中空藏白粉去其粉可貯水作硯滴出鼎州祗闍山者多此類他亦有之然不及也長老祖秀曇頴説黃魯直謂荀中令喜焚香故名縮砂湯曰荀令湯朱雲喜直言切諌苦口逆耳故名三稜湯曰朱雲湯任夢臣任西川路提點刑獄以廉節稱卧病不起家四壁立二女賢甚趙清獻公守城都率僚屬以俸助之二女辭不受力拒之云豈敢以此汚先君之清德趙倅成伯篤意勉之遂納於公宇之東廡既行以元物若干榜於門壁付之守禦吏無毫髮所損二女廉潔如此文筆議論士夫所不逮也後𢾗年清獻皆以子姪妻之蘇頌子容丞相慱學無所不通熙寧十年為大遼生辰國信使在虜中適遇冬至時本朝曆先北朝一日北朝曆後一日北人問公孰是公曰曆家算術小異遲速不同謂如亥時節氣相交則猶是今夕若踰𢾗刻則屬子時為明日矣曆家布算容有遲速或先或後故有一日之異皆各從本朝之曆可也虜人深以為然遂各以其日為節慶賀使還奏之上喜曰朕思之此最難處卿之所對極中事理近時傳一書曰龍城録云栁子厚所作非也乃王銍性之偽為之其梅花鬼事蓋遷就東坡詩月黑林間逄縞𬒮及月落參橫之句耳又作雲仙散録尤為怪誕殊誤後之學者又有李歜注杜甫詩及注東坡詩事皆王性之一手殊可駭笑有識者當自知之黃實師是弟宰方叔坐上書譏訕事下御史時相𣣔置極典中丞盧航彥濟乞降元書看詳時禁中已焚其書有旨令宰執就臺供析其言有云蔡京姦邪用之誤國童貫閹官祗可灑掃宫庭不冝預廟謀密算刪去謗訕之語遂得寬貸時相猶忿𣣔置決彥濟復爭之乃流海島後𢾗年定武帥梁子美奏邉事有云某事乞依黃實知本州日申明徽宗忽顧左右曰實有弟而今在何處近臣奏先因上書得罪流海島即日內批與量移後遇赦放還便終於家張稚圭元老荆公客也為江東漕攝金陵府事嚴酷鮮恕喜與方士遊門下嘗𢾗客一日行郡圃老卒項繫念珠公曰汝誦經乎卒曰𢾗息爾公異之呼至室內問其得所論飬生吐納內丹皆造精微又曰運使平生殊錯用心酷虐用刑非所以為子孫福延方士皆非有道之士此曹特覬公賄耳公曰汝能傳我乎卒曰正𣣔授公然須今夜半潛至某室當以傳公初亦難之不得已許焉既歸與魚軒劉議之劉曰不可公以嚴毅人素苦之夜中獨出事有不測奈何太夫人微聞之潛鎖其寢室竟不得出黎明視事衙校報守圃卒是夜四更跌坐而化公大悵惋𢾗月感疾遂卒舒信道謫居四明幾二十年獨以詩為樂嘗得句云春禽得意千般語澗草無名百種香自喜之既而曰此聮可入箋注不可以示人遂改去不用之東坡先生知揚州一夕夢在山林間忽見一虎來噬公方驚怖有一紫𫀆黃冠以袖障公叱虎使去明日有道士投謁曰昨夜不驚畏否公曰鼠子乃敢爾本𣣔杖汝脊吾豈不知子夜術也道士駭懼而退余友人相訪指案間荆公日録曰僕不喜閲此書余問其故客曰凡稱上曰某事如何則言曰豫不然凡稱某事豫則曰如何則言上曰極是此尤可笑也濠州州宇含桃閣下因􅓯土得一石匣始美疑中藏金玉開之得巨編𢾗帙乃陳留鄭向所述五代開皇紀三十卷乾興元年向以尚書屯田貟外郎為郡守瘞此書於閣下中有銘曰自朱矯命終紫遊位二十四年一十三帝興亡行事魚貫珠綴瘞藁於斯如地之利此書亦行於世山谷先生作蘇李畫枯木道士賦云懼夫子之獨立而矢來無向乃作女蘿施於木末婆娑成隂與世宴息而嘗以矢來無鄉問人少有能説者後因觀韓非子有云矢來有鄉鄉方也有來從之方則積鐡以備一鄉謂聚鐵於身以備一處即甲之不全者矢來無鄉則鐡室以盡備之謂甲之不全者自首至足無不有鐵故曰鐵室備之則體無傷故彼以盡備之不傷此以盡之無姦也言君亦當盡備於臣皆所防疑則姦絶也山谷用事僻逺此點化格也不知者豈知其工云王逄原作假山詩云鯨牙鯤鬛相磨捽巨靈戲撮天凹突舊山風老狂雲根重湖凍脫秋波骨我來謂怪非得真醉揭碧海瞰蛟窟不然禹鼎魑魅形神顛鬼脅相撑揬夏倪均父謂豫言此詩竒險不蹈襲前人韓退之所謂惟陳言之是去者非筆力豪放不能為也范致虛謙叔與蔡元長相忤久處間散宣和初自唐州方城召還提舉寶籙宫未幾執政時元長以五日一造朝居西第乃與謙叔釋憾一日觴於西園主禮勤渥元長作詩見意云一日趨朝四日間荒園薄酒願交歡三峰崛起無平地二派爭流有激湍極目榛蕪惟野蔓忘情魚鳥自波瀾滿船載得圭璋重更掬珠璣洗眼看三峰二派雖皆園中景蓋有激而云時罷政未久王黼靈素師成輩方盛也揚州蜀岡上大明寺平山堂前歐陽文公忠手植桞一株謂之歐公桞公詞所謂手種堂前楊桞別來幾度春風薛嗣昌作守相對亦種一株自傍曰薛公桞人莫不嗤之嗣昌既去為人伐之不度德有如此者漢宫香方鄭康成注沈水香二十四銖著石蜜復湯鬻銅鐵輩皆並香以指嘗試能飲甲則已南海賈胡貴一種香木末如蜜房鋭澤正黃可滅甲以寒水炭四焙之青木香十二之一可酌損之雞舌香以其子勿以其母青木香用二錢合搗為糜沈水得鬻蜜煙黃而氣鬱投初鬻蜜中媒使相恱閟以黃堥蜜隙塪不津地霾之火再中許出之投龍腦六銖麝損半一爐注如芡子薰鬱鬱略聞百步中人也今太官加蜜鬻紅螺如射外家效之以殊勝此方魏泰道輔強記面疏以示洪炎玉父意其實古語其後於相國庭寺中買得古葉子書雜抄有此法改正十餘字又一貴人家見一編號古粧臺記證數字甚妙豫恐失之因附于此豫在揚州一日獨遊石塔寺訪一髙僧坐小室中僧於骨董袋中取香如芡許炷之覺香韻不凡與諸香異似道家嬰香而清烈過之僧笑曰此魏公香也韓魏公喜焚此香乃傳其法用黑角沉半兩鬱金香一錢一字麩炒丁香一分上等臘茶一分碾細分作兩處麝香當門子一字右先點一半茶澄取清汁研麝漬之次屑三物入之以餘茶和半盞許令衆香蒸過入磁器有油者地窖窨一月荆公病革甚吳夫人令蔡元度詣茅山謁劉混康問狀劉曰公之病不可為已適見道士𢾗十人往迎公前二人執幡幡面有字若金書然左曰中亟法性右曰外習塵紛元度自言如此或者又云荆公臨薨頗有隂譴怪異之事與此不同未知孰是世傳吕公得道之士唐僖宗時進士能作詩傳者僅百首往往賣墨世間毗陵士人姓邵忘其名善談易衆請講於佛舍至小畜有墨者青巾布衣褰幃直入邵惡之捲卷而問曰何來曰賣墨耳適聞講易至小畜其説非是邵驚遽揖之坐墨者脫屨置案上取墨一丸曰此墨價十千一坐皆笑墨者納屨取硯滌之試墨置日影中貯墨而出曰抵暮復來當知十千非貴也邵且笑且駭少頃視墨硯之所濡徹底為黃金與日影相耀邵惋恨不已必吕公也廣陵牛氏家堂燕方育雛而雌為貓所斃雄啁哳久之翻然而逝少選一雌偕來共哺其子明日有雛墜地至晚群雛畢死取視之滿吭皆卷耳實蓋為雌所毒也嗟乎禽鳥嫉其前雛一至於此而終不悟悲夫晉昌唐寅子畏校畢墨莊漫録卷第二
